version: 1
auth:
  scheme: none
http_backend: http://example.test
entities:
  Product:
    id_field: id
    description: Minimal fixture product for TS facade snapshot tests
    fields:
      id:
        required: true
        value_ref: nv_product_id
      name:
        required: false
        value_ref: nv_product_name
      category_id:
        required: false
        value_ref: nv_product_category_id
      payload:
        required: false
        value_ref: nv_product_payload
    relations:
      category:
        description: Category this product belongs to
        target: Category
        cardinality: one
  Category:
    id_field: id
    description: Product category fixture
    fields:
      id:
        required: true
        value_ref: nv_category_id
      name:
        required: false
        value_ref: nv_category_name
    relations: {}
capabilities:
  product_get:
    description: Fetch a product by id
    kind: get
    entity: Product
    provides:
    - id
    - name
    - category_id
  product_query:
    description: List products
    kind: query
    entity: Product
    parameters:
    - name: owner
      value_ref: nv_product_query_owner
      required: true
      role: scope
    - name: repo
      value_ref: nv_product_query_repo
      required: true
      role: scope
    - name: active
      value_ref: nv_product_query_active
      required: false
  product_search:
    description: Search products by free text
    kind: search
    entity: Product
    parameters:
    - name: q
      value_ref: nv_product_search_q
      required: true
      role: search
    - name: active
      value_ref: nv_product_search_active
      required: false
  product_create:
    description: Create a product
    kind: create
    entity: Product
    parameters:
    - name: name
      value_ref: nv_product_create_name
      required: true
    - name: category_id
      value_ref: nv_product_create_category_id
      required: false
    provides:
    - id
    - name
    - category_id
  product_label:
    description: Label a product
    kind: action
    entity: Product
    parameters:
    - name: label
      value_ref: nv_product_label_label
      required: true
    - name: notify
      value_ref: nv_product_label_notify
      required: false
    output:
      type: side_effect
      description: Applies a label to the product.
  product_update:
    description: Update a product (e.g. repoint category)
    kind: update
    entity: Product
    parameters:
    - name: category_id
      value_ref: nv_product_update_category_id
      required: true
    provides:
    - id
    - name
    - category_id
  product_add_support_reply:
    description: Post a public reply on the helpdesk case thread
    kind: action
    entity: Product
    parameters:
    - name: message
      value_ref: nv_product_add_support_reply_message
      required: true
    output:
      type: side_effect
      description: Customer-visible thread comment; appears on the case timeline.
  category_get:
    description: Fetch a category by id
    kind: get
    entity: Category
    provides:
    - id
    - name
values:
  nv_product_id:
    type: string
    string_semantics: short
  nv_product_name:
    type: string
    string_semantics: short
  nv_product_category_id:
    type: entity_ref
    target: Category
  nv_product_payload:
    type: blob
  nv_category_id:
    type: string
    string_semantics: short
  nv_category_name:
    type: string
    string_semantics: short
  nv_product_query_owner:
    type: string
    string_semantics: short
  nv_product_query_repo:
    type: string
    string_semantics: short
  nv_product_query_active:
    type: boolean
  nv_product_search_q:
    type: string
    string_semantics: short
  nv_product_search_active:
    type: boolean
  nv_product_create_name:
    type: string
    string_semantics: short
  nv_product_create_category_id:
    type: string
    string_semantics: short
  nv_product_label_label:
    type: string
    string_semantics: short
  nv_product_label_notify:
    type: boolean
  nv_product_update_category_id:
    type: string
    string_semantics: short
  nv_product_add_support_reply_message:
    type: string
    string_semantics: markdown
