version: 1

auth:
  scheme: none

http_backend: http://example.test

entities:
  Product:
    id_field: id
    description: Minimal product for execute tool tests
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      name:
        field_type: string
        required: false
        string_semantics: short
      category_id:
        field_type: entity_ref
        target: Category
        required: false
    relations:
      category:
        description: Category this product belongs to
        target: Category
        cardinality: one
  Category:
    id_field: id
    description: Minimal category for relation tests
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      name:
        field_type: string
        required: false
        string_semantics: short
    relations: {}

capabilities:
  product_list:
    description: List products
    kind: query
    entity: Product
    provides:
    - id
    - name
  product_search:
    description: Search products
    kind: search
    entity: Product
    parameters:
    - name: q
      type: string
      required: true
      role: search
      string_semantics: short
  product_get:
    description: Fetch a product by id
    kind: get
    entity: Product
    provides:
    - id
    - name
    - category_id
  category_get:
    description: Fetch a category by id
    kind: get
    entity: Category
    provides:
    - id
    - name
