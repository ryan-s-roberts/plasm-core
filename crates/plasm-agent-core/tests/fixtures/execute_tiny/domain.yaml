version: 1
auth:
  scheme: none
http_backend: http://example.test
entities:
  Product:
    id_field: id
    description: Minimal product for execute tool tests
    fields:
      id:
        required: true
        value_ref: nv_product_id
      name:
        required: false
        value_ref: nv_product_name
      category_id:
        required: false
        value_ref: nv_product_category_id
    relations:
      category:
        description: Category this product belongs to
        target: Category
        cardinality: one
  Category:
    id_field: id
    description: Minimal category for relation tests
    fields:
      id:
        required: true
        value_ref: nv_category_id
      name:
        required: false
        value_ref: nv_category_name
    relations: {}
capabilities:
  product_list:
    description: List products
    kind: query
    entity: Product
    provides:
    - id
    - name
  product_search:
    description: Search products
    kind: search
    entity: Product
    parameters:
    - name: q
      value_ref: nv_product_search_q
      required: true
      role: search
  product_get:
    description: Fetch a product by id
    kind: get
    entity: Product
    provides:
    - id
    - name
    - category_id
  category_get:
    description: Fetch a category by id
    kind: get
    entity: Category
    provides:
    - id
    - name
values:
  nv_product_id:
    type: string
    string_semantics: short
  nv_product_name:
    type: string
    string_semantics: short
  nv_product_category_id:
    type: entity_ref
    target: Category
  nv_category_id:
    type: string
    string_semantics: short
  nv_category_name:
    type: string
    string_semantics: short
  nv_product_search_q:
    type: string
    string_semantics: short
