version: 1

auth:
  scheme: none

http_backend: http://example.test

entities:
  Product:
    id_field: id
    description: Minimal fixture product for TS facade snapshot tests
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      name:
        field_type: string
        required: false
        string_semantics: short
      category_id:
        field_type: entity_ref
        target: Category
        required: false
      payload:
        field_type: blob
        required: false
    relations:
      category:
        description: Category this product belongs to
        target: Category
        cardinality: one
  Category:
    id_field: id
    description: Product category fixture
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      name:
        field_type: string
        required: false
        string_semantics: short
    relations: {}

capabilities:
  product_get:
    description: Fetch a product by id
    kind: get
    entity: Product
    provides:
    - id
    - name
    - category_id
  product_query:
    description: List products
    kind: query
    entity: Product
    parameters:
    - name: owner
      type: string
      required: true
      role: scope
      string_semantics: short
    - name: repo
      type: string
      required: true
      role: scope
      string_semantics: short
    - name: active
      type: boolean
      required: false
  product_search:
    description: Search products by free text
    kind: search
    entity: Product
    parameters:
    - name: q
      type: string
      required: true
      role: search
      string_semantics: short
    - name: active
      type: boolean
      required: false
  product_create:
    description: Create a product
    kind: create
    entity: Product
    parameters:
    - name: name
      type: string
      required: true
      string_semantics: short
    - name: category_id
      type: string
      required: false
      string_semantics: short
    provides:
    - id
    - name
    - category_id
  product_label:
    description: Label a product
    kind: action
    entity: Product
    parameters:
    - name: label
      type: string
      required: true
      string_semantics: short
    - name: notify
      type: boolean
      required: false
    output:
      type: side_effect
      description: Applies a label to the product.
  category_get:
    description: Fetch a category by id
    kind: get
    entity: Category
    provides:
    - id
    - name
