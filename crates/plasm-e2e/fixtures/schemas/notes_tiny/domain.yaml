version: 1

auth:
  scheme: none

http_backend: http://127.0.0.1:9

entities:
  Note:
    id_field: id
    description: Synthesized note (kitchen-sink e2e; stub HTTP).
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      title:
        field_type: string
        required: true
        string_semantics: short
    relations: {}

capabilities:
  note_create:
    description: Create a note (POST, body JSON).
    kind: create
    entity: Note
    parameters:
      - name: title
        type: string
        required: true
        string_semantics: short
    provides:
      - id
      - title
