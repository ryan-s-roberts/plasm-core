name: OSS release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches workspace version
        run: bash scripts/ci/verify-release-tag-matches-workspace-version.sh

  build:
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
          - os: macos-latest
            triple: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binaries
        run: |
          cargo build --release \
            -p plasm-server --bin plasm-server \
            -p plasm --bin plasm \
            -p plasm-cli --bin plasm-cgs
      - name: Package release tarballs
        run: |
          set -euo pipefail
          mkdir -p dist
          bash scripts/ci/oss-release-pack-native.sh "${{ matrix.triple }}" dist
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.triple }}
          path: dist/plasm-*.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: dist-*
          merge-multiple: true
      - name: Flatten artifacts
        run: |
          set -euo pipefail
          mkdir -p upload
          find artifacts -type f -name 'plasm-*.tar.gz' ! -name 'plasm-oss-*.tar.gz' -exec cp {} upload/ \;
          (cd upload && sha256sum plasm-*.tar.gz > SHA256SUMS)
      - uses: softprops/action-gh-release@v2
        with:
          files: upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

