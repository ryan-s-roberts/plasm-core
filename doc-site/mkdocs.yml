site_name: Plasm OSS
site_description: Technical documentation for plasm-core — compiler, runtime, plasm-mcp, and apis/.
site_url: https://plasmtools.github.io/plasm-core/
repo_url: https://github.com/PlasmTools/plasm-core
repo_name: plasm-core
edit_uri: edit/main/doc-site/docs/
copyright: Plasm OSS docs · styled to align with Plasm Cloud (platform.plasm.tools)

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  logo: assets/plasm-mark.svg
  favicon: assets/favicon.ico
  font:
    text: Plus Jakarta Sans
    code: JetBrains Mono
  features:
    - search.suggest
    - search.highlight
    - content.code.copy
    - navigation.instant
    - navigation.tracking
    # Hierarchical sidebar (nested nav from `nav:`). Avoid `navigation.tabs`:
    # tabs flatten top-level items into the header and hide deeper structure.
    - navigation.expand
    - navigation.path
    - toc.follow
  palette:
    - scheme: default
      primary: deep orange
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to dark theme
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to light theme

extra_css:
  - stylesheets/plasm-saas-theme.css

extra:
  generator: false
  social:
    - icon: fontawesome/solid/cloud
      link: https://platform.plasm.tools
      name: Plasm Cloud

plugins:
  - search

markdown_extensions:
  - tables
  - fenced_code
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences

nav:
  - Home: index.md
  - Concepts: concepts.md
  - Start here: getting-started.md
  - Run the MCP appliance: appliance/onboarding.md
  - Glossary: glossary.md
  - Language:
      - Specification: reference/plasm-language-unification.md
      - Correction catalogue: reference/correction-catalogue.md
  - Service endpoints:
      - Tool model: reference/tool-model-http.md
      - Trace & run artifacts: reference/oss-core-trace-artifacts.md
  - MCP:
      - Session reuse: reference/mcp-session-reuse.md
      - Trace correlation: reference/mcp-trace-correlation.md
      - Logical sessions: reference/mcp-logical-sessions.md
      - Incremental DOMAIN: reference/incremental-domain-prompts.md
  - Auth:
      - Incoming auth: reference/plasm-mcp-incoming-auth.md
      - Appliance persistence: reference/oss-appliance-mcp-persistence.md
      - Outgoing OAuth (promotion): reference/oss-outgoing-oauth-promotion.md
  - Catalogs: reference/apis-readme.md
  - Connect an API:
      - Tutorial: authoring/index.md
      - Reference: authoring/reference.md
  - Plugins & compile pipeline: reference/genco-plugin-pipeline.md
  - Extensions roadmap: reference/cgs-extensions-roadmap.md
  - Embed Plasm: crates/index.md
  - CLI & env index: reference/cli-and-env.md
