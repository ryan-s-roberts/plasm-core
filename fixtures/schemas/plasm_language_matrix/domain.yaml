version: 1

auth:
  scheme: none

http_backend: http://127.0.0.1:9

entities:
  LangTag:
    id_field: id
    description: Tags scoped to a LangItem (query_scoped relation target).
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      item_id:
        field_type: entity_ref
        target: LangItem
        required: true
      label:
        field_type: string
        required: true
        string_semantics: short
    relations: {}

  LangLine:
    id_field: id
    description: Child line embedded under LangItem GET (from_parent_get).
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      item_id:
        field_type: entity_ref
        target: LangItem
        required: true
      note:
        field_type: string
        required: true
        string_semantics: short
    relations: {}

  LangItem:
    id_field: id
    description: Primary matrix entity — list, search, CRUD, relations, actions.
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      title:
        field_type: string
        required: true
        string_semantics: short
      score:
        field_type: integer
        required: false
      owner:
        field_type: string
        required: false
        string_semantics: short
    relations:
      lines:
        description: Lines embedded on LangItem GET responses
        target: LangLine
        cardinality: many
        materialize:
          kind: from_parent_get
          path:
          - key: lines
          - wildcard: true
      tags:
        description: Tags fetched via scoped query
        target: LangTag
        cardinality: many
        materialize:
          kind: query_scoped
          capability: langtag_query
          param: item_id

capabilities:
  langitem_query:
    description: List LangItem rows (no required HTTP filters)
    kind: query
    entity: LangItem
    provides:
    - id
    - title
    - score
    - owner
  langitem_query_owner:
    description: List LangItem rows filtered by owner (required query param)
    kind: query
    entity: LangItem
    parameters:
    - name: owner
      type: string
      required: true
      role: filter
      string_semantics: short
    provides:
    - id
    - title
    - score
    - owner
  langitem_search:
    description: Search LangItem rows
    kind: search
    entity: LangItem
    parameters:
    - name: q
      type: string
      required: true
      role: search
      string_semantics: short
    provides:
    - id
    - title
    - score
    - owner
  langitem_get:
    description: Get LangItem by id (includes embedded lines in wire JSON)
    kind: get
    entity: LangItem
    provides:
    - id
    - title
    - score
    - owner
  langitem_create:
    description: Create LangItem
    kind: create
    entity: LangItem
    parameters:
    - name: title
      type: string
      required: true
      string_semantics: short
    - name: score
      type: integer
      required: false
    - name: owner
      type: string
      required: false
      string_semantics: short
    provides:
    - id
    - title
    - score
    - owner
  langitem_update:
    description: Patch LangItem
    kind: update
    entity: LangItem
    parameters:
    - name: title
      type: string
      required: false
      string_semantics: short
    - name: score
      type: integer
      required: false
    - name: owner
      type: string
      required: false
      string_semantics: short
    provides:
    - id
    - title
    - score
    - owner
  langitem_delete:
    description: Delete LangItem
    kind: delete
    entity: LangItem
  langitem_ping:
    description: Side-effect ping on LangItem
    kind: action
    entity: LangItem
    output:
      type: side_effect
      description: Records a ping against the item (matrix conformance).
  langtag_query:
    description: List tags scoped to one LangItem
    kind: query
    entity: LangTag
    parameters:
    - name: item_id
      type: entity_ref
      target: LangItem
      required: true
      role: scope
    provides:
    - id
    - item_id
    - label
  langline_get:
    description: Get LangLine by id (batch relation resolution)
    kind: get
    entity: LangLine
    provides:
    - id
    - item_id
    - note
  langline_query:
    description: List lines scoped to one LangItem (optional list path; also on item GET)
    kind: query
    entity: LangLine
    parameters:
    - name: item_id
      type: entity_ref
      target: LangItem
      required: true
      role: scope
    provides:
    - id
    - item_id
    - note
