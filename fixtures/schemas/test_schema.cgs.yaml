      name:
        name: name
        value_ref: v_str_name
        field_type: string
        string_semantics: short
        allowed_values: 
        required: true
      revenue:
        name: revenue
        value_ref: v_number
        field_type: number
        allowed_values: 
        required: false
      region:
        name: region
        value_ref: v_select_region
        field_type: select
        allowed_values:
        - EMEA
        - APAC
        - AMER
        required: false
    relations:
      contacts:
        name: contacts
        target_resource: Contact
        cardinality: many
  Contact:
    name: Contact
    abstract: true
    id_field: id
    fields:
      id:
        name: id
        value_ref: v_str_id
        field_type: string
        string_semantics: short
        allowed_values: 
        required: true
      name:
        name: name
