---
http_backend: http://localhost:1080
values:
  v_str_id:
    description: ""
    field_type: string
    string_semantics: short
  v_str_name:
    description: ""
    field_type: string
    string_semantics: short
  v_number:
    description: ""
    field_type: number
  v_select_region:
    description: ""
    field_type: select
    allowed_values:
    - EMEA
    - APAC
    - AMER
  v_select_role:
    description: ""
    field_type: select
    allowed_values:
    - Manager
    - Employee
    - Contractor
  v_blob:
    description: ""
