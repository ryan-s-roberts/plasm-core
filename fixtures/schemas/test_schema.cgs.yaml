    mapping:
      template:
        method: POST
        path:
        - type: literal
          value: query
        - type: literal
          value: Account
        body:
          type: if
          condition:
            type: exists
            var: filter
          then_expr:
            type: object
            fields:
            - - filter
              - type: var
                name: filter
          else_expr:
            type: object
            fields: []
  blob_asset_get:
    name: blob_asset_get
    kind: get
    domain: BlobAsset
    mapping:
      template:
        response: single
        method: GET
        path:
        - type: literal
          value: blob-asset
        - name: id
          type: var
