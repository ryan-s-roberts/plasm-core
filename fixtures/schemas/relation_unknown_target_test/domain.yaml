version: 1

auth:
  scheme: none

http_backend: http://example.test

entities:
  Widget:
    id_field: id
    description: Minimal widget for loader relation-target validation
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
    relations:
      peer:
        description: Broken relation — target entity is not defined
        target: MissingEntity
        cardinality: one

capabilities:
  widget_get:
    description: Fetch widget
    kind: get
    entity: Widget
    provides:
    - id
