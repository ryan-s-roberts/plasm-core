# Stub CML for fixtures — paths are illustrative (local Overshow-style MCP bridge).

recorded_content_search:
  method: GET
  path:
    - { type: literal, value: v1 }
    - { type: literal, value: recorded-content }
    - { type: literal, value: search }
  response:
    items: items
  query:
    type: object
    fields:
      - [q, { type: var, name: q }]
      - [content_type, { type: if, condition: { type: exists, var: content_type },
          then_expr: { type: var, name: content_type },
          else_expr: { type: const, value: null } }]
      - [limit, { type: if, condition: { type: exists, var: limit },
          then_expr: { type: var, name: limit },
          else_expr: { type: const, value: null } }]
      - [offset, { type: if, condition: { type: exists, var: offset },
          then_expr: { type: var, name: offset },
          else_expr: { type: const, value: null } }]
      - [start_time, { type: if, condition: { type: exists, var: start_time },
          then_expr: { type: var, name: start_time },
          else_expr: { type: const, value: null } }]
      - [end_time, { type: if, condition: { type: exists, var: end_time },
          then_expr: { type: var, name: end_time },
          else_expr: { type: const, value: null } }]
      - [app_name, { type: if, condition: { type: exists, var: app_name },
          then_expr: { type: var, name: app_name },
          else_expr: { type: const, value: null } }]
      - [window_name, { type: if, condition: { type: exists, var: window_name },
          then_expr: { type: var, name: window_name },
          else_expr: { type: const, value: null } }]
      - [min_length, { type: if, condition: { type: exists, var: min_length },
