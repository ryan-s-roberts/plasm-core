version: 1
auth:
  scheme: none
http_backend: http://127.0.0.1
entities:
  RecordedContent:
    id_field: id
    description: A hit from full-text or profile-scoped search over captured OCR, transcripts, and UI text.
    fields:
      id:
        required: true
        value_ref: nv_recorded_content_id
      text:
        required: false
        value_ref: nv_recorded_content_text
      content_type:
        required: false
        value_ref: nv_recorded_content_content_type
      captured_at:
        required: false
        value_ref: nv_recorded_content_captured_at
      app_name:
        required: false
        value_ref: nv_recorded_content_app_name
      window_name:
        required: false
        value_ref: nv_recorded_content_window_name
      profile_id:
        required: false
        value_ref: nv_recorded_content_profile_id
  Profile:
    id_field: id
    description: A person, organisation, or project profile.
    fields:
      id:
        required: true
        value_ref: nv_profile_id
      profile_type:
        required: false
        value_ref: nv_profile_profile_type
      display_name:
        required: false
        value_ref: nv_profile_display_name
    relations:
      recorded_matches:
        target: RecordedContent
        cardinality: many
        description: Content scoped to this profile.
        materialize:
          kind: query_scoped
          capability: recorded_content_query_by_profile
          param: profile_id
  DetectedQuestion:
    id_field: id
    description: A detected question with optional answers.
    fields:
      id:
        required: true
        value_ref: nv_detected_question_id
      question_text:
        required: false
        value_ref: nv_detected_question_question_text
      resolved:
        required: false
        value_ref: nv_detected_question_resolved
  Meeting:
    id_field: meeting_uuid
    description: A detected meeting.
    fields:
      meeting_uuid:
        required: true
        value_ref: nv_meeting_meeting_uuid
      meeting_id:
        required: false
        value_ref: nv_meeting_meeting_id
      status:
        required: false
        value_ref: nv_meeting_status
      summary:
        required: false
        value_ref: nv_meeting_summary
  CaptureItem:
    key_vars:
    - id
    - content_type
    id_field: id
    description: One capture pipeline item.
    fields:
      id:
        required: true
        value_ref: nv_capture_item_id
      content_type:
        required: true
        value_ref: nv_capture_item_content_type
      text_preview:
        required: false
        value_ref: nv_capture_item_text_preview
  PipelineSnapshot:
    id_field: id
    description: Pipeline health snapshot.
    fields:
      id:
        required: true
        value_ref: nv_pipeline_snapshot_id
      workers:
        required: false
        value_ref: nv_pipeline_snapshot_workers
  CaptureSession:
    id_field: id
    description: Capture running or paused.
    fields:
      id:
        required: true
        value_ref: nv_capture_session_id
      screen_capture_running:
        required: false
        value_ref: nv_capture_session_screen_capture_running
  PipelineEvent:
    id_field: id
    description: One pipeline bus event.
    fields:
      id:
        required: true
        value_ref: nv_pipeline_event_id
      name:
        required: false
        value_ref: nv_pipeline_event_name
      severity:
        required: false
        value_ref: nv_pipeline_event_severity
  PromptRun:
    id_field: id
    description: Action prompt execution result.
    fields:
      id:
        required: false
        value_ref: nv_prompt_run_id
      slug:
        required: true
        value_ref: nv_prompt_run_slug
      output:
        required: false
        value_ref: nv_prompt_run_output
capabilities:
  recorded_content_search:
    kind: search
    entity: RecordedContent
    description: Search recorded OCR, transcripts, and UI text.
    parameters:
    - name: q
      value_ref: nv_recorded_content_search_q
      required: true
      role: search
    - name: content_type
      value_ref: nv_recorded_content_search_content_type
      required: false
    - name: limit
      value_ref: nv_recorded_content_search_limit
      required: false
    - name: offset
      value_ref: nv_recorded_content_search_offset
      required: false
    - name: start_time
      value_ref: nv_recorded_content_search_start_time
      required: false
    - name: end_time
      value_ref: nv_recorded_content_search_end_time
      required: false
    - name: app_name
      value_ref: nv_recorded_content_search_app_name
      required: false
    - name: window_name
      value_ref: nv_recorded_content_search_window_name
      required: false
    - name: min_length
      value_ref: nv_recorded_content_search_min_length
      required: false
    - name: max_length
      value_ref: nv_recorded_content_search_max_length
      required: false
  recorded_content_query_by_profile:
    kind: query
    entity: RecordedContent
    description: Search content scoped to one profile.
    parameters:
    - name: profile_id
      value_ref: nv_recorded_content_query_by_profile_profile_id
      required: true
      role: scope
    - name: query
      value_ref: nv_recorded_content_query_by_profile_query
      required: false
    - name: limit
      value_ref: nv_recorded_content_query_by_profile_limit
      required: false
    - name: mode
      value_ref: nv_recorded_content_query_by_profile_mode
      required: false
  detected_question_query:
    kind: query
    entity: DetectedQuestion
    parameters:
    - name: unresolved_only
      value_ref: nv_detected_question_query_unresolved_only
      required: false
    - name: app_name
      value_ref: nv_detected_question_query_app_name
      required: false
    - name: speaker_id
      value_ref: nv_detected_question_query_speaker_id
      required: false
    - name: include_answers
      value_ref: nv_detected_question_query_include_answers
      required: false
    - name: min_answer_similarity
      value_ref: nv_detected_question_query_min_answer_similarity
      required: false
    - name: limit
      value_ref: nv_detected_question_query_limit
      required: false
    - name: offset
      value_ref: nv_detected_question_query_offset
      required: false
  meeting_query:
    kind: query
    entity: Meeting
    parameters:
    - name: status
      value_ref: nv_meeting_query_status
      required: false
    - name: start_date
      value_ref: nv_meeting_query_start_date
      required: false
    - name: end_date
      value_ref: nv_meeting_query_end_date
      required: false
    - name: limit
      value_ref: nv_meeting_query_limit
      required: false
  meeting_get:
    kind: get
    entity: Meeting
  prompt_run_create:
    kind: create
    entity: PromptRun
    parameters:
    - name: slug
      value_ref: nv_prompt_run_create_slug
      required: true
    - name: meeting_id
      value_ref: nv_prompt_run_create_meeting_id
      required: false
    - name: meeting_uuid
      value_ref: nv_prompt_run_create_meeting_uuid
      required: false
    - name: meeting_ids
      value_ref: nv_prompt_run_create_meeting_ids
      required: false
    - name: start_time
      value_ref: nv_prompt_run_create_start_time
      required: false
    - name: end_time
      value_ref: nv_prompt_run_create_end_time
      required: false
  profile_query:
    kind: query
    entity: Profile
    parameters:
    - name: profile_type
      value_ref: nv_profile_query_profile_type
      required: false
    - name: limit
      value_ref: nv_profile_query_limit
      required: false
  profile_get:
    kind: get
    entity: Profile
  pipeline_snapshot_get:
    kind: singleton
    entity: PipelineSnapshot
  capture_item_query:
    kind: query
    entity: CaptureItem
    parameters:
    - name: limit
      value_ref: nv_capture_item_query_limit
      required: false
    - name: app_name
      value_ref: nv_capture_item_query_app_name
      required: false
    - name: start_time
      value_ref: nv_capture_item_query_start_time
      required: false
    - name: end_time
      value_ref: nv_capture_item_query_end_time
      required: false
  capture_item_get:
    kind: get
    entity: CaptureItem
  capture_session_get:
    kind: singleton
    entity: CaptureSession
  pipeline_event_query:
    kind: query
    entity: PipelineEvent
    parameters:
    - name: names
      value_ref: nv_pipeline_event_query_names
      required: false
    - name: sources
      value_ref: nv_pipeline_event_query_sources
      required: false
    - name: min_severity
      value_ref: nv_pipeline_event_query_min_severity
      required: false
    - name: limit
      value_ref: nv_pipeline_event_query_limit
      required: false
values:
  nv_recorded_content_id:
    type: string
    string_semantics: short
  nv_recorded_content_text:
    type: string
    string_semantics: markdown
  nv_recorded_content_content_type:
    type: select
    allowed_values:
    - all
    - ocr
    - audio
    - ui
  nv_recorded_content_captured_at:
    type: date
    value_format: rfc3339
  nv_recorded_content_app_name:
    type: string
    string_semantics: short
  nv_recorded_content_window_name:
    type: string
    string_semantics: short
  nv_recorded_content_profile_id:
    type: entity_ref
    target: Profile
  nv_profile_id:
    type: integer
  nv_profile_profile_type:
    type: select
    allowed_values:
    - person
    - organisation
    - project
  nv_profile_display_name:
    type: string
    string_semantics: short
  nv_detected_question_id:
    type: string
    string_semantics: short
  nv_detected_question_question_text:
    type: string
    string_semantics: markdown
  nv_detected_question_resolved:
    type: boolean
  nv_meeting_meeting_uuid:
    type: string
    string_semantics: short
  nv_meeting_meeting_id:
    type: integer
  nv_meeting_status:
    type: select
    allowed_values:
    - active
    - ended
    - cancelled
  nv_meeting_summary:
    type: string
    string_semantics: markdown
  nv_capture_item_id:
    type: integer
  nv_capture_item_content_type:
    type: select
    allowed_values:
    - ui
    - ocr
    - audio
    - document
  nv_capture_item_text_preview:
    type: string
    string_semantics: short
  nv_pipeline_snapshot_id:
    type: string
    string_semantics: short
  nv_pipeline_snapshot_workers:
    type: string
    string_semantics: short
  nv_capture_session_id:
    type: string
    string_semantics: short
  nv_capture_session_screen_capture_running:
    type: boolean
  nv_pipeline_event_id:
    type: string
    string_semantics: short
  nv_pipeline_event_name:
    type: string
    string_semantics: short
  nv_pipeline_event_severity:
    type: select
    allowed_values:
    - debug
    - info
    - warning
    - error
    - critical
  nv_prompt_run_id:
    type: string
    string_semantics: short
  nv_prompt_run_slug:
    type: string
    string_semantics: short
  nv_prompt_run_output:
    type: string
    string_semantics: markdown
  nv_recorded_content_search_q:
    type: string
    string_semantics: short
  nv_recorded_content_search_content_type:
    type: select
    allowed_values:
    - all
    - ocr
    - audio
    - ui
  nv_recorded_content_search_limit:
    type: integer
  nv_recorded_content_search_offset:
    type: integer
  nv_recorded_content_search_start_time:
    type: date
    value_format: rfc3339
  nv_recorded_content_search_end_time:
    type: date
    value_format: rfc3339
  nv_recorded_content_search_app_name:
    type: string
    string_semantics: short
  nv_recorded_content_search_window_name:
    type: string
    string_semantics: short
  nv_recorded_content_search_min_length:
    type: integer
  nv_recorded_content_search_max_length:
    type: integer
  nv_recorded_content_query_by_profile_profile_id:
    type: entity_ref
    target: Profile
  nv_recorded_content_query_by_profile_query:
    type: string
    string_semantics: short
  nv_recorded_content_query_by_profile_limit:
    type: integer
  nv_recorded_content_query_by_profile_mode:
    type: select
    allowed_values:
    - auto
    - keyword
    - natural
  nv_detected_question_query_unresolved_only:
    type: boolean
  nv_detected_question_query_app_name:
    type: string
    string_semantics: short
  nv_detected_question_query_speaker_id:
    type: integer
  nv_detected_question_query_include_answers:
    type: boolean
  nv_detected_question_query_min_answer_similarity:
    type: number
  nv_detected_question_query_limit:
    type: integer
  nv_detected_question_query_offset:
    type: integer
  nv_meeting_query_status:
    type: select
    allowed_values:
    - active
    - ended
    - cancelled
  nv_meeting_query_start_date:
    type: date
    value_format: iso8601_date
  nv_meeting_query_end_date:
    type: date
    value_format: iso8601_date
  nv_meeting_query_limit:
    type: integer
  nv_prompt_run_create_slug:
    type: string
    string_semantics: short
  nv_prompt_run_create_meeting_id:
    type: integer
  nv_prompt_run_create_meeting_uuid:
    type: string
    string_semantics: short
  nv_prompt_run_create_meeting_ids_item:
    type: integer
  nv_prompt_run_create_meeting_ids:
    type: array
    items:
      value_ref: nv_prompt_run_create_meeting_ids_item
  nv_prompt_run_create_start_time:
    type: date
    value_format: rfc3339
  nv_prompt_run_create_end_time:
    type: date
    value_format: rfc3339
  nv_profile_query_profile_type:
    type: select
    allowed_values:
    - person
    - organisation
    - project
  nv_profile_query_limit:
    type: integer
  nv_capture_item_query_limit:
    type: integer
  nv_capture_item_query_app_name:
    type: string
    string_semantics: short
  nv_capture_item_query_start_time:
    type: date
    value_format: rfc3339
  nv_capture_item_query_end_time:
    type: date
    value_format: rfc3339
  nv_pipeline_event_query_names:
    type: string
    string_semantics: short
  nv_pipeline_event_query_sources:
    type: string
    string_semantics: short
  nv_pipeline_event_query_min_severity:
    type: select
    allowed_values:
    - debug
    - info
    - warning
    - error
    - critical
  nv_pipeline_event_query_limit:
    type: integer
