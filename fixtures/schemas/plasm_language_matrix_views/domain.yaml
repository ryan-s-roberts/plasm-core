version: 1
auth:
  scheme: none
http_backend: http://127.0.0.1:9
entities:
  LangTag:
    id_field: id
    description: Tags scoped to a LangItem (query_scoped relation target).
    fields:
      id:
        required: true
        value_ref: nv_lang_tag_id
      item_id:
        required: true
        value_ref: nv_lang_tag_item_id
      label:
        required: true
        value_ref: nv_lang_tag_label
    relations: {}
  LangLine:
    id_field: id
    description: Child line embedded under LangItem GET (from_parent_get).
    fields:
      id:
        required: true
        value_ref: nv_lang_line_id
      item_id:
        required: true
        value_ref: nv_lang_line_item_id
      note:
        required: true
        value_ref: nv_lang_line_note
    relations: {}
  LangItem:
    id_field: id
    description: Primary matrix entity — list, search, CRUD, relations, actions.
    fields:
      id:
        required: true
        value_ref: nv_lang_item_id
      title:
        required: true
        value_ref: nv_lang_item_title
      score:
        required: false
        value_ref: nv_lang_item_score
      owner:
        required: false
        value_ref: nv_lang_item_owner
    relations:
      lines:
        description: Lines embedded on LangItem GET responses
        target: LangLine
        cardinality: many
        materialize:
          kind: from_parent_get
          path:
          - key: lines
          - wildcard: true
      tags:
        description: Tags fetched via scoped query
        target: LangTag
        cardinality: many
        materialize:
          kind: query_scoped
          capability: langtag_query
          param: item_id
      self_via_bindings:
        description: Same LangItem row via scoped GET bindings (get_scoped_bindings conformance).
        target: LangItem
        cardinality: one
        materialize:
          kind: get_scoped_bindings
          capability: langitem_get
          bindings:
            id: id
  LangDigest:
    id_field: item_id
    primary_read: lang_digest_get
    description: View-backed digest row (matrix views extension fixture).
    fields:
      item_id:
        required: true
        value_ref: nv_lang_digest_item_id
      echo_title:
        required: true
        value_ref: nv_lang_digest_echo_title
      echo_slug:
        required: true
        value_ref: nv_lang_digest_echo_slug
    relations:
      item_snapshot:
        description: Synthetic relation ref to the backing LangItem from the view DAG.
        target: LangItem
        cardinality: one
capabilities:
  langitem_query:
    description: List LangItem rows (no required HTTP filters)
    kind: query
    entity: LangItem
    provides:
    - id
    - title
    - score
    - owner
  langitem_query_owner:
    description: List LangItem rows filtered by owner (required query param)
    kind: query
    entity: LangItem
    parameters:
    - name: owner
      value_ref: nv_langitem_query_owner_owner
      required: true
      role: filter
    provides:
    - id
    - title
    - score
    - owner
  langitem_search:
    description: Search LangItem rows
    kind: search
    entity: LangItem
    parameters:
    - name: q
      value_ref: nv_langitem_search_q
      required: true
      role: search
    provides:
    - id
    - title
    - score
    - owner
  langitem_get:
    description: Get LangItem by id (includes embedded lines in wire JSON)
    kind: get
    entity: LangItem
    parameters:
    - name: id
      value_ref: nv_lang_item_id
      required: true
      role: scope
    provides:
    - id
    - title
    - score
    - owner
  langitem_create:
    description: Create LangItem
    kind: create
    entity: LangItem
    parameters:
    - name: title
      value_ref: nv_langitem_create_title
      required: true
    - name: score
      value_ref: nv_langitem_create_score
      required: false
    - name: owner
      value_ref: nv_langitem_create_owner
      required: false
    provides:
    - id
    - title
    - score
    - owner
  langitem_update:
    description: Patch LangItem
    kind: update
    entity: LangItem
    parameters:
    - name: title
      value_ref: nv_langitem_update_title
      required: false
    - name: score
      value_ref: nv_langitem_update_score
      required: false
    - name: owner
      value_ref: nv_langitem_update_owner
      required: false
    provides:
    - id
    - title
    - score
    - owner
  langitem_delete:
    description: Delete LangItem
    kind: delete
    entity: LangItem
  langitem_ping:
    description: Side-effect ping on LangItem
    kind: action
    entity: LangItem
    output:
      type: side_effect
      description: Records a ping against the item (matrix conformance).
  langtag_query:
    description: List tags scoped to one LangItem
    kind: query
    entity: LangTag
    parameters:
    - name: item_id
      value_ref: nv_langtag_query_item_id
      required: true
      role: scope
    provides:
    - id
    - item_id
    - label
  langline_get:
    description: Get LangLine by id (batch relation resolution)
    kind: get
    entity: LangLine
    provides:
    - id
    - item_id
    - note
  langline_query:
    description: List lines scoped to one LangItem (optional list path; also on item GET)
    kind: query
    entity: LangLine
    parameters:
    - name: item_id
      value_ref: nv_langline_query_item_id
      required: true
      role: scope
    provides:
    - id
    - item_id
    - note
  lang_digest_query:
    description: Query LangDigest by item id (transport view).
    kind: query
    entity: LangDigest
    parameters:
    - name: item_id
      value_ref: nv_lang_digest_scope_item_id
      required: true
      role: filter
    provides:
    - item_id
    - echo_title
    - echo_slug
  lang_digest_get:
    description: Get LangDigest by item id (transport view).
    kind: get
    entity: LangDigest
    parameters:
    - name: item_id
      value_ref: nv_lang_digest_get_item_id
      required: true
      role: scope
    provides:
    - item_id
    - echo_title
    - echo_slug
values:
  nv_lang_tag_id:
    type: string
    string_semantics: short
  nv_lang_tag_item_id:
    type: entity_ref
    target: LangItem
  nv_lang_tag_label:
    type: string
    string_semantics: short
  nv_lang_line_id:
    type: string
    string_semantics: short
  nv_lang_line_item_id:
    type: entity_ref
    target: LangItem
  nv_lang_line_note:
    type: string
    string_semantics: short
  nv_lang_item_id:
    type: string
    string_semantics: short
  nv_lang_item_title:
    type: string
    string_semantics: short
  nv_lang_item_score:
    type: integer
  nv_lang_item_owner:
    type: string
    string_semantics: short
  nv_langitem_query_owner_owner:
    type: string
    string_semantics: short
  nv_langitem_search_q:
    type: string
    string_semantics: short
  nv_langitem_create_title:
    type: string
    string_semantics: short
  nv_langitem_create_score:
    type: integer
  nv_langitem_create_owner:
    type: string
    string_semantics: short
  nv_langitem_update_title:
    type: string
    string_semantics: short
  nv_langitem_update_score:
    type: integer
  nv_langitem_update_owner:
    type: string
    string_semantics: short
  nv_langtag_query_item_id:
    type: entity_ref
    target: LangItem
  nv_langline_query_item_id:
    type: entity_ref
    target: LangItem
  nv_lang_digest_item_id:
    type: string
    string_semantics: short
  nv_lang_digest_echo_title:
    type: string
    string_semantics: short
  nv_lang_digest_echo_slug:
    type: string
    string_semantics: short
  nv_lang_digest_scope_item_id:
    type: entity_ref
    target: LangItem
  nv_lang_digest_get_item_id:
    type: entity_ref
    target: LangItem

views:
  lang_digest:
    description: Fetch LangItem by scope item_id and echo title (view transport conformance).
    capability: lang_digest_query
    entity: LangDigest
    scope:
    - name: item_id
      value_ref: nv_lang_digest_scope_item_id
    nodes:
    - id: item_node
      capability: langitem_get
      bind:
        id:
          kind: scope
          param: item_id
    output:
      item_id:
        kind: scope
        param: item_id
      echo_title:
        kind: node_field
        node: item_node
        field: title
      echo_slug:
        kind: computed
        template: "{{ item_id }}-{{ echo_title }}"
    relation_outputs:
    - relation: item_snapshot
      target: LangItem
      cardinality: one
      binding:
        kind: node_single_row
        node: item_node
