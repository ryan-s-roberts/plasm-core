version: 12
http_backend: https://api.cloudflare.com/client/v4
entities:
  Zone:
    id_field: id
    description: Anchor for one proxied site—keep work scoped when firewall or proxy behavior is tied to that site.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: true
        value_ref: nv_wire_str_short
      status:
        required: false
        value_ref: nv_wire_str_short
      paused:
        required: false
        value_ref: nv_zone_paused
      type:
        required: false
        value_ref: nv_wire_str_short
    relations:
      rulesets:
        target: Ruleset
        cardinality: many
        discovery:
          qualifier_terms:
          - rulesets
          - ruleset engine
          - waf
          - firewall
          - managed rules
          - cloudflare waf
          - phase rulesets
          traversal_weight: 1.2
        materialize:
          kind: query_scoped_bindings
          capability: ruleset_query
          bindings:
            zone_id: id
      security_overview:
        target: SecurityOverview
        cardinality: one
        discovery:
          qualifier_terms:
          - security overview
          - firewall summary
          - waf summary
          - zone security snapshot
          traversal_weight: 1.15
        materialize:
          kind: get_scoped_bindings
          capability: security_overview_get
          bindings:
            zone_id: id
  Ruleset:
    id_field: id
    key_vars:
    - zone_id
    - ruleset_id
    description: Rules configuration held here—the inspect or replace target when the task names this ruleset.
    fields:
      zone_id:
        required: true
        value_ref: nv_cloudflare_zone_id
      ruleset_id:
        required: true
        path: id
        value_ref: nv_wire_str_short
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      kind:
        required: false
        value_ref: nv_wire_sel_8da7df51398b3ce3
      phase:
        required: false
        value_ref: nv_wire_sel_b53dd05524ff4281
      version:
        required: false
        value_ref: nv_wire_str_short
      last_updated:
        required: false
        value_ref: nv_wire_date_rfc3339
  RulesetEntrypoint:
    id_field: id
    key_vars:
    - zone_id
    - ruleset_phase
    description: Vendor-managed default ruleset binding for one execution phase.
    fields:
      zone_id:
        required: true
        value_ref: nv_cloudflare_zone_id
      ruleset_phase:
        required: true
        value_ref: nv_wire_sel_zone_ruleset_entrypoint_phase
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      kind:
        required: false
        value_ref: nv_wire_sel_8da7df51398b3ce3
      phase:
        required: false
        value_ref: nv_wire_sel_zone_ruleset_entrypoint_phase
      version:
        required: false
        value_ref: nv_wire_str_short
      last_updated:
        required: false
        value_ref: nv_wire_date_rfc3339
  WafPackage:
    abstract: true
    id_field: id
    key_vars:
    - zone_id
    description: Legacy package catalog surface only—skip unless the task explicitly targets that API.
    fields:
      zone_id:
        required: true
        value_ref: nv_cloudflare_zone_id
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      detection_mode:
        required: false
        value_ref: nv_wire_str_short
  SecurityOverview:
    id_field: zone_id
    key_vars:
    - zone_id
    primary_read: security_overview_get
    description: Quick posture read before investing in deeper firewall or rules changes.
    fields:
      zone_id:
        required: true
        value_ref: nv_cloudflare_zone_id
      zone_name:
        required: false
        value_ref: nv_wire_str_short
      managed_waf_configured:
        required: false
        value_ref: nv_cf_security_posture_bool
      ddos_l7_configured:
        required: false
        value_ref: nv_cf_security_posture_bool
      custom_rules_configured:
        required: false
        value_ref: nv_cf_security_posture_bool
      legacy_waf_present:
        required: false
        value_ref: nv_cf_security_posture_bool
      security_surface_status:
        required: false
        value_ref: nv_wire_sel_security_surface_status
    relations:
      managed_waf_ruleset:
        target: Ruleset
        cardinality: one
        discovery:
          qualifier_terms:
          - managed waf
          - managed rules
          - owasp
          - cloudflare managed ruleset
          traversal_weight: 1.1
      ddos_l7_ruleset:
        target: Ruleset
        cardinality: one
        discovery:
          qualifier_terms:
          - ddos l7
          - l7 ddos
          - ddos phase ruleset
          traversal_weight: 1.1
      custom_rulesets:
        target: Ruleset
        cardinality: many
        discovery:
          qualifier_terms:
          - custom rules
          - custom firewall
          - firewall custom
          traversal_weight: 1.05
      legacy_waf_packages:
        target: WafPackage
        cardinality: many
        discovery:
          qualifier_terms:
          - legacy waf
          - firewall packages
          - old packages api
          traversal_weight: 1.0
capabilities:
  zone_query:
    kind: query
    entity: Zone
    description: Find or filter zones before any zone-scoped work.
    parameters:
    - name: account_id
      value_ref: nv_zone_query_account_id
      required: false
      role: filter
    - name: name
      value_ref: nv_zone_query_name
      required: false
      role: filter
    - name: status
      value_ref: nv_zone_query_status
      required: false
      role: filter
    - name: type
      value_ref: nv_zone_query_type
      required: false
      role: filter
    - name: page
      value_ref: nv_zone_query_page
      required: false
      role: response_control
    - name: per_page
      value_ref: nv_zone_query_per_page
      required: false
      role: response_control
  zone_get:
    kind: get
    entity: Zone
    description: Load canonical zone metadata when you already hold the zone id.
    parameters:
    - name: zone_id
      value_ref: nv_cloudflare_zone_id
      required: true
      role: scope
    provides:
    - id
    - name
    - status
    - paused
    - type
  ruleset_query:
    kind: query
    entity: Ruleset
    description: Inventory every ruleset on a zone before drilling into one.
    discovery:
      operation_terms:
      - list
      - enumerate
      - inventory
      target_terms:
      - rulesets
      - zone rulesets
      - ruleset engine
      - firewall rulesets
      - mixed managed zone root inventory
    parameters:
    - name: zone_id
      value_ref: nv_cloudflare_zone_id
      required: true
      role: scope
    - name: per_page
      value_ref: nv_ruleset_query_per_page
      required: false
      role: response_control
  ruleset_get:
    kind: get
    entity: Ruleset
    description: Full ruleset document when you hold zone id and ruleset id.
    discovery:
      operation_terms:
      - get
      - fetch
      - load
      - inspect
      target_terms:
      - ruleset by id
      - ruleset detail
      - single ruleset
      - use id from zone ruleset list
      - prefer before phase entrypoint shortcut
    parameters:
    - name: zone_id
      value_ref: nv_cloudflare_zone_id
      required: true
      role: scope
    - name: ruleset_id
      value_ref: nv_wire_str_short
      required: true
      role: scope
    provides:
    - zone_id
    - id
    - name
    - description
    - kind
    - phase
    - version
    - last_updated
  ruleset_entrypoint_get:
    kind: get
    entity: RulesetEntrypoint
    description: Resolve the managed ruleset Cloudflare exposes at a named phase.
    discovery:
      operation_terms:
      - entrypoint
      - phase entrypoint
      - get by phase
      target_terms:
      - managed phase ruleset
      - phase ruleset
      - rulesets phases entrypoint
      - unprovisioned phase
      - missing entrypoint normal error 10003
      - not same as empty ruleset list
    parameters:
    - name: zone_id
      value_ref: nv_cloudflare_zone_id
      required: true
      role: scope
    - name: ruleset_phase
      value_ref: nv_wire_sel_zone_ruleset_entrypoint_phase
      required: true
      role: scope
    provides:
    - zone_id
    - ruleset_phase
    - id
    - name
    - description
    - kind
    - phase
    - version
    - last_updated
  ruleset_entrypoint_update:
    kind: action
    entity: RulesetEntrypoint
    description: Point a phase entrypoint at a different ruleset—requires zone WAF edit on the token.
    parameters:
    - name: zone_id
      value_ref: nv_cloudflare_zone_id
      required: true
      role: scope
    - name: ruleset_phase
      value_ref: nv_wire_sel_zone_ruleset_entrypoint_phase
      required: true
      role: scope
    - name: input
      value_ref: nv_ruleset_entrypoint_update_input
      required: true
    output:
      type: side_effect
      description: The phase entrypoint now references the submitted ruleset.
  waf_package_query:
    kind: query
    entity: WafPackage
    description: Legacy package listing—use only for migration or investigations against the old packages API.
    discovery:
      operation_terms:
      - list legacy packages
      - legacy waf packages
      - firewall packages api
      target_terms:
      - waf packages endpoint
      - old managed rules packages
      - pre ruleset engine waf
      - explicit WafPackage seed
      - migration audit legacy api
    parameters:
    - name: zone_id
      value_ref: nv_cloudflare_zone_id
      required: true
      role: scope
    - name: page
      value_ref: nv_wire_int
      required: false
      role: response_control
    - name: per_page
      value_ref: nv_wire_int
      required: false
      role: response_control
  security_overview_query:
    kind: query
    entity: SecurityOverview
    description: Posture snapshot exposed as a query—same agent-facing projection as get for teaching symmetry.
    discovery:
      operation_terms:
      - security overview
      - firewall summary
      - waf summary
      target_terms:
      - zone security overview
      - composed posture snapshot
      - zone security posture summary
    parameters:
    - name: zone_id
      value_ref: nv_cloudflare_zone_id
      required: true
      role: scope
    provides:
    - zone_id
    - zone_name
    - managed_waf_configured
    - ddos_l7_configured
    - custom_rules_configured
    - legacy_waf_present
    - security_surface_status
  security_overview_get:
    kind: get
    entity: SecurityOverview
    description: Posture snapshot by zone id—use when you already scoped the zone and want the composed overview.
    discovery:
      operation_terms:
      - get
      - fetch
      - load
      target_terms:
      - security overview snapshot
      - zone security posture
      - posture snapshot
    parameters:
    - name: zone_id
      value_ref: nv_cloudflare_zone_id
      required: true
      role: scope
    provides:
    - zone_id
    - zone_name
    - managed_waf_configured
    - ddos_l7_configured
    - custom_rules_configured
    - legacy_waf_present
    - security_surface_status
views:
  security_overview:
    description: One composed security overview without manually correlating the backing reads.
    capability: security_overview_query
    entity: SecurityOverview
    scope:
    - name: zone_id
      value_ref: nv_cloudflare_zone_id
    nodes:
    - id: zone_row
      capability: zone_get
      bind:
        zone_id:
          kind: scope
          param: zone_id
    - id: rulesets
      capability: ruleset_query
      bind:
        zone_id:
          kind: scope
          param: zone_id
    - id: legacy_packages
      capability: waf_package_query
      bind:
        zone_id:
          kind: scope
          param: zone_id
    output:
      zone_id:
        kind: scope
        param: zone_id
      zone_name:
        kind: node_field
        node: zone_row
        field: name
      managed_waf_configured:
        kind: node_any_row_field_equals
        node: rulesets
        field: kind
        equals: managed
      custom_rules_configured:
        kind: node_any_row_field_equals
        node: rulesets
        field: kind
        equals: custom
      ddos_l7_configured:
        kind: node_any_row_field_equals
        node: rulesets
        field: phase
        equals: ddos_l7
      legacy_waf_present:
        kind: node_row_count_positive
        node: legacy_packages
    relation_outputs:
    - relation: managed_waf_ruleset
      target: Ruleset
      cardinality: one
      binding:
        kind: first_node_row_where
        node: rulesets
        where_field: kind
        equals: managed
    - relation: ddos_l7_ruleset
      target: Ruleset
      cardinality: one
      binding:
        kind: first_node_row_where
        node: rulesets
        where_field: phase
        equals: ddos_l7
    - relation: custom_rulesets
      target: Ruleset
      cardinality: many
      binding:
        kind: node_rows_where
        node: rulesets
        where_field: kind
        equals: custom
    - relation: legacy_waf_packages
      target: WafPackage
      cardinality: many
      binding:
        kind: node_all_rows
        node: legacy_packages
oauth:
  provider: cloudflare
  scopes:
    cloudflare.zone.read:
      label: Zone Read
      notes: Lists and reads zones and zone metadata (matches API token permission **Zone Read**; scope family `com.cloudflare.api.account.zone`).
      docs_url: https://developers.cloudflare.com/fundamentals/api/reference/permissions/
    cloudflare.zone.edit:
      label: Zone Edit
      notes: Zone lifecycle and configuration writes beyond read-only (API token **Zone Edit**).
      docs_url: https://developers.cloudflare.com/fundamentals/api/reference/permissions/
    cloudflare.zone.waf.read:
      label: Zone WAF Read
      notes: Read zone WAF surfaces — rulesets, packages, managed phases (API token **Zone WAF Read**).
      docs_url: https://developers.cloudflare.com/fundamentals/api/reference/permissions/
    cloudflare.zone.waf.edit:
      label: Zone WAF Edit
      notes: Change zone WAF rulesets including phase entrypoints (API token **Zone WAF Edit**).
      docs_url: https://developers.cloudflare.com/fundamentals/api/reference/permissions/
  default_scope_sets:
    plasm_cloudflare_demo_readonly:
      description: Read-only demo bundle for exploring zones and zone WAF; legacy packages appear only if you seed **WafPackage**.
      scopes:
      - cloudflare.zone.read
      - cloudflare.zone.waf.read
    plasm_cloudflare_demo_operator:
      description: Operator demo bundle—adds zone WAF edit when tasks must change phase entrypoints.
      scopes:
      - cloudflare.zone.read
      - cloudflare.zone.waf.read
      - cloudflare.zone.waf.edit
  requirements:
    capabilities:
      zone_query:
        any_of:
        - cloudflare.zone.read
      zone_get:
        any_of:
        - cloudflare.zone.read
      ruleset_query:
        all_of:
        - any_of:
          - cloudflare.zone.read
        - any_of:
          - cloudflare.zone.waf.read
      ruleset_get:
        all_of:
        - any_of:
          - cloudflare.zone.read
        - any_of:
          - cloudflare.zone.waf.read
      ruleset_entrypoint_get:
        all_of:
        - any_of:
          - cloudflare.zone.read
        - any_of:
          - cloudflare.zone.waf.read
      waf_package_query:
        all_of:
        - any_of:
          - cloudflare.zone.read
        - any_of:
          - cloudflare.zone.waf.read
      security_overview_query:
        all_of:
        - any_of:
          - cloudflare.zone.read
        - any_of:
          - cloudflare.zone.waf.read
      security_overview_get:
        all_of:
        - any_of:
          - cloudflare.zone.read
        - any_of:
          - cloudflare.zone.waf.read
      ruleset_entrypoint_update:
        all_of:
        - any_of:
          - cloudflare.zone.read
        - any_of:
          - cloudflare.zone.waf.edit
# Bearer API tokens (`CLOUDFLARE_API_TOKEN`) plus optional outbound OAuth (`oauth:`) — tool-model `connect_profile` is mixed auth.
auth:
  scheme: bearer_token
  env: CLOUDFLARE_API_TOKEN
values:
  nv_cf_security_posture_bool:
    type: boolean
    description: Yes/no posture signal derived for SecurityOverview.
  nv_wire_sel_security_surface_status:
    type: select
    description: Coarse derived posture label for SecurityOverview (mirrors runtime derivation).
    allowed_values:
    - minimal
    - managed_surface
    - custom_heavy
    - managed_and_custom
    - legacy_only
    - legacy_heavy
  nv_ruleset_entrypoint_update_input:
    type: json
    description: Full ruleset payload for the phase entrypoint update.
  nv_ruleset_query_per_page:
    type: integer
    description: Preferred maximum rulesets per page when listing.
  nv_cloudflare_zone_id:
    type: entity_ref
    target: Zone
    description: Zone identifier.
  nv_wire_date_rfc3339:
    type: date
    value_format: rfc3339
  nv_wire_int:
    type: integer
  nv_wire_sel_8da7df51398b3ce3:
    type: select
    allowed_values:
    - custom
    - managed
    - root
    - zone
  nv_wire_sel_zone_ruleset_entrypoint_phase:
    type: select
    description: Phases accepted by zone entrypoint ruleset GET/PUT (excludes account-scoped L4 DDoS).
    allowed_values:
    - ddos_l7
    - http_config_settings
    - http_custom_errors
    - http_log_custom_fields
    - http_ratelimit
    - http_request_cache_settings
    - http_request_dynamic_redirect
    - http_request_firewall_custom
    - http_request_firewall_managed
    - http_request_late_transform
    - http_request_origin
    - http_request_redirect
    - http_request_sanitize
    - http_request_sbfm
    - http_request_transform
    - http_response_cache_settings
    - http_response_compression
    - http_response_firewall_managed
    - http_response_headers_transform
    - magic_transit
    - magic_transit_ids_managed
    - magic_transit_managed
    - magic_transit_ratelimit
  nv_wire_sel_b53dd05524ff4281:
    type: select
    allowed_values:
    - ddos_l4
    - ddos_l7
    - http_config_settings
    - http_custom_errors
    - http_log_custom_fields
    - http_ratelimit
    - http_request_cache_settings
    - http_request_dynamic_redirect
    - http_request_firewall_custom
    - http_request_firewall_managed
    - http_request_late_transform
    - http_request_origin
    - http_request_redirect
    - http_request_sanitize
    - http_request_sbfm
    - http_request_transform
    - http_response_cache_settings
    - http_response_compression
    - http_response_firewall_managed
    - http_response_headers_transform
    - magic_transit
    - magic_transit_ids_managed
    - magic_transit_managed
    - magic_transit_ratelimit
  nv_wire_str_markdown:
    type: string
    string_semantics: markdown
  nv_wire_str_short:
    type: string
    string_semantics: short
  nv_zone_paused:
    type: boolean
  nv_zone_query_account_id:
    type: string
    string_semantics: short
    description: Restrict listed zones to this account.
  nv_zone_query_name:
    type: string
    string_semantics: short
    description: Exact zone name match.
  nv_zone_query_page:
    type: integer
    description: Page index when listing zones.
  nv_zone_query_per_page:
    type: integer
    description: Preferred maximum zones per page when listing.
  nv_zone_query_status:
    type: string
    string_semantics: short
    description: Zone status filter (e.g. active, pending, initializing).
  nv_zone_query_type:
    type: string
    string_semantics: short
    description: Zone type filter (full, partial, etc.).
