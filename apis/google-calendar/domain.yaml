version: 4
http_backend: https://www.googleapis.com/calendar/v3
entities:
  Calendar:
    id_field: id
    description: A Google Calendar from the authenticated user's calendar list
    fields:
      id:
        required: true
        value_ref: nv_calendar_id
      summary:
        required: false
        value_ref: nv_calendar_summary
      description:
        required: false
        value_ref: nv_calendar_description
      timeZone:
        required: false
        value_ref: nv_calendar_time_zone
      location:
        required: false
        value_ref: nv_calendar_location
      backgroundColor:
        required: false
        value_ref: nv_calendar_background_color
      accessRole:
        required: false
        value_ref: nv_calendar_access_role
      foregroundColor:
        required: false
        value_ref: nv_calendar_foreground_color
      summaryOverride:
        required: false
        value_ref: nv_calendar_summary_override
      primary:
        required: false
        value_ref: nv_calendar_primary
      selected:
        required: false
        value_ref: nv_calendar_selected
      hidden:
        required: false
        value_ref: nv_calendar_hidden
    primary_read: calendar_get
    relations:
      events:
        target: Event
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: event_list
          bindings:
            calendarId: id
  Event:
    id_field: id
    key_vars:
    - calendarId
    - id
    description: A Google Calendar event
    fields:
      calendarId:
        required: true
        value_ref: nv_event_calendar_id
      id:
        required: true
        value_ref: nv_event_id
      summary:
        required: false
        value_ref: nv_event_summary
      description:
        required: false
        value_ref: nv_event_description
      location:
        required: false
        value_ref: nv_event_location
      status:
        required: false
        value_ref: nv_event_status
      visibility:
        required: false
        value_ref: nv_event_visibility
      transparency:
        required: false
        value_ref: nv_event_transparency
      start_datetime:
        required: false
        path: start.dateTime
        value_ref: nv_event_start_datetime
      start_date:
        required: false
        path: start.date
        value_ref: nv_event_start_date
      end_datetime:
        required: false
        path: end.dateTime
        value_ref: nv_event_end_datetime
      end_date:
        required: false
        path: end.date
        value_ref: nv_event_end_date
      organizer_email:
        required: false
        path: organizer.email
        value_ref: nv_event_organizer_email
      organizer_name:
        required: false
        path: organizer.displayName
        value_ref: nv_event_organizer_name
      creator_email:
        required: false
        path: creator.email
        value_ref: nv_event_creator_email
      recurringEventId:
        required: false
        value_ref: nv_event_recurring_event_id
      iCalUID:
        required: false
        value_ref: nv_event_i_cal_uid
      htmlLink:
        required: false
        value_ref: nv_event_html_link
      etag:
        required: false
        value_ref: nv_event_etag
      colorId:
        required: false
        value_ref: nv_event_color_id
      sequence:
        required: false
        value_ref: nv_event_sequence
      endTimeUnspecified:
        required: false
        value_ref: nv_event_end_time_unspecified
      hangoutLink:
        required: false
        value_ref: nv_event_hangout_link
      attendees:
        required: false
        value_ref: nv_event_attendees
      recurrence:
        required: false
        value_ref: nv_event_recurrence
      reminders:
        required: false
        value_ref: nv_event_reminders
      conferenceData:
        required: false
        value_ref: nv_event_conference_data
      extendedProperties:
        required: false
        value_ref: nv_event_extended_properties
      created:
        required: false
        value_ref: nv_event_created
      updated:
        required: false
        value_ref: nv_event_updated
      eventType:
        required: false
        value_ref: nv_event_event_type
    primary_read: event_get
capabilities:
  calendar_get:
    kind: get
    entity: Calendar
    description: Get a calendar from the authenticated user's list by its ID
    provides:
    - id
    - summary
    - description
    - timeZone
    - location
    - backgroundColor
    - foregroundColor
    - summaryOverride
    - accessRole
    - primary
    - selected
    - hidden
  calendar_list:
    kind: query
    entity: Calendar
    description: List all calendars in the authenticated user's calendar list
    parameters:
    - name: showHidden
      value_ref: nv_calendar_list_show_hidden
      required: false
    - name: showDeleted
      value_ref: nv_calendar_list_show_deleted
      required: false
    - name: minAccessRole
      value_ref: nv_calendar_list_min_access_role
      required: false
  event_get:
    kind: get
    entity: Event
    description: Get a specific event by compound key (calendarId/eventId)
    provides:
    - id
    - calendarId
    - summary
    - description
    - location
    - status
    - visibility
    - transparency
    - start_datetime
    - start_date
    - end_datetime
    - end_date
    - organizer_email
    - organizer_name
    - creator_email
    - recurringEventId
    - iCalUID
    - htmlLink
    - etag
    - colorId
    - sequence
    - endTimeUnspecified
    - hangoutLink
    - attendees
    - recurrence
    - reminders
    - conferenceData
    - extendedProperties
    - created
    - updated
    - eventType
  event_list:
    kind: query
    entity: Event
    description: List events in a specific calendar
    parameters:
    - name: calendarId
      value_ref: nv_event_list_calendar_id
      required: true
      role: scope
    - name: q
      value_ref: nv_event_list_q
      required: false
      role: search
    - name: timeMin
      value_ref: nv_event_list_time_min
      required: false
    - name: timeMax
      value_ref: nv_event_list_time_max
      required: false
    - name: timeZone
      value_ref: nv_event_list_time_zone
      required: false
      role: response_control
    - name: updatedMin
      value_ref: nv_event_list_updated_min
      required: false
    - name: syncToken
      value_ref: nv_event_list_sync_token
      required: false
    - name: iCalUID
      value_ref: nv_event_list_i_cal_uid
      required: false
    - name: maxAttendees
      value_ref: nv_event_list_max_attendees
      required: false
    - name: showHiddenInvitations
      value_ref: nv_event_list_show_hidden_invitations
      required: false
    - name: privateExtendedProperty
      value_ref: nv_event_list_private_extended_property
      required: false
    - name: sharedExtendedProperty
      value_ref: nv_event_list_shared_extended_property
      required: false
    - name: orderBy
      value_ref: nv_event_list_order_by
      required: false
      role: sort
    - name: singleEvents
      value_ref: nv_event_list_single_events
      required: false
    - name: showDeleted
      value_ref: nv_event_list_show_deleted
      required: false
    - name: eventTypes
      value_ref: nv_event_list_event_types
      required: false
oauth:
  provider: google
  scopes:
    https://www.googleapis.com/auth/calendar:
      label: Full Calendar API access (calendars, events, sharing, and deletes)
      notes: Superset of all narrower Calendar scopes; use when the product needs writes or ACL changes beyond this read-only
        CGS.
      docs_url: https://developers.google.com/calendar/api/auth
    https://www.googleapis.com/auth/calendar.readonly:
      label: Read calendars you can access and their events (recommended for this domain)
      notes: Covers calendarList and events GET/list for calendars the user can open in Google Calendar; broader than the
        granular calendarlist/events pairs.
      docs_url: https://developers.google.com/calendar/api/auth
    https://www.googleapis.com/auth/calendar.calendarlist:
      label: Manage which calendars you are subscribed to (add/remove subscriptions)
      docs_url: https://developers.google.com/calendar/api/auth
    https://www.googleapis.com/auth/calendar.calendarlist.readonly:
      label: See the list of calendars you are subscribed to
      notes: Sufficient for calendar_list and calendar_get when you do not need event bodies from other scopes.
      docs_url: https://developers.google.com/calendar/api/auth
    https://www.googleapis.com/auth/calendar.events:
      label: View and edit events on all calendars you can access
      docs_url: https://developers.google.com/calendar/api/auth
    https://www.googleapis.com/auth/calendar.events.readonly:
      label: View events on all calendars you can access
      notes: Covers event_get and event_list; pair with a calendar-list scope if tokens omit calendar.readonly.
      docs_url: https://developers.google.com/calendar/api/auth
    https://www.googleapis.com/auth/calendar.events.owned:
      label: Create, change, and delete events on calendars you own
      docs_url: https://developers.google.com/calendar/api/auth
    https://www.googleapis.com/auth/calendar.events.owned.readonly:
      label: View events on calendars you own
      notes: Narrower than calendar.events.readonly; shared calendars another user owns may be inaccessible for event reads.
      docs_url: https://developers.google.com/calendar/api/auth
  default_scope_sets:
    readonly_calendar_surface:
      description: Matches this CGS (calendar list + event reads). Prefer a single calendar.readonly token when possible.
      scopes:
      - https://www.googleapis.com/auth/calendar.readonly
    granular_readonly_calendarlist_plus_events:
      description: Narrower split—calendar list metadata plus read-only events—when consent screens must avoid full calendar.readonly.
      scopes:
      - https://www.googleapis.com/auth/calendar.calendarlist.readonly
      - https://www.googleapis.com/auth/calendar.events.readonly
  requirements:
    capabilities:
      calendar_list:
        any_of:
        - https://www.googleapis.com/auth/calendar
        - https://www.googleapis.com/auth/calendar.readonly
        - https://www.googleapis.com/auth/calendar.calendarlist
        - https://www.googleapis.com/auth/calendar.calendarlist.readonly
      calendar_get:
        any_of:
        - https://www.googleapis.com/auth/calendar
        - https://www.googleapis.com/auth/calendar.readonly
        - https://www.googleapis.com/auth/calendar.calendarlist
        - https://www.googleapis.com/auth/calendar.calendarlist.readonly
      event_list:
        any_of:
        - https://www.googleapis.com/auth/calendar
        - https://www.googleapis.com/auth/calendar.readonly
        - https://www.googleapis.com/auth/calendar.events
        - https://www.googleapis.com/auth/calendar.events.readonly
        - https://www.googleapis.com/auth/calendar.events.owned
        - https://www.googleapis.com/auth/calendar.events.owned.readonly
      event_get:
        any_of:
        - https://www.googleapis.com/auth/calendar
        - https://www.googleapis.com/auth/calendar.readonly
        - https://www.googleapis.com/auth/calendar.events
        - https://www.googleapis.com/auth/calendar.events.readonly
        - https://www.googleapis.com/auth/calendar.events.owned
        - https://www.googleapis.com/auth/calendar.events.owned.readonly
    relations:
      Calendar.events:
        any_of:
        - https://www.googleapis.com/auth/calendar
        - https://www.googleapis.com/auth/calendar.readonly
        - https://www.googleapis.com/auth/calendar.events
        - https://www.googleapis.com/auth/calendar.events.readonly
        - https://www.googleapis.com/auth/calendar.events.owned
        - https://www.googleapis.com/auth/calendar.events.owned.readonly
auth:
  scheme: bearer_token
  env: GCAL_TOKEN
values:
  nv_calendar_id:
    type: string
    string_semantics: short
  nv_calendar_summary:
    type: string
    string_semantics: short
  nv_calendar_description:
    type: string
    string_semantics: markdown
  nv_calendar_time_zone:
    type: string
    string_semantics: short
  nv_calendar_location:
    type: string
    string_semantics: short
  nv_calendar_background_color:
    type: string
    string_semantics: short
  nv_calendar_access_role:
    type: select
    allowed_values:
    - none
    - freeBusyReader
    - reader
    - writer
    - owner
  nv_calendar_foreground_color:
    type: string
    string_semantics: short
  nv_calendar_summary_override:
    type: string
    string_semantics: short
  nv_calendar_primary:
    type: boolean
  nv_calendar_selected:
    type: boolean
  nv_calendar_hidden:
    type: boolean
  nv_event_calendar_id:
    type: entity_ref
    target: Calendar
  nv_event_id:
    type: string
    string_semantics: short
  nv_event_summary:
    type: string
    string_semantics: short
  nv_event_description:
    type: string
    string_semantics: markdown
  nv_event_location:
    type: string
    string_semantics: short
  nv_event_status:
    type: select
    allowed_values:
    - confirmed
    - tentative
    - cancelled
  nv_event_visibility:
    type: select
    allowed_values:
    - default
    - public
    - private
    - confidential
  nv_event_transparency:
    type: select
    allowed_values:
    - opaque
    - transparent
  nv_event_start_datetime:
    type: date
    value_format: rfc3339
  nv_event_start_date:
    type: string
    string_semantics: short
  nv_event_end_datetime:
    type: date
    value_format: rfc3339
  nv_event_end_date:
    type: string
    string_semantics: short
  nv_event_organizer_email:
    type: string
    string_semantics: short
  nv_event_organizer_name:
    type: string
    string_semantics: short
  nv_event_creator_email:
    type: string
    string_semantics: short
  nv_event_recurring_event_id:
    type: string
    string_semantics: short
  nv_event_i_cal_uid:
    type: string
    string_semantics: short
  nv_event_html_link:
    type: string
    string_semantics: short
  nv_event_etag:
    type: string
    string_semantics: short
  nv_event_color_id:
    type: string
    string_semantics: short
  nv_event_sequence:
    type: integer
  nv_event_end_time_unspecified:
    type: boolean
  nv_event_hangout_link:
    type: string
    string_semantics: short
  nv_event_attendees:
    type: json
    description: Attendee list as returned by the API (omit or truncate when maxAttendees limits response).
  nv_event_recurrence_item:
    type: string
    string_semantics: short
  nv_event_recurrence:
    type: array
    items:
      value_ref: nv_event_recurrence_item
    description: RRULE/EXRULE strings for recurring masters.
  nv_event_reminders:
    type: json
  nv_event_conference_data:
    type: json
  nv_event_extended_properties:
    type: json
  nv_event_created:
    type: date
    value_format: rfc3339
  nv_event_updated:
    type: date
    value_format: rfc3339
  nv_event_event_type:
    type: select
    allowed_values:
    - birthday
    - default
    - focusTime
    - fromGmail
    - outOfOffice
    - workingLocation
  nv_calendar_list_show_hidden:
    type: boolean
  nv_calendar_list_show_deleted:
    type: boolean
  nv_calendar_list_min_access_role:
    type: select
    allowed_values:
    - freeBusyReader
    - reader
    - writer
    - owner
  nv_event_list_calendar_id:
    type: entity_ref
    target: Calendar
  nv_event_list_q:
    type: string
    string_semantics: short
  nv_event_list_time_min:
    type: date
    value_format: rfc3339
  nv_event_list_time_max:
    type: date
    value_format: rfc3339
  nv_event_list_time_zone:
    type: string
    string_semantics: short
    description: IANA time zone used when interpreting and returning event times in the response.
  nv_event_list_updated_min:
    type: date
    value_format: rfc3339
    description: Lower bound (exclusive) on event updated time; enables incremental sync style filters.
  nv_event_list_sync_token:
    type: string
    string_semantics: short
    description: Incremental sync token from a prior list response; cannot combine with several other filters (see API sync
      guide).
  nv_event_list_i_cal_uid:
    type: string
    string_semantics: short
  nv_event_list_max_attendees:
    type: integer
  nv_event_list_show_hidden_invitations:
    type: boolean
  nv_event_list_private_extended_property_item:
    type: string
    string_semantics: short
  nv_event_list_private_extended_property:
    type: array
    items:
      value_ref: nv_event_list_private_extended_property_item
    description: Repeated name=value constraints; matches private extended properties.
  nv_event_list_shared_extended_property_item:
    type: string
    string_semantics: short
  nv_event_list_shared_extended_property:
    type: array
    items:
      value_ref: nv_event_list_shared_extended_property_item
    description: Repeated name=value constraints; matches shared extended properties.
  nv_event_list_order_by:
    type: select
    allowed_values:
    - startTime
    - updated
  nv_event_list_single_events:
    type: boolean
  nv_event_list_show_deleted:
    type: boolean
  nv_event_list_event_types_item:
    type: string
  nv_event_list_event_types:
    type: array
    items:
      value_ref: nv_event_list_event_types_item
