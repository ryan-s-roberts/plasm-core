version: 1

http_backend: https://api.cloudflare.com/client/v4

entities:
  Zone:
    id_field: id
    description: A Cloudflare zone (site) the account can manage.
    fields:
      id:
        field_type: string
        string_semantics: short
        required: true
      name:
        field_type: string
        string_semantics: short
        required: true
      status:
        field_type: string
        string_semantics: short
        required: false
      paused:
        field_type: boolean
        required: false
      type:
        field_type: string
        string_semantics: short
        required: false
    relations:
      rulesets:
        target: Ruleset
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: ruleset_query
          bindings:
            zone_id: id
      waf_packages:
        target: WafPackage
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: waf_package_query
          bindings:
            zone_id: id

  Ruleset:
    id_field: id
    key_vars:
    - zone_id
    - ruleset_id
    description: A ruleset attached to a zone (metadata list, or full payload including rules when fetched by id).
    fields:
      zone_id:
        field_type: string
        string_semantics: short
        required: true
      ruleset_id:
        field_type: string
        string_semantics: short
        required: true
        path: id
      id:
        field_type: string
        string_semantics: short
        required: true
      name:
        field_type: string
        string_semantics: short
        required: false
      description:
        field_type: string
        string_semantics: markdown
        required: false
      kind:
        field_type: select
        allowed_values:
        - managed
        - custom
        - root
        - zone
        required: false
      phase:
        field_type: select
        allowed_values:
        - ddos_l4
        - ddos_l7
        - http_config_settings
        - http_custom_errors
        - http_log_custom_fields
        - http_ratelimit
        - http_request_cache_settings
        - http_request_dynamic_redirect
        - http_request_firewall_custom
        - http_request_firewall_managed
        - http_request_late_transform
        - http_request_origin
        - http_request_redirect
        - http_request_sanitize
        - http_request_sbfm
        - http_request_transform
        - http_response_cache_settings
        - http_response_compression
        - http_response_firewall_managed
        - http_response_headers_transform
        - magic_transit
        - magic_transit_ids_managed
        - magic_transit_managed
        - magic_transit_ratelimit
        required: false
      version:
        field_type: string
        string_semantics: short
        required: false
      last_updated:
        field_type: date
        value_format: rfc3339
        required: false

  RulesetEntrypoint:
    id_field: id
    key_vars:
    - zone_id
    - ruleset_phase
    description: Managed entrypoint ruleset for one execution phase on a zone (DDoS L7, managed WAF, rate limits, etc.).
    fields:
      zone_id:
        field_type: string
        string_semantics: short
        required: true
      ruleset_phase:
        field_type: select
        allowed_values:
        - ddos_l4
        - ddos_l7
        - http_config_settings
        - http_custom_errors
        - http_log_custom_fields
        - http_ratelimit
        - http_request_cache_settings
        - http_request_dynamic_redirect
        - http_request_firewall_custom
        - http_request_firewall_managed
        - http_request_late_transform
        - http_request_origin
        - http_request_redirect
        - http_request_sanitize
        - http_request_sbfm
        - http_request_transform
        - http_response_cache_settings
        - http_response_compression
        - http_response_firewall_managed
        - http_response_headers_transform
        - magic_transit
        - magic_transit_ids_managed
        - magic_transit_managed
        - magic_transit_ratelimit
        required: true
      id:
        field_type: string
        string_semantics: short
        required: true
      name:
        field_type: string
        string_semantics: short
        required: false
      description:
        field_type: string
        string_semantics: markdown
        required: false
      kind:
        field_type: select
        allowed_values:
        - managed
        - custom
        - root
        - zone
        required: false
      phase:
        field_type: select
        allowed_values:
        - ddos_l4
        - ddos_l7
        - http_config_settings
        - http_custom_errors
        - http_log_custom_fields
        - http_ratelimit
        - http_request_cache_settings
        - http_request_dynamic_redirect
        - http_request_firewall_custom
        - http_request_firewall_managed
        - http_request_late_transform
        - http_request_origin
        - http_request_redirect
        - http_request_sanitize
        - http_request_sbfm
        - http_request_transform
        - http_response_cache_settings
        - http_response_compression
        - http_response_firewall_managed
        - http_response_headers_transform
        - magic_transit
        - magic_transit_ids_managed
        - magic_transit_managed
        - magic_transit_ratelimit
        required: false
      version:
        field_type: string
        string_semantics: short
        required: false
      last_updated:
        field_type: date
        value_format: rfc3339
        required: false

  WafPackage:
    id_field: id
    key_vars:
    - zone_id
    description: A WAF package offered for a zone (OWASP Core Ruleset, Cloudflare managed rules, etc.).
    fields:
      zone_id:
        field_type: string
        string_semantics: short
        required: true
      id:
        field_type: string
        string_semantics: short
        required: true
      name:
        field_type: string
        string_semantics: short
        required: false
      description:
        field_type: string
        string_semantics: markdown
        required: false
      detection_mode:
        field_type: string
        string_semantics: short
        required: false

capabilities:
  zone_query:
    kind: query
    entity: Zone
    description: List zones visible to the token, optionally filtered by account or name.
    parameters:
    - name: account_id
      type: string
      required: false
      role: filter
      description: Filter to zones owned by this account id (maps to account.id query parameter).
      string_semantics: short
    - name: name
      type: string
      required: false
      role: filter
      description: Exact zone name match.
      string_semantics: short
    - name: status
      type: string
      required: false
      role: filter
      description: Zone status filter (e.g. active, pending, initializing).
      string_semantics: short
    - name: type
      type: string
      required: false
      role: filter
      description: Zone type filter (full, partial, etc.).
      string_semantics: short
    - name: page
      type: integer
      required: false
      role: response_control
      description: Page number for list pagination (Cloudflare v4).
    - name: per_page
      type: integer
      required: false
      role: response_control
      description: Page size (max per Cloudflare docs).
  zone_get:
    kind: get
    entity: Zone
    description: Fetch one zone by id.
    provides:
    - id
    - name
    - status
    - paused
    - type
  ruleset_query:
    kind: query
    entity: Ruleset
    description: List rulesets on a zone (summary rows without full rules per Cloudflare list semantics).
    parameters:
    - name: zone_id
      type: string
      required: true
      role: scope
      description: Zone identifier.
      string_semantics: short
    - name: per_page
      type: integer
      required: false
      role: response_control
      description: Page size for cursor pagination.
  ruleset_get:
    kind: get
    entity: Ruleset
    description: Fetch one zone ruleset by id, including rules when the API returns them.
    provides:
    - zone_id
    - id
    - name
    - description
    - kind
    - phase
    - version
    - last_updated
  ruleset_entrypoint_get:
    kind: get
    entity: RulesetEntrypoint
    description: Get the managed entrypoint ruleset for a phase (DDoS L7, managed WAF, custom rules, etc.).
    provides:
    - zone_id
    - ruleset_phase
    - id
    - name
    - description
    - kind
    - phase
    - version
    - last_updated
  ruleset_entrypoint_update:
    kind: action
    entity: RulesetEntrypoint
    description: Replace the zone entrypoint ruleset for a phase. Pass input as a JSON object (name, kind, phase, rules, etc.) per Cloudflare Rulesets API.
    parameters:
    - name: zone_id
      type: string
      required: true
      role: scope
      string_semantics: short
    - name: ruleset_phase
      type: select
      required: true
      role: scope
      allowed_values:
      - ddos_l4
      - ddos_l7
      - http_config_settings
      - http_custom_errors
      - http_log_custom_fields
      - http_ratelimit
      - http_request_cache_settings
      - http_request_dynamic_redirect
      - http_request_firewall_custom
      - http_request_firewall_managed
      - http_request_late_transform
      - http_request_origin
      - http_request_redirect
      - http_request_sanitize
      - http_request_sbfm
      - http_request_transform
      - http_response_cache_settings
      - http_response_compression
      - http_response_firewall_managed
      - http_response_headers_transform
      - magic_transit
      - magic_transit_ids_managed
      - magic_transit_managed
      - magic_transit_ratelimit
    - name: input
      type: json
      required: true
      description: Request body JSON for PUT entrypoint (ruleset shape including rules array).
    output:
      type: side_effect
      description: Updates the phase entrypoint ruleset in Cloudflare (WAF sensitivity, custom rules, etc.).
  waf_package_query:
    kind: query
    entity: WafPackage
    description: List WAF packages available for a zone.
    parameters:
    - name: zone_id
      type: string
      required: true
      role: scope
      string_semantics: short
    - name: page
      type: integer
      required: false
      role: response_control
    - name: per_page
      type: integer
      required: false
      role: response_control

auth:
  scheme: bearer_token
  env: CLOUDFLARE_API_TOKEN
