version: 1
http_backend: https://api.cloudflare.com/client/v4
entities:
  Zone:
    id_field: id
    description: A Cloudflare zone (site) the account can manage.
    fields:
      id:
        required: true
        value_ref: nv_zone_id
      name:
        required: true
        value_ref: nv_zone_name
      status:
        required: false
        value_ref: nv_zone_status
      paused:
        required: false
        value_ref: nv_zone_paused
      type:
        required: false
        value_ref: nv_zone_type
    relations:
      rulesets:
        target: Ruleset
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: ruleset_query
          bindings:
            zone_id: id
      waf_packages:
        target: WafPackage
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: waf_package_query
          bindings:
            zone_id: id
  Ruleset:
    id_field: id
    key_vars:
    - zone_id
    - ruleset_id
    description: A ruleset attached to a zone (metadata list, or full payload including rules when fetched by id).
    fields:
      zone_id:
        required: true
        value_ref: nv_ruleset_zone_id
      ruleset_id:
        required: true
        path: id
        value_ref: nv_ruleset_ruleset_id
      id:
        required: true
        value_ref: nv_ruleset_id
      name:
        required: false
        value_ref: nv_ruleset_name
      description:
        required: false
        value_ref: nv_ruleset_description
      kind:
        required: false
        value_ref: nv_ruleset_kind
      phase:
        required: false
        value_ref: nv_ruleset_phase
      version:
        required: false
        value_ref: nv_ruleset_version
      last_updated:
        required: false
        value_ref: nv_ruleset_last_updated
  RulesetEntrypoint:
    id_field: id
    key_vars:
    - zone_id
    - ruleset_phase
    description: Managed entrypoint ruleset for one execution phase on a zone (DDoS L7, managed WAF, rate limits, etc.).
    fields:
      zone_id:
        required: true
        value_ref: nv_ruleset_entrypoint_zone_id
      ruleset_phase:
        required: true
        value_ref: nv_ruleset_entrypoint_ruleset_phase
      id:
        required: true
        value_ref: nv_ruleset_entrypoint_id
      name:
        required: false
        value_ref: nv_ruleset_entrypoint_name
      description:
        required: false
        value_ref: nv_ruleset_entrypoint_description
      kind:
        required: false
        value_ref: nv_ruleset_entrypoint_kind
      phase:
        required: false
        value_ref: nv_ruleset_entrypoint_phase
      version:
        required: false
        value_ref: nv_ruleset_entrypoint_version
      last_updated:
        required: false
        value_ref: nv_ruleset_entrypoint_last_updated
  WafPackage:
    id_field: id
    key_vars:
    - zone_id
    description: A WAF package offered for a zone (OWASP Core Ruleset, Cloudflare managed rules, etc.).
    fields:
      zone_id:
        required: true
        value_ref: nv_waf_package_zone_id
      id:
        required: true
        value_ref: nv_waf_package_id
      name:
        required: false
        value_ref: nv_waf_package_name
      description:
        required: false
        value_ref: nv_waf_package_description
      detection_mode:
        required: false
        value_ref: nv_waf_package_detection_mode
capabilities:
  zone_query:
    kind: query
    entity: Zone
    description: List zones visible to the token, optionally filtered by account or name.
    parameters:
    - name: account_id
      value_ref: nv_zone_query_account_id
      required: false
      role: filter
    - name: name
      value_ref: nv_zone_query_name
      required: false
      role: filter
    - name: status
      value_ref: nv_zone_query_status
      required: false
      role: filter
    - name: type
      value_ref: nv_zone_query_type
      required: false
      role: filter
    - name: page
      value_ref: nv_zone_query_page
      required: false
      role: response_control
    - name: per_page
      value_ref: nv_zone_query_per_page
      required: false
      role: response_control
  zone_get:
    kind: get
    entity: Zone
    description: Fetch one zone by id.
    provides:
    - id
    - name
    - status
    - paused
    - type
  ruleset_query:
    kind: query
    entity: Ruleset
    description: List rulesets on a zone (summary rows without full rules per Cloudflare list semantics).
    parameters:
    - name: zone_id
      value_ref: nv_ruleset_query_zone_id
      required: true
      role: scope
    - name: per_page
      value_ref: nv_ruleset_query_per_page
      required: false
      role: response_control
  ruleset_get:
    kind: get
    entity: Ruleset
    description: Fetch one zone ruleset by id, including rules when the API returns them.
    provides:
    - zone_id
    - id
    - name
    - description
    - kind
    - phase
    - version
    - last_updated
  ruleset_entrypoint_get:
    kind: get
    entity: RulesetEntrypoint
    description: Get the managed entrypoint ruleset for a phase (DDoS L7, managed WAF, custom rules, etc.).
    provides:
    - zone_id
    - ruleset_phase
    - id
    - name
    - description
    - kind
    - phase
    - version
    - last_updated
  ruleset_entrypoint_update:
    kind: action
    entity: RulesetEntrypoint
    description: Replace the zone entrypoint ruleset for a phase. Pass input as a JSON object (name, kind, phase, rules, etc.)
      per Cloudflare Rulesets API.
    parameters:
    - name: zone_id
      value_ref: nv_ruleset_entrypoint_update_zone_id
      required: true
      role: scope
    - name: ruleset_phase
      value_ref: nv_ruleset_entrypoint_update_ruleset_phase
      required: true
      role: scope
    - name: input
      value_ref: nv_ruleset_entrypoint_update_input
      required: true
    output:
      type: side_effect
      description: Updates the phase entrypoint ruleset in Cloudflare (WAF sensitivity, custom rules, etc.).
  waf_package_query:
    kind: query
    entity: WafPackage
    description: List WAF packages available for a zone.
    parameters:
    - name: zone_id
      value_ref: nv_waf_package_query_zone_id
      required: true
      role: scope
    - name: page
      value_ref: nv_waf_package_query_page
      required: false
      role: response_control
    - name: per_page
      value_ref: nv_waf_package_query_per_page
      required: false
      role: response_control
auth:
  scheme: bearer_token
  env: CLOUDFLARE_API_TOKEN
values:
  nv_zone_id:
    type: string
    string_semantics: short
  nv_zone_name:
    type: string
    string_semantics: short
  nv_zone_status:
    type: string
    string_semantics: short
  nv_zone_paused:
    type: boolean
  nv_zone_type:
    type: string
    string_semantics: short
  nv_ruleset_zone_id:
    type: string
    string_semantics: short
  nv_ruleset_ruleset_id:
    type: string
    string_semantics: short
  nv_ruleset_id:
    type: string
    string_semantics: short
  nv_ruleset_name:
    type: string
    string_semantics: short
  nv_ruleset_description:
    type: string
    string_semantics: markdown
