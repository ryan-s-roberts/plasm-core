version: 3
auth:
  scheme: none
http_backend: https://www.dnd5eapi.co
entities:
  AbilityScore:
    id_field: index
    description: One of the six ability scores (STR, DEX, CON, INT, WIS, CHA) used for checks and saves.
    fields:
      index:
        required: true
        value_ref: nv_ability_score_index
      name:
        required: true
        value_ref: nv_ability_score_name
      full_name:
        required: false
        value_ref: nv_ability_score_full_name
      desc:
        required: false
        value_ref: nv_ability_score_desc
    relations:
      skills:
        description: Skills that use this ability as their key modifier.
        target: Skill
        cardinality: many
        materialize:
          kind: from_parent_get
          path:
          - key: skills
          - wildcard: true
          - key: index
  Alignment:
    id_field: index
    description: A moral and ethical outlook label from the nine-alignment grid.
    fields:
      index:
        required: true
        value_ref: nv_alignment_index
      name:
        required: true
        value_ref: nv_alignment_name
      abbreviation:
        required: false
        value_ref: nv_alignment_abbreviation
      desc:
        required: false
        value_ref: nv_alignment_desc
  DamageType:
    id_field: index
    description: A damage type such as slashing, fire, or psychic.
    fields:
      index:
        required: true
        value_ref: nv_damage_type_index
      name:
        required: true
        value_ref: nv_damage_type_name
      desc:
        required: false
        value_ref: nv_damage_type_desc
  EquipmentCategory:
    id_field: index
    description: A grouping of equipment such as martial melee weapons or holy symbols.
    fields:
      index:
        required: true
        value_ref: nv_equipment_category_index
      name:
        required: true
        value_ref: nv_equipment_category_name
  WeaponProperty:
    id_field: index
    description: A weapon tag such as finesse, reach, or two-handed.
    fields:
      index:
        required: true
        value_ref: nv_weapon_property_index
      name:
        required: true
        value_ref: nv_weapon_property_name
      desc:
        required: false
        value_ref: nv_weapon_property_desc
  Language:
    id_field: index
    description: A language creatures may speak or understand.
    fields:
      index:
        required: true
        value_ref: nv_language_index
      name:
        required: true
        value_ref: nv_language_name
      desc:
        required: false
        value_ref: nv_language_desc
      type:
        required: false
        value_ref: nv_language_type
      typical_speakers:
        required: false
        value_ref: nv_language_typical_speakers
  Proficiency:
    id_field: index
    description: A skill, saving throw, armor, weapon, or tool proficiency granted by class, race, or background.
    fields:
      index:
        required: true
        value_ref: nv_proficiency_index
      name:
        required: true
        value_ref: nv_proficiency_name
      type:
        required: false
        value_ref: nv_proficiency_type
  Rule:
    id_field: index
    description: A top-level SRD rules chapter with subsections.
    fields:
      index:
        required: true
        value_ref: nv_rule_index
      name:
        required: true
        value_ref: nv_rule_name
      desc:
        required: false
        value_ref: nv_rule_desc
    relations:
      subsections:
        description: Linked rule subsections under this chapter.
        target: RuleSection
        cardinality: many
        materialize:
          kind: from_parent_get
          path:
          - key: subsections
          - wildcard: true
          - key: index
  RuleSection:
    id_field: index
    description: A subsection within a rules chapter.
    fields:
      index:
        required: true
        value_ref: nv_rule_section_index
      name:
        required: true
        value_ref: nv_rule_section_name
      desc:
        required: false
        value_ref: nv_rule_section_desc
  Feat:
    id_field: index
    description: An optional feat from the SRD when present.
    fields:
      index:
        required: true
        value_ref: nv_feat_index
      name:
        required: true
        value_ref: nv_feat_name
      desc:
        required: false
        value_ref: nv_feat_desc
  ClassLevel:
    id_field: index
    description: Progression row for one class level (hit dice, proficiencies, class-specific knobs).
    fields:
      index:
        required: true
        value_ref: nv_class_level_index
      level:
        required: false
        value_ref: nv_class_level_level
      ability_score_bonuses:
        required: false
        value_ref: nv_class_level_ability_score_bonuses
      prof_bonus:
        required: false
        value_ref: nv_class_level_prof_bonus
      url:
        required: false
        value_ref: nv_class_level_url
      class_specific:
        required: false
        value_ref: nv_class_level_class_specific
      spellcasting:
        required: false
        value_ref: nv_class_level_spellcasting
      updated_at:
        required: false
        value_ref: nv_class_level_updated_at
    relations:
      class:
        description: Class this level row belongs to.
        target: Class
        cardinality: one
      features:
        description: Features gained at exactly this level.
        target: Feature
        cardinality: many
        materialize:
          kind: from_parent_get
          path:
          - key: features
          - wildcard: true
          - key: index
  SubclassLevel:
    id_field: index
    description: Progression row for a subclass at a given character level.
    fields:
      index:
        required: true
        value_ref: nv_subclass_level_index
      level:
        required: false
        value_ref: nv_subclass_level_level
      prof_bonus:
        required: false
        value_ref: nv_subclass_level_prof_bonus
      url:
        required: false
        value_ref: nv_subclass_level_url
      subclass_specific:
        required: false
        value_ref: nv_subclass_level_subclass_specific
      updated_at:
        required: false
        value_ref: nv_subclass_level_updated_at
    relations:
      subclass:
        description: Subclass owning this progression row.
        target: Subclass
        cardinality: one
      features:
        description: Features granted at this subclass level.
        target: Feature
        cardinality: many
        materialize:
          kind: from_parent_get
          path:
          - key: features
          - wildcard: true
          - key: index
  ClassSpellcasting:
    id_field: index
    implicit_request_identity: true
    domain_projection_examples: false
    description: Spellcasting progression and rules text for a class that casts spells.
    fields:
      index:
        required: true
        value_ref: nv_class_spellcasting_index
      level:
        required: false
        value_ref: nv_class_spellcasting_level
      info:
        required: false
        value_ref: nv_class_spellcasting_info
    relations:
      spellcasting_ability:
        description: Ability score used for spell save DC and spell attacks.
        target: AbilityScore
        cardinality: one
  ClassMulticlassing:
    id_field: index
    implicit_request_identity: true
    domain_projection_examples: false
    description: Multiclass prerequisites and proficiencies granted when dipping into a class.
    fields:
      index:
        required: true
        value_ref: nv_class_multiclassing_index
      prerequisites:
        required: false
        value_ref: nv_class_multiclassing_prerequisites
      proficiencies:
        required: false
        value_ref: nv_class_multiclassing_proficiencies
      proficiency_choices:
        required: false
        value_ref: nv_class_multiclassing_proficiency_choices
  MagicSchool:
    id_field: index
    description: One of the eight schools of magic (e.g. Evocation, Illusion).
    fields:
      index:
        required: true
        value_ref: nv_magic_school_index
      name:
        required: true
        value_ref: nv_magic_school_name
      desc:
        required: false
        value_ref: nv_magic_school_desc
  Class:
    id_field: index
    description: A character class (Fighter, Wizard, Rogue etc.) defining core abilities.
    fields:
      index:
        required: true
        value_ref: nv_class_index
      name:
        required: true
        value_ref: nv_class_name
      hit_die:
        required: false
        value_ref: nv_class_hit_die
    relations:
      subclasses:
        description: Subclasses available for this class.
        target: Subclass
        cardinality: many
        materialize:
          kind: query_scoped
          capability: class_subclasses
          param: class_index
      features:
        description: All features granted by this class.
        target: Feature
        cardinality: many
        materialize:
          kind: query_scoped
          capability: class_features
          param: class_index
      spells:
        description: All spells available to this class.
        target: Spell
        cardinality: many
        materialize:
          kind: query_scoped
          capability: class_spells
          param: class_index
  Subclass:
    id_field: index
    description: A specialisation of a Class (e.g. Evocation Wizard).
    fields:
      index:
        required: true
        value_ref: nv_subclass_index
      name:
        required: true
        value_ref: nv_subclass_name
      subclass_flavor:
        required: false
        value_ref: nv_subclass_subclass_flavor
      desc:
        required: false
        value_ref: nv_subclass_desc
    relations:
      class:
        description: Base class this subclass extends.
        target: Class
        cardinality: one
  Spell:
    id_field: index
    description: A magical effect a caster can invoke; identified by kebab-case slug.
    fields:
      index:
        required: true
        value_ref: nv_spell_index
      name:
        required: true
        value_ref: nv_spell_name
      level:
        required: false
        value_ref: nv_spell_level
      range:
        required: false
        value_ref: nv_spell_range
      casting_time:
        required: false
        value_ref: nv_spell_casting_time
      duration:
        required: false
        value_ref: nv_spell_duration
      concentration:
        required: false
        value_ref: nv_spell_concentration
      ritual:
        required: false
        value_ref: nv_spell_ritual
      desc:
        required: false
        value_ref: nv_spell_desc
      higher_level:
        required: false
        value_ref: nv_spell_higher_level
      components:
        required: false
        value_ref: nv_spell_components
      material:
        required: false
        value_ref: nv_spell_material
      attack_type:
        required: false
        value_ref: nv_spell_attack_type
      area_of_effect:
        required: false
        value_ref: nv_spell_area_of_effect
      damage:
        required: false
        value_ref: nv_spell_damage
      dc:
        required: false
        value_ref: nv_spell_dc
      url:
        required: false
        value_ref: nv_spell_url
      updated_at:
        required: false
        value_ref: nv_spell_updated_at
    relations:
      school:
        description: The school of magic this spell belongs to.
        target: MagicSchool
        cardinality: one
      classes:
        description: Classes that can learn this spell.
        target: Class
        cardinality: many
        materialize:
          kind: from_parent_get
          path:
          - key: classes
          - wildcard: true
          - key: index
      subclasses:
        description: Subclasses that add this spell to their list.
        target: Subclass
        cardinality: many
        materialize:
          kind: from_parent_get
          path:
          - key: subclasses
          - wildcard: true
          - key: index
  Monster:
    id_field: index
    description: A creature or NPC encountered in combat encounters.
    fields:
      index:
        required: true
        value_ref: nv_monster_index
      name:
        required: true
        value_ref: nv_monster_name
      size:
        required: false
        value_ref: nv_monster_size
      type:
        required: false
        value_ref: nv_monster_type
      subtype:
        required: false
        value_ref: nv_monster_subtype
      alignment:
        required: false
        value_ref: nv_monster_alignment
      challenge_rating:
        required: false
        value_ref: nv_monster_challenge_rating
      hit_points:
        required: false
        value_ref: nv_monster_hit_points
      hit_dice:
        required: false
        value_ref: nv_monster_hit_dice
      hit_points_roll:
        required: false
        value_ref: nv_monster_hit_points_roll
      armor_class:
        required: false
        value_ref: nv_monster_armor_class
      proficiency_bonus:
        required: false
        value_ref: nv_monster_proficiency_bonus
      strength:
        required: false
        value_ref: nv_monster_strength
      dexterity:
        required: false
        value_ref: nv_monster_dexterity
      constitution:
        required: false
        value_ref: nv_monster_constitution
      intelligence:
        required: false
        value_ref: nv_monster_intelligence
      wisdom:
        required: false
        value_ref: nv_monster_wisdom
      charisma:
        required: false
        value_ref: nv_monster_charisma
      xp:
        required: false
        value_ref: nv_monster_xp
      image:
        required: false
        value_ref: nv_monster_image
      speed:
        required: false
        value_ref: nv_monster_speed
      senses:
        required: false
        value_ref: nv_monster_senses
      languages:
        required: false
        value_ref: nv_monster_languages
      proficiencies:
        required: false
        value_ref: nv_monster_proficiencies
      damage_vulnerabilities:
        required: false
        value_ref: nv_monster_damage_vulnerabilities
      damage_resistances:
        required: false
        value_ref: nv_monster_damage_resistances
      damage_immunities:
        required: false
        value_ref: nv_monster_damage_immunities
      condition_immunities:
        required: false
        value_ref: nv_monster_condition_immunities
      special_abilities:
        required: false
        value_ref: nv_monster_special_abilities
      actions:
        required: false
        value_ref: nv_monster_actions
      legendary_actions:
        required: false
        value_ref: nv_monster_legendary_actions
      reactions:
        required: false
        value_ref: nv_monster_reactions
      url:
        required: false
        value_ref: nv_monster_url
      updated_at:
        required: false
        value_ref: nv_monster_updated_at
  Race:
    id_field: index
    description: A playable species (Human, Elf, Dwarf etc.).
    fields:
      index:
        required: true
        value_ref: nv_race_index
      name:
        required: true
        value_ref: nv_race_name
      speed:
        required: false
        value_ref: nv_race_speed
      size:
        required: false
        value_ref: nv_race_size
      alignment:
        required: false
        value_ref: nv_race_alignment
      age:
        required: false
        value_ref: nv_race_age
    relations:
      traits:
        description: Racial passive traits granted to characters of this race.
        target: Trait
        cardinality: many
        materialize:
          kind: query_scoped
          capability: race_traits
          param: race_index
      subraces:
        description: Subraces (variants) available for this race.
        target: Subrace
        cardinality: many
        materialize:
          kind: query_scoped
          capability: race_subraces
          param: race_index
  Subrace:
    id_field: index
    description: A variant of a Race (e.g. High Elf vs Wood Elf).
    fields:
      index:
        required: true
        value_ref: nv_subrace_index
      name:
        required: true
        value_ref: nv_subrace_name
      desc:
        required: false
        value_ref: nv_subrace_desc
  Feature:
    id_field: index
    description: A class or race ability gained at a specific level.
    fields:
      index:
        required: true
        value_ref: nv_feature_index
      name:
        required: true
        value_ref: nv_feature_name
      level:
        required: false
        value_ref: nv_feature_level
      desc:
        required: false
        value_ref: nv_feature_desc
  Equipment:
    id_field: index
    description: A piece of gear including weapons, armour, and tools.
    fields:
      index:
        required: true
        value_ref: nv_equipment_index
      name:
        required: true
        value_ref: nv_equipment_name
      weight:
        required: false
        value_ref: nv_equipment_weight
      desc:
        required: false
        value_ref: nv_equipment_desc
  MagicItem:
    id_field: index
    description: An enchanted item with special magical properties.
    fields:
      index:
        required: true
        value_ref: nv_magic_item_index
      name:
        required: true
        value_ref: nv_magic_item_name
      desc:
        required: false
        value_ref: nv_magic_item_desc
  Skill:
    id_field: index
    description: A proficiency such as Stealth or Persuasion.
    fields:
      index:
        required: true
        value_ref: nv_skill_index
      name:
        required: true
        value_ref: nv_skill_name
      desc:
        required: false
        value_ref: nv_skill_desc
    relations:
      ability_score:
        description: Ability score used for this skill's checks.
        target: AbilityScore
        cardinality: one
  Condition:
    id_field: index
    description: A status effect such as Blinded or Paralyzed.
    fields:
      index:
        required: true
        value_ref: nv_condition_index
      name:
        required: true
        value_ref: nv_condition_name
      desc:
        required: false
        value_ref: nv_condition_desc
  Background:
    id_field: index
    description: A character backstory archetype (Soldier, Criminal etc.).
    fields:
      index:
        required: true
        value_ref: nv_background_index
      name:
        required: true
        value_ref: nv_background_name
  Trait:
    id_field: index
    description: A racial passive ability or characteristic.
    fields:
      index:
        required: true
        value_ref: nv_trait_index
      name:
        required: true
        value_ref: nv_trait_name
      desc:
        required: false
        value_ref: nv_trait_desc
capabilities:
  ability_score_query:
    description: List all ability scores.
    kind: query
    entity: AbilityScore
  ability_score_get:
    description: Retrieve one ability score by index.
    kind: get
    entity: AbilityScore
    provides:
    - index
    - name
    - full_name
    - desc
  alignment_query:
    description: List all alignments.
    kind: query
    entity: Alignment
  alignment_get:
    description: Retrieve one alignment by index.
    kind: get
    entity: Alignment
    provides:
    - index
    - name
    - abbreviation
    - desc
  damage_type_query:
    description: List all damage types.
    kind: query
    entity: DamageType
  damage_type_get:
    description: Retrieve one damage type by index.
    kind: get
    entity: DamageType
    provides:
    - index
    - name
    - desc
  equipment_category_query:
    description: List equipment categories.
    kind: query
    entity: EquipmentCategory
  equipment_category_get:
    description: Retrieve one equipment category by index.
    kind: get
    entity: EquipmentCategory
    provides:
    - index
    - name
  weapon_property_query:
    description: List weapon properties such as finesse or reach.
    kind: query
    entity: WeaponProperty
  weapon_property_get:
    description: Retrieve one weapon property by index.
    kind: get
    entity: WeaponProperty
    provides:
    - index
    - name
    - desc
  language_query:
    description: List languages from the SRD.
    kind: query
    entity: Language
  language_get:
    description: Retrieve one language by index.
    kind: get
    entity: Language
    provides:
    - index
    - name
    - desc
    - type
    - typical_speakers
  proficiency_query:
    description: List all proficiencies.
    kind: query
    entity: Proficiency
  proficiency_get:
    description: Retrieve one proficiency by index.
    kind: get
    entity: Proficiency
    provides:
    - index
    - name
    - type
  rule_query:
    description: List top-level rules chapters.
    kind: query
    entity: Rule
  rule_get:
    description: Retrieve one rules chapter by index.
    kind: get
    entity: Rule
    provides:
    - index
    - name
    - desc
  rule_section_query:
    description: List rule subsections (flat index).
    kind: query
    entity: RuleSection
  rule_section_get:
    description: Retrieve one rule subsection by index.
    kind: get
    entity: RuleSection
    provides:
    - index
    - name
    - desc
  feat_query:
    description: List feats exposed by the SRD API.
    kind: query
    entity: Feat
  feat_get:
    description: Retrieve one feat by index.
    kind: get
    entity: Feat
    provides:
    - index
    - name
    - desc
  class_level_query:
    description: Level-by-level progression rows for a class.
    kind: query
    entity: ClassLevel
    parameters:
    - name: class_index
      value_ref: nv_class_level_query_class_index
      required: true
      role: scope
    - name: subclass
      value_ref: nv_class_level_query_subclass
      required: false
      role: filter
  class_level_features_query:
    description: Features gained at a specific class level.
    kind: query
    entity: Feature
    parameters:
    - name: class_index
      value_ref: nv_class_level_features_query_class_index
      required: true
      role: scope
    - name: class_level
      value_ref: nv_class_level_features_query_class_level
      required: true
      role: scope
  class_spells_by_slot_query:
    description: Spells of a given spell level available to a class.
    kind: query
    entity: Spell
    parameters:
    - name: class_index
      value_ref: nv_class_spells_by_slot_query_class_index
      required: true
      role: scope
    - name: spell_level
      value_ref: nv_class_spells_by_slot_query_spell_level
      required: true
      role: scope
  class_spellcasting_get:
    description: Spellcasting rules block for a class (404 when the class does not cast).
    kind: get
    entity: ClassSpellcasting
    provides:
    - index
    - level
    - info
  class_multiclassing_get:
    description: Multiclass prerequisites and proficiencies for a class.
    kind: get
    entity: ClassMulticlassing
    provides:
    - index
    - prerequisites
    - proficiencies
    - proficiency_choices
  class_proficiencies_query:
    description: Starting proficiencies granted by the class.
    kind: query
    entity: Proficiency
    parameters:
    - name: class_index
      value_ref: nv_class_proficiencies_query_class_index
      required: true
      role: scope
  subclass_features_query:
    description: Features listed for a subclass resource.
    kind: query
    entity: Feature
    parameters:
    - name: subclass_index
      value_ref: nv_subclass_features_query_subclass_index
      required: true
      role: scope
  subclass_level_query:
    description: Subclass progression rows by character level.
    kind: query
    entity: SubclassLevel
    parameters:
    - name: subclass_index
      value_ref: nv_subclass_level_query_subclass_index
      required: true
      role: scope
  race_proficiencies_query:
    description: Proficiencies granted by a race.
    kind: query
    entity: Proficiency
    parameters:
    - name: race_index
      value_ref: nv_race_proficiencies_query_race_index
      required: true
      role: scope
  subrace_proficiencies_query:
    description: Proficiencies granted by a subrace.
    kind: query
    entity: Proficiency
    parameters:
    - name: subrace_index
      value_ref: nv_subrace_proficiencies_query_subrace_index
      required: true
      role: scope
  subrace_traits_query:
    description: Traits specific to a subrace.
    kind: query
    entity: Trait
    parameters:
    - name: subrace_index
      value_ref: nv_subrace_traits_query_subrace_index
      required: true
      role: scope
  spell_query:
    description: List and filter spells by level, school, concentration, or ritual.
    kind: query
    entity: Spell
    parameters:
    - name: level
      value_ref: nv_spell_query_level
      required: false
      role: filter
    - name: school
      value_ref: nv_spell_query_school
      required: false
      role: filter
    - name: concentration
      value_ref: nv_spell_query_concentration
      required: false
      role: filter
    - name: ritual
      value_ref: nv_spell_query_ritual
      required: false
      role: filter
  spell_get:
    description: Retrieve a single spell by its kebab-case index slug.
    kind: get
    entity: Spell
    provides:
    - index
    - name
    - level
    - range
    - casting_time
