# D&D 5e SRD API (public read-only; set published site origin with --backend).
# Paths include the api prefix; do not double-append /api on --backend.

ability_score_query:
  method: GET
  path: [{ type: literal, value: api }, { type: literal, value: ability-scores }]
ability_score_get:
  method: GET
  path: [{ type: literal, value: api }, { type: literal, value: ability-scores }, { type: var, name: id }]

alignment_query:
  method: GET
  path: [{ type: literal, value: api }, { type: literal, value: alignments }]
alignment_get:
