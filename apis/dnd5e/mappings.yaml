feat_get:
  method: GET
  path: [{ type: literal, value: api }, { type: literal, value: feats }, { type: var, name: id }]

class_level_query:
  method: GET
  path:
    - { type: literal, value: api }
    - { type: literal, value: classes }
    - { type: var, name: class_index }
    - { type: literal, value: levels }
  query:
    type: object
    fields:
      - - subclass
        - type: if
          condition: { type: exists, var: subclass }
          then_expr: { type: var, name: subclass }
          else_expr: { type: const, value: null }

class_level_features_query:
  method: GET
  path:
    - { type: literal, value: api }
    - { type: literal, value: classes }
    - { type: var, name: class_index }
    - { type: literal, value: levels }
    - { type: var, name: class_level }
    - { type: literal, value: features }

