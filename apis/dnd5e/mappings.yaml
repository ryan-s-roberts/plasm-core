spell_query:
  method: GET
  path: [{ type: literal, value: api }, { type: literal, value: spells }]
  query:
    type: object
    fields:
      - - level
        - type: if
          condition: { type: exists, var: level }
          then_expr: { type: var, name: level }
          else_expr: { type: const, value: null }
      - - school
        - type: if
          condition: { type: exists, var: school }
          then_expr: { type: var, name: school }
          else_expr: { type: const, value: null }
      - - concentration
        - type: if
          condition: { type: exists, var: concentration }
          then_expr: { type: var, name: concentration }
          else_expr: { type: const, value: null }
      - - ritual
        - type: if
          condition: { type: exists, var: ritual }
          then_expr: { type: var, name: ritual }
          else_expr: { type: const, value: null }

spell_get:
  method: GET
  path: [{ type: literal, value: api }, { type: literal, value: spells }, { type: var, name: id }]

monster_query:
