  goal: "Extended SRD catalog entities for eval coverage (ability scores, alignments, rules, levels, spellcasting)"
  tags: [coverage]
  covers: [query_filtered]
  expect:
    entities_any:
      - AbilityScore
      - Alignment
      - ClassLevel
      - ClassMulticlassing
      - ClassSpellcasting
      - DamageType
      - EquipmentCategory
      - Feat
      - Language
      - Rule
      - RuleSection
      - SubclassLevel
      - WeaponProperty
