# ClickUp API v2 — CML (Capability Mapping Language). Semantic model is in domain.yaml.
#
# Base URL: join `--backend` / `http_backend` (https://api.clickup.com/api) with
# path `v2/...` for `https://api.clickup.com/api/v2/...` (see ClickUp OpenAPI `servers.url`).
#
# Auth: api_key_header — token sent verbatim as `Authorization: <token>` (no "Bearer ").
#
# Pagination quirk: ClickUp uses zero-indexed page numbers (page=0, 1, 2, …)
# and stops when `last_page: true` appears in the response body. This is
# modelled with a Counter param + FieldEquals stop condition.
#
# Response envelopes: each list endpoint wraps its array under a named key
# (teams, spaces, folders, lists, tasks, etc.) — declared per-capability
# via `response: {items: <key>}`.

# ── Team (workspace) ──────────────────────────────────────────────────────

team_query:
  response:
    items: teams
  method: GET
  path:
    - type: literal
      value: v2
    - type: literal
      value: team

user_get_me:
  # GET /v2/user — returns {"user": {...}}
  # Decode the nested object under the "user" key.
  response:
    items: user
  method: GET
  path:
    - type: literal
      value: v2
    - type: literal
      value: user

team_member_query:
  # GET /v2/team (authorized workspaces) — pick the workspace matching team_id and pluck `members`.
  # There is no GET /v2/team/{id}/member in the public v2 spec.
  response:
    items: members
    response_preprocess:
      kind: array_find_pluck
      path: [teams]
      id_field: id
      id_var: team_id
      nested_array: members
  method: GET
  path:
    - type: literal
      value: v2
    - type: literal
      value: team

team_seats:
  response: single
  method: GET
  path:
    - type: literal
      value: v2
    - type: literal
      value: team
    - type: var
      name: team_id
    - type: literal
      value: seats

team_plan:
  response: single
  method: GET
  path:
    - type: literal
      value: v2
    - type: literal
      value: team
    - type: var
      name: team_id
    - type: literal
      value: plan

team_create_space:
  # POST /v2/team/{team_id}/space — requires name, multiple_assignees, and features.
  response: single
  method: POST
  path:
    - type: literal
      value: v2
    - type: literal
      value: team
    - type: var
      name: team_id
    - type: literal
      value: space
  body:
    type: object
    fields:
      - - name
        - type: var
          name: name
      - - multiple_assignees
        - type: if
          condition: { type: exists, var: multiple_assignees }
          then_expr: { type: var, name: multiple_assignees }
          else_expr: { type: const, value: true }
      - - features
        - type: if
          condition: { type: exists, var: features }
          then_expr: { type: var, name: features }
          else_expr:
            type: const
            value:
              due_dates:
                enabled: true
                start_date: false
                remap_due_dates: true
                remap_closed_due_date: false
              time_tracking:
                enabled: false
              tags:
                enabled: true
              time_estimates:
                enabled: true
              checklists:
                enabled: true
              custom_fields:
                enabled: true
              remap_dependencies:
                enabled: true
              dependency_warning:
                enabled: true
              portfolios:
                enabled: true

