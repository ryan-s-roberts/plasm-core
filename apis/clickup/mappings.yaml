# ── Task ──────────────────────────────────────────────────────────────────

task_query:
  # Workspace-wide task query.
  # ClickUp stops pagination when last_page:true appears in the response body.
  response:
    items: tasks
    last_page: last_page
  method: GET
  path:
    - type: literal
      value: v2
    - type: literal
      value: team
    - type: var
      name: team_id
    - type: literal
      value: task
  pagination:
    params:
      page: {counter: 0}
    stop_when: {field: last_page, eq: true}

list_task_query:
  # List-scoped task query. GET /v2/list/{list_id}/task
  # Uses the same last_page pagination pattern as task_query.
  response:
    items: tasks
    last_page: last_page
  method: GET
  path:
    - type: literal
      value: v2
    - type: literal
      value: list
    - type: var
      name: list_id
