version: 3
http_backend: https://api.clickup.com/api
entities:
  Team:
    id_field: id
    expression_aliases:
    - Workspace
    description: A ClickUp workspace (historically called Team)
    fields:
      id:
        required: true
        value_ref: nv_team_id
      name:
        required: false
        value_ref: nv_team_name
      color:
        required: false
        value_ref: nv_wire_str_short
      avatar:
        required: false
        value_ref: nv_wire_str_short
    relations:
      spaces:
        description: Spaces belonging to this workspace
        target: Space
        cardinality: many
        materialize:
          kind: query_scoped
          capability: space_query
          param: team_id
      plan:
        description: Billing plan for this workspace
        target: WorkspacePlan
        cardinality: one
      seat_usage:
        description: Member and guest seat usage
        target: WorkspaceSeatUsage
        cardinality: one
  WorkspacePlan:
    id_field: id
    implicit_request_identity: true
    description: Workspace billing plan from the plan subresource (body has no row id; id is the team_id from the path)
    fields:
      id:
        required: true
        value_ref: nv_workspace_plan_id
      plan_name:
        required: false
        value_ref: nv_workspace_plan_plan_name
      plan_id:
        required: false
        value_ref: nv_workspace_plan_plan_id
    relations: {}
  WorkspaceSeatUsage:
    id_field: id
    implicit_request_identity: true
    description: Seat counts for members and guests
    fields:
      id:
        required: true
        value_ref: nv_workspace_seat_usage_id
      members:
        required: false
        value_ref: nv_workspace_seat_usage_members
      guests:
        required: false
        value_ref: nv_workspace_seat_usage_guests
    relations: {}
  Space:
    id_field: id
    description: A project area within a workspace
    fields:
      id:
        required: true
        value_ref: nv_space_id
      archived:
        required: false
        value_ref: nv_space_archived
      name:
        required: false
        value_ref: nv_space_name
      private:
        required: false
        value_ref: nv_wire_bool
    relations:
      folders:
        description: Folders within this space
        target: Folder
        cardinality: many
        materialize:
          kind: query_scoped
          capability: folder_query
          param: space_id
      lists:
        description: Folderless lists in this space
        target: List
        cardinality: many
        materialize:
          kind: query_scoped
          capability: list_query
          param: space_id
  Folder:
    id_field: id
    description: A grouping of lists within a space
    fields:
      id:
        required: true
        value_ref: nv_folder_id
      name:
        required: false
        value_ref: nv_folder_name
    relations:
      lists:
        description: Lists within this folder
        target: List
        cardinality: many
        materialize:
          kind: query_scoped
          capability: folder_list_query
          param: folder_id
  List:
    id_field: id
    description: A container for tasks
    fields:
      id:
        required: true
        value_ref: nv_list_id
      name:
        required: false
        value_ref: nv_list_name
      status:
        required: false
        value_ref: nv_list_status
    relations:
      tasks:
        description: Tasks within this list
        target: Task
        cardinality: many
        materialize:
          kind: query_scoped
          capability: list_task_query
          param: list_id
  Task:
    id_field: id
    description: A unit of work or action item
    fields:
      id:
        required: true
        value_ref: nv_task_id
      name:
        required: false
        value_ref: nv_task_name
      description:
        required: false
        value_ref: nv_task_description
      status:
        required: false
        value_ref: nv_task_status
      priority:
        required: false
        value_ref: nv_task_priority
      due_date:
        required: false
        value_ref: nv_task_due_date
      start_date:
        required: false
        value_ref: nv_task_start_date
      time_estimate:
        required: false
        value_ref: nv_task_time_estimate
      date_created:
        required: false
        value_ref: nv_task_date_created
      date_updated:
        required: false
        value_ref: nv_task_date_updated
      archived:
        required: false
        value_ref: nv_task_archived
      parent:
        required: false
        value_ref: nv_task_parent
      url:
        required: false
        value_ref: nv_task_url
      markdown_description:
        required: false
        value_ref: nv_task_markdown_description
    relations:
      comments:
        description: Comments on this task
        target: Comment
        cardinality: many
        materialize:
          kind: query_scoped
          capability: comment_query
          param: task_id
      time_in_status:
        description: Per-status time totals
        target: TaskTimeInStatus
        cardinality: one
  TaskTimeInStatus:
    id_field: id
    implicit_request_identity: true
    description: Time spent in each status for a task
    fields:
      id:
        required: true
        value_ref: nv_task_time_in_status_id
      current_status:
        required: false
        value_ref: nv_task_time_in_status_current_status
      status_history:
        required: false
        value_ref: nv_task_time_in_status_status_history
    relations: {}
  User:
    id_field: id
    description: An authorized ClickUp user
    fields:
      id:
        required: true
        value_ref: nv_user_id
      username:
        required: false
        value_ref: nv_user_username
      email:
        required: false
        value_ref: nv_user_email
      color:
        required: false
        value_ref: nv_user_color
      profilePicture:
        required: false
        value_ref: nv_user_profile_picture
    relations: {}
  Group:
    id_field: id
    description: A user group for permissions
    fields:
      id:
        required: true
        value_ref: nv_group_id
      name:
        required: false
        value_ref: nv_group_name
    relations: {}
  View:
    id_field: id
    description: A saved view configuration
    fields:
      id:
        required: true
        value_ref: nv_view_id
      name:
        required: false
        value_ref: nv_view_name
      type:
        required: false
        value_ref: nv_view_type
    relations: {}
  Goal:
    id_field: id
    description: A high-level objective with key results
    fields:
      id:
        required: true
        value_ref: nv_goal_id
      name:
        required: false
        value_ref: nv_goal_name
      due_date:
        required: false
        value_ref: nv_goal_due_date
      description:
        required: false
        value_ref: nv_wire_str_markdown
      color:
        required: false
        value_ref: nv_wire_str_short
    relations:
      key_results:
        description: Measurable key results for this goal
        target: KeyResult
        cardinality: many
  KeyResult:
    id_field: id
    description: A measurable outcome tied to a goal
    fields:
      id:
        required: true
        value_ref: nv_key_result_id
      name:
        required: false
        value_ref: nv_key_result_name
      type:
        required: false
        value_ref: nv_key_result_type
      current:
        required: false
        value_ref: nv_key_result_current
    relations: {}
  Attachment:
    abstract: true
    id_field: id
    description: A file attached to a task
    fields:
      id:
        required: true
        value_ref: nv_attachment_id
      title:
        required: false
        value_ref: nv_attachment_title
      url:
        required: false
        value_ref: nv_attachment_url
    relations: {}
  Comment:
    id_field: id
    description: A comment on a task or view
    fields:
      id:
        required: true
        value_ref: nv_comment_id
      comment_text:
        required: false
        value_ref: nv_comment_comment_text
      date:
        required: false
        value_ref: nv_comment_date
    relations: {}
  CustomField:
    id_field: id
    description: A workspace-level custom field definition
    fields:
      id:
        required: true
        value_ref: nv_custom_field_id
      name:
        required: false
        value_ref: nv_custom_field_name
      type:
        required: false
        value_ref: nv_custom_field_type
    relations: {}
  CustomTaskType:
    id_field: id
    description: A user-defined task type
    fields:
      id:
        required: true
        value_ref: nv_custom_task_type_id
      name:
        required: false
        value_ref: nv_custom_task_type_name
    relations: {}
  Member:
    id_field: id
    id_from: user.id
    description: A workspace or task member
    fields:
      id:
        required: true
        value_ref: nv_member_id
      username:
        required: false
        value_ref: nv_member_username
      email:
        required: false
        value_ref: nv_member_email
      color:
        required: false
        value_ref: nv_wire_str_short
    relations: {}
  Role:
    id_field: id
    description: A custom permission role
    fields:
      id:
        required: true
        value_ref: nv_role_id
      name:
        required: false
        value_ref: nv_role_name
    relations: {}
  Tag:
    id_field: name
    description: A label tag within a space, identified by its name
    fields:
      name:
        required: true
        value_ref: nv_tag_name
      tag_fg:
        required: false
        value_ref: nv_tag_tag_fg
      tag_bg:
        required: false
        value_ref: nv_tag_tag_bg
    relations: {}
  Template:
    id_field: id
    description: A reusable workspace template
    fields:
      id:
        required: true
        value_ref: nv_template_id
      name:
        required: false
        value_ref: nv_template_name
    relations: {}
  TimeEntry:
    id_field: id
    description: A logged time record
    fields:
      id:
        required: true
        value_ref: nv_time_entry_id
      start_date:
        required: false
        value_ref: nv_time_entry_start_date
      end_date:
        required: false
        value_ref: nv_time_entry_end_date
      duration:
        required: false
        value_ref: nv_time_entry_duration
    relations: {}
  TimeInterval:
    id_field: id
    description: A tracked time interval on a task
    fields:
      id:
        required: true
        value_ref: nv_time_interval_id
      start:
        required: false
        value_ref: nv_time_interval_start
      end:
        required: false
        value_ref: nv_time_interval_end
      duration:
        required: false
        path: time
        value_ref: nv_time_interval_duration
    relations: {}
  Webhook:
    id_field: id
    description: A registered webhook endpoint
    fields:
      id:
        required: true
        value_ref: nv_webhook_id
      endpoint:
        required: false
        value_ref: nv_webhook_endpoint
      status:
        required: false
        value_ref: nv_webhook_status
    relations: {}
capabilities:
  team_query:
    description: List all accessible workspaces
    kind: query
    entity: Team
  user_get_me:
    description: Get the currently authenticated user
    kind: singleton
    entity: User
  team_member_query:
    description: List members in a workspace
    kind: query
    entity: Member
    parameters:
    - name: team_id
      value_ref: nv_team_member_query_team_id
      required: true
      role: scope
  team_seats:
    description: Get workspace seat usage
    kind: get
    entity: WorkspaceSeatUsage
    provides:
    - id
    - members
    - guests
  team_plan:
    description: Get workspace plan details
    kind: get
    entity: WorkspacePlan
    provides:
    - id
    - plan_name
    - plan_id
  team_create_space:
    description: Create a new space in the workspace
    kind: create
    entity: Space
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: true
    - name: multiple_assignees
      value_ref: nv_wire_bool
      required: false
    - name: features
      value_ref: nv_team_create_space_features
      required: false
  team_create_goal:
    description: Create a new goal in the workspace
    kind: create
    entity: Goal
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: true
    - name: due_date
      value_ref: nv_team_create_goal_due_date
      required: false
    - name: description
      value_ref: nv_wire_str_markdown
      required: false
  team_create_group:
    description: Create a user group in the workspace
    kind: create
    entity: Group
    parameters:
    - name: team_id
      value_ref: nv_team_create_group_team_id
      required: true
    - name: name
      value_ref: nv_wire_str_short
      required: true
  team_create_webhook:
    description: Register a webhook for the workspace
    kind: create
    entity: Webhook
    parameters:
    - name: endpoint
      value_ref: nv_wire_str_short
      required: true
  team_create_view:
    description: Create a view at workspace level
    kind: create
    entity: View
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: true
  team_create_time_entry:
    description: Create a manual time entry
    kind: create
    entity: TimeEntry
    parameters:
    - name: tid
      value_ref: nv_wire_str_short
      required: false
    - name: start
      value_ref: nv_team_create_time_entry_start
      required: false
    - name: stop
      value_ref: nv_team_create_time_entry_stop
      required: false
  team_start_time_entry:
    description: Start a running time entry
    kind: action
    entity: Team
    output:
      type: side_effect
      description: Start a running time entry
  team_stop_time_entry:
    description: Stop the current running time entry
    kind: action
    entity: Team
    output:
      type: side_effect
      description: Stop the current running time entry
  space_query:
    description: List spaces in a workspace
    kind: query
    entity: Space
    parameters:
    - name: team_id
      value_ref: nv_space_query_team_id
      required: true
      role: scope
    - name: archived
      value_ref: nv_wire_bool
      required: false
      role: filter
  space_get:
    description: Get a single space by ID
    kind: get
    entity: Space
    provides:
    - id
    - archived
    - name
    - private
  space_update:
    description: Update space properties
    kind: update
    entity: Space
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: false
    - name: color
      value_ref: nv_wire_str_short
      required: false
    - name: private
      value_ref: nv_wire_bool
      required: false
  space_delete:
    description: Delete a space
    kind: delete
    entity: Space
  space_create_folder:
    description: Create a folder in the space
    kind: create
    entity: Folder
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: true
  space_create_list:
    description: Create a folderless list in the space
    kind: create
    entity: List
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: true
  space_views:
    description: List views for a space
    kind: query
    entity: View
    parameters:
    - name: space_id
      value_ref: nv_space_views_space_id
      required: true
      role: scope
  space_fields:
    description: List custom fields accessible in a space
    kind: query
    entity: CustomField
    parameters:
    - name: space_id
      value_ref: nv_space_fields_space_id
      required: true
      role: scope
  folder_query:
    description: List folders in a space
    kind: query
    entity: Folder
    parameters:
    - name: space_id
      value_ref: nv_folder_query_space_id
      required: true
      role: scope
    - name: archived
      value_ref: nv_wire_bool
      required: false
      role: filter
  folder_get:
    description: Get a single folder by ID
    kind: get
    entity: Folder
    provides:
    - id
    - name
  folder_update:
    description: Update folder properties
    kind: update
    entity: Folder
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: false
  folder_delete:
    description: Delete a folder
    kind: delete
    entity: Folder
  folder_create_list:
    description: Create a list in the folder
    kind: create
    entity: List
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: true
  folder_views:
    description: List views for a folder
    kind: query
    entity: View
    parameters:
    - name: folder_id
      value_ref: nv_folder_views_folder_id
      required: true
      role: scope
  folder_fields:
    description: List custom fields on a folder
    kind: query
    entity: CustomField
    parameters:
    - name: folder_id
      value_ref: nv_folder_fields_folder_id
      required: true
      role: scope
  list_query:
    description: List folderless lists in a space
    kind: query
    entity: List
    parameters:
    - name: space_id
      value_ref: nv_list_query_space_id
      required: true
      role: scope
    - name: archived
      value_ref: nv_wire_bool
      required: false
      role: filter
  folder_list_query:
    description: List lists inside a folder
    kind: query
    entity: List
    parameters:
    - name: folder_id
      value_ref: nv_folder_list_query_folder_id
      required: true
      role: scope
    - name: archived
      value_ref: nv_wire_bool
      required: false
      role: filter
  list_get:
    description: Get a single list by ID
    kind: get
    entity: List
    provides:
    - id
    - name
    - status
  list_update:
    description: Update list properties
    kind: update
    entity: List
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: false
    - name: status
      value_ref: nv_wire_str_short
      required: false
  list_delete:
    description: Delete a list
    kind: delete
    entity: List
  list_members:
    description: List members of a list
    kind: query
    entity: Member
    parameters:
    - name: list_id
      value_ref: nv_list_members_list_id
      required: true
      role: scope
  list_comments:
    description: List comments on a list
    kind: query
    entity: Comment
    parameters:
    - name: list_id
      value_ref: nv_list_comments_list_id
      required: true
      role: scope
  list_fields:
    description: List custom fields on a list
    kind: query
    entity: CustomField
    parameters:
    - name: list_id
      value_ref: nv_list_fields_list_id
      required: true
      role: scope
  task_query:
    description: Query tasks across a workspace (workspace-scoped, all lists)
    kind: query
    entity: Task
    parameters:
    - name: team_id
      value_ref: nv_task_query_team_id
      required: true
      role: scope
    - name: order_by
      value_ref: nv_wire_sel_3ccc56c1be864adb
      required: false
      role: sort
    - name: reverse
      value_ref: nv_wire_bool
      required: false
      role: sort_direction
    - name: subtasks
      value_ref: nv_wire_bool
      required: false
      role: filter
    - name: include_closed
      value_ref: nv_wire_bool
      required: false
      role: filter
    - name: archived
      value_ref: nv_wire_bool
      required: false
      role: filter
    - name: date_created_gt
      value_ref: nv_task_query_date_created_gt
      required: false
      role: filter
    - name: date_created_lt
      value_ref: nv_task_query_date_created_lt
      required: false
      role: filter
    - name: date_updated_gt
      value_ref: nv_task_query_date_updated_gt
      required: false
      role: filter
    - name: date_updated_lt
      value_ref: nv_task_query_date_updated_lt
      required: false
      role: filter
    - name: due_date_gt
      value_ref: nv_task_query_due_date_gt
      required: false
      role: filter
    - name: due_date_lt
      value_ref: nv_task_query_due_date_lt
      required: false
      role: filter
    - name: include_markdown_description
      value_ref: nv_wire_bool
      required: false
      role: response_control
  list_task_query:
    description: Query tasks within a specific list (list-scoped, preferred for List.tasks traversal)
    kind: query
    entity: Task
    parameters:
    - name: list_id
      value_ref: nv_list_task_query_list_id
      required: true
      role: scope
    - name: order_by
      value_ref: nv_wire_sel_3ccc56c1be864adb
      required: false
      role: sort
    - name: reverse
      value_ref: nv_wire_bool
      required: false
      role: sort_direction
    - name: subtasks
      value_ref: nv_wire_bool
      required: false
      role: filter
    - name: include_closed
      value_ref: nv_wire_bool
      required: false
      role: filter
    - name: include_markdown_description
      value_ref: nv_wire_bool
      required: false
      role: response_control
  task_get:
    description: Get a single task by ID with full detail
    kind: get
    entity: Task
    provides:
    - id
    - name
    - description
    - status
    - priority
    - due_date
    - start_date
    - time_estimate
    - date_created
    - date_updated
    - archived
    - parent
    - url
    - markdown_description
  task_update:
    description: Update task properties
    kind: update
    entity: Task
    parameters:
    - name: name
      value_ref: nv_task_update_name
      required: false
    - name: description
      value_ref: nv_task_update_description
      required: false
    - name: status
      value_ref: nv_task_update_status
      required: false
    - name: priority
      value_ref: nv_task_update_priority
      required: false
    - name: due_date
      value_ref: nv_task_update_due_date
      required: false
    - name: start_date
      value_ref: nv_task_update_start_date
      required: false
    - name: time_estimate
      value_ref: nv_task_update_time_estimate
      required: false
    - name: archived
      value_ref: nv_task_update_archived
      required: false
    - name: parent
      value_ref: nv_task_update_parent
      required: false
  list_create_task:
    description: Create a task in a list
    kind: create
    entity: Task
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: true
    - name: description
      value_ref: nv_list_create_task_description
      required: false
    - name: status
      value_ref: nv_list_create_task_status
      required: false
    - name: priority
      value_ref: nv_wire_int
      required: false
    - name: due_date
      value_ref: nv_list_create_task_due_date
      required: false
  task_delete:
    description: Delete a task
    kind: delete
    entity: Task
  task_create_comment:
    description: Add a comment to a task
    kind: create
    entity: Comment
    parameters:
    - name: comment_text
      value_ref: nv_wire_str_short
      required: true
  task_create_attachment:
    description: Upload an attachment to a task
    kind: action
    entity: Task
    output:
      type: side_effect
      description: Upload an attachment to a task
  task_create_checklist:
    description: Create a checklist on a task
    kind: action
    entity: Task
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: false
    output:
      type: side_effect
      description: Create a checklist on a task
  task_add_dependency:
    description: Add a dependency to a task
    kind: action
    entity: Task
    parameters:
    - name: depends_on
      value_ref: nv_wire_str_short
      required: false
    output:
      type: side_effect
      description: Add a dependency to a task
  task_remove_dependency:
    description: Remove a dependency from a task
    kind: action
    entity: Task
    parameters:
    - name: depends_on
      value_ref: nv_wire_str_short
      required: true
    - name: dependency_of
      value_ref: nv_wire_str_short
      required: true
    output:
      type: side_effect
      description: Remove a dependency from a task
  task_time_in_status:
    description: Get time spent in each status
    kind: get
    entity: TaskTimeInStatus
    provides:
    - id
    - current_status
    - status_history
  task_intervals:
