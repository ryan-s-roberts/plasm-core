# ClickUp — Plasm eval (schema key must match directory name: `clickup`)
#
# Run:
#   plasm-eval --schema apis/clickup --cases apis/clickup/eval/cases.yaml --attempts 2
# Default: last run → ./{model-slug}.latest.human.txt + ./{model-slug}.latest.json (same directory as this file).
# Optional: --report-dir eval-reports for timestamped copies under eval-reports/clickup/.
#
# Tune correction vs semantic blend:
#   expect:
#     correction:
#       weight: 0.25
#
# Authoring:
# - **Goal-seeking (preferred for open eval):** write what the user or agent is trying to
#   accomplish—planning, audit, triage, onboarding—not a prose rewrite of a REST query.
#   Tool use is outcome-driven; the harness still scores soft entity/predicate hints.
# - **Scoped grammar checks** (cu-01..cu-12): tighter prompts for regression; cu-13+ are
#   mostly open goals. Where `List(...).tasks` or `Space(...).folders` is as valid as a
#   scoped `Task` / `Folder` query, expectations omit `pred_fields_any` so both paths score.

- id: cu-01
  schema: clickup
  goal: "List every ClickUp workspace (team) I have access to"
  tags: [query, team, unscoped]
  covers: [query_all]
  expect:
    entities_any: [Team]

- id: cu-02
  schema: clickup
  goal: "Show profile information for the currently authenticated user"
  tags: [singleton, user]
  covers: [get]
  expect:
    entities_any: [User]

- id: cu-03
  schema: clickup
  goal: "List all spaces in workspace team_id 123456789"
  tags: [query, space, scope]
  covers: [query_filtered]
  expect:
    entities_any: [Space]
    pred_fields_any: [team_id]

- id: cu-04
