version: 2
http_backend: https://docs.googleapis.com
entities:
  Document:
    id_field: documentId
    description: A Google Docs document (structure, tabs, and body content as returned by the API).
    primary_read: documents_get
    fields:
      documentId:
        required: true
        value_ref: nv_wire_str_short
      title:
        required: false
        value_ref: nv_wire_str_short
      revisionId:
        required: false
        value_ref: nv_wire_str_short
      body:
        required: false
        value_ref: nv_document_body
      headers:
        required: false
        value_ref: nv_document_headers
      footers:
        required: false
        value_ref: nv_document_footers
      footnotes:
        required: false
        value_ref: nv_document_footnotes
      inlineObjects:
        required: false
        value_ref: nv_document_inline_objects
      positionedObjects:
        required: false
        value_ref: nv_document_positioned_objects
      lists:
        required: false
        value_ref: nv_document_lists
      namedRanges:
        required: false
        value_ref: nv_document_named_ranges
      documentStyle:
        required: false
        value_ref: nv_document_document_style
      namedStyles:
        required: false
        value_ref: nv_document_named_styles
      suggestionsViewMode:
        required: false
        value_ref: nv_wire_str_short
      tabs:
        required: false
        value_ref: nv_document_tabs
      replies:
        required: false
        value_ref: nv_document_replies
      writeControl:
        required: false
        value_ref: nv_document_write_control
    relations: {}
capabilities:
  documents_get:
    kind: get
    entity: Document
    description: Fetch the full document resource (optionally controlling tab content and suggestions view).
    parameters:
    - name: includeTabsContent
      value_ref: nv_documents_get_include_tabs_content
      required: false
    - name: suggestionsViewMode
      value_ref: nv_wire_str_short
      required: false
  documents_create:
    kind: create
    entity: Document
    description: Create a blank document or supply an initial title and body via the JSON input.
    parameters:
    - name: input
      value_ref: nv_documents_create_input
      required: false
  documents_batchUpdate:
    kind: action
    entity: Document
    description: Apply one or more structured updates (BatchUpdateDocumentRequest) to a document.
    parameters:
    - name: input
      value_ref: nv_documents_batch_update_input
      required: false
    provides:
    - documentId
    - replies
    - writeControl
oauth:
  provider: google
  scopes:
    https://www.googleapis.com/auth/documents:
      label: See edit create and delete all your Google Docs documents
      docs_url: https://developers.google.com/workspace/guides/configure-oauth-consent
    https://www.googleapis.com/auth/documents.readonly:
      label: See all your Google Docs documents
      docs_url: https://developers.google.com/workspace/guides/configure-oauth-consent
    https://www.googleapis.com/auth/drive.file:
      label: Per-file access to files opened or created by the app
      docs_url: https://developers.google.com/identity/protocols/oauth2/scopes
    https://www.googleapis.com/auth/drive:
      label: Full access to Google Drive files
      docs_url: https://developers.google.com/identity/protocols/oauth2/scopes
    https://www.googleapis.com/auth/drive.readonly:
      label: See and download all Google Drive files
      docs_url: https://developers.google.com/identity/protocols/oauth2/scopes
  default_scope_sets:
    docs_readonly:
      description: Read documents only.
      scopes:
      - https://www.googleapis.com/auth/documents.readonly
    docs_edit:
      description: Create and edit Docs (typical editor grant).
      scopes:
      - https://www.googleapis.com/auth/documents
  requirements:
    capabilities:
      documents_get:
        any_of:
        - https://www.googleapis.com/auth/documents
        - https://www.googleapis.com/auth/documents.readonly
        - https://www.googleapis.com/auth/drive
        - https://www.googleapis.com/auth/drive.readonly
        - https://www.googleapis.com/auth/drive.file
      documents_create:
        any_of:
        - https://www.googleapis.com/auth/documents
        - https://www.googleapis.com/auth/drive.file
        - https://www.googleapis.com/auth/drive
      documents_batchUpdate:
        any_of:
        - https://www.googleapis.com/auth/documents
        - https://www.googleapis.com/auth/drive.file
        - https://www.googleapis.com/auth/drive
auth:
  scheme: oauth_bearer
  env: GOOGLE_DOCS_ACCESS_TOKEN
  hosted_kv: plasm:outbound:v1:catalog:google-docs
values:
  nv_document_body:
    type: json
    description: Structured body content (StructuralElement list under body.content when present).
  nv_document_document_style:
    type: json
  nv_document_footers:
    type: json
  nv_document_footnotes:
    type: json
  nv_document_headers:
    type: json
  nv_document_inline_objects:
    type: json
  nv_document_lists:
    type: json
  nv_document_named_ranges:
    type: json
  nv_document_named_styles:
    type: json
  nv_document_positioned_objects:
    type: json
  nv_document_replies:
    type: json
    description: Response replies from batchUpdate (write results and id mappings).
  nv_document_tabs:
    type: json
  nv_document_write_control:
    type: json
  nv_documents_batch_update_input:
    type: json
    description: BatchUpdateDocumentRequest JSON (requests array and write control fields).
  nv_documents_create_input:
    type: json
    description: Document resource body for POST /documents.
  nv_documents_get_include_tabs_content:
    type: boolean
  nv_wire_str_short:
    type: string
    string_semantics: short
