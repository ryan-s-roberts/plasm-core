version: 2
http_backend: https://api.musixmatch.com
entities:
  Artist:
    id_field: artist_id
    description: A musical artist in the Musixmatch catalog
    fields:
      artist_id:
        required: true
        value_ref: nv_artist_artist_id
      artist_name:
        required: true
        value_ref: nv_artist_artist_name
      artist_rating:
        required: false
        value_ref: nv_artist_artist_rating
      artist_country:
        required: false
        value_ref: nv_artist_artist_country
  Track:
    id_field: track_id
    description: A music track with lyrics metadata
    fields:
      track_id:
        required: true
        value_ref: nv_track_track_id
      track_name:
        required: true
        value_ref: nv_track_track_name
      artist_id:
        required: false
        value_ref: nv_track_artist_id
      track_rating:
        required: false
        value_ref: nv_track_track_rating
      has_lyrics:
        required: false
        value_ref: nv_track_has_lyrics
    relations:
      lyrics:
        target: Lyrics
        cardinality: one
        description: Lyrics content for this track
  Lyrics:
    id_field: lyrics_id
    description: 'Lyrics content for a Musixmatch track. Retrieved via GET /track.lyrics.get?track_id=<id>. This is a separate
      entity from Track (has its own lyrics_id), navigable via Track.lyrics relation.

      '
    fields:
      lyrics_id:
        required: true
        value_ref: nv_lyrics_lyrics_id
      lyrics_body:
        required: false
        value_ref: nv_lyrics_lyrics_body
      lyrics_copyright:
        required: false
        value_ref: nv_lyrics_lyrics_copyright
      lyrics_language:
        required: false
        value_ref: nv_lyrics_lyrics_language
capabilities:
  artist_search:
    description: Search for artists by name
    kind: search
    entity: Artist
    parameters:
    - name: q_artist
      value_ref: nv_wire_str_short
      required: true
      role: search
    - name: f_artist_id
      value_ref: nv_wire_int
      required: false
      role: filter
  artist_get:
    description: Retrieve a single artist by ID
    kind: get
    entity: Artist
    provides:
    - artist_id
    - artist_name
    - artist_rating
    - artist_country
  chart_artists:
    description: Get top charting artists by country
    kind: query
    entity: Artist
    parameters:
    - name: country
      value_ref: nv_wire_str_short
      required: false
      role: filter
  track_search:
    description: Search tracks by title, artist, or lyrics
    kind: search
    entity: Track
    parameters:
    - name: q_track
      value_ref: nv_wire_str_short
      required: false
      role: search
    - name: q_artist
      value_ref: nv_wire_str_short
      required: false
      role: search
    - name: f_artist_id
      value_ref: nv_wire_int
      required: false
      role: filter
    - name: f_music_genre_id
      value_ref: nv_wire_int
      required: false
      role: filter
    - name: f_has_lyrics
      value_ref: nv_wire_int
      required: false
      role: filter
  track_get:
    description: Retrieve a single track by ID
    kind: get
    entity: Track
    provides:
    - track_id
    - track_name
    - artist_id
    - track_rating
    - has_lyrics
  chart_tracks:
    description: Get top charting tracks by country
    kind: query
    entity: Track
    parameters:
    - name: country
      value_ref: nv_wire_str_short
      required: false
      role: filter
    - name: f_has_lyrics
      value_ref: nv_wire_int
      required: false
      role: filter
  track_lyrics_get:
    description: 'Retrieve the lyrics for a track by its Musixmatch track_id. Returns a Lyrics object (lyrics_id, lyrics_body,
      lyrics_copyright, lyrics_language). Navigate via Track.lyrics relation: artist_search → Track → Lyrics.

      '
    kind: get
    entity: Lyrics
    provides:
    - lyrics_id
    - lyrics_body
    - lyrics_copyright
    - lyrics_language
auth:
  scheme: api_key_query
  param: apikey
  env: MUSIXMATCH_API_KEY
  hosted_kv: plasm:outbound:v1:catalog:musixmatch
values:
  nv_artist_artist_country:
    type: string
    string_semantics: short
    description: Country of origin for the artist
  nv_artist_artist_id:
    type: integer
    description: Unique Musixmatch artist identifier
  nv_artist_artist_name:
    type: string
    string_semantics: short
    description: Artist or band name
  nv_artist_artist_rating:
    type: integer
    description: Musixmatch popularity rating
  nv_lyrics_lyrics_body:
    type: string
    string_semantics: markdown
    description: The full lyrics text (may be truncated per Musixmatch licensing)
  nv_lyrics_lyrics_copyright:
    type: string
    string_semantics: short
    description: Copyright notice for the lyrics
  nv_lyrics_lyrics_id:
    type: integer
    description: Unique Musixmatch lyrics identifier
  nv_lyrics_lyrics_language:
    type: string
    string_semantics: short
    description: BCP 47 language code of the lyrics (e.g. 'en', 'es')
  nv_track_artist_id:
    type: entity_ref
    target: Artist
    description: Reference to the track's artist
  nv_track_has_lyrics:
    type: integer
    description: Whether lyrics are available (1=yes, 0=no)
  nv_track_track_id:
    type: integer
    description: Unique Musixmatch track identifier
  nv_track_track_name:
    type: string
    string_semantics: short
    description: Title of the track
  nv_track_track_rating:
    type: integer
    description: Musixmatch popularity rating
  nv_wire_int:
    type: integer
  nv_wire_str_short:
    type: string
    string_semantics: short
