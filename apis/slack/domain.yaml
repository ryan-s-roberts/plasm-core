version: 2
http_backend: https://slack.com/api
entities:
  Channel:
    id_field: id
    description: A Slack channel, DM, group DM, or multi-party IM (conversation)
    fields:
      id:
        required: true
        value_ref: nv_channel_id
      name:
        required: false
        value_ref: nv_channel_name
      is_channel:
        required: false
        value_ref: nv_channel_is_channel
      is_group:
        required: false
        value_ref: nv_channel_is_group
      is_im:
        required: false
        value_ref: nv_channel_is_im
      is_mpim:
        required: false
        value_ref: nv_channel_is_mpim
      is_private:
        required: false
        value_ref: nv_channel_is_private
      is_archived:
        required: false
        value_ref: nv_channel_is_archived
      is_general:
        required: false
        value_ref: nv_channel_is_general
      is_member:
        required: false
        value_ref: nv_channel_is_member
      is_shared:
        required: false
        value_ref: nv_channel_is_shared
      num_members:
        required: false
        value_ref: nv_channel_num_members
      topic:
        required: false
        value_ref: nv_channel_topic
      purpose:
        required: false
        value_ref: nv_channel_purpose
      created:
        required: false
        value_ref: nv_channel_created
    relations:
      messages:
        description: Message history in this channel
        target: Message
        cardinality: many
        materialize:
          kind: query_scoped
          capability: channel_history
          param: channel
      members:
        description: Members of this channel
        target: User
        cardinality: many
        materialize:
          kind: query_scoped
          capability: channel_members
          param: channel
      pins:
        description: Pinned items in this channel
        target: Pin
        cardinality: many
        materialize:
          kind: query_scoped
          capability: pin_list
          param: channel
      bookmarks:
        description: Bookmarks in this channel header
        target: Bookmark
        cardinality: many
        materialize:
          kind: query_scoped
          capability: bookmark_list
          param: channel
      scheduled_messages:
        description: Messages scheduled for future delivery in this channel
        target: ScheduledMessage
        cardinality: many
        materialize:
          kind: query_scoped
          capability: scheduledmessage_list
          param: channel
  Message:
    id_field: ts
    description: A Slack message, identified by its timestamp within a channel
    fields:
      ts:
        required: true
        value_ref: nv_message_ts
      type:
        required: false
        value_ref: nv_message_type
      text:
        required: false
        value_ref: nv_message_text
      subtype:
        required: false
        value_ref: nv_message_subtype
      thread_ts:
        required: false
        value_ref: nv_message_thread_ts
      reply_count:
        required: false
        value_ref: nv_message_reply_count
      latest_reply:
        required: false
        value_ref: nv_message_latest_reply
      permalink:
        required: false
        value_ref: nv_message_permalink
      channel:
        required: false
        value_ref: nv_message_channel
      user:
        required: false
        value_ref: nv_message_user
    relations: {}
  User:
    id_field: id
    description: A Slack workspace member
    fields:
      id:
        required: true
        value_ref: nv_user_id
      name:
        required: false
        value_ref: nv_user_name
      real_name:
        required: false
        value_ref: nv_user_real_name
      display_name:
        required: false
        value_ref: nv_user_display_name
      email:
        required: false
        value_ref: nv_user_email
      is_bot:
        required: false
        value_ref: nv_user_is_bot
      is_admin:
        required: false
        value_ref: nv_user_is_admin
      is_owner:
        required: false
        value_ref: nv_user_is_owner
      deleted:
        required: false
        value_ref: nv_user_deleted
      tz:
        required: false
        value_ref: nv_user_tz
      tz_label:
        required: false
        value_ref: nv_user_tz_label
      updated:
        required: false
        value_ref: nv_user_updated
    relations: {}
  File:
    id_field: id
    description: A file uploaded to Slack
    fields:
      id:
        required: true
        value_ref: nv_file_id
      name:
        required: false
        value_ref: nv_file_name
      title:
        required: false
        value_ref: nv_file_title
      mimetype:
        required: false
        value_ref: nv_file_mimetype
      filetype:
        required: false
        value_ref: nv_file_filetype
      size:
        required: false
        value_ref: nv_file_size
      created:
        required: false
        value_ref: nv_file_created
      url_private:
        required: false
        value_ref: nv_file_url_private
      permalink:
        required: false
        value_ref: nv_file_permalink
      is_public:
        required: false
        value_ref: nv_file_is_public
      is_external:
        required: false
        value_ref: nv_file_is_external
    relations: {}
  UserGroup:
    id_field: id
    description: A Slack user group (sub-team)
    fields:
      id:
        required: true
        value_ref: nv_user_group_id
      name:
        required: false
        value_ref: nv_user_group_name
      handle:
        required: false
        value_ref: nv_user_group_handle
      description:
        required: false
        value_ref: nv_user_group_description
      is_usergroup:
        required: false
        value_ref: nv_user_group_is_usergroup
      is_external:
        required: false
        value_ref: nv_user_group_is_external
      date_create:
        required: false
        value_ref: nv_user_group_date_create
      user_count:
        required: false
        value_ref: nv_user_group_user_count
    relations: {}
  Team:
    id_field: id
    description: A Slack workspace
    fields:
      id:
        required: true
        value_ref: nv_team_id
      name:
        required: false
        value_ref: nv_team_name
      domain:
        required: false
        value_ref: nv_team_domain
      email_domain:
        required: false
        value_ref: nv_team_email_domain
    relations: {}
  Reminder:
    id_field: id
    description: A Slack reminder
    fields:
      id:
        required: true
        value_ref: nv_reminder_id
      text:
        required: false
        value_ref: nv_reminder_text
      recurring:
        required: false
        value_ref: nv_reminder_recurring
      time:
        required: false
        value_ref: nv_reminder_time
      complete_count:
        required: false
        value_ref: nv_reminder_complete_count
      completed:
        required: false
        value_ref: nv_reminder_completed
    relations: {}
  Bot:
    id_field: id
    description: A Slack bot user
    fields:
      id:
        required: true
        value_ref: nv_bot_id
      name:
        required: false
        value_ref: nv_bot_name
      deleted:
        required: false
        value_ref: nv_bot_deleted
    relations: {}
  Pin:
    id_field: id
    description: A pinned item in a channel
    fields:
      id:
        required: true
        value_ref: nv_pin_id
      type:
        required: false
        value_ref: nv_pin_type
      created:
        required: false
        value_ref: nv_pin_created
    relations: {}
  Bookmark:
    id_field: id
    description: A channel bookmark (external link or Slack resource)
    fields:
      id:
        required: true
        value_ref: nv_bookmark_id
      title:
        required: false
        value_ref: nv_bookmark_title
      link:
        required: false
        value_ref: nv_bookmark_link
      emoji:
        required: false
        value_ref: nv_bookmark_emoji
      type:
        required: false
        value_ref: nv_bookmark_type
      channel_id:
        required: false
        value_ref: nv_bookmark_channel_id
      rank:
        required: false
        value_ref: nv_bookmark_rank
      date_created:
        required: false
        value_ref: nv_bookmark_date_created
    relations: {}
  ScheduledMessage:
    id_field: id
    description: A message queued to post to a channel at a future time (chat.scheduleMessage)
    fields:
      id:
        required: true
        value_ref: nv_scheduled_message_id
      channel_id:
        required: false
        value_ref: nv_scheduled_message_channel_id
      post_at:
        required: false
        value_ref: nv_scheduled_message_post_at
      date_created:
        required: false
        value_ref: nv_scheduled_message_date_created
      text:
        required: false
        value_ref: nv_scheduled_message_text
    relations: {}
capabilities:
  channel_list:
    description: List all channels (conversations) in the workspace
    kind: query
    entity: Channel
    parameters:
    - name: exclude_archived
      value_ref: nv_channel_list_exclude_archived
      required: false
      role: filter
    - name: types
      value_ref: nv_channel_list_types
      required: false
      role: filter
    provides:
    - id
    - name
    - is_channel
    - is_group
    - is_im
    - is_mpim
    - is_private
    - is_archived
    - is_general
    - is_member
    - is_shared
    - created
  channel_info:
    description: Get details about a single channel by ID
    kind: get
    entity: Channel
    provides:
    - id
    - name
    - is_channel
    - is_group
    - is_im
    - is_mpim
    - is_private
    - is_archived
    - is_general
    - is_member
    - is_shared
    - num_members
    - topic
    - purpose
    - created
  channel_history:
    description: Fetch the message history of a channel
    kind: query
    entity: Message
    parameters:
    - name: channel
      value_ref: nv_channel_history_channel
      required: true
      role: scope
    - name: oldest
      value_ref: nv_channel_history_oldest
      required: false
      role: filter
    - name: latest
      value_ref: nv_channel_history_latest
      required: false
      role: filter
    - name: inclusive
      value_ref: nv_wire_bool
      required: false
      role: filter
    provides:
    - ts
    - type
    - text
    - subtype
    - thread_ts
    - reply_count
    - latest_reply
    - permalink
    - channel
    - user
  channel_replies:
    description: Get replies in a message thread
    kind: query
    entity: Message
    parameters:
    - name: channel
      value_ref: nv_channel_replies_channel
      required: true
      role: scope
    - name: ts
      value_ref: nv_channel_replies_ts
      required: true
    provides:
    - ts
    - type
    - text
    - subtype
    - thread_ts
    - reply_count
    - latest_reply
    - permalink
    - channel
    - user
  channel_members:
    description: List members of a channel
    kind: query
    entity: User
    parameters:
    - name: channel
      value_ref: nv_channel_members_channel
      required: true
      role: scope
  channel_create:
    description: Create a new channel
    kind: create
    entity: Channel
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: true
    - name: is_private
      value_ref: nv_wire_bool
      required: false
  channel_archive:
    description: Archive a channel
    kind: action
    entity: Channel
    output:
      type: side_effect
      description: Archive a channel
  channel_unarchive:
    description: Unarchive a channel
    kind: action
    entity: Channel
    output:
      type: side_effect
      description: Unarchive a channel
  channel_join:
    description: Join a channel
    kind: action
    entity: Channel
    output:
      type: side_effect
      description: Join a channel
  channel_leave:
    description: Leave a channel
    kind: action
    entity: Channel
    output:
      type: side_effect
      description: Leave a channel
  channel_rename:
    description: Rename a channel
    kind: update
    entity: Channel
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: true
  channel_set_topic:
    description: Set the topic of a channel
    kind: action
    entity: Channel
    parameters:
    - name: topic
      value_ref: nv_wire_str_markdown
      required: true
    output:
      type: side_effect
      description: Set the topic of a channel
  channel_set_purpose:
    description: Set the purpose of a channel
    kind: action
    entity: Channel
    parameters:
    - name: purpose
      value_ref: nv_wire_str_markdown
      required: true
    output:
      type: side_effect
      description: Set the purpose of a channel
  channel_invite:
    description: Invite a user to a channel
    kind: action
    entity: Channel
    parameters:
    - name: users
      value_ref: nv_channel_invite_users
      required: true
    output:
      type: side_effect
      description: Invite a user to a channel
  channel_kick:
    description: Remove a user from a channel
    kind: action
    entity: Channel
    parameters:
    - name: user
      value_ref: nv_channel_kick_user
      required: true
    output:
      type: side_effect
      description: Remove a user from a channel
  channel_mark:
    description: Mark the read position in a channel
    kind: action
    entity: Channel
    parameters:
    - name: ts
      value_ref: nv_wire_str_short
      required: true
    output:
      type: side_effect
      description: Mark the read position in a channel
  message_search:
    description: Search messages across all accessible channels
    kind: search
    entity: Message
    parameters:
    - name: query
      value_ref: nv_message_search_query
      required: true
      role: search
    - name: sort
      value_ref: nv_message_search_sort
      required: false
      role: sort
    - name: sort_dir
      value_ref: nv_message_search_sort_dir
      required: false
      role: sort_direction
    - name: highlight
      value_ref: nv_wire_bool
      required: false
      role: response_control
  message_post:
    description: Send a message to a channel
    kind: create
    entity: Message
    parameters:
    - name: channel
      value_ref: nv_message_post_channel
      required: true
    - name: text
      value_ref: nv_message_post_text
      required: false
    - name: thread_ts
      value_ref: nv_message_post_thread_ts
      required: false
    - name: blocks
      value_ref: nv_message_post_blocks
      required: false
    - name: attachments
      value_ref: nv_message_post_attachments
      required: false
    - name: unfurl_links
      value_ref: nv_message_post_unfurl_links
      required: false
    - name: unfurl_media
      value_ref: nv_message_post_unfurl_media
      required: false
    - name: mrkdwn
      value_ref: nv_message_post_mrkdwn
      required: false
  message_update:
    description: Update a message
    kind: update
    entity: Message
    parameters:
    - name: channel
      value_ref: nv_message_update_channel
      required: true
    - name: text
      value_ref: nv_wire_str_markdown
      required: false
    - name: blocks
      value_ref: nv_message_update_blocks
      required: false
    - name: attachments
      value_ref: nv_message_update_attachments
      required: false
  message_delete:
    description: Delete a message
    kind: delete
    entity: Message
    parameters:
    - name: channel
      value_ref: nv_message_delete_channel
      required: true
  message_permalink:
    description: Get a permanent link to a message
    kind: action
    entity: Message
    parameters:
    - name: channel
      value_ref: nv_message_permalink_channel
      required: true
    output:
      type: side_effect
      description: Get a permanent link to a message
  message_react_add:
    description: Add an emoji reaction to a message
    kind: action
    entity: Message
    parameters:
    - name: channel
      value_ref: nv_message_react_add_channel
      required: true
    - name: name
      value_ref: nv_message_react_add_name
      required: true
    output:
      type: side_effect
      description: Add an emoji reaction to a message
  message_react_remove:
    description: Remove an emoji reaction from a message
    kind: action
    entity: Message
    parameters:
    - name: channel
      value_ref: nv_message_react_remove_channel
      required: true
    - name: name
      value_ref: nv_wire_str_short
      required: true
    output:
      type: side_effect
      description: Remove an emoji reaction from a message
  user_list:
    description: List all users in the workspace
    kind: query
    entity: User
    parameters:
    - name: include_locale
      value_ref: nv_wire_bool
      required: false
      role: response_control
    provides:
    - id
    - name
    - is_bot
    - deleted
  user_info:
    description: Get info about a specific user by ID
    kind: get
    entity: User
    provides:
    - id
    - name
    - real_name
    - display_name
    - email
    - is_bot
    - is_admin
    - is_owner
    - deleted
    - tz
    - tz_label
    - updated
  user_lookup_by_email:
    description: Look up a user by email address
    kind: action
    entity: User
    parameters:
    - name: email
      value_ref: nv_wire_str_short
      required: true
    output:
      type: side_effect
      description: Look up a user by email address
  user_get_presence:
    description: Get the presence status of a user
    kind: action
    entity: User
    output:
      type: side_effect
      description: Get the presence status of a user
  user_identity:
    description: Get identity of the calling user (requires identity.* scopes)
    kind: singleton
    entity: User
  file_list:
    description: List files in the workspace, optionally filtered by user or channel
    kind: query
    entity: File
    parameters:
    - name: user
      value_ref: nv_file_list_user
      required: false
      role: filter
    - name: channel
      value_ref: nv_file_list_channel
      required: false
      role: filter
    - name: types
      value_ref: nv_file_list_types
      required: false
      role: filter
    - name: ts_from
      value_ref: nv_wire_num
      required: false
      role: filter
    - name: ts_to
      value_ref: nv_wire_num
      required: false
      role: filter
    provides:
    - id
    - name
    - title
    - mimetype
    - filetype
    - size
    - created
    - is_public
  file_info:
    description: Get info about a specific file
    kind: get
    entity: File
    provides:
    - id
    - name
    - title
    - mimetype
    - filetype
    - size
    - created
    - url_private
    - permalink
    - is_public
    - is_external
  file_upload:
    description: Upload a file to a channel
    kind: create
    entity: File
    parameters:
    - name: channels
      value_ref: nv_file_upload_channels
      required: false
    - name: content
      value_ref: nv_file_upload_content
      required: false
    - name: filename
      value_ref: nv_wire_str_short
      required: false
  file_delete:
    description: Delete a file
    kind: delete
    entity: File
  file_revoke_public_url:
    description: Revoke the public URL for a file
    kind: action
    entity: File
    output:
      type: side_effect
      description: Revoke the public URL for a file
  usergroup_list:
    description: List all user groups in the workspace
    kind: query
    entity: UserGroup
    parameters:
    - name: include_users
      value_ref: nv_wire_bool
      required: false
      role: response_control
    - name: include_count
      value_ref: nv_wire_bool
      required: false
      role: response_control
    - name: include_disabled
      value_ref: nv_wire_bool
      required: false
      role: filter
    provides:
    - id
    - name
    - handle
    - description
    - is_usergroup
    - date_create
    - user_count
  usergroup_create:
    description: Create a new user group
    kind: create
    entity: UserGroup
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: true
    - name: handle
      value_ref: nv_wire_str_short
      required: false
    - name: description
      value_ref: nv_wire_str_markdown
      required: false
  usergroup_update:
    description: Update a user group
    kind: update
    entity: UserGroup
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: false
    - name: handle
      value_ref: nv_wire_str_short
      required: false
    - name: description
      value_ref: nv_wire_str_markdown
      required: false
  usergroup_enable:
    description: Enable a disabled user group
    kind: action
    entity: UserGroup
    output:
      type: side_effect
      description: Enable a disabled user group
  usergroup_disable:
    description: Disable an active user group
    kind: action
    entity: UserGroup
    output:
      type: side_effect
      description: Disable an active user group
  usergroup_member_list:
    description: List the members of a user group
    kind: query
    entity: User
    parameters:
    - name: usergroup
      value_ref: nv_usergroup_member_list_usergroup
      required: true
      role: scope
    - name: include_disabled
      value_ref: nv_wire_bool
      required: false
      role: filter
  team_info:
    description: Get information about the current workspace
    kind: singleton
    entity: Team
  reminder_list:
    description: List reminders for the current user
    kind: query
    entity: Reminder
    provides:
    - id
    - text
    - time
    - completed
  reminder_info:
    description: Get a single reminder by ID
    kind: get
    entity: Reminder
    provides:
    - id
    - text
    - recurring
    - time
    - complete_count
    - completed
  reminder_add:
    description: Create a reminder for a user
    kind: create
    entity: Reminder
    parameters:
    - name: text
      value_ref: nv_wire_str_markdown
      required: true
    - name: time
      value_ref: nv_reminder_add_time
      required: true
  reminder_complete:
    description: Mark a reminder as complete
    kind: action
    entity: Reminder
    output:
      type: side_effect
      description: Mark a reminder as complete
  reminder_delete:
    description: Delete a reminder
    kind: delete
    entity: Reminder
  pin_list:
    description: List pinned items in a channel
    kind: query
    entity: Pin
    parameters:
    - name: channel
      value_ref: nv_pin_list_channel
      required: true
      role: scope
    provides:
    - id
    - type
    - created
  pin_add:
    description: Pin a message or file to a channel
    kind: action
    entity: Pin
    parameters:
    - name: channel
      value_ref: nv_pin_add_channel
      required: true
    - name: timestamp
      value_ref: nv_pin_add_timestamp
      required: false
    output:
      type: side_effect
      description: Pin a message or file to a channel
  pin_remove:
    description: Remove a pinned item from a channel
    kind: action
    entity: Pin
    parameters:
    - name: channel
      value_ref: nv_pin_remove_channel
      required: true
    - name: timestamp
      value_ref: nv_wire_str_short
      required: false
    output:
      type: side_effect
      description: Remove a pinned item from a channel
  bot_info:
    description: Get information about a bot user
    kind: get
    entity: Bot
    provides:
    - id
    - name
    - deleted
  bookmark_list:
    description: List bookmarks in a channel
    kind: query
    entity: Bookmark
    parameters:
    - name: channel
      value_ref: nv_bookmark_list_channel
      required: true
      role: scope
    provides:
    - id
    - title
    - link
    - emoji
    - type
    - channel_id
    - rank
    - date_created
  bookmark_add:
    description: Add a bookmark to a channel
    kind: create
    entity: Bookmark
    parameters:
    - name: channel
      value_ref: nv_bookmark_add_channel
      required: true
    - name: title
      value_ref: nv_wire_str_short
      required: true
    - name: type
      value_ref: nv_bookmark_add_type
      required: true
    - name: link
      value_ref: nv_bookmark_add_link
      required: false
    - name: emoji
      value_ref: nv_wire_str_short
      required: false
  bookmark_edit:
    description: Edit an existing bookmark
    kind: update
    entity: Bookmark
    parameters:
    - name: channel
      value_ref: nv_bookmark_edit_channel
      required: true
    - name: title
      value_ref: nv_wire_str_short
      required: false
    - name: link
      value_ref: nv_wire_str_short
      required: false
    - name: emoji
      value_ref: nv_wire_str_short
      required: false
  bookmark_remove:
    description: Remove a bookmark from a channel
    kind: action
    entity: Bookmark
    parameters:
    - name: channel
      value_ref: nv_bookmark_remove_channel
      required: true
    output:
      type: side_effect
      description: Remove this bookmark from the Slack channel header
  scheduledmessage_list:
    description: List pending scheduled messages (optionally filtered to one channel)
    kind: query
    entity: ScheduledMessage
    parameters:
    - name: channel
      value_ref: nv_scheduledmessage_list_channel
      required: true
      role: scope
    - name: oldest
      value_ref: nv_scheduledmessage_list_oldest
      required: false
    - name: latest
      value_ref: nv_scheduledmessage_list_latest
      required: false
    provides:
    - id
    - channel_id
    - post_at
    - date_created
    - text
  scheduledmessage_create:
    description: Schedule a message to be sent later (chat.scheduleMessage)
    kind: create
    entity: ScheduledMessage
    parameters:
    - name: channel
      value_ref: nv_scheduledmessage_create_channel
      required: true
    - name: post_at
      value_ref: nv_scheduledmessage_create_post_at
      required: true
    - name: text
      value_ref: nv_scheduledmessage_create_text
      required: false
    - name: thread_ts
      value_ref: nv_scheduledmessage_create_thread_ts
      required: false
    - name: blocks
      value_ref: nv_scheduledmessage_create_blocks
      required: false
    - name: attachments
      value_ref: nv_scheduledmessage_create_attachments
      required: false
    - name: unfurl_links
      value_ref: nv_wire_bool
      required: false
    - name: unfurl_media
      value_ref: nv_wire_bool
      required: false
    - name: mrkdwn
      value_ref: nv_scheduledmessage_create_mrkdwn
      required: false
  scheduledmessage_delete:
    description: Delete a pending scheduled message before it sends
    kind: delete
    entity: ScheduledMessage
    parameters:
    - name: channel
      value_ref: nv_scheduledmessage_delete_channel
      required: true
  auth_test:
    description: Test the authentication token and get caller identity
    kind: singleton
    entity: User
oauth:
  provider: slack
  scopes:
    channels:read:
      label: View basic channel metadata (public channels)
      notes: Bot tokens with this scope see public channels; private channels and DMs need groups:read, im:read, or mpim:read
        respectively. Full coverage across conversation types usually means multiple scopes.
      docs_url: https://api.slack.com/scopes/channels:read
    channels:manage:
      label: Manage public channels (create, archive, rename, membership admin)
      docs_url: https://api.slack.com/scopes/channels:manage
    channels:history:
      label: View messages and other content in public channels
      docs_url: https://api.slack.com/scopes/channels:history
    channels:join:
      label: Join public channels
      docs_url: https://api.slack.com/scopes/channels:join
    groups:read:
      label: View basic metadata about private channels
      docs_url: https://api.slack.com/scopes/groups:read
    groups:write:
      label: Manage private channels (create, rename, archive, invite, kick)
      docs_url: https://api.slack.com/scopes/groups:write
    groups:history:
      label: View messages in private channels
      docs_url: https://api.slack.com/scopes/groups:history
    im:read:
      label: View basic DM metadata
      docs_url: https://api.slack.com/scopes/im:read
    im:history:
      label: View DM message history
      docs_url: https://api.slack.com/scopes/im:history
    mpim:read:
      label: View basic group DM metadata
      docs_url: https://api.slack.com/scopes/mpim:read
    mpim:history:
      label: View group DM message history
      docs_url: https://api.slack.com/scopes/mpim:history
    chat:write:
      label: Post and update messages as the app
      docs_url: https://api.slack.com/scopes/chat:write
    chat:write.public:
      label: Post to channels the app is not a member of (public channels)
      notes: Complements chat:write for posting without prior membership in some cases.
      docs_url: https://api.slack.com/scopes/chat:write.public
    chat:write.customize:
      label: Post with custom username/icon (legacy-style customization where supported)
      notes: Optional; not required by this toolkit’s mapped methods but listed for OAuth bundle completeness.
      docs_url: https://api.slack.com/scopes/chat:write.customize
    search:read:
      label: Search messages and files visible to the user
      docs_url: https://api.slack.com/scopes/search:read
    users:read:
      label: View people in the workspace (users.list, users.info, presence, bots.info)
      notes: Slack’s auth.test validates a token without listing a bot/user OAuth scope; this catalog does not gate auth_test.
        Typical bot installs include users:read for directory features.
      docs_url: https://api.slack.com/scopes/users:read
    users:read.email:
      label: View email addresses of people in the workspace
      docs_url: https://api.slack.com/scopes/users:read.email
    users.profile:read:
      label: View user profile details (title, status, fields)
      docs_url: https://api.slack.com/scopes/users.profile:read
    identity.basic:
      label: View basic user identity (users.identity)
      docs_url: https://api.slack.com/scopes/identity.basic
    identity.email:
      label: View user email (users.identity)
      docs_url: https://api.slack.com/scopes/identity.email
    identity.team:
      label: View workspace/team for the authorized user (users.identity)
      docs_url: https://api.slack.com/scopes/identity.team
    identity.avatar:
      label: View user avatar URL (users.identity)
      docs_url: https://api.slack.com/scopes/identity.avatar
    files:read:
      label: View file metadata and contents the app can access
      docs_url: https://api.slack.com/scopes/files:read
    files:write:
      label: Upload, delete, and change file visibility
      docs_url: https://api.slack.com/scopes/files:write
    usergroups:read:
      label: View user groups and membership
      docs_url: https://api.slack.com/scopes/usergroups:read
    usergroups:write:
      label: Create and manage user groups
      docs_url: https://api.slack.com/scopes/usergroups:write
    team:read:
      label: View workspace name, domain, and icon (team.info)
      docs_url: https://api.slack.com/scopes/team:read
    reminders:read:
      label: View reminders for the user
      docs_url: https://api.slack.com/scopes/reminders:read
    reminders:write:
      label: Add, complete, and delete reminders
      docs_url: https://api.slack.com/scopes/reminders:write
    pins:read:
      label: View pinned items in channels
      docs_url: https://api.slack.com/scopes/pins:read
    pins:write:
      label: Add and remove pinned items
      docs_url: https://api.slack.com/scopes/pins:write
    reactions:read:
      label: View emoji reactions on messages
      docs_url: https://api.slack.com/scopes/reactions:read
    reactions:write:
      label: Add and remove emoji reactions
      docs_url: https://api.slack.com/scopes/reactions:write
    bookmarks:read:
      label: View channel bookmarks
      docs_url: https://api.slack.com/scopes/bookmarks:read
    bookmarks:write:
      label: Add, edit, and remove channel bookmarks
      docs_url: https://api.slack.com/scopes/bookmarks:write
  default_scope_sets:
    typical_bot_assistant:
      description: Common read-and-post bot bundle (browse public and private channels, DM history, post messages). Not sufficient
        for channel admin, file uploads, search, or usergroups by itself.
      scopes:
      - channels:read
      - channels:history
      - chat:write
      - users:read
      - groups:read
      - groups:history
      - im:history
      - mpim:history
    workspace_directory_readonly:
      description: Discovery-only bundle (workspace info, membership directory, channel lists) without posting.
      scopes:
      - users:read
      - team:read
      - channels:read
      - groups:read
  requirements:
    capabilities:
      channel_list:
        any_of:
        - channels:read
        - groups:read
        - im:read
        - mpim:read
      channel_info:
        any_of:
        - channels:read
        - groups:read
        - im:read
        - mpim:read
      channel_history:
        any_of:
        - channels:history
        - groups:history
        - im:history
        - mpim:history
      channel_replies:
        any_of:
        - channels:history
        - groups:history
        - im:history
        - mpim:history
      channel_members:
        any_of:
        - channels:read
        - groups:read
      channel_create:
        any_of:
        - channels:manage
        - groups:write
      channel_archive:
        any_of:
        - channels:manage
        - groups:write
      channel_unarchive:
        any_of:
        - channels:manage
        - groups:write
      channel_join:
        any_of:
        - channels:join
      channel_leave:
        any_of:
        - channels:manage
        - groups:write
      channel_rename:
        any_of:
        - channels:manage
        - groups:write
      channel_set_topic:
        any_of:
        - channels:manage
        - groups:write
      channel_set_purpose:
        any_of:
        - channels:manage
        - groups:write
      channel_invite:
        any_of:
        - channels:manage
        - groups:write
      channel_kick:
        any_of:
        - channels:manage
        - groups:write
      channel_mark:
        any_of:
        - channels:history
        - groups:history
        - im:history
        - mpim:history
      message_search:
        any_of:
        - search:read
      message_post:
        any_of:
        - chat:write
        - chat:write.public
      message_update:
        any_of:
        - chat:write
      message_delete:
        any_of:
        - chat:write
      message_permalink:
        any_of:
        - channels:history
        - groups:history
        - im:history
        - mpim:history
      message_react_add:
        any_of:
        - reactions:write
      message_react_remove:
        any_of:
        - reactions:write
      user_list:
        any_of:
        - users:read
      user_info:
        any_of:
        - users:read
      user_lookup_by_email:
        any_of:
        - users:read.email
      user_get_presence:
        any_of:
        - users:read
      user_identity:
        any_of:
        - identity.basic
        - identity.email
        - identity.team
        - identity.avatar
      file_list:
        any_of:
        - files:read
      file_info:
        any_of:
        - files:read
      file_upload:
        any_of:
        - files:write
      file_delete:
        any_of:
        - files:write
      file_revoke_public_url:
        any_of:
        - files:write
      usergroup_list:
        any_of:
        - usergroups:read
      usergroup_create:
        any_of:
        - usergroups:write
      usergroup_update:
        any_of:
        - usergroups:write
      usergroup_enable:
        any_of:
        - usergroups:write
      usergroup_disable:
        any_of:
        - usergroups:write
      usergroup_member_list:
        any_of:
        - usergroups:read
      team_info:
        any_of:
        - team:read
      reminder_list:
        any_of:
        - reminders:read
      reminder_info:
        any_of:
        - reminders:read
      reminder_add:
        any_of:
        - reminders:write
      reminder_complete:
        any_of:
        - reminders:write
      reminder_delete:
        any_of:
        - reminders:write
      pin_list:
        any_of:
        - pins:read
      pin_add:
        any_of:
        - pins:write
      pin_remove:
        any_of:
        - pins:write
      bot_info:
        any_of:
        - users:read
      bookmark_list:
        any_of:
        - bookmarks:read
      bookmark_add:
        any_of:
        - bookmarks:write
      bookmark_edit:
        any_of:
        - bookmarks:write
      bookmark_remove:
        any_of:
        - bookmarks:write
      scheduledmessage_list:
        any_of:
        - chat:write
      scheduledmessage_create:
        any_of:
        - chat:write
      scheduledmessage_delete:
        any_of:
        - chat:write
    relations:
      Channel.messages:
        any_of:
        - channels:history
        - groups:history
        - im:history
        - mpim:history
      Channel.members:
        any_of:
