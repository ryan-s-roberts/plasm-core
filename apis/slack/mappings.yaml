# Slack Web API — CML (Capability Mapping Language). Semantic model is in domain.yaml.
#
# Base URL: Slack Web API (slack.com/api — set HTTPS origin with --backend).
# All methods: POST or GET to /family.method
#
# Auth: Bearer token injected as Authorization header by the runtime.
#
# Pagination: cursor-based on all list endpoints.
# - Request: cursor=<token> (passed as query param)
# - Response: {"...", "response_metadata": {"next_cursor": "dGVhbTpD..."}}
# - Stop: implicit when response_metadata.next_cursor is absent or empty string.
#   Uses dot-path notation in from_response (plasm dot-path feature).
#
# Response envelopes: Slack wraps entities in named keys at the response root.
# - List responses: {"channels": [...], "response_metadata": {...}}
# - Single responses: {"channel": {...}}, {"user": {...}}, etc.
# - The `items:` config field directs the decoder to the correct key.

# ── Channel (conversations) ───────────────────────────────────────────────

channel_list:
  response:
    items: channels
    next_cursor: response_metadata.next_cursor
  method: GET
  path:
    - type: literal
      value: conversations.list
  query:
    type: object
    fields:
      - - exclude_archived
        - type: if
          condition: { type: exists, var: exclude_archived }
          then_expr: { type: var, name: exclude_archived }
          else_expr: { type: const, value: null }
      - - types
        - type: if
          condition: { type: exists, var: types }
          then_expr: { type: var, name: types }
          else_expr: { type: const, value: null }
  pagination:
    params:
      cursor: { from_response: response_metadata.next_cursor }
      limit: { fixed: 200 }
    location: query

channel_info:
  response:
    items: channel
  method: GET
  path:
    - type: literal
      value: conversations.info
  query:
    type: object
    fields:
      - - channel
        - type: var
          name: id
      - - include_num_members
        - type: const
          value: "true"

channel_history:
  response:
    items: messages
  method: GET
  path:
    - type: literal
      value: conversations.history
  query:
    type: object
    fields:
      - - channel
        - type: var
          name: channel
      - - oldest
        - type: if
          condition: { type: exists, var: oldest }
          then_expr: { type: var, name: oldest }
          else_expr: { type: const, value: null }
      - - latest
        - type: if
          condition: { type: exists, var: latest }
          then_expr: { type: var, name: latest }
          else_expr: { type: const, value: null }
      - - inclusive
        - type: if
          condition: { type: exists, var: inclusive }
          then_expr: { type: var, name: inclusive }
          else_expr: { type: const, value: null }
  pagination:
    params:
      cursor: { from_response: response_metadata.next_cursor }
      limit: { fixed: 100 }
    location: query
    stop_when: { field: has_more, eq: false }

channel_replies:
  response:
    items: messages
  method: GET
  path:
    - type: literal
      value: conversations.replies
  query:
    type: object
    fields:
      - - channel
