# ── Auth ──────────────────────────────────────────────────────────────────

auth_test:
  # POST auth.test — returns {"ok": true, "user": "...", "user_id": "...", "team": "...", ...}
  # We use items: user_id to get the caller's user ID, but the full object is actually at root.
  # Decode from root as a User entity (user_id maps to id via decoder).
  response: single
  method: POST
  path:
    - type: literal
      value: auth.test
