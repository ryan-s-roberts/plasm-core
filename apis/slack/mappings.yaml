# ── Message (chat / search) ────────────────────────────────────────────────

message_search:
  # Slack returns: {"messages": {"matches": [...], "total": N, "pagination": {...}}}
  # The items are at messages.matches — dot-path for items is not supported in
  # ResponseConfig.items, so we map to the outer "messages" key and note this
  # as a known limitation (see README). Use the pagination below.
  response:
    items: messages
  method: GET
  path:
    - type: literal
      value: search.messages
  query:
    type: object
    fields:
      - - query
        - type: var
          name: query
      - - sort
        - type: if
          condition: { type: exists, var: sort }
          then_expr: { type: var, name: sort }
          else_expr: { type: const, value: null }
      - - sort_dir
        - type: if
          condition: { type: exists, var: sort_dir }
          then_expr: { type: var, name: sort_dir }
          else_expr: { type: const, value: null }
      - - highlight
        - type: if
          condition: { type: exists, var: highlight }
          then_expr: { type: var, name: highlight }
          else_expr: { type: const, value: null }
  pagination:
    params:
      page: { counter: 1 }
      count: { fixed: 100 }
    location: query

message_post:
  response: single
  method: POST
  path:
    - type: literal
      value: chat.postMessage
  body:
    type: var
    name: input

message_update:
  response: single
  method: POST
  path:
    - type: literal
      value: chat.update
  body:
    type: object
    fields:
      - - channel
        - type: var
          name: channel
      - - ts
        - type: var
          name: id
      - - text
        - type: if
          condition: { type: exists, var: text }
          then_expr: { type: var, name: text }
          else_expr: { type: const, value: null }
      - - blocks
        - type: if
          condition: { type: exists, var: blocks }
          then_expr: { type: var, name: blocks }
          else_expr: { type: const, value: null }
      - - attachments
        - type: if
          condition: { type: exists, var: attachments }
          then_expr: { type: var, name: attachments }
          else_expr: { type: const, value: null }

message_delete:
  response: single
  method: POST
  path:
    - type: literal
      value: chat.delete
  body:
    type: object
    fields:
      - - channel
        - type: var
          name: channel
      - - ts
        - type: var
          name: id

message_permalink:
  response: single
  method: GET
  path:
    - type: literal
      value: chat.getPermalink
  query:
    type: object
    fields:
      - - channel
        - type: var
          name: channel
      - - message_ts
        - type: var
          name: id

message_react_add:
  response: single
  method: POST
  path:
    - type: literal
      value: reactions.add
  body:
    type: object
    fields:
      - - channel
        - type: var
          name: channel
      - - timestamp
        - type: var
          name: id
      - - name
        - type: var
          name: name

message_react_remove:
