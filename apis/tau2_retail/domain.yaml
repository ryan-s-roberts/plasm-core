version: 1
auth:
  scheme: none
http_backend: http://localhost:1080
entities:
  Order:
    id_field: order_id
    description: Customer order
    fields:
      order_id:
        required: true
        value_ref: nv_order_order_id
      user_id:
        required: true
        value_ref: nv_order_user_id
      status:
        required: true
        value_ref: nv_order_status
      cancel_reason:
        required: false
        value_ref: nv_order_cancel_reason
    relations: {}
  User:
    id_field: user_id
    description: Retail customer profile
    fields:
      user_id:
        required: true
        value_ref: nv_user_user_id
      email:
        required: false
        value_ref: nv_user_email
    relations: {}
  Product:
    id_field: product_id
    description: Sellable product with variants
    fields:
      product_id:
        required: true
        value_ref: nv_product_product_id
      name:
        required: true
        value_ref: nv_product_name
    relations:
      variants:
        description: SKUs / line items for this product
        target: Variant
        cardinality: many
        materialize:
          kind: query_scoped
          capability: list_variants_by_product
          param: product_id
  Variant:
    id_field: item_id
    description: Product variant
    fields:
      item_id:
        required: true
        value_ref: nv_variant_item_id
      product_id:
        required: true
        value_ref: nv_variant_product_id
      available:
        required: false
        value_ref: nv_variant_available
      price:
        required: false
        value_ref: nv_variant_price
    relations: {}
  CatalogLine:
    id_field: product_id
    description: One row from product types
    fields:
      product_id:
        required: true
        value_ref: nv_catalog_line_product_id
      name:
        required: true
        value_ref: nv_catalog_line_name
    relations: {}
  CalcJob:
    id_field: result
    description: Arithmetic evaluation via calculate()
    fields:
      result:
        required: true
        value_ref: nv_calc_job_result
    relations: {}
    domain_projection_examples: false
  HumanHandoff:
    id_field: status
    description: transfer_to_human_agents outcome
    fields:
      status:
        required: true
        value_ref: nv_human_handoff_status
    relations: {}
    domain_projection_examples: false
capabilities:
  get_order_details:
    kind: get
    entity: Order
    description: Get order
    provides:
    - order_id
    - user_id
    - status
    - cancel_reason
  get_user_details:
    kind: get
    entity: User
    description: Get user profile
    provides:
    - user_id
    - email
  get_product_details:
    kind: get
    entity: Product
    description: Get product and variant inventory
    provides:
    - product_id
    - name
  get_item_details:
    kind: get
    entity: Variant
    description: Get variant by item id
    provides:
    - item_id
    - product_id
    - available
    - price
  list_variants_by_product:
    kind: query
    entity: Variant
    description: Variants for a product
    parameters:
    - name: product_id
      value_ref: nv_list_variants_by_product_product_id
      required: true
      role: scope
  find_user_id_by_email:
    kind: query
    entity: User
    description: Resolve user by email
    provides:
    - user_id
    parameters:
    - name: email
      value_ref: nv_find_user_id_by_email_email
      required: true
  find_user_id_by_name_zip:
    kind: query
    entity: User
    description: Resolve user by name and zip
    provides:
    - user_id
    parameters:
    - name: first_name
      value_ref: nv_find_user_id_by_name_zip_first_name
      required: true
    - name: last_name
      value_ref: nv_find_user_id_by_name_zip_last_name
      required: true
    - name: zip
      value_ref: nv_find_user_id_by_name_zip_zip
      required: true
  list_all_product_types:
    kind: query
    entity: CatalogLine
    description: List all product types
  calculate:
    kind: create
    entity: CalcJob
    description: Evaluate a safe arithmetic expression
    provides:
    - result
    parameters:
    - name: expression
      value_ref: nv_calculate_expression
      required: true
  transfer_to_human_agents:
    kind: create
    entity: HumanHandoff
    description: Escalate to human with summary
    parameters:
    - name: summary
      value_ref: nv_transfer_to_human_agents_summary
      required: true
  cancel_pending_order:
    kind: update
    entity: Order
    description: Cancel pending order with policy reason
    parameters:
    - name: reason
      value_ref: nv_cancel_pending_order_reason
      required: true
  modify_pending_order_address:
    kind: update
    entity: Order
    description: Change shipping address on a pending order
    parameters:
    - name: address1
      value_ref: nv_modify_pending_order_address_address1
      required: true
    - name: address2
      value_ref: nv_modify_pending_order_address_address2
      required: false
    - name: city
      value_ref: nv_modify_pending_order_address_city
      required: true
    - name: state
      value_ref: nv_modify_pending_order_address_state
      required: true
    - name: country
      value_ref: nv_modify_pending_order_address_country
      required: true
    - name: zip
      value_ref: nv_modify_pending_order_address_zip
      required: true
  modify_pending_order_payment:
    kind: update
    entity: Order
    description: Switch payment method on a pending order
    parameters:
    - name: payment_method_id
      value_ref: nv_modify_pending_order_payment_payment_method_id
      required: true
  modify_pending_order_items:
    kind: action
    entity: Order
    description: Replace line items on pending order
    parameters:
    - name: item_ids
      value_ref: nv_modify_pending_order_items_item_ids
      required: true
    - name: new_item_ids
      value_ref: nv_modify_pending_order_items_new_item_ids
      required: true
    - name: payment_method_id
      value_ref: nv_modify_pending_order_items_payment_method_id
      required: true
    output:
      type: side_effect
      description: Replace line items on pending order
  exchange_delivered_order_items:
    kind: action
    entity: Order
    description: Exchange items on a delivered order
    parameters:
    - name: item_ids
      value_ref: nv_exchange_delivered_order_items_item_ids
      required: true
    - name: new_item_ids
      value_ref: nv_exchange_delivered_order_items_new_item_ids
      required: true
    - name: payment_method_id
      value_ref: nv_exchange_delivered_order_items_payment_method_id
      required: true
    output:
      type: side_effect
      description: Exchange items on a delivered order
  return_delivered_order_items:
    kind: action
    entity: Order
    description: Request return for delivered order lines
    parameters:
    - name: item_ids
      value_ref: nv_return_delivered_order_items_item_ids
      required: true
    - name: payment_method_id
      value_ref: nv_return_delivered_order_items_payment_method_id
      required: true
    output:
      type: side_effect
      description: Request return for delivered order lines
  modify_user_address:
    kind: update
    entity: User
    description: Update user's default address
    parameters:
    - name: address1
      value_ref: nv_modify_user_address_address1
      required: true
    - name: address2
      value_ref: nv_modify_user_address_address2
      required: false
    - name: city
      value_ref: nv_modify_user_address_city
      required: true
    - name: state
      value_ref: nv_modify_user_address_state
      required: true
    - name: country
      value_ref: nv_modify_user_address_country
      required: true
    - name: zip
      value_ref: nv_modify_user_address_zip
      required: true
values:
  nv_order_order_id:
    type: string
    string_semantics: short
  nv_order_user_id:
    type: entity_ref
    target: User
  nv_order_status:
    type: select
    allowed_values:
    - processed
    - pending
    - pending (item modified)
    - delivered
    - cancelled
    - exchange requested
    - return requested
  nv_order_cancel_reason:
    type: select
    allowed_values:
    - no longer needed
    - ordered by mistake
  nv_user_user_id:
    type: string
    string_semantics: short
  nv_user_email:
    type: string
    string_semantics: short
  nv_product_product_id:
    type: string
    string_semantics: short
  nv_product_name:
    type: string
    string_semantics: short
  nv_variant_item_id:
    type: string
    string_semantics: short
  nv_variant_product_id:
    type: entity_ref
    target: Product
  nv_variant_available:
    type: boolean
  nv_variant_price:
    type: number
  nv_catalog_line_product_id:
    type: string
    string_semantics: short
  nv_catalog_line_name:
    type: string
    string_semantics: short
  nv_calc_job_result:
    type: string
    string_semantics: short
  nv_human_handoff_status:
    type: string
    string_semantics: short
  nv_list_variants_by_product_product_id:
    type: entity_ref
    target: Product
  nv_find_user_id_by_email_email:
    type: string
    string_semantics: short
  nv_find_user_id_by_name_zip_first_name:
    type: string
    string_semantics: short
  nv_find_user_id_by_name_zip_last_name:
    type: string
    string_semantics: short
  nv_find_user_id_by_name_zip_zip:
    type: string
    string_semantics: short
  nv_calculate_expression:
    type: string
    string_semantics: short
  nv_transfer_to_human_agents_summary:
    type: string
    string_semantics: short
  nv_cancel_pending_order_reason:
    type: select
    allowed_values:
    - no longer needed
    - ordered by mistake
  nv_modify_pending_order_address_address1:
    type: string
    string_semantics: short
  nv_modify_pending_order_address_address2:
    type: string
    string_semantics: short
  nv_modify_pending_order_address_city:
    type: string
    string_semantics: short
  nv_modify_pending_order_address_state:
    type: string
    string_semantics: short
  nv_modify_pending_order_address_country:
    type: string
    string_semantics: short
  nv_modify_pending_order_address_zip:
    type: string
    string_semantics: short
  nv_modify_pending_order_payment_payment_method_id:
    type: string
    string_semantics: short
  nv_modify_pending_order_items_item_ids_item:
    type: entity_ref
    target: Variant
  nv_modify_pending_order_items_item_ids:
    type: array
    items:
      value_ref: nv_modify_pending_order_items_item_ids_item
  nv_modify_pending_order_items_new_item_ids_item:
    type: entity_ref
    target: Variant
  nv_modify_pending_order_items_new_item_ids:
    type: array
    items:
      value_ref: nv_modify_pending_order_items_new_item_ids_item
  nv_modify_pending_order_items_payment_method_id:
    type: string
    string_semantics: short
  nv_exchange_delivered_order_items_item_ids_item:
    type: entity_ref
    target: Variant
  nv_exchange_delivered_order_items_item_ids:
    type: array
    items:
      value_ref: nv_exchange_delivered_order_items_item_ids_item
  nv_exchange_delivered_order_items_new_item_ids_item:
    type: entity_ref
    target: Variant
  nv_exchange_delivered_order_items_new_item_ids:
    type: array
    items:
      value_ref: nv_exchange_delivered_order_items_new_item_ids_item
  nv_exchange_delivered_order_items_payment_method_id:
    type: string
    string_semantics: short
  nv_return_delivered_order_items_item_ids_item:
    type: entity_ref
    target: Variant
  nv_return_delivered_order_items_item_ids:
    type: array
    items:
      value_ref: nv_return_delivered_order_items_item_ids_item
  nv_return_delivered_order_items_payment_method_id:
    type: string
    string_semantics: short
  nv_modify_user_address_address1:
    type: string
    string_semantics: short
  nv_modify_user_address_address2:
    type: string
    string_semantics: short
  nv_modify_user_address_city:
    type: string
    string_semantics: short
  nv_modify_user_address_state:
    type: string
    string_semantics: short
  nv_modify_user_address_country:
    type: string
    string_semantics: short
  nv_modify_user_address_zip:
    type: string
    string_semantics: short
