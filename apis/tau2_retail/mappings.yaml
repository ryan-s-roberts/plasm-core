# Synthetic HTTP surface for τ² retail tools.
# Intended for a future shim: one path segment per tool + primary id in the last segment when applicable.
# POST bodies carry non-id arguments (updates, actions, queries, creates).

# --- GET-by-id (single trailing path var = entity id; runtime maps `id` env → var name) ---

get_order_details:
  response: single
  method: POST
  path:
    - type: literal
      value: v1
    - type: literal
      value: tau2
    - type: literal
      value: retail
    - type: literal
      value: get_order_details
    - type: var
      name: order_id

get_user_details:
  response: single
  method: POST
  path:
    - type: literal
      value: v1
    - type: literal
      value: tau2
    - type: literal
      value: retail
    - type: literal
      value: get_user_details
    - type: var
      name: user_id

get_product_details:
  response: single
  method: POST
  path:
    - type: literal
      value: v1
    - type: literal
      value: tau2
    - type: literal
      value: retail
    - type: literal
      value: get_product_details
    - type: var
      name: product_id

get_item_details:
  response: single
  method: POST
  path:
    - type: literal
      value: v1
    - type: literal
      value: tau2
    - type: literal
      value: retail
    - type: literal
      value: get_item_details
    - type: var
      name: item_id

list_variants_by_product:
  method: POST
  path:
    - type: literal
      value: v1
    - type: literal
      value: tau2
    - type: literal
      value: retail
    - type: literal
      value: list_variants_by_product
    - type: var
      name: product_id

# --- Queries (JSON body only; no path vars) ---

find_user_id_by_email:
  method: POST
  path:
    - type: literal
      value: v1
    - type: literal
      value: tau2
    - type: literal
      value: retail
    - type: literal
      value: find_user_id_by_email
  body:
    type: object
    fields:
      - - email
        - name: email
          type: var

find_user_id_by_name_zip:
  method: POST
  path:
    - type: literal
      value: v1
    - type: literal
      value: tau2
    - type: literal
      value: retail
    - type: literal
      value: find_user_id_by_name_zip
  body:
    type: object
    fields:
      - - first_name
        - name: first_name
          type: var
      - - last_name
        - name: last_name
          type: var
      - - zip
        - name: zip
          type: var

list_all_product_types:
  method: POST
  path:
    - type: literal
      value: v1
    - type: literal
      value: tau2
    - type: literal
      value: retail
    - type: literal
      value: list_all_product_types
  body:
    type: object
    fields: []

# --- Collection-level creates ---

calculate:
  response: single
  method: POST
  path:
    - type: literal
      value: v1
    - type: literal
      value: tau2
    - type: literal
      value: retail
    - type: literal
      value: calculate
  body:
    type: var
    name: input

transfer_to_human_agents:
