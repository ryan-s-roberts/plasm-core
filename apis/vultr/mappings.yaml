# Vultr public HTTP API v2 — CML. Auth: domain bearer token (Authorization: Bearer <key>).
# List endpoints return { "<resource_key>": [...], "meta": { "total", "links": { "next", "prev" } } }.

# ── Account plane ────────────────────────────────────────────────────────────
account_get:
  method: GET
  path:
    - { type: literal, value: v2 }
    - { type: literal, value: account }
  response:
    single: true
    items_path: [account]

account_bgp_get:
  method: GET
  path:
    - { type: literal, value: v2 }
    - { type: literal, value: account }
    - { type: literal, value: bgp }
  response: single

account_bandwidth_get:
  method: GET
  path:
    - { type: literal, value: v2 }
    - { type: literal, value: account }
    - { type: literal, value: bandwidth }
  response: single

# ── Global catalogs (cursor + per_page) ─────────────────────────────────────
region_query:
  method: GET
  path:
    - { type: literal, value: v2 }
    - { type: literal, value: regions }
  response:
    items: regions
  pagination:
    location: query
    response_prefix: [meta, links]
    stop_when:
      field: next
      eq: ""
    params:
      per_page: { fixed: 100 }
      cursor: { from_response: next }

plan_query:
  method: GET
  path:
    - { type: literal, value: v2 }
    - { type: literal, value: plans }
  response:
    items: plans
  query:
    type: object
    fields:
      - - type
        - type: if
          condition: { type: exists, var: type }
          then_expr: { type: var, name: type }
          else_expr: { type: const, value: null }
      - - os
        - type: if
          condition: { type: exists, var: os }
          then_expr: { type: var, name: os }
          else_expr: { type: const, value: null }
  pagination:
    location: query
    response_prefix: [meta, links]
    stop_when:
      field: next
      eq: ""
    params:
      per_page: { fixed: 100 }
      cursor: { from_response: next }

