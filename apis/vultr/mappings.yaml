    single: true
    items_path: [firewall_rule]

firewallrule_create:
  method: POST
  path:
    - { type: literal, value: v2 }
    - { type: literal, value: firewalls }
    - { type: var, name: firewall_group_id }
    - { type: literal, value: rules }
  body:
    type: object
    fields:
      - - ip_type
        - { type: var, name: ip_type }
      - - protocol
        - { type: var, name: protocol }
      - - subnet
        - { type: var, name: subnet }
      - - subnet_size
        - { type: var, name: subnet_size }
      - - port
        - type: if
          condition: { type: exists, var: port }
          then_expr: { type: var, name: port }
          else_expr: { type: const, value: null }
      - - source
        - type: if
          condition: { type: exists, var: source }
          then_expr: { type: var, name: source }
          else_expr: { type: const, value: null }
      - - notes
        - type: if
          condition: { type: exists, var: notes }
          then_expr: { type: var, name: notes }
          else_expr: { type: const, value: null }
  response:
    single: true
    items_path: [firewall_rule]

firewallrule_delete:
  method: DELETE
  path:
    - { type: literal, value: v2 }
    - { type: literal, value: firewalls }
    - { type: var, name: firewall_group_id }
    - { type: literal, value: rules }
    - { type: var, name: id }
  response: single

