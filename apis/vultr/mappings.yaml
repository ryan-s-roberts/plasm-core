# ── Firewall rules (scoped under a firewall group; compound key on rule) ─
firewallrule_query:
  method: GET
  path:
    - { type: literal, value: v2 }
    - { type: literal, value: firewalls }
    - { type: var, name: firewall_group_id }
    - { type: literal, value: rules }
  response:
    items: firewall_rules
  pagination:
    location: query
    response_prefix: [meta, links]
    stop_when:
      field: next
      eq: ""
    params:
      per_page: { fixed: 100 }
      cursor: { from_response: next }

firewallrule_get:
  method: GET
  path:
    - { type: literal, value: v2 }
