    response_prefix: [meta, links]
    stop_when:
      field: next
      eq: ""
    params:
      per_page: { fixed: 100 }
      cursor: { from_response: next }

application_query:
  method: GET
  path:
    - { type: literal, value: v2 }
    - { type: literal, value: applications }
  response:
    items: applications
  query:
    type: object
    fields:
      - - type
        - type: if
          condition: { type: exists, var: type }
          then_expr: { type: var, name: type }
          else_expr: { type: const, value: null }
  pagination:
