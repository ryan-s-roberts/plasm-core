version: 16

http_backend: https://api.vultr.com

entities:
  Account:
    id_field: email
    description: Vultr account profile and billing flags for the authenticated user
    fields:
      email:
        field_type: string
        required: true
        string_semantics: short
      name:
        field_type: string
        required: false
        string_semantics: short
      balance:
        field_type: number
        required: false
      pending_charges:
        field_type: number
        required: false
      last_payment_amount:
        field_type: number
        required: false
      last_payment_date:
        field_type: date
        value_format: rfc3339
        required: false
      acls:
        field_type: array
        required: false
        items:
          type: string
          string_semantics: short
    relations: {}

  AccountBgp:
    id_field: id
    implicit_request_identity: true
    description: Public BGP status for the authenticated account
    fields:
      enabled:
        field_type: boolean
        required: false
      asn:
        field_type: integer
        required: false
      password:
        field_type: string
        path: pasword
        string_semantics: short
        required: false
    relations: {}

  AccountBandwidth:
    id_field: id
    implicit_request_identity: true
    description: Aggregated bandwidth and usage meters for the authenticated account
    fields:
      usage:
        field_type: json
        path: bandwidth
        required: false
    relations: {}

  Region:
    id_field: id
    description: A Vultr deployment region
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      city:
        field_type: string
        required: false
        string_semantics: short
      country:
        field_type: string
        required: false
        string_semantics: short
      continent:
        field_type: string
        required: false
        string_semantics: short
      options:
        field_type: array
        required: false
        items:
          type: string
          string_semantics: short
      connectivity:
        field_type: array
        required: false
        items:
          type: string
          string_semantics: short
    relations:
      instances:
        target: Instance
        cardinality: many
        materialize:
          kind: query_scoped
          capability: instance_query
          param: region

  Plan:
    id_field: id
    description: A deployable Vultr compute plan and associated pricing
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      vcpu_count:
        field_type: integer
        required: false
      ram:
        field_type: integer
        required: false
      disk:
        field_type: integer
        required: false
      disk_count:
        field_type: integer
        required: false
      bandwidth:
        field_type: integer
        required: false
      type:
        field_type: string
        required: false
        string_semantics: short
      locations:
        field_type: array
        required: false
        items:
          type: string
          string_semantics: short
      monthly_cost:
        field_type: number
        required: false
      hourly_cost:
        field_type: number
        required: false
    relations: {}

  BareMetalPlan:
    id_field: id
    description: A bare metal server plan at Vultr
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      type:
        field_type: string
        required: false
        string_semantics: short
      cpu_count:
        field_type: integer
        required: false
      cpu_threads:
        field_type: integer
        required: false
      cpu_model:
        field_type: string
        required: false
        string_semantics: short
      ram:
        field_type: integer
        required: false
      disk:
        field_type: integer
        required: false
      disk_count:
        field_type: integer
        required: false
      bandwidth:
        field_type: integer
        required: false
      locations:
        field_type: array
        required: false
        items:
          type: string
          string_semantics: short
    relations: {}

  Os:
    id_field: id
    description: A Vultr OS or application image that can be selected at deploy time
    fields:
      id:
        field_type: integer
        required: true
      name:
        field_type: string
        required: false
        string_semantics: short
      arch:
        field_type: string
        required: false
        string_semantics: short
      family:
        field_type: string
        required: false
        string_semantics: short
    relations: {}

  Application:
    id_field: id
    description: A One-Click or Marketplace application image
    fields:
      id:
        field_type: integer
        required: true
      name:
        field_type: string
        required: false
        string_semantics: short
      type:
        field_type: string
        required: false
        string_semantics: short
      vendor:
        field_type: string
        required: false
        string_semantics: short
      short_name:
        field_type: string
        required: false
        string_semantics: short
      deploy_name:
        field_type: string
        required: false
        string_semantics: short
      image_id:
        field_type: string
        required: false
        string_semantics: short
    relations: {}

  BillingLine:
    id_field: id
    description: A line on the account billing or credit history
    fields:
      id:
        field_type: integer
        required: true
      type:
        field_type: string
        required: false
        string_semantics: short
      description:
        field_type: string
        required: false
        string_semantics: short
      amount:
        field_type: number
        required: false
      balance:
        field_type: number
        required: false
      date:
        field_type: date
        value_format: rfc3339
        required: false
    relations: {}

  Invoice:
    id_field: id
    description: A billing invoice or credit document
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      description:
        field_type: string
        required: false
        string_semantics: short
      amount:
        field_type: number
        required: false
      date:
        field_type: date
        value_format: rfc3339
        required: false
    relations: {}

  ApiKey:
    id_field: id
    description: A Vultr account API key row (value is always masked in list and get, except for create)
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      name:
        field_type: string
        required: false
        string_semantics: short
      masked_key:
        field_type: string
        path: api_key
        string_semantics: short
        required: false
      expire:
        field_type: boolean
        required: false
      date_expire:
        field_type: date
        value_format: rfc3339
        required: false
    relations: {}

  User:
    id_field: id
    description: A user account in your Vultr team, with their own API keys and ACLs
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      name:
        field_type: string
        required: false
        string_semantics: short
      first_name:
        field_type: string
        required: false
        string_semantics: short
      last_name:
        field_type: string
        required: false
        string_semantics: short
      email:
        field_type: string
        required: false
        string_semantics: short
      api_enabled:
        field_type: boolean
        required: false
      service_user:
        field_type: boolean
        required: false
      status:
        field_type: boolean
        required: false
      invited_by:
        field_type: string
        required: false
        string_semantics: short
      invited_on:
        field_type: date
        value_format: rfc3339
        required: false
      invite_accepted:
        field_type: boolean
        required: false
      last_activity:
        field_type: date
        value_format: rfc3339
        required: false
      acls:
        field_type: array
        required: false
        items:
          type: string
          string_semantics: short
    relations: {}

  SshKey:
    id_field: id
    description: A public SSH key you can copy onto new server deployments
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      name:
        field_type: string
        required: false
        string_semantics: short
      public_key:
        field_type: string
        path: ssh_key
        string_semantics: short
        required: false
      date_created:
        field_type: date
        value_format: rfc3339
        required: false
    relations: {}

  IamPolicy:
    id_field: id
    description: IAM access policy (pre-release API) attached to roles and the account
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      name:
        field_type: string
        required: false
        string_semantics: short
      description:
        field_type: string
        required: false
        string_semantics: short
      version:
        field_type: string
        required: false
        string_semantics: short
      is_system_policy:
        field_type: boolean
        required: false
      date_created:
        field_type: date
        value_format: rfc3339
        required: false
      policy_document:
        field_type: json
        required: false
    relations: {}

  IamRole:
    id_field: id
    description: An IAM role bundling one or more policies
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      name:
        field_type: string
        required: false
        string_semantics: short
      description:
        field_type: string
        required: false
        string_semantics: short
      role_type:
        field_type: string
        string_semantics: short
        required: false
      max_session_duration:
        field_type: integer
        required: false
      date_created:
        field_type: date
        value_format: rfc3339
        required: false
      policies:
        field_type: json
        required: false
    relations: {}

  IamGroup:
    id_field: id
    description: An IAM group that bundles users
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      display_name:
        field_type: string
        string_semantics: short
        required: false
      description:
        field_type: string
        required: false
        string_semantics: short
      status:
        field_type: string
        required: false
        string_semantics: short
      last_activity:
        field_type: date
        value_format: rfc3339
        required: false
      date_created:
        field_type: date
        value_format: rfc3339
        required: false
      date_updated:
        field_type: date
        value_format: rfc3339
        required: false
      members:
        field_type: json
        required: false
    relations: {}

  Vpc:
    id_field: id
    description: A per-region private network you attach instances to
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      region:
        field_type: entity_ref
        target: Region
        required: false
      description:
        field_type: string
        required: false
        string_semantics: short
      date_created:
        field_type: date
        value_format: rfc3339
        required: false
      v4_subnet:
        field_type: string
        required: false
        string_semantics: short
      v4_subnet_mask:
        field_type: integer
        required: false
      nodes:
        field_type: json
        required: false
    relations: {}

  FirewallGroup:
    id_field: id
    description: A group of firewall rules that you bind to one or more instances
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      description:
        field_type: string
        required: false
        string_semantics: short
      date_created:
        field_type: date
        value_format: rfc3339
        required: false
      date_modified:
        field_type: date
        value_format: rfc3339
        required: false
      instance_count:
        field_type: integer
        required: false
      rule_count:
        field_type: integer
        required: false
      max_rule_count:
        field_type: integer
        required: false
    relations:
      rules:
        target: FirewallRule
        cardinality: many
        materialize:
          kind: query_scoped
          capability: firewallrule_query
          param: firewall_group_id
      instances:
        target: Instance
        cardinality: many
        materialize:
          kind: query_scoped
          capability: instance_query
          param: firewall_group_id

  Instance:
    id_field: id
    description: A Vultr cloud instance (VPS) in your account
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      label:
        field_type: string
        required: false
        string_semantics: short
      hostname:
        field_type: string
        required: false
        string_semantics: short
      os:
        field_type: string
        required: false
        string_semantics: short
      region:
        field_type: entity_ref
        target: Region
        required: false
      plan:
        field_type: entity_ref
        target: Plan
        required: false
      main_ip:
        field_type: string
        required: false
        string_semantics: short
      status:
        field_type: string
        required: false
        string_semantics: short
      power_status:
        field_type: string
        required: false
        string_semantics: short
      server_status:
        field_type: string
        required: false
        string_semantics: short
      ram:
        field_type: integer
        required: false
      disk:
        field_type: integer
        required: false
      vcpu_count:
        field_type: integer
        required: false
      os_id:
        field_type: entity_ref
        target: Os
        required: false
      app_id:
        field_type: entity_ref
        target: Application
        required: false
      image_id:
        field_type: string
        required: false
        string_semantics: short
      date_created:
        field_type: date
        value_format: rfc3339
        required: false
      allowed_bandwidth:
        field_type: integer
        required: false
      pending_charges:
        field_type: number
        required: false
      firewall_group_id:
        field_type: entity_ref
        target: FirewallGroup
        required: false
      vpcs:
        field_type: json
        required: false
      features:
        field_type: array
        required: false
        items:
          type: string
          string_semantics: short
      tags:
        field_type: array
        required: false
        items:
          type: string
          string_semantics: short
    relations: {}

  ReservedIp:
    id_field: id
    description: A region-scoped reserved or floating IPv4 or IPv6 address
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      region:
        field_type: entity_ref
        target: Region
        required: false
      ip_type:
        field_type: select
        required: false
        allowed_values: [v4, v6]
      subnet:
        field_type: string
        required: false
        string_semantics: short
      subnet_size:
        field_type: integer
        required: false
      label:
        field_type: string
        required: false
        string_semantics: short
      instance_id:
        field_type: entity_ref
        target: Instance
        required: false
    relations: {}

  LoadBalancer:
    id_field: id
    description: A regional L4/L7 load balancer in front of one or more instances
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      label:
        field_type: string
        required: false
        string_semantics: short
      region:
        field_type: entity_ref
        target: Region
        required: false
      status:
        field_type: string
        required: false
        string_semantics: short
      ipv4:
        field_type: string
        required: false
        string_semantics: short
      ipv6:
        field_type: string
        required: false
        string_semantics: short
      date_created:
        field_type: date
        value_format: rfc3339
        required: false
      pending_charges:
        field_type: number
        required: false
      has_ssl:
        field_type: boolean
        required: false
      http2:
        field_type: boolean
        required: false
      http3:
        field_type: boolean
        required: false
      nodes:
        field_type: integer
        required: false
      cname:
        field_type: string
        required: false
        string_semantics: short
      generic_info:
        field_type: json
        path: generic_info
        required: false
      health_check:
        field_type: json
        path: health_check
        required: false
      forwarding_rules:
        field_type: json
        path: forwarding_rules
        required: false
      node_ips:
        field_type: json
        path: node_ips
        required: false
    relations: {}

  FirewallRule:
    id_field: id
    key_vars: [firewall_group_id, id]
    description: A single rule inside a firewall group, scoped to that group
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      firewall_group_id:
        field_type: entity_ref
        target: FirewallGroup
        required: true
      kind:
        field_type: select
        path: type
        required: false
        allowed_values: [v4, v6]
      ip_type:
        field_type: select
        required: false
        allowed_values: [v4, v6]
      action:
        field_type: string
        required: false
        string_semantics: short
      protocol:
        field_type: select
        required: false
        allowed_values: [tcp, udp, icmp, gre, esp, ah]
      port:
        field_type: string
        required: false
        string_semantics: short
      subnet:
        field_type: string
        required: false
        string_semantics: short
      subnet_size:
        field_type: integer
        required: false
      source:
        field_type: string
        required: false
        string_semantics: short
      notes:
        field_type: string
        required: false
        string_semantics: short
    relations: {}

  Snapshot:
    id_field: id
    description: A point-in-time block snapshot of a compute instance or imported image
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      date_created:
        field_type: date
        value_format: rfc3339
        required: false
      description:
        field_type: string
        required: false
        string_semantics: short
      size:
        field_type: integer
        required: false
      compressed_size:
        field_type: integer
        required: false
      status:
        field_type: string
        required: false
        string_semantics: short
      os_id:
        field_type: entity_ref
        target: Os
        required: false
      app_id:
        field_type: entity_ref
        target: Application
        required: false
    relations: {}

  BlockStorage:
    id_field: id
    description: A block volume that can be attached to a compute instance in one region
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      date_created:
        field_type: date
        value_format: rfc3339
        required: false
      cost:
        field_type: number
        required: false
      status:
        field_type: select
        required: false
        allowed_values: [pending, active]
      size_gb:
        field_type: integer
        required: false
      region:
        field_type: entity_ref
        target: Region
        required: false
      attached_to_instance:
        field_type: entity_ref
        target: Instance
        required: false
      label:
        field_type: string
        required: false
        string_semantics: short
      mount_id:
        field_type: string
        required: false
        string_semantics: short
      block_type:
        field_type: select
        required: false
        allowed_values: [high_perf, storage_opt]
    relations: {}

  Iso:
    id_field: id
    description: A private ISO image in the account, or a catalog entry used when deploying
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      date_created:
        field_type: date
        value_format: rfc3339
        required: false
      filename:
        field_type: string
        required: false
        string_semantics: short
      size:
        field_type: integer
        required: false
      md5sum:
        field_type: string
        required: false
        string_semantics: short
      status:
        field_type: string
        required: false
        string_semantics: short
    relations: {}

  StartupScript:
    id_field: id
    description: A user-supplied script executed on first boot (payload is base64 on the wire)
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      date_created:
        field_type: date
        value_format: rfc3339
        required: false
      date_modified:
        field_type: date
        value_format: rfc3339
        required: false
      name:
        field_type: string
        required: false
        string_semantics: short
      type:
        field_type: select
        required: false
        allowed_values: [boot, pxe]
      script:
        field_type: blob
        required: false
    relations: {}

  Backup:
    id_field: id
    description: An automatic backup of an instance as retained by the platform
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      date_created:
        field_type: date
        value_format: rfc3339
        required: false
      description:
        field_type: string
        required: false
        string_semantics: short
      size:
        field_type: integer
        required: false
      status:
        field_type: string
        required: false
        string_semantics: short
      os_id:
        field_type: entity_ref
        target: Os
        required: false
      app_id:
        field_type: entity_ref
        target: Application
        required: false
    relations: {}

  DnsDomain:
    id_field: domain
    description: A DNS zone hosted on Vultr
    fields:
      domain:
        field_type: string
        required: true
        string_semantics: short
      date_created:
        field_type: date
        value_format: rfc3339
        required: false
      dns_sec:
        field_type: string
        required: false
        string_semantics: short
    relations:
      records:
        target: DnsRecord
        cardinality: many
        materialize:
          kind: query_scoped
          capability: dnsrecord_query
          param: domain

  DnsRecord:
    id_field: id
    key_vars: [domain, id]
    description: A single DNS record row inside a domain zone
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      domain:
        field_type: entity_ref
        target: DnsDomain
        required: true
      type:
        field_type: select
        required: false
        allowed_values: [A, AAAA, CNAME, NS, MX, SRV, TXT, CAA, SSHFP]
      name:
        field_type: string
        required: false
        string_semantics: short
      data:
        field_type: string
        required: false
        string_semantics: short
      priority:
        field_type: integer
        required: false
      ttl:
        field_type: integer
        required: false
    relations: {}

  ObjectStorage:
    id_field: id
    description: S3-compatible object storage subscription in a cluster and region
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      date_created:
        field_type: date
        value_format: rfc3339
        required: false
      cluster_id:
        field_type: integer
        required: false
      region:
        field_type: entity_ref
        target: Region
        required: false
      label:
        field_type: string
        required: false
        string_semantics: short
      status:
        field_type: string
        required: false
        string_semantics: short
      s3_hostname:
        field_type: string
        required: false
        string_semantics: short
      s3_access_key:
        field_type: string
        required: false
        string_semantics: short
      s3_secret_key:
        field_type: string
        required: false
        string_semantics: short
      pending_charges:
        field_type: number
        required: false
    relations: {}

  ManagedDatabase:
    id_field: id
    description: A managed MySQL, PostgreSQL, Valkey, or Kafka cluster
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      date_created:
        field_type: date
        value_format: rfc3339
        required: false
      plan:
        field_type: string
        required: false
        string_semantics: short
      plan_disk:
        field_type: integer
        required: false
      plan_ram:
        field_type: integer
        required: false
      plan_vcpus:
        field_type: integer
        required: false
      plan_replicas:
        field_type: integer
        required: false
      region:
        field_type: entity_ref
        target: Region
        required: false
      database_engine:
