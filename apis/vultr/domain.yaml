version: 17
http_backend: https://api.vultr.com
entities:
  Account:
    id_field: email
    description: Vultr account profile and billing flags for the authenticated user
    fields:
      email:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_wire_str_short
      balance:
        required: false
        value_ref: nv_wire_num
      pending_charges:
        required: false
        value_ref: nv_wire_num
      last_payment_amount:
        required: false
        value_ref: nv_wire_num
      last_payment_date:
        required: false
        value_ref: nv_wire_date_rfc3339
      acls:
        required: false
        value_ref: nv_account_acls
    relations: {}
  AccountBgp:
    id_field: id
    implicit_request_identity: true
    description: Public BGP status for the authenticated account
    fields:
      enabled:
        required: false
        value_ref: nv_wire_bool
      asn:
        required: false
        value_ref: nv_wire_int
      password:
        required: false
        path: pasword
        value_ref: nv_wire_str_short
    relations: {}
  AccountBandwidth:
    id_field: id
    implicit_request_identity: true
    description: Aggregated bandwidth and usage meters for the authenticated account
    fields:
      usage:
        required: false
        path: bandwidth
        value_ref: nv_account_bandwidth_usage
    relations: {}
  Region:
    id_field: id
    description: A Vultr deployment region
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      city:
        required: false
        value_ref: nv_wire_str_short
      country:
        required: false
        value_ref: nv_wire_str_short
      continent:
        required: false
        value_ref: nv_wire_str_short
      options:
        required: false
        value_ref: nv_region_options
      connectivity:
        required: false
        value_ref: nv_region_connectivity
    relations:
      instances:
        target: Instance
        cardinality: many
        materialize:
          kind: query_scoped
          capability: instance_query
          param: region
  Plan:
    id_field: id
    description: A deployable Vultr compute plan and associated pricing
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      vcpu_count:
        required: false
        value_ref: nv_wire_int
      ram:
        required: false
