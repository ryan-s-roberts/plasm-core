      type: string
      required: true
      string_semantics: short
  baremetal_vnc:
    kind: action
    entity: BareMetal
    provides:
    - vnc_url
  baremetal_vpc_attach:
    kind: action
    entity: BareMetal
    output:
      type: side_effect
      description: Joins this server to a VPC for private network traffic.
    parameters:
    - name: vpc_id
      type: entity_ref
      target: Vpc
      required: true
  baremetal_vpc_detach:
    kind: action
    entity: BareMetal
    output:
      type: side_effect
      description: Removes this server from a previously attached VPC.
    parameters:
    - name: vpc_id
      type: entity_ref
      target: Vpc
      required: true

auth:
  scheme: bearer_token
  env: VULTR_API_KEY
