version: 16
http_backend: https://api.vultr.com
entities:
  Account:
    id_field: email
    description: Vultr account profile and billing flags for the authenticated user
    fields:
      email:
        required: true
        value_ref: nv_account_email
      name:
        required: false
        value_ref: nv_account_name
      balance:
        required: false
        value_ref: nv_account_balance
      pending_charges:
        required: false
        value_ref: nv_account_pending_charges
      last_payment_amount:
        required: false
        value_ref: nv_account_last_payment_amount
      last_payment_date:
        required: false
        value_ref: nv_account_last_payment_date
      acls:
        required: false
        value_ref: nv_account_acls
    relations: {}
  AccountBgp:
    id_field: id
    implicit_request_identity: true
    description: Public BGP status for the authenticated account
    fields:
      enabled:
        required: false
        value_ref: nv_account_bgp_enabled
      asn:
        required: false
        value_ref: nv_account_bgp_asn
      password:
        required: false
        path: pasword
        value_ref: nv_account_bgp_password
    relations: {}
  AccountBandwidth:
    id_field: id
    implicit_request_identity: true
    description: Aggregated bandwidth and usage meters for the authenticated account
    fields:
      usage:
        required: false
        path: bandwidth
        value_ref: nv_account_bandwidth_usage
    relations: {}
  Region:
    id_field: id
    description: A Vultr deployment region
    fields:
      id:
        required: true
        value_ref: nv_region_id
      city:
        required: false
        value_ref: nv_region_city
      country:
        required: false
        value_ref: nv_region_country
      continent:
        required: false
        value_ref: nv_region_continent
      options:
        required: false
        value_ref: nv_region_options
      connectivity:
        required: false
        value_ref: nv_region_connectivity
    relations:
      instances:
        target: Instance
        cardinality: many
        materialize:
          kind: query_scoped
          capability: instance_query
          param: region
  Plan:
    id_field: id
    description: A deployable Vultr compute plan and associated pricing
    fields:
      id:
        required: true
        value_ref: nv_plan_id
      vcpu_count:
        required: false
        value_ref: nv_plan_vcpu_count
      ram:
        required: false
        value_ref: nv_plan_ram
      disk:
        required: false
        value_ref: nv_plan_disk
      disk_count:
        required: false
        value_ref: nv_plan_disk_count
      bandwidth:
        required: false
        value_ref: nv_plan_bandwidth
      type:
        required: false
        value_ref: nv_plan_type
      locations:
        required: false
        value_ref: nv_plan_locations
      monthly_cost:
        required: false
        value_ref: nv_plan_monthly_cost
      hourly_cost:
        required: false
        value_ref: nv_plan_hourly_cost
