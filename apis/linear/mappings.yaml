      - - query
        - type: const
          value: 'query($id: String!){ issue(id: $id) { id identifier title description parent { id identifier title description } children(first: 250, includeArchived: true) { nodes { id identifier title description } pageInfo { hasNextPage endCursor } } team { id name key } project { id name slugId } assignee { id name displayName email } state { id name type } cycle { id number startsAt endsAt team { id name key } } labels { nodes { id name color } } } }'
      - - variables
