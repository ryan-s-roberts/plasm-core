# Linear GraphQL — transport: graphql, POST /graphql.
# Name resolution (team key, issue identifier, state/label names) happens in CML; agents use strings/keys.

issue_search:
  transport: graphql
  method: POST
  path:
    - type: literal
      value: graphql
  body:
    type: object
    fields:
      - - query
        - type: const
          value: 'query($first: Int, $after: String, $filter: IssueFilter) { issues(first: $first, after: $after, filter: $filter) { nodes { id identifier title priority } pageInfo { hasNextPage endCursor } } }'
      - - variables
        - type: object
          fields:
            - - filter
              - type: object
                fields:
                  - - team
                    - type: if
                      condition: { type: exists, var: team_key }
                      then_expr:
                        type: object
                        fields:
                          - - key
                            - type: object
                              fields:
                                - - eq
                                  - type: var
                                    name: team_key
                      else_expr: { type: const, value: null }
                  - - state
                    - type: if
                      condition: { type: exists, var: state_name }
                      then_expr:
                        type: object
                        fields:
                          - - name
                            - type: object
                              fields:
                                - - eq
                                  - type: var
                                    name: state_name
                      else_expr: { type: const, value: null }
                  - - assignee
                    - type: if
                      condition: { type: exists, var: assignee_name }
                      then_expr:
                        type: object
                        fields:
                          - - displayName
                            - type: object
                              fields:
                                - - eq
                                  - type: var
                                    name: assignee_name
                      else_expr: { type: const, value: null }
                  - - cycle
                    - type: if
                      condition: { type: exists, var: cycle }
                      then_expr:
                        type: object
                        fields:
                          - - id
                            - type: object
                              fields:
                                - - eq
                                  - type: var
                                    name: cycle
                      else_expr: { type: const, value: null }
                  - - title
                    - type: if
                      condition: { type: exists, var: q }
                      then_expr:
                        type: object
                        fields:
                          - - contains
                            - type: var
                              name: q
                      else_expr: { type: const, value: null }
                  - - priority
                    - type: if
                      condition: { type: exists, var: priority }
                      then_expr:
                        type: object
                        fields:
                          - - eq
                            - type: var
                              name: priority
                      else_expr: { type: const, value: null }
            - - first
              - type: const
                value: 50
            - - after
              - type: if
                condition: { type: exists, var: after }
                then_expr: { type: var, name: after }
                else_expr: { type: const, value: null }
  response:
    items_path: [data, issues, nodes]
  pagination:
    location: body
    body_merge_path: [variables]
    response_prefix: [data, issues, pageInfo]
    params:
      first: {fixed: 50}
      after: {from_response: endCursor}
    stop_when:
      field: hasNextPage
      eq: false

issue_get:
  transport: graphql
  method: POST
  path:
    - type: literal
      value: graphql
  body:
    type: object
    fields:
      - - query
        - type: const
          value: 'query($id: String!){ issue(id: $id) { id identifier title description priority estimate dueDate parent { id identifier title } children(first: 50, includeArchived: true) { nodes { id identifier title } } team { id key name } project { id name slugId } assignee { id name displayName email } state { id name type } cycle { id number startsAt endsAt } labels { nodes { id name color } } } }'
      - - variables
        - type: object
          fields:
            - - id
              - type: var
                name: id
  response:
    single: true
    items_path: [data, issue]

