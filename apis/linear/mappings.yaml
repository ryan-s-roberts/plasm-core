      - - variables
        - type: object
          fields:
            - - id
              - type: var
                name: id
            - - input
              - type: object
                fields:
                  - - title
                    - type: if
                      condition: { type: exists, var: title }
                      then_expr: { type: var, name: title }
                      else_expr: { type: const, value: null }
                  - - description
                    - type: if
                      condition: { type: exists, var: description }
                      then_expr: { type: var, name: description }
                      else_expr: { type: const, value: null }
                  - - projectId
                    - type: if
                      condition: { type: exists, var: project }
                      then_expr: { type: var, name: project }
                      else_expr: { type: const, value: null }
                  - - assigneeId
                    - type: if
                      condition: { type: exists, var: assignee }
                      then_expr: { type: var, name: assignee }
                      else_expr: { type: const, value: null }
                  - - stateId
                    - type: if
                      condition: { type: exists, var: state }
                      then_expr: { type: var, name: state }
                      else_expr: { type: const, value: null }
                  - - parentId
                    - type: if
                      condition: { type: exists, var: parent }
                      then_expr: { type: var, name: parent }
                      else_expr: { type: const, value: null }
                  - - cycleId
                    - type: if
                      condition: { type: exists, var: cycle }
