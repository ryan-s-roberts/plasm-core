issue_create:
  transport: graphql
  method: POST
  path:
    - type: literal
      value: graphql
  body:
    type: object
    fields:
      - - query
        - type: const
          value: 'mutation($input: IssueCreateInput!){ issueCreate(input: $input) { success issue { id identifier title description state { id name type } cycle { id number startsAt endsAt } parent { id identifier title description } children(first: 250, includeArchived: true) { nodes { id identifier title description } pageInfo { hasNextPage endCursor } } } } }'
      - - variables
        - type: object
          fields:
            - - input
              - type: object
                fields:
                  - - teamId
                    - type: var
                      name: team
                  - - title
                    - type: var
                      name: title
                  - - description
                    - type: if
                      condition: { type: exists, var: description }
                      then_expr: { type: var, name: description }
                      else_expr: { type: const, value: null }
                  - - projectId
                    - type: if
                      condition: { type: exists, var: project }
                      then_expr: { type: var, name: project }
                      else_expr: { type: const, value: null }
                  - - assigneeId
                    - type: if
                      condition: { type: exists, var: assignee }
                      then_expr: { type: var, name: assignee }
                      else_expr: { type: const, value: null }
                  - - stateId
                    - type: if
                      condition: { type: exists, var: state }
                      then_expr: { type: var, name: state }
                      else_expr: { type: const, value: null }
                  - - parentId
                    - type: if
                      condition: { type: exists, var: parent }
                      then_expr: { type: var, name: parent }
                      else_expr: { type: const, value: null }
                  - - cycleId
                    - type: if
                      condition: { type: exists, var: cycle }
                      then_expr: { type: var, name: cycle }
                      else_expr: { type: const, value: null }
  response:
    single: true
    items_path: [data, issueCreate, issue]

