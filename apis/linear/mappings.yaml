# Linear GraphQL — `transport: graphql`, POST `/graphql`.
# GraphQL connections: `first` / `after`, `pageInfo.hasNextPage` / `endCursor`; `response_prefix` + `body_merge_path: [variables]`.

issue_query:
  transport: graphql
  method: POST
  path:
    - type: literal
      value: graphql
  body:
    type: object
    fields:
      - - query
        - type: const
          value: 'query($first: Int, $after: String) { issues(first: $first, after: $after) { nodes { id identifier title parent { id identifier title } } pageInfo { hasNextPage endCursor } } }'
      - - variables
        - type: object
          fields: []
  response:
    items_path: [data, issues, nodes]
  pagination:
    location: body
    body_merge_path: [variables]
    response_prefix: [data, issues, pageInfo]
    params:
      first: {fixed: 50}
      after: {from_response: endCursor}
    stop_when:
      field: hasNextPage
      eq: false

issue_by_team_query:
  transport: graphql
  method: POST
  path:
    - type: literal
      value: graphql
  body:
    type: object
    fields:
      - - query
        - type: const
          value: 'query($first: Int, $after: String, $team: ID!) { issues(first: $first, after: $after, filter: { team: { id: { eq: $team } } }) { nodes { id identifier title parent { id identifier title } } pageInfo { hasNextPage endCursor } } }'
      - - variables
        - type: object
          fields:
            - - team
              - type: var
                name: team
  response:
    items_path: [data, issues, nodes]
  pagination:
    location: body
    body_merge_path: [variables]
    response_prefix: [data, issues, pageInfo]
    params:
      first: {fixed: 50}
      after: {from_response: endCursor}
    stop_when:
      field: hasNextPage
      eq: false

