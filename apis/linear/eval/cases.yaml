# Linear — task-oriented NL eval (name-centric: identifiers, team keys, filter strings).
#
- id: lin-01
  schema: linear
  goal: "Show open bugs in team ENG"
  tags: [search]
  covers: [search_text, query_filtered]
  reference_expr: Issue.search(q=bug, team_key=ENG)
  expect:
    entities_any: [Issue]

- id: lin-02
  schema: linear
  goal: "Get issue ENG-42"
  tags: [get]
  covers: [get]
  reference_expr: Issue(ENG-42)
  expect:
    entities_any: [Issue]

- id: lin-03
  schema: linear
  goal: "What is ENG-42 and its comments?"
  tags: [get, multi_step]
  covers: [get, multi_step]
  reference_expr: IssueContext(ENG-42)
  expect:
    entities_any: [IssueContext, Issue, Comment]

- id: lin-04
  schema: linear
  goal: "What should I work on?"
  tags: [multi_step]
  covers: [multi_step, query_filtered]
  reference_expr: MyWorkSnapshot
  expect:
    entities_any: [MyWorkSnapshot, Issue]

- id: lin-05
  schema: linear
  goal: "List workflow columns for team ENG"
  tags: [query]
  covers: [query_filtered]
  reference_expr: WorkflowState{team_key=ENG}
  expect:
    entities_any: [WorkflowState]

- id: lin-06
  schema: linear
  goal: "Create issue titled Sprint task on team ENG"
  tags: [create]
  covers: [create]
  reference_expr: Issue.create(team=Team(ENG), title=Sprint task)
  expect:
    entities_any: [Issue]

- id: lin-07
  schema: linear
  goal: "Rename issue ENG-42 to Renamed"
  tags: [update]
  covers: [update]
  reference_expr: Issue(ENG-42).update(title=Renamed)
  expect:
    entities_any: [Issue]

- id: lin-08
  schema: linear
  goal: "Trash issue ENG-42"
  tags: [delete]
  covers: [delete]
  reference_expr: Issue(ENG-42).delete
  expect:
    entities_any: [Issue]

- id: lin-09
  schema: linear
  goal: "Comment on ENG-42 with body LGTM"
  tags: [create]
  covers: [create]
  reference_expr: Comment.create(issue=Issue(ENG-42), body=LGTM)
  expect:
    entities_any: [Comment]

- id: lin-10
  schema: linear
  goal: "List all teams"
  tags: [query]
  covers: [projection]
  expect:
    entities_any: [Team]

- id: lin-11
  schema: linear
  goal: "Share the Linear web URL for ENG-42"
  tags: [view]
  covers: [get]
  reference_expr: IssueNavigationLink(ENG-42)
  expect:
    entities_any: [IssueNavigationLink]

- id: lin-12
  schema: linear
  goal: "List issues for team ENG across pages"
  tags: [search, pagination]
  covers: [page_next, search_text, query_filtered]
  reference_expr: Issue.search(team_key=ENG)
  expect:
    entities_any: [Issue]

- id: lin-13
  schema: linear
  goal: "Find projects matching Mobile"
  tags: [search]
  covers: [search_text]
  reference_expr: Project.search(q=Mobile)
  expect:
    entities_any: [Project]

- id: lin-14
  schema: linear
  goal: "Show project status updates for a project"
  tags: [view, multi_step]
  covers: [multi_step, get]
  expect:
    entities_any: [ProjectContext, ProjectUpdate]

- id: lin-15
  schema: linear
  goal: "Search documents for API spec"
  tags: [search]
  covers: [search_text]
  reference_expr: Document.search(q=API spec)
  expect:
    entities_any: [Document]

- id: lin-16
  schema: linear
  goal: "Open issue ENG-42 then show assignee"
  tags: [chain]
  covers: [chain, get]
  reference_expr: Issue(ENG-42).assignee
  expect:
    entities_any: [Issue, User]

- id: lin-17
  schema: linear
  goal: "List sprint cycles for team ENG"
  tags: [query]
  covers: [query_filtered]
  reference_expr: Cycle{team_key=ENG}
  expect:
    entities_any: [Cycle, Team]

- id: lin-18
  schema: linear
  goal: "Browse all issue labels"
  tags: [query]
  covers: [query_all, projection]
  expect:
    entities_any: [Label]

- id: lin-19
  schema: linear
  goal: "List strategic initiatives"
  tags: [query]
  covers: [query_all]
  expect:
    entities_any: [Initiative]

- id: lin-20
  schema: linear
  goal: "List milestones on a project"
  tags: [query]
  covers: [query_filtered]
  expect:
    entities_any: [ProjectMilestone]

- id: lin-21
  schema: linear
  goal: "Show cycle board for an iteration"
  tags: [view]
  covers: [multi_step]
  expect:
    entities_any: [CycleBoardSnapshot, Issue, Cycle]

- id: lin-22
  schema: linear
  goal: "Open ENG-42 and show its team"
  tags: [chain, reverse]
  covers: [reverse, chain, get]
  reference_expr: Issue(ENG-42).team
  expect:
    entities_any: [Issue, Team]

- id: lin-23
  schema: linear
  goal: "List issues in the workspace"
  tags: [search]
  covers: [query_all, search_text]
  reference_expr: Issue.search
  expect:
    entities_any: [Issue]
