version: 6
http_backend: https://api.linear.app
entities:
  Team:
    id_field: id
    description: A Linear team (workspace grouping).
    fields:
      id:
        required: true
        value_ref: nv_team_id
      name:
        required: false
        value_ref: nv_wire_str_short
      key:
        required: false
        value_ref: nv_team_key
    relations: {}
  Project:
    id_field: id
    description: A Linear project within a team.
    fields:
      id:
        required: true
        value_ref: nv_project_id
      name:
        required: false
        value_ref: nv_wire_str_short
      slugId:
        required: false
        value_ref: nv_project_slug_id
    relations: {}
  Cycle:
    id_field: id
    description: A time-boxed iteration on a team (sprint / cycle window).
    fields:
      id:
        required: true
        value_ref: nv_cycle_id
      number:
        required: false
        value_ref: nv_cycle_number
      startsAt:
        required: false
        value_ref: nv_cycle_starts_at
      endsAt:
        required: false
        value_ref: nv_cycle_ends_at
    relations:
      team:
        target: Team
        cardinality: one
        description: Team this cycle belongs to.
  User:
    id_field: id
    description: A Linear user.
    fields:
      id:
        required: true
        value_ref: nv_user_id
      name:
        required: false
        value_ref: nv_wire_str_short
      displayName:
        required: false
        value_ref: nv_wire_str_short
      email:
        required: false
        value_ref: nv_wire_str_short
    relations: {}
  WorkflowState:
    id_field: id
    description: A workflow column/state for a team (backlog, in progress, done, …).
    fields:
      id:
        required: true
        value_ref: nv_workflow_state_id
      name:
        required: false
        value_ref: nv_wire_str_short
      type:
        required: false
        value_ref: nv_workflow_state_type
      position:
        required: false
        value_ref: nv_workflow_state_position
    relations: {}
  Label:
    id_field: id
    description: An issue label.
    fields:
      id:
        required: true
        value_ref: nv_label_id
      name:
        required: false
        value_ref: nv_wire_str_short
      color:
        required: false
        value_ref: nv_wire_str_short
    relations: {}
  Comment:
    id_field: id
    description: A comment on an issue.
    fields:
      id:
        required: true
        value_ref: nv_comment_id
      body:
        required: false
        value_ref: nv_wire_str_markdown
    relations:
      issue:
        target: Issue
        cardinality: one
        description: Issue this comment belongs to.
  Issue:
    id_field: id
    description: A Linear issue (task, bug, or feature).
    fields:
      id:
        required: true
        value_ref: nv_issue_id
      identifier:
        required: false
        value_ref: nv_issue_identifier
      title:
        required: false
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
    relations:
      team:
        target: Team
        cardinality: one
        description: Owning team.
      project:
        target: Project
        cardinality: one
        description: Project this issue belongs to.
      assignee:
        target: User
        cardinality: one
        description: User assigned to the issue.
      state:
        target: WorkflowState
        cardinality: one
        description: Current workflow state.
      cycle:
        target: Cycle
        cardinality: one
        description: Iteration cycle when the issue is scheduled into one.
      labels:
        target: Label
        cardinality: many
        description: Labels on this issue.
        materialize:
          kind: from_parent_get
          path:
          - key: labels
          - key: nodes
          - wildcard: true
      parent:
        target: Issue
        cardinality: one
        description: Parent issue when this issue is a sub-issue (otherwise absent).
      children:
        target: Issue
        cardinality: many
        description: Sub-issues nested directly under this issue in the work hierarchy.
        materialize:
          kind: from_parent_get
          path:
          - key: children
          - key: nodes
          - wildcard: true
  IssueNavigationLink:
    id_field: issue_id
    primary_read: issue_navigation_link_get
    description: Shareable Linear web URL for an issue.
    fields:
      issue_id:
        required: true
        value_ref: nv_issue_id
      identifier:
        required: false
        value_ref: nv_issue_identifier
      title:
        required: false
        value_ref: nv_wire_str_short
      url:
        required: false
        value_ref: nv_linear_issue_url
    relations:
      issue:
        target: Issue
        cardinality: one
  CycleBoardSnapshot:
    id_field: cycle_id
    primary_read: cycle_board_snapshot_get
    description: Cycle metadata plus issues scheduled in that iteration (sprint board pattern).
    fields:
      cycle_id:
        required: true
        value_ref: nv_cycle_id
      number:
        required: false
        value_ref: nv_cycle_number
      startsAt:
        required: false
        value_ref: nv_cycle_starts_at
      endsAt:
        required: false
        value_ref: nv_cycle_ends_at
      issue_count:
        required: false
        value_ref: nv_wire_int
    relations:
      cycle:
        target: Cycle
        cardinality: one
      issues:
        target: Issue
        cardinality: many
capabilities:
  issue_query:
    kind: query
    entity: Issue
    description: List issues in the workspace.
    provides:
    - id
    - identifier
    - title
  issue_by_team_query:
    kind: query
    entity: Issue
    description: List issues for a specific team.
    parameters:
    - name: team
      value_ref: nv_issue_by_team_query_team
      required: true
      role: scope
    provides:
    - id
    - identifier
    - title
  issue_by_cycle_query:
    kind: query
    entity: Issue
    description: List issues scheduled in a specific cycle (iteration).
    parameters:
    - name: cycle
      value_ref: nv_issue_by_cycle_query_cycle
      required: true
      role: scope
    provides:
    - id
    - identifier
    - title
  issue_get:
    kind: get
    entity: Issue
    description: Load one issue with its team, project, assignee, labels, workflow column, cycle, parent, and child issues.
    provides:
    - id
    - identifier
    - title
    - description
    - parent
    - team
    - project
    - assignee
    - state
    - cycle
  team_query:
    kind: query
    entity: Team
    description: List teams.
    provides:
    - id
    - name
    - key
  team_get:
    kind: get
    entity: Team
    description: Fetch one team by id.
    provides:
    - id
    - name
    - key
  project_query:
    kind: query
    entity: Project
    description: List projects.
    provides:
    - id
    - name
    - slugId
  project_get:
    kind: get
    entity: Project
    description: Fetch one project by id.
    provides:
    - id
    - name
    - slugId
  user_query:
    kind: query
    entity: User
    description: List users.
    provides:
    - id
    - name
    - displayName
    - email
  user_get:
    kind: get
    entity: User
    description: Fetch one user by id.
    provides:
    - id
    - name
    - displayName
    - email
  workflow_state_query:
    kind: query
    entity: WorkflowState
    description: List workflow columns for a team—column title, category (e.g. backlog, in progress, done), and sort order.
    parameters:
    - name: team
      value_ref: nv_workflow_state_query_team
      required: true
      role: scope
    provides:
    - id
    - name
    - type
    - position
  workflow_state_get:
    kind: get
    entity: WorkflowState
    description: Fetch one workflow state (column) by id.
    provides:
    - id
    - name
    - type
    - position
  cycle_query:
    kind: query
    entity: Cycle
    description: List iteration cycles for a team (ordered by the API).
    parameters:
    - name: team
      value_ref: nv_cycle_query_team
      required: true
      role: scope
    provides:
    - id
    - number
    - startsAt
    - endsAt
    - team
  cycle_get:
    kind: get
    entity: Cycle
    description: Fetch one cycle by id, including its team.
    provides:
    - id
    - number
    - startsAt
    - endsAt
    - team
  label_query:
    kind: query
    entity: Label
    description: List issue labels.
    provides:
    - id
    - name
    - color
  label_get:
    kind: get
    entity: Label
    description: Fetch one label by id.
    provides:
    - id
    - name
    - color
  comment_query:
    kind: query
    entity: Comment
    description: List comments.
    provides:
    - id
    - body
  comment_get:
    kind: get
    entity: Comment
    description: Fetch one comment by id.
    provides:
    - id
    - body
  issue_create:
    kind: create
    entity: Issue
    description: Create a new issue on a team, optionally in a project, column, cycle, or under a parent issue.
    provides:
    - id
    - identifier
    - title
    - description
    - state
    - cycle
    parameters:
    - name: team
      value_ref: nv_issue_create_team
      required: true
    - name: title
      value_ref: nv_wire_str_short
      required: true
    - name: description
      value_ref: nv_wire_str_markdown
      required: false
    - name: project
      value_ref: nv_issue_create_project
      required: false
    - name: assignee
      value_ref: nv_issue_create_assignee
      required: false
    - name: state
      value_ref: nv_issue_create_state
      required: false
    - name: parent
      value_ref: nv_issue_create_parent
      required: false
    - name: cycle
      value_ref: nv_issue_create_cycle
      required: false
  issue_update:
    kind: update
    entity: Issue
    description: Update an issue
    provides:
    - id
    - identifier
    - title
    - description
    - state
    - cycle
    parameters:
    - name: title
      value_ref: nv_wire_str_short
      required: false
    - name: description
      value_ref: nv_wire_str_markdown
      required: false
    - name: project
      value_ref: nv_issue_update_project
      required: false
    - name: assignee
      value_ref: nv_issue_update_assignee
      required: false
    - name: state
      value_ref: nv_issue_update_state
      required: false
    - name: parent
      value_ref: nv_issue_update_parent
      required: false
    - name: cycle
      value_ref: nv_issue_update_cycle
      required: false
  issue_delete:
    kind: delete
    entity: Issue
    description: Move an issue to trash (recoverable; not a permanent delete).
  comment_create:
    kind: create
    entity: Comment
    description: Add a markdown comment on an issue.
    provides:
    - id
    - body
    parameters:
    - name: issue
      value_ref: nv_comment_create_issue
      required: true
    - name: body
      value_ref: nv_wire_str_markdown
      required: true
  label_create:
    kind: create
    entity: Label
    description: Create an issue label (optionally scoped to a team; omit team for workspace-wide).
    provides:
    - id
    - name
    - color
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: true
    - name: team
      value_ref: nv_label_create_team
      required: false
    - name: color
      value_ref: nv_label_create_color
      required: false
    - name: description
      value_ref: nv_wire_str_markdown
      required: false
  label_update:
    kind: update
    entity: Label
    description: Update label name, color, or description.
    provides:
    - id
    - name
    - color
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: false
    - name: color
      value_ref: nv_wire_str_short
      required: false
    - name: description
      value_ref: nv_wire_str_markdown
      required: false
  project_create:
    kind: create
    entity: Project
    description: Create a project owned by one or more teams.
    provides:
    - id
    - name
    - slugId
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: true
    - name: team
      value_ref: nv_project_create_team
      required: true
    - name: description
      value_ref: nv_wire_str_markdown
      required: false
  workflow_state_create:
    kind: create
    entity: WorkflowState
    description: Create a workflow column on a team.
    provides:
    - id
    - name
    - type
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: true
    - name: team
      value_ref: nv_workflow_state_create_team
      required: true
    - name: state_type
      value_ref: nv_workflow_state_create_state_type
      required: true
    - name: color
      value_ref: nv_workflow_state_create_color
      required: true
    - name: description
      value_ref: nv_wire_str_markdown
      required: false
    - name: position
      value_ref: nv_workflow_state_create_position
      required: false
  issue_add_label:
    kind: update
    entity: Issue
    description: Attach one label to this issue (existing labels kept).
    provides:
    - id
    - identifier
    parameters:
    - name: label
      value_ref: nv_issue_add_label_label
      required: true
  issue_remove_label:
    kind: update
    entity: Issue
    description: Remove one label from this issue.
    provides:
    - id
    - identifier
    parameters:
    - name: label
      value_ref: nv_issue_remove_label_label
      required: true
  issue_navigation_link_query:
    kind: query
    entity: IssueNavigationLink
    description: Assemble the Linear web URL for an issue from its identifier.
    parameters:
    - name: issue_id
      value_ref: nv_issue_navigation_link_issue_id
      required: true
      role: scope
    provides:
    - issue_id
    - identifier
    - title
    - url
  issue_navigation_link_get:
    kind: get
    entity: IssueNavigationLink
    description: Linear web URL when you already hold the issue id.
    provides:
    - issue_id
    - identifier
    - title
    - url
  cycle_board_snapshot_query:
    kind: query
    entity: CycleBoardSnapshot
    description: Load cycle dates and issues in that iteration in one composed read.
    parameters:
    - name: cycle_id
      value_ref: nv_cycle_board_snapshot_cycle_id
      required: true
      role: scope
    provides:
    - cycle_id
    - number
    - startsAt
    - endsAt
    - issue_count
  cycle_board_snapshot_get:
    kind: get
    entity: CycleBoardSnapshot
    description: Cycle board snapshot scoped by cycle id.
    provides:
    - cycle_id
    - number
    - startsAt
    - endsAt
    - issue_count
views:
  issue_navigation_link:
    description: Linear web URL assembled from issue identifier and team key prefix.
    capability: issue_navigation_link_query
    entity: IssueNavigationLink
    scope:
    - name: issue_id
      value_ref: nv_issue_navigation_link_issue_id
    nodes:
    - id: issue_row
      capability: issue_get
      bind:
        id:
          kind: scope
          param: issue_id
    output:
      issue_id:
        kind: scope
        param: issue_id
      identifier:
        kind: node_field
        node: issue_row
        field: identifier
      title:
        kind: node_field
        node: issue_row
        field: title
      url:
        kind: computed
        template: |
          {%- set team_key = identifier.split('-')[0] -%}
          https://linear.app/{{ team_key }}/issue/{{ identifier }}
    relation_outputs:
    - relation: issue
      target: Issue
      cardinality: one
      binding:
        kind: node_single_row
        node: issue_row
  cycle_board_snapshot:
    description: Cycle row plus issues filtered to that iteration (sprint board pattern).
    capability: cycle_board_snapshot_query
    entity: CycleBoardSnapshot
    scope:
    - name: cycle_id
      value_ref: nv_cycle_board_snapshot_cycle_id
    nodes:
    - id: cycle_row
      capability: cycle_get
      bind:
        id:
          kind: scope
          param: cycle_id
    - id: cycle_issues
      capability: issue_by_cycle_query
      bind:
        cycle:
          kind: node_field
          node: cycle_row
          field: id
    output:
      cycle_id:
        kind: scope
        param: cycle_id
      number:
        kind: node_field
        node: cycle_row
        field: number
      startsAt:
        kind: node_field
        node: cycle_row
        field: startsAt
      endsAt:
        kind: node_field
        node: cycle_row
        field: endsAt
      issue_count:
        kind: node_row_count
        node: cycle_issues
    relation_outputs:
    - relation: cycle
      target: Cycle
      cardinality: one
      binding:
        kind: node_single_row
        node: cycle_row
    - relation: issues
      target: Issue
      cardinality: many
      binding:
        kind: node_all_rows
        node: cycle_issues
oauth:
  provider: linear
  scopes:
    read:
      label: Read access (default on OAuth tokens)
      notes: Linear documents read as always present on user OAuth tokens.
      docs_url: https://linear.app/developers/oauth-2-0-authentication
    write:
      label: Broad write access
      docs_url: https://linear.app/developers/oauth-2-0-authentication
    issues:create:
      label: Create issues and attachments
      docs_url: https://linear.app/developers/oauth-2-0-authentication
    comments:create:
      label: Create issue comments
      docs_url: https://linear.app/developers/oauth-2-0-authentication
    timeSchedule:write:
      label: Time schedules write
      docs_url: https://linear.app/developers/oauth-2-0-authentication
    admin:
      label: Admin endpoints
      docs_url: https://linear.app/developers/oauth-2-0-authentication
  default_scope_sets:
    plasm_linear_readonly_core:
      description: Read-heavy automation — query and load issues, teams, projects, users, labels, comments, workflow states,
        and cycles.
      scopes:
      - read
    plasm_linear_contributor_core:
      description: Issue and workspace edits — create and update issues and comments, manage labels, projects, and workflow
        columns (full write surface in this CGS).
      scopes:
      - read
      - write
    plasm_linear_create_focus:
      description: Narrow grant — create issues and comments without broader write access (no issue updates, labels, projects,
        or workflow structure changes).
      scopes:
      - read
      - issues:create
      - comments:create
  requirements:
    capabilities:
      issue_query:
        any_of:
        - read
      issue_by_team_query:
        any_of:
        - read
      issue_by_cycle_query:
        any_of:
        - read
      issue_get:
        any_of:
        - read
      team_query:
        any_of:
        - read
      team_get:
        any_of:
        - read
      project_query:
        any_of:
        - read
      project_get:
        any_of:
        - read
      user_query:
        any_of:
        - read
      user_get:
        any_of:
        - read
      workflow_state_query:
        any_of:
        - read
      workflow_state_get:
        any_of:
        - read
      cycle_query:
        any_of:
        - read
      cycle_get:
        any_of:
        - read
      label_query:
        any_of:
        - read
      label_get:
        any_of:
        - read
      comment_query:
        any_of:
        - read
      comment_get:
        any_of:
        - read
      issue_create:
        any_of:
        - issues:create
        - write
      issue_update:
        any_of:
        - write
      issue_delete:
        any_of:
        - write
      comment_create:
        any_of:
        - comments:create
        - write
      label_create:
        any_of:
        - write
      label_update:
        any_of:
        - write
      project_create:
        any_of:
        - write
      workflow_state_create:
        any_of:
        - write
      issue_add_label:
        any_of:
        - write
      issue_remove_label:
        any_of:
        - write
      issue_navigation_link_query:
        any_of:
        - read
      issue_navigation_link_get:
        any_of:
        - read
      cycle_board_snapshot_query:
        any_of:
        - read
      cycle_board_snapshot_get:
        any_of:
        - read
    relations:
      Issue.team:
        any_of:
        - read
      Issue.project:
        any_of:
        - read
      Issue.assignee:
        any_of:
        - read
      Issue.state:
        any_of:
        - read
      Issue.cycle:
        any_of:
        - read
      Cycle.team:
        any_of:
        - read
      Issue.labels:
        any_of:
        - read
      Issue.parent:
        any_of:
        - read
      Issue.children:
        any_of:
        - read
      IssueNavigationLink.issue:
        any_of:
        - read
      CycleBoardSnapshot.cycle:
        any_of:
        - read
      CycleBoardSnapshot.issues:
        any_of:
        - read
      Comment.issue:
        any_of:
        - read
auth:
  scheme: api_key_header
  header: Authorization
  env: LINEAR_API_TOKEN
  hosted_kv: plasm:outbound:v1:catalog:linear
values:
  nv_issue_navigation_link_issue_id:
    type: entity_ref
    target: Issue
    description: Issue whose Linear web URL to assemble.
  nv_linear_issue_url:
    type: string
    string_semantics: short
    description: Assembled linear.app issue URL from identifier.
  nv_comment_create_issue:
    type: entity_ref
    target: Issue
    description: Issue to attach the comment to.
  nv_comment_id:
    type: uuid
  nv_cycle_ends_at:
    type: string
    string_semantics: short
    description: Cycle end (ISO-8601 timestamp from the API).
  nv_cycle_id:
    type: uuid
  nv_cycle_number:
    type: number
    description: Cycle index within the team (Linear exposes as a number).
  nv_cycle_query_team:
    type: entity_ref
    target: Team
    description: Team whose cycles to list.
  nv_cycle_starts_at:
    type: string
    string_semantics: short
    description: Cycle start (ISO-8601 timestamp from the API).
  nv_issue_add_label_label:
    type: entity_ref
    target: Label
  nv_issue_by_team_query_team:
    type: entity_ref
    target: Team
    description: Team whose issues to list.
  nv_issue_by_cycle_query_cycle:
    type: entity_ref
    target: Cycle
    description: Cycle whose scheduled issues to list.
  nv_cycle_board_snapshot_cycle_id:
    type: entity_ref
    target: Cycle
    description: Cycle id for the board snapshot view scope.
  nv_issue_create_assignee:
    type: entity_ref
    target: User
  nv_issue_create_cycle:
    type: entity_ref
    target: Cycle
    description: Iteration cycle to place the new issue in.
  nv_issue_create_parent:
    type: entity_ref
    target: Issue
    description: Parent issue when creating a sub-issue.
  nv_issue_create_project:
    type: entity_ref
    target: Project
  nv_issue_create_state:
    type: entity_ref
    target: WorkflowState
  nv_issue_create_team:
    type: entity_ref
    target: Team
    description: Team that owns the new issue.
  nv_issue_id:
    type: uuid
  nv_issue_identifier:
    type: string
    string_semantics: short
    description: Human-visible key (e.g. ENG-42).
  nv_issue_remove_label_label:
    type: entity_ref
    target: Label
  nv_issue_update_assignee:
    type: entity_ref
    target: User
  nv_issue_update_cycle:
    type: entity_ref
    target: Cycle
    description: Iteration cycle to assign; omit to leave the cycle unchanged.
  nv_issue_update_parent:
    type: entity_ref
    target: Issue
    description: Issue to nest this under; omit to leave the parent link unchanged.
  nv_issue_update_project:
    type: entity_ref
    target: Project
  nv_issue_update_state:
    type: entity_ref
    target: WorkflowState
  nv_label_create_color:
    type: string
    string_semantics: short
    description: Hex swatch color for the label.
  nv_label_create_team:
