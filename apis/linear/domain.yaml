    type: entity_ref
    target: Issue
    description: Issue anchor (human identifier, e.g. ENG-42).
  nv_issue_id:
    type: uuid
  nv_state_name:
    type: string
    string_semantics: short
    description: Workflow column name (e.g. In Progress).
  nv_label_name:
    type: string
    string_semantics: short
