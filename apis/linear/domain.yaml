version: 9
http_backend: https://api.linear.app
entities:
  Team:
    id_field: key
    description: A Linear team (workspace grouping); agents address teams by short key (e.g. ENG).
    fields:
      id:
        required: true
        value_ref: nv_team_id
      key:
        required: true
        value_ref: nv_team_key
      name:
        required: false
        value_ref: nv_wire_str_short
    relations: {}
  Project:
    id_field: id
    description: A Linear project.
    fields:
      id:
        required: true
        value_ref: nv_project_id
      name:
        required: false
        value_ref: nv_wire_str_short
      slugId:
        required: false
        value_ref: nv_project_slug_id
    relations: {}
  Cycle:
    id_field: id
    description: A time-boxed iteration on a team.
    fields:
      id:
        required: true
        value_ref: nv_cycle_id
      number:
        required: false
        value_ref: nv_cycle_number
      startsAt:
        required: false
        value_ref: nv_cycle_starts_at
      endsAt:
        required: false
        value_ref: nv_cycle_ends_at
    relations:
      team:
        target: Team
        cardinality: one
  User:
    id_field: id
    description: A Linear user.
    fields:
      id:
        required: true
        value_ref: nv_user_id
      name:
        required: false
        value_ref: nv_wire_str_short
      displayName:
        required: false
        value_ref: nv_wire_str_short
      email:
        required: false
        value_ref: nv_wire_str_short
    relations: {}
  WorkflowState:
    id_field: id
    description: A workflow column for a team.
    fields:
      id:
        required: true
        value_ref: nv_workflow_state_id
      name:
        required: false
        value_ref: nv_state_name
      type:
        required: false
        value_ref: nv_workflow_state_type
    relations: {}
  Label:
    id_field: name
    description: An issue label (addressed by name in filters and writes).
    fields:
      id:
        required: true
        value_ref: nv_label_id
      name:
        required: true
        value_ref: nv_label_name
      color:
        required: false
        value_ref: nv_wire_str_short
    relations: {}
  Comment:
    id_field: id
    description: A comment on an issue.
    fields:
      id:
        required: true
        value_ref: nv_comment_id
      body:
        required: false
        value_ref: nv_wire_str_markdown
    relations:
      issue:
        target: Issue
        cardinality: one
  Issue:
    id_field: identifier
    primary_read: issue_get
    description: A Linear issue (task, bug, or feature); use human identifier (e.g. ENG-42).
    fields:
      id:
        required: true
        value_ref: nv_issue_id
      identifier:
        required: true
        value_ref: nv_issue_identifier
      title:
        required: false
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      priority:
        required: false
        value_ref: nv_issue_priority
      estimate:
        required: false
        value_ref: nv_wire_num
      dueDate:
        required: false
        value_ref: nv_wire_str_short
    relations:
      team:
        target: Team
        cardinality: one
      project:
        target: Project
        cardinality: one
      assignee:
        target: User
        cardinality: one
      state:
        target: WorkflowState
        cardinality: one
      cycle:
        target: Cycle
        cardinality: one
      labels:
        target: Label
        cardinality: many
        materialize:
          kind: from_parent_get
          path:
          - key: labels
          - key: nodes
          - wildcard: true
      parent:
        target: Issue
        cardinality: one
      children:
        target: Issue
        cardinality: many
        materialize:
          kind: from_parent_get
          path:
          - key: children
          - key: nodes
          - wildcard: true
      comments:
        target: Comment
        cardinality: many
        materialize:
          kind: query_scoped
          capability: comment_by_issue_query
          param: issue
  Document:
    id_field: id
    description: A Linear document.
    fields:
      id:
        required: true
        value_ref: nv_document_id
      title:
        required: false
        value_ref: nv_wire_str_short
    relations: {}
  Initiative:
    id_field: id
    description: A strategic initiative grouping projects.
    fields:
      id:
        required: true
        value_ref: nv_initiative_id
      name:
        required: false
        value_ref: nv_wire_str_short
    relations: {}
  ProjectMilestone:
    id_field: id
    description: A milestone on a project.
    fields:
      id:
        required: true
        value_ref: nv_project_milestone_id
      name:
        required: false
        value_ref: nv_wire_str_short
    relations:
      project:
        target: Project
        cardinality: one
  ProjectUpdate:
    id_field: id
    description: A status update posted on a project.
    fields:
      id:
        required: true
        value_ref: nv_project_update_id
      body:
        required: false
        value_ref: nv_wire_str_markdown
      health:
        required: false
        value_ref: nv_project_update_health
    relations:
      project:
        target: Project
        cardinality: one
  IssueContext:
    abstract: true
    id_field: issue_identifier
    primary_read: issue_context_get
    description: One issue plus its comments and relation hooks for triage.
    fields:
      issue_identifier:
        required: true
        value_ref: nv_issue_identifier
      title:
        required: false
        value_ref: nv_wire_str_short
      comment_count:
        required: false
        value_ref: nv_wire_int
    relations:
      issue:
        target: Issue
        cardinality: one
      comments:
        target: Comment
        cardinality: many
  MyWorkSnapshot:
    abstract: true
    id_field: viewer_id
    primary_read: my_work_get
    description: Issues assigned to the authenticated user (dashboard).
    fields:
      viewer_id:
        required: true
        value_ref: nv_user_id
      issue_count:
        required: false
        value_ref: nv_wire_int
    relations:
      viewer:
        target: User
        cardinality: one
      issues:
        target: Issue
        cardinality: many
  ProjectContext:
    abstract: true
    id_field: project_id
    primary_read: project_context_get
    description: Project row plus recent status updates.
    fields:
      project_id:
        required: true
        value_ref: nv_project_id
      name:
        required: false
        value_ref: nv_wire_str_short
      update_count:
        required: false
        value_ref: nv_wire_int
    relations:
      project:
        target: Project
        cardinality: one
      updates:
        target: ProjectUpdate
        cardinality: many
  IssueNavigationLink:
    abstract: true
    id_field: issue_identifier
    primary_read: issue_navigation_link_get
    description: Shareable Linear web URL for an issue.
    fields:
      issue_identifier:
        required: true
        value_ref: nv_issue_identifier
      title:
        required: false
        value_ref: nv_wire_str_short
      url:
        required: false
        value_ref: nv_linear_issue_url
    relations:
      issue:
        target: Issue
        cardinality: one
  CycleBoardSnapshot:
    abstract: true
    id_field: cycle_id
    primary_read: cycle_board_snapshot_get
    description: Cycle dates and issues in that iteration.
    fields:
      cycle_id:
        required: true
        value_ref: nv_cycle_id
      number:
        required: false
        value_ref: nv_cycle_number
      issue_count:
        required: false
        value_ref: nv_wire_int
    relations:
      cycle:
        target: Cycle
        cardinality: one
      issues:
        target: Issue
        cardinality: many
capabilities:
  issue_search:
    kind: search
    entity: Issue
    description: Find issues by title text and name-typed filters (team key, state, label, assignee).
    parameters:
    - name: q
      value_ref: nv_issue_search_q
      required: false
      role: search
    - name: team_key
      value_ref: nv_team_key
      required: false
      role: filter
    - name: state_name
      value_ref: nv_state_name
      required: false
      role: filter
    - name: label_name
      value_ref: nv_label_name
      required: false
      role: filter
    - name: assignee_name
      value_ref: nv_assignee_name
      required: false
      role: filter
    - name: priority
      value_ref: nv_issue_priority
      required: false
      role: filter
    - name: project_name
      value_ref: nv_wire_str_short
      required: false
      role: filter
    - name: cycle
      value_ref: nv_cycle_id
      required: false
      role: filter
    provides:
    - identifier
    - title
    - priority
  issue_get:
    kind: get
    entity: Issue
    description: Load one issue by identifier (e.g. ENG-42).
    provides:
    - id
    - identifier
    - title
    - description
    - priority
    - estimate
    - dueDate
    - team
    - project
    - assignee
    - state
    - cycle
    - parent
  user_viewer:
    kind: get
    entity: User
    description: The authenticated Linear user.
    provides:
    - id
    - name
    - displayName
    - email
  user_search:
    kind: search
    entity: User
    description: Find users by display name (exact match on first page).
    parameters:
    - name: display_name
      value_ref: nv_assignee_name
      required: true
      role: search
    provides:
    - id
    - displayName
  team_query:
    kind: query
    entity: Team
    description: List teams.
    provides:
    - key
    - name
  team_get:
    kind: get
    entity: Team
    description: Fetch one team by key (e.g. ENG).
    provides:
    - id
    - key
    - name
  project_query:
    kind: query
    entity: Project
    description: List projects.
    provides:
    - id
    - name
    - slugId
  project_get:
    kind: get
    entity: Project
    description: Fetch one project by id.
    provides:
    - id
    - name
    - slugId
  project_search:
    kind: search
    entity: Project
    description: Find projects by name substring.
    parameters:
    - name: q
      value_ref: nv_wire_str_short
      required: false
      role: search
    provides:
    - id
    - name
    - slugId
  cycle_query:
    kind: query
    entity: Cycle
    description: List cycles for a team (by team key).
    parameters:
    - name: team_key
      value_ref: nv_team_key
      required: true
      role: scope
    provides:
    - id
    - number
    - startsAt
    - endsAt
  cycle_get:
    kind: get
    entity: Cycle
    description: Fetch one cycle by id.
    provides:
    - id
    - number
    - startsAt
    - endsAt
    - team
  workflow_state_query:
    kind: query
    entity: WorkflowState
    description: List workflow columns for a team (by team key).
    parameters:
    - name: team_key
      value_ref: nv_team_key
      required: true
      role: scope
    provides:
    - id
    - name
    - type
  label_query:
    kind: query
    entity: Label
    description: List issue labels.
    provides:
    - name
    - color
  comment_by_issue_query:
    kind: query
    entity: Comment
    description: List comments on an issue (scoped by issue identifier).
    parameters:
    - name: issue
      value_ref: nv_issue_ref
      required: true
      role: scope
    provides:
    - id
    - body
  document_search:
    kind: search
    entity: Document
    description: Find documents by title.
    parameters:
    - name: q
      value_ref: nv_wire_str_short
      required: false
      role: search
    provides:
    - id
    - title
  document_get:
    kind: get
    entity: Document
    description: Fetch one document by id.
    provides:
    - id
    - title
  document_update:
    kind: update
    entity: Document
    description: Update document title or content.
    provides:
    - id
    - title
    parameters:
    - name: title
      value_ref: nv_wire_str_short
      required: false
    - name: content
      value_ref: nv_wire_str_markdown
      required: false
  initiative_query:
    kind: query
    entity: Initiative
    description: List initiatives.
    provides:
    - id
    - name
  initiative_get:
    kind: get
    entity: Initiative
    description: Fetch one initiative by id.
    provides:
    - id
    - name
  initiative_update:
    kind: update
    entity: Initiative
    description: Update initiative name or description.
    provides:
    - id
    - name
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: false
    - name: description
      value_ref: nv_wire_str_markdown
      required: false
  project_milestone_query:
    kind: query
    entity: ProjectMilestone
    description: List milestones on a project.
    parameters:
    - name: project
      value_ref: nv_project_id
      required: true
      role: scope
    provides:
    - id
    - name
  project_milestone_create:
    kind: create
    entity: ProjectMilestone
    description: Create a milestone on a project.
    provides:
    - id
    - name
    parameters:
    - name: project
      value_ref: nv_project_id
      required: true
    - name: name
      value_ref: nv_wire_str_short
      required: true
    - name: description
      value_ref: nv_wire_str_markdown
      required: false
  project_milestone_update:
    kind: update
    entity: ProjectMilestone
    description: Update a project milestone.
    provides:
    - id
    - name
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: false
    - name: description
      value_ref: nv_wire_str_markdown
      required: false
  project_update_query:
    kind: query
    entity: ProjectUpdate
    description: List status updates on a project.
    parameters:
    - name: project
      value_ref: nv_project_id
      required: true
      role: scope
    provides:
    - id
    - body
    - health
  project_update_create:
    kind: create
    entity: ProjectUpdate
    description: Post a project status update.
    provides:
    - id
    - body
    - health
    parameters:
    - name: project
      value_ref: nv_project_id
      required: true
    - name: body
      value_ref: nv_wire_str_markdown
      required: true
    - name: health
      value_ref: nv_project_update_health
      required: false
  issue_create:
    kind: create
    entity: Issue
    description: Create an issue on a team (by team key).
    provides:
    - identifier
    - title
    - state
    parameters:
    - name: team
      value_ref: nv_issue_create_team
      required: true
    - name: title
      value_ref: nv_wire_str_short
      required: true
    - name: description
      value_ref: nv_wire_str_markdown
      required: false
    - name: state_name
      value_ref: nv_state_name
      required: false
    - name: assignee_name
      value_ref: nv_assignee_name
      required: false
    - name: project_name
      value_ref: nv_wire_str_short
      required: false
    - name: parent_identifier
      value_ref: nv_issue_identifier
      required: false
    - name: priority
      value_ref: nv_issue_priority
      required: false
    preflight:
    - kind: hydrate_entity_ref_param
      param: team
      get: team_get
      merge:
        teamId: id
    - kind: query_pick
      when: state_name
      query: workflow_state_query
      scope:
        team_key:
          from_param: team
      pick:
        field: name
        equals_param: state_name
      merge:
        stateId: id
    - kind: query_pick
      when: assignee_name
      query: user_search
      scope:
        display_name:
          from_param: assignee_name
      pick:
        field: displayName
        equals_param: assignee_name
      merge:
        assigneeId: id
    - kind: query_pick
      when: project_name
      query: project_search
      scope:
        q:
          from_param: project_name
      pick:
        field: name
        equals_param: project_name
      merge:
        projectId: id
  issue_update:
    kind: update
    entity: Issue
    description: Update issue fields (state, assignee, labels, priority, …) by identifier.
    provides:
    - identifier
    - title
    - state
    parameters:
    - name: title
      value_ref: nv_wire_str_short
      required: false
    - name: description
      value_ref: nv_wire_str_markdown
      required: false
    - name: state_name
      value_ref: nv_state_name
      required: false
    - name: assignee_name
      value_ref: nv_assignee_name
      required: false
    - name: project_name
      value_ref: nv_wire_str_short
      required: false
    - name: add_label_name
      value_ref: nv_label_name
      required: false
    - name: remove_label_name
      value_ref: nv_label_name
      required: false
    - name: priority
      value_ref: nv_issue_priority
      required: false
    preflight:
    - kind: hydrate_invoke_target
      get: issue_get
      prefix: issue
    - kind: query_pick
      when: state_name
      query: workflow_state_query
      scope:
        team_key:
          from_preflight:
            prefix: issue
            path:
            - team
            - key
      pick:
        field: name
        equals_param: state_name
      merge:
        stateId: id
    - kind: query_pick
      when: assignee_name
      query: user_search
      scope:
        display_name:
          from_param: assignee_name
      pick:
        field: displayName
        equals_param: assignee_name
      merge:
        assigneeId: id
    - kind: query_pick
      when: project_name
      query: project_search
      scope:
        q:
          from_param: project_name
      pick:
        field: name
        equals_param: project_name
      merge:
        projectId: id
    - kind: label_ids_delta
      add_when: add_label_name
      remove_when: remove_label_name
      lookup: label_query
      from_preflight:
        prefix: issue
        path:
        - labels
      merge: labelIds
  issue_delete:
    kind: delete
    entity: Issue
    description: Move an issue to trash (recoverable).
  comment_create:
    kind: create
    entity: Comment
    description: Add a comment on an issue (scoped by issue identifier).
    provides:
    - id
    - body
    parameters:
    - name: issue
      value_ref: nv_issue_ref
      required: true
    - name: body
      value_ref: nv_wire_str_markdown
      required: true
  project_create:
    kind: create
    entity: Project
    description: Create a project on a team (by team key).
    provides:
    - id
    - name
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: true
    - name: team
      value_ref: nv_issue_create_team
      required: true
    - name: description
      value_ref: nv_wire_str_markdown
      required: false
  project_update:
    kind: update
    entity: Project
    description: Update project name or description.
    provides:
    - id
    - name
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: false
    - name: description
      value_ref: nv_wire_str_markdown
      required: false
  issue_context_query:
    kind: query
    entity: IssueContext
    description: Load issue context (issue + comments) for one identifier.
    parameters:
    - name: issue_identifier
      value_ref: nv_issue_identifier
      required: true
      role: scope
    provides:
    - issue_identifier
    - title
    - comment_count
  issue_context_get:
    kind: get
    entity: IssueContext
    description: Issue context when scoped by identifier.
    provides:
    - issue_identifier
    - title
    - comment_count
  my_work_query:
    kind: query
    entity: MyWorkSnapshot
    description: Issues assigned to the authenticated user.
    provides:
    - viewer_id
    - issue_count
  my_work_get:
    kind: get
    entity: MyWorkSnapshot
    description: Dashboard snapshot for the current user.
    provides:
    - viewer_id
    - issue_count
  project_context_query:
    kind: query
    entity: ProjectContext
    description: Project plus recent status updates.
    parameters:
    - name: project
      value_ref: nv_project_id
      required: true
      role: scope
    provides:
    - project_id
    - name
    - update_count
  project_context_get:
    kind: get
    entity: ProjectContext
    description: Project context by project id.
    provides:
    - project_id
    - name
    - update_count
  issue_navigation_link_query:
    kind: query
    entity: IssueNavigationLink
    description: Assemble the Linear web URL for an issue identifier.
    parameters:
    - name: issue_identifier
      value_ref: nv_issue_identifier
      required: true
      role: scope
    provides:
    - issue_identifier
    - title
    - url
  issue_navigation_link_get:
    kind: get
    entity: IssueNavigationLink
    provides:
    - issue_identifier
    - title
    - url
  cycle_board_snapshot_query:
    kind: query
    entity: CycleBoardSnapshot
    description: Cycle board (cycle + issues in iteration).
    parameters:
    - name: cycle
      value_ref: nv_cycle_id
      required: true
      role: scope
    provides:
    - cycle_id
    - number
    - issue_count
  cycle_board_snapshot_get:
    kind: get
    entity: CycleBoardSnapshot
    provides:
    - cycle_id
    - number
    - issue_count
views:
  issue_context:
    description: Issue row plus comments for one identifier.
    capability: issue_context_query
    entity: IssueContext
    scope:
    - name: issue_identifier
      value_ref: nv_issue_identifier
    nodes:
    - id: issue_row
      capability: issue_get
      bind:
        id:
          kind: scope
          param: issue_identifier
    - id: issue_comments
      capability: comment_by_issue_query
      bind:
        issue:
          kind: scope
          param: issue_identifier
    output:
      issue_identifier:
        kind: scope
        param: issue_identifier
      title:
        kind: node_field
        node: issue_row
        field: title
      comment_count:
        kind: node_row_count
        node: issue_comments
    relation_outputs:
    - relation: issue
      target: Issue
      cardinality: one
      binding:
        kind: node_single_row
        node: issue_row
    - relation: comments
      target: Comment
      cardinality: many
      binding:
        kind: node_all_rows
        node: issue_comments
  my_work:
    description: Authenticated user and their assigned issues.
    capability: my_work_query
    entity: MyWorkSnapshot
    nodes:
    - id: viewer_row
      capability: user_viewer
      bind: {}
    - id: assigned_issues
      capability: issue_search
      bind:
        assignee_name:
          kind: node_field
          node: viewer_row
          field: displayName
    output:
      viewer_id:
        kind: node_field
        node: viewer_row
        field: id
      issue_count:
        kind: node_row_count
        node: assigned_issues
    relation_outputs:
    - relation: viewer
      target: User
      cardinality: one
      binding:
        kind: node_single_row
        node: viewer_row
    - relation: issues
      target: Issue
      cardinality: many
      binding:
        kind: node_all_rows
        node: assigned_issues
  project_context:
    description: Project plus status updates.
    capability: project_context_query
    entity: ProjectContext
    scope:
    - name: project
      value_ref: nv_project_id
    nodes:
    - id: project_row
      capability: project_get
      bind:
        id:
          kind: scope
          param: project
    - id: status_updates
      capability: project_update_query
      bind:
        project:
          kind: scope
          param: project
    output:
      project_id:
        kind: scope
        param: project
      name:
        kind: node_field
        node: project_row
        field: name
      update_count:
        kind: node_row_count
        node: status_updates
    relation_outputs:
    - relation: project
      target: Project
      cardinality: one
      binding:
        kind: node_single_row
        node: project_row
    - relation: updates
      target: ProjectUpdate
      cardinality: many
      binding:
        kind: node_all_rows
        node: status_updates
  issue_navigation_link:
    description: Linear web URL from issue identifier.
    capability: issue_navigation_link_query
    entity: IssueNavigationLink
    scope:
    - name: issue_identifier
      value_ref: nv_issue_identifier
    nodes:
    - id: issue_row
      capability: issue_get
      bind:
        id:
          kind: scope
          param: issue_identifier
    output:
      issue_identifier:
        kind: scope
        param: issue_identifier
      title:
        kind: node_field
        node: issue_row
        field: title
      url:
        kind: computed
        template: |
          {%- set team_key = issue_identifier.split('-')[0] -%}
          https://linear.app/{{ team_key }}/issue/{{ issue_identifier }}
    relation_outputs:
    - relation: issue
      target: Issue
      cardinality: one
      binding:
        kind: node_single_row
        node: issue_row
  cycle_board_snapshot:
    description: Cycle plus issues in that iteration.
    capability: cycle_board_snapshot_query
    entity: CycleBoardSnapshot
    scope:
    - name: cycle
      value_ref: nv_cycle_id
    nodes:
    - id: cycle_row
      capability: cycle_get
      bind:
        id:
          kind: scope
          param: cycle
    - id: cycle_issues
      capability: issue_search
      bind:
        cycle:
          kind: scope
          param: cycle
    output:
      cycle_id:
        kind: scope
        param: cycle
      number:
        kind: node_field
        node: cycle_row
        field: number
      issue_count:
        kind: node_row_count
        node: cycle_issues
    relation_outputs:
    - relation: cycle
      target: Cycle
      cardinality: one
      binding:
        kind: node_single_row
        node: cycle_row
    - relation: issues
      target: Issue
      cardinality: many
      binding:
        kind: node_all_rows
        node: cycle_issues
