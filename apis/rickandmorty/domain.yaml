version: 1
auth:
  scheme: none
http_backend: https://rickandmortyapi.com
entities:
  Character:
    id_field: id
    description: A character from the show (Rick, Morty, Beth, etc.).
    fields:
      id:
        required: true
        value_ref: nv_character_id
      name:
        required: true
        value_ref: nv_character_name
      status:
        required: false
        value_ref: nv_character_status
      species:
        required: false
        value_ref: nv_character_species
      type:
        required: false
        value_ref: nv_character_type
      gender:
        required: false
        value_ref: nv_character_gender
      image:
        required: false
        value_ref: nv_character_image
      url:
        required: false
        value_ref: nv_character_url
      created:
        required: false
        value_ref: nv_character_created
    relations:
      origin:
        description: The location where the character was born or originated.
        target: Location
        cardinality: one
      location:
        description: The character's last known location.
        target: Location
        cardinality: one
  Location:
    id_field: id
    description: A planet, dimension, or place (Earth, Citadel of Ricks, etc.).
    fields:
      id:
        required: true
        value_ref: nv_location_id
      name:
        required: true
        value_ref: nv_location_name
      type:
        required: false
        value_ref: nv_location_type
      dimension:
        required: false
        value_ref: nv_location_dimension
      url:
        required: false
        value_ref: nv_location_url
      created:
        required: false
        value_ref: nv_location_created
    relations:
      residents:
        description: Characters currently residing at this location.
        target: Character
        cardinality: many
  Episode:
    id_field: id
    description: A TV episode identified by a code like S01E01.
    fields:
      id:
        required: true
        value_ref: nv_episode_id
      name:
        required: true
        value_ref: nv_episode_name
      air_date:
        required: false
        value_ref: nv_episode_air_date
      episode:
        required: false
        value_ref: nv_episode_episode
      url:
        required: false
        value_ref: nv_episode_url
      created:
        required: false
        value_ref: nv_episode_created
    relations:
      characters:
        description: Characters appearing in this episode.
        target: Character
        cardinality: many
capabilities:
  character_query:
    description: Filter characters by name, status, species, type, or gender.
    kind: query
    entity: Character
    parameters:
    - name: name
      value_ref: nv_character_query_name
      required: false
      role: filter
    - name: status
      value_ref: nv_character_query_status
      required: false
      role: filter
    - name: species
      value_ref: nv_character_query_species
      required: false
      role: filter
    - name: type
      value_ref: nv_character_query_type
      required: false
      role: filter
    - name: gender
      value_ref: nv_character_query_gender
      required: false
      role: filter
  character_get:
    description: Retrieve a single character by ID.
    kind: get
    entity: Character
    provides:
    - id
    - name
    - status
    - species
    - type
    - gender
    - image
    - url
    - created
  location_query:
    description: Filter locations by name, type, or dimension.
    kind: query
    entity: Location
    parameters:
    - name: name
      value_ref: nv_location_query_name
      required: false
      role: filter
    - name: type
      value_ref: nv_location_query_type
      required: false
      role: filter
    - name: dimension
      value_ref: nv_location_query_dimension
      required: false
      role: filter
  location_get:
    description: Retrieve a single location by ID.
    kind: get
    entity: Location
    provides:
    - id
    - name
    - type
    - dimension
    - url
    - created
  episode_query:
    description: Filter episodes by name or episode code.
    kind: query
    entity: Episode
    parameters:
    - name: name
      value_ref: nv_episode_query_name
      required: false
      role: filter
    - name: episode
      value_ref: nv_episode_query_episode
      required: false
      role: filter
  episode_get:
    description: Retrieve a single episode by ID.
    kind: get
    entity: Episode
    provides:
    - id
    - name
    - air_date
    - episode
    - url
    - created
values:
  nv_character_id:
    type: integer
    description: Unique integer identifier for the character.
  nv_character_name:
    type: string
    string_semantics: short
    description: Character's full name.
  nv_character_status:
    type: select
    allowed_values:
    - Alive
    - Dead
    - unknown
    description: 'Life status of the character: Alive, Dead, or unknown.'
  nv_character_species:
    type: string
    string_semantics: short
    description: Species of the character (e.g. Human, Alien).
  nv_character_type:
    type: string
    string_semantics: short
    description: Sub-species or special type descriptor if any.
  nv_character_gender:
    type: select
    allowed_values:
    - Female
    - Male
    - Genderless
    - unknown
    description: Gender identity of the character.
  nv_character_image:
    type: string
    string_semantics: short
    description: URL to the character's portrait image.
  nv_character_url:
    type: string
    string_semantics: short
    description: API endpoint URL for this character record.
  nv_character_created:
    type: date
    value_format: rfc3339
    description: ISO date when this record was first created.
  nv_location_id:
    type: integer
    description: Unique integer identifier for the location.
  nv_location_name:
    type: string
    string_semantics: short
    description: Name of the location (e.g. Earth, Citadel of Ricks).
  nv_location_type:
    type: string
    string_semantics: short
    description: Type of place (e.g. Planet, Space station, Microverse).
  nv_location_dimension:
    type: string
    string_semantics: short
    description: Dimension the location exists in.
  nv_location_url:
    type: string
    string_semantics: short
    description: API endpoint URL for this location record.
  nv_location_created:
    type: date
    value_format: rfc3339
    description: ISO date when this record was first created.
  nv_episode_id:
    type: integer
    description: Unique integer identifier for the episode.
  nv_episode_name:
    type: string
    string_semantics: short
    description: Episode title.
  nv_episode_air_date:
    type: string
    string_semantics: short
    description: Original broadcast date of the episode.
  nv_episode_episode:
    type: string
    string_semantics: short
    description: Episode code (e.g. S01E01) indicating season and number.
  nv_episode_url:
    type: string
    string_semantics: short
    description: API endpoint URL for this episode record.
  nv_episode_created:
    type: date
    value_format: rfc3339
    description: ISO date when this record was first created.
  nv_character_query_name:
    type: string
    string_semantics: short
  nv_character_query_status:
    type: select
    allowed_values:
    - Alive
    - Dead
    - unknown
  nv_character_query_species:
    type: string
    string_semantics: short
  nv_character_query_type:
    type: string
    string_semantics: short
  nv_character_query_gender:
    type: select
    allowed_values:
    - Female
    - Male
    - Genderless
    - unknown
  nv_location_query_name:
    type: string
    string_semantics: short
  nv_location_query_type:
    type: string
    string_semantics: short
  nv_location_query_dimension:
    type: string
    string_semantics: short
  nv_episode_query_name:
    type: string
    string_semantics: short
  nv_episode_query_episode:
    type: string
    string_semantics: short
