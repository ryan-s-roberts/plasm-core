version: 2
http_backend: https://api.nytimes.com
entities:
  Article:
    id_field: web_url
    description: A New York Times article from the archive
    fields:
      web_url:
        required: true
        value_ref: nv_article_web_url
      headline:
        required: false
        value_ref: nv_article_headline
      abstract:
        required: false
        value_ref: nv_article_abstract
      pub_date:
        required: false
        value_ref: nv_article_pub_date
      source:
        required: false
        value_ref: nv_article_source
      section_name:
        required: false
        value_ref: nv_article_section_name
      news_desk:
        required: false
        value_ref: nv_article_news_desk
      document_type:
        required: false
        value_ref: nv_article_document_type
capabilities:
  article_search:
    description: Full-text search across NYT article archive
    kind: search
    entity: Article
    parameters:
    - name: q
      value_ref: nv_wire_str_short
      required: false
      role: search
    - name: fq
      value_ref: nv_wire_str_short
      required: false
      role: filter
    - name: begin_date
      value_ref: nv_wire_str_short
      required: false
      role: filter
    - name: end_date
      value_ref: nv_wire_str_short
      required: false
      role: filter
    - name: sort
      value_ref: nv_article_search_sort
      required: false
      role: sort
    - name: fl
      value_ref: nv_wire_str_short
      required: false
      role: response_control
auth:
  scheme: api_key_query
  param: api-key
  env: NYTIMES_API_KEY
  hosted_kv: plasm:outbound:v1:catalog:nytimes
values:
  nv_article_abstract:
    type: string
    string_semantics: markdown
    description: Short summary paragraph of the article
  nv_article_document_type:
    type: string
    string_semantics: short
    description: Type of document (article, blog post, etc.)
  nv_article_headline:
    type: string
    string_semantics: markdown
    description: Primary headline text of the article
  nv_article_news_desk:
    type: string
    string_semantics: short
    description: Newsroom desk that produced the article
  nv_article_pub_date:
    type: date
    value_format: iso8601_date
    description: 'Publication date (Article Search API: YYYY-MM-DD)'
  nv_article_search_sort:
    type: select
    allowed_values:
    - relevance
    - newest
    - oldest
  nv_article_section_name:
    type: string
    string_semantics: short
    description: Editorial section the article belongs to
  nv_article_source:
    type: string
    string_semantics: short
    description: Originating publication source name
  nv_article_web_url:
    type: string
    string_semantics: short
    description: Canonical URL of the article on nytimes.com
  nv_wire_str_short:
    type: string
    string_semantics: short
