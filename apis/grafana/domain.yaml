version: 5
http_backend: http://localhost:3000/api

values:
  nv_wire_str_short:
    type: string
    string_semantics: short
  nv_wire_str_markdown:
    type: string
    string_semantics: markdown
  nv_wire_int:
    type: integer
  nv_wire_bool:
    type: boolean
  nv_grafana_uid:
    type: string
    string_semantics: short
  nv_grafana_title:
    type: string
    string_semantics: short
  nv_grafana_description:
    type: string
    string_semantics: markdown
  nv_grafana_url:
    type: string
    string_semantics: short
  nv_grafana_tags:
    type: array
    items:
      value_ref: nv_wire_str_short
  nv_grafana_search_type:
    type: select
    allowed_values: [dash-db, dash-folder]
  nv_grafana_int_id:
    type: integer
  nv_grafana_bool:
    type: boolean
  nv_grafana_datasource_type:
    type: string
    string_semantics: short
  nv_grafana_datasource_name:
    type: string
    string_semantics: short
  nv_grafana_time_range:
    type: string
    string_semantics: short
  nv_grafana_annotation_text:
    type: string
    string_semantics: markdown
  nv_grafana_json_text:
    type: string
    string_semantics: json_text
  nv_grafana_json_value:
    type: json
  nv_grafana_alert_state:
    type: string
    string_semantics: short
  nv_grafana_duration:
    type: string
    string_semantics: short
  nv_grafana_folder_uid:
    type: entity_ref
    target: Folder
  nv_grafana_dashboard_uid:
    type: entity_ref
    target: Dashboard
  nv_grafana_datasource_uid:
    type: entity_ref
    target: Datasource
  nv_grafana_team_id:
    type: integer
  nv_grafana_user_id:
    type: integer
  nv_grafana_email:
    type: string
    string_semantics: short
  nv_grafana_login:
    type: string
    string_semantics: short
  nv_grafana_org_role:
    type: select
    allowed_values: [Admin, Editor, Viewer]
  nv_grafana_team_name:
    type: string
    string_semantics: short
  nv_grafana_contact_point_type:
    type: string
    string_semantics: short
  nv_grafana_mute_timing_name:
    type: string
    string_semantics: short
  nv_grafana_silence_id:
    type: string
    string_semantics: short
  nv_grafana_library_kind:
    type: select
    allowed_values: ["1", "2"]
  nv_grafana_team_ref:
    type: entity_ref
    target: Team
  nv_grafana_user_ref:
    type: entity_ref
    target: OrgUser
  nv_grafana_contact_point_uid:
    type: entity_ref
    target: ContactPoint
  nv_grafana_mute_timing_ref:
    type: entity_ref
    target: MuteTiming
  nv_grafana_library_element_uid:
    type: entity_ref
    target: LibraryElement
  nv_grafana_silence_ref:
    type: entity_ref
    target: Silence
  nv_grafana_role_uid:
    type: string
    string_semantics: short
  nv_grafana_resource_type:
    type: select
    allowed_values: [dashboards, datasources, folders, teams, users, serviceaccounts]
  nv_grafana_deeplink_type:
    type: select
    allowed_values: [dashboard, panel, explore]
  nv_grafana_uuid:
    type: string
    string_semantics: short
  nv_grafana_label_name:
    type: string
    string_semantics: short
  nv_grafana_logql:
    type: string
    string_semantics: short
  nv_grafana_sql:
    type: string
    string_semantics: short
  nv_grafana_oncall_state:
    type: select
    allowed_values: [new, acknowledged, resolved, silenced]
  nv_grafana_oncall_id:
    type: string
    string_semantics: short
  nv_grafana_incident_severity:
    type: string
    string_semantics: short
  nv_grafana_sift_status:
    type: string
    string_semantics: short
  nv_grafana_role_ref:
    type: entity_ref
    target: RbacRole
  nv_grafana_investigation_ref:
    type: entity_ref
    target: SiftInvestigation
  nv_grafana_incident_ref:
    type: entity_ref
    target: Incident

entities:
  Dashboard:
    id_field: uid
    description: Observability dashboard — search when the title is unknown, then get for panel layout and queries.
    primary_read: dashboard_get
    fields:
      uid:
        required: true
        value_ref: nv_grafana_uid
      title:
        required: false
        value_ref: nv_grafana_title
      url:
        required: false
        value_ref: nv_grafana_url
      slug:
        required: false
        value_ref: nv_wire_str_short
      tags:
        required: false
        value_ref: nv_grafana_tags
      description:
        required: false
        value_ref: nv_grafana_description
      folder_uid:
        required: false
        value_ref: nv_grafana_folder_uid
        path: folderUid
      is_starred:
        required: false
        value_ref: nv_wire_bool
        path: isStarred
      version:
        required: false
        value_ref: nv_wire_int
      schema_version:
        required: false
        value_ref: nv_wire_int
        path: schemaVersion
      dashboard_json:
        required: false
        value_ref: nv_grafana_json_text

  Folder:
    id_field: uid
    description: Dashboard folder for organizing and ACL scoping.
    fields:
      uid:
        required: true
        value_ref: nv_grafana_uid
      title:
        required: false
        value_ref: nv_grafana_title
      url:
        required: false
        value_ref: nv_grafana_url

  Datasource:
    id_field: uid
    description: Configured metrics, logs, traces, or profiles backend reachable through Grafana.
    primary_read: datasource_get
    discovery:
      qualifier_terms:
        - datasource
        - prometheus
        - loki
        - tempo
        - pyroscope
        - promql
        - logql
        - query metrics
        - query logs
    fields:
      uid:
        required: true
        value_ref: nv_grafana_uid
      name:
        required: false
        value_ref: nv_grafana_datasource_name
      type:
        required: false
        value_ref: nv_grafana_datasource_type
      url:
        required: false
        value_ref: nv_grafana_url
      is_default:
        required: false
        value_ref: nv_wire_bool
        path: isDefault
      access:
        required: false
        value_ref: nv_wire_str_short
      query_results:
        required: false
        value_ref: nv_grafana_json_text
        path: results
      discovery_data:
        required: false
        value_ref: nv_grafana_json_value
        path: data

  Annotation:
    id_field: id
    description: Time-range marker on a dashboard or global timeline.
    fields:
      id:
        required: true
        value_ref: nv_grafana_int_id
      dashboard_uid:
        required: false
        value_ref: nv_grafana_dashboard_uid
        path: dashboardUID
      panel_id:
        required: false
        value_ref: nv_wire_int
        path: panelId
      time:
        required: false
        value_ref: nv_wire_int
      time_end:
        required: false
        value_ref: nv_wire_int
        path: timeEnd
      text:
        required: false
        value_ref: nv_grafana_annotation_text
      tags:
        required: false
        value_ref: nv_grafana_tags

  AlertRule:
    id_field: uid
    description: Grafana unified alerting rule (provisioned configuration).
    fields:
      uid:
        required: true
        value_ref: nv_grafana_uid
      title:
        required: false
        value_ref: nv_grafana_title
      folder_uid:
        required: false
        value_ref: nv_grafana_folder_uid
        path: folderUID
      rule_group:
        required: false
        value_ref: nv_wire_str_short
        path: ruleGroup
      condition:
        required: false
        value_ref: nv_wire_str_short
      for:
        required: false
        value_ref: nv_grafana_duration
      is_paused:
        required: false
        value_ref: nv_wire_bool
        path: isPaused
      no_data_state:
        required: false
        value_ref: nv_grafana_alert_state
        path: noDataState
      exec_err_state:
        required: false
        value_ref: nv_grafana_alert_state
        path: execErrState

  ContactPoint:
    id_field: uid
    description: Alert notification destination for unified alerting routes.
    primary_read: contact_point_get
    fields:
      uid:
        required: true
        value_ref: nv_grafana_uid
      name:
        required: false
        value_ref: nv_grafana_title
      type:
        required: false
        value_ref: nv_grafana_contact_point_type
      settings_json:
        required: false
        value_ref: nv_grafana_json_text
        path: settings
      disable_resolve_message:
        required: false
        value_ref: nv_wire_bool
        path: disableResolveMessage
      provenance:
        required: false
        value_ref: nv_wire_str_short

  NotificationPolicy:
    id_field: id
    implicit_request_identity: true
    domain_projection_examples: false
    description: Root notification policy tree for alert routing in the organization.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      receiver:
        required: false
        value_ref: nv_wire_str_short
      group_by:
        required: false
        value_ref: nv_grafana_tags
      routes_json:
        required: false
        value_ref: nv_grafana_json_value
        path: routes
      policy_json:
        required: false
        value_ref: nv_grafana_json_text

  MuteTiming:
    id_field: name
    description: Recurring mute window referenced by notification policies and alert rules.
    primary_read: mute_timing_get
    fields:
      name:
        required: true
        value_ref: nv_grafana_mute_timing_name
      time_intervals_json:
        required: false
        value_ref: nv_grafana_json_text
        path: time_intervals
      version:
        required: false
        value_ref: nv_wire_int

  Silence:
    id_field: id
    description: Alertmanager silence suppressing notifications for matching alerts.
    primary_read: silence_get
    fields:
      id:
        required: true
        value_ref: nv_grafana_silence_id
      status_json:
        required: false
        value_ref: nv_grafana_json_text
        path: status
      matchers_json:
        required: false
        value_ref: nv_grafana_json_text
        path: matchers
      starts_at:
        required: false
        value_ref: nv_wire_str_short
        path: startsAt
      ends_at:
        required: false
        value_ref: nv_wire_str_short
        path: endsAt
      created_by:
        required: false
        value_ref: nv_wire_str_short
        path: createdBy
      comment:
        required: false
        value_ref: nv_grafana_annotation_text

  Team:
    id_field: id
    description: Organization team for RBAC assignments and on-call grouping.
    primary_read: team_get
    fields:
      id:
        required: true
        value_ref: nv_grafana_team_id
      uid:
        required: false
        value_ref: nv_grafana_uid
      name:
        required: false
        value_ref: nv_grafana_team_name
      email:
        required: false
        value_ref: nv_grafana_email
      avatar_url:
        required: false
        value_ref: nv_grafana_url
        path: avatarUrl

  OrgUser:
    id_field: userId
    description: Organization member account with role and profile metadata.
    fields:
      userId:
        required: true
        value_ref: nv_grafana_user_id
      uid:
        required: false
        value_ref: nv_grafana_uid
      login:
        required: false
        value_ref: nv_grafana_login
      email:
        required: false
        value_ref: nv_grafana_email
      name:
        required: false
        value_ref: nv_grafana_title
      role:
        required: false
        value_ref: nv_grafana_org_role
      avatar_url:
        required: false
        value_ref: nv_grafana_url
        path: avatarUrl
      last_seen_at:
        required: false
        value_ref: nv_wire_str_short
        path: lastSeenAt

  LibraryElement:
    id_field: uid
    description: Reusable library panel or dashboard variable definition.
    primary_read: library_element_get
    fields:
      uid:
        required: true
        value_ref: nv_grafana_uid
      name:
        required: false
        value_ref: nv_grafana_title
      kind:
        required: false
        value_ref: nv_grafana_library_kind
      type:
        required: false
        value_ref: nv_grafana_datasource_type
      description:
        required: false
        value_ref: nv_grafana_description
      folder_uid:
        required: false
        value_ref: nv_grafana_folder_uid
        path: folderUid
      model_json:
        required: false
        value_ref: nv_grafana_json_text
        path: model

  AnnotationTag:
    id_field: tag
    description: Annotation tag with usage count for filtering markers.
    fields:
      tag:
        required: true
        value_ref: nv_wire_str_short
      count:
        required: false
        value_ref: nv_wire_int

  DashboardSummary:
    id_field: uid
    description: Compact dashboard overview without loading full panel JSON.
    primary_read: dashboard_summary_get
    fields:
      uid:
        required: true
        value_ref: nv_grafana_uid
      title:
        required: false
        value_ref: nv_grafana_title
      description:
        required: false
        value_ref: nv_grafana_description
      tags:
        required: false
        value_ref: nv_grafana_tags
      folder_uid:
        required: false
        value_ref: nv_grafana_folder_uid
      version:
        required: false
        value_ref: nv_wire_int
      schema_version:
        required: false
        value_ref: nv_wire_int
        path: schemaVersion
    relations:
      dashboard:
        target: Dashboard
        cardinality: one

  RbacRole:
    id_field: uid
    description: Grafana RBAC custom or fixed role with permission grants.
    primary_read: rbac_role_get
    fields:
      uid:
        required: true
        value_ref: nv_grafana_role_uid
      name:
        required: false
        value_ref: nv_grafana_title
      description:
        required: false
        value_ref: nv_grafana_description
      version:
        required: false
        value_ref: nv_wire_int
      global:
        required: false
        value_ref: nv_wire_bool
      permissions_json:
        required: false
        value_ref: nv_grafana_json_text
        path: permissions

  RbacRoleAssignment:
    id_field: role_uid
    description: Users, teams, and service accounts assigned to an RBAC role.
    fields:
      role_uid:
        required: true
        value_ref: nv_grafana_role_uid
      users_json:
        required: false
        value_ref: nv_grafana_json_text
        path: users
      teams_json:
        required: false
        value_ref: nv_grafana_json_text
        path: teams
      service_accounts_json:
        required: false
        value_ref: nv_grafana_json_text
        path: serviceAccounts

  ResourcePermission:
    id_field: id
    implicit_request_identity: true
    description: Fine-grained permission grant on a dashboard, folder, or datasource.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      resource:
        required: false
        value_ref: nv_grafana_resource_type
      resource_id:
        required: false
        value_ref: nv_grafana_uid
      permission:
        required: false
        value_ref: nv_wire_str_short
      role:
        required: false
        value_ref: nv_wire_str_short
      user_id:
        required: false
        value_ref: nv_grafana_user_id
      team_id:
        required: false
        value_ref: nv_grafana_team_id
      built_in_role:
        required: false
        value_ref: nv_grafana_org_role
        path: builtInRole

  ResourceTypeMeta:
    id_field: resource
    description: Available permission actions and scopes for a Grafana resource type.
    fields:
      resource:
        required: true
        value_ref: nv_grafana_resource_type
      actions_json:
        required: false
        value_ref: nv_grafana_json_text
        path: actions
      scopes_json:
        required: false
        value_ref: nv_grafana_json_text
        path: scopes

  FrontendSettings:
    id_field: app_url
    id_from: [appUrl]
    description: Public Grafana frontend settings including the app base URL for deeplinks.
    fields:
      app_url:
        required: true
        value_ref: nv_grafana_url
        path: appUrl

  NavigationLink:
    id_field: resource_type
    key_vars:
      - resource_type
      - dashboard_uid
      - panel_id
      - datasource_uid
    description: Assembled Grafana navigation URL (dashboard, panel, or Explore).
    fields:
      resource_type:
        required: true
        value_ref: nv_grafana_deeplink_type
      app_url:
        required: false
        value_ref: nv_grafana_url
      dashboard_uid:
        required: false
        value_ref: nv_grafana_dashboard_uid
      panel_id:
        required: false
        value_ref: nv_wire_int
      datasource_uid:
        required: false
        value_ref: nv_grafana_datasource_uid
      queries_json:
        required: false
        value_ref: nv_grafana_json_text
        description: Explore query objects JSON (e.g. [{"refId":"A","expr":"up"}]).
      query_params_json:
        required: false
        value_ref: nv_grafana_json_text
        description: Extra dashboard/panel URL query parameters as a JSON object.
      from:
        required: false
        value_ref: nv_grafana_time_range
      to:
        required: false
        value_ref: nv_grafana_time_range
      url:
        required: false
        value_ref: nv_grafana_url

  PanelRender:
    id_field: dashboard_uid
    description: PNG panel or dashboard render from the Grafana image renderer.
    fields:
      dashboard_uid:
        required: true
        value_ref: nv_grafana_dashboard_uid
      panel_id:
        required: false
        value_ref: nv_wire_int
      width:
        required: false
        value_ref: nv_wire_int
      height:
        required: false
        value_ref: nv_wire_int

  SiftInvestigation:
    id_field: id
    description: Grafana Sift investigation for automated log or trace analysis.
    primary_read: sift_investigation_get
    fields:
      id:
        required: true
        value_ref: nv_grafana_uuid
      name:
        required: false
        value_ref: nv_grafana_title
      status:
        required: false
        value_ref: nv_grafana_sift_status
      failure_reason:
        required: false
        value_ref: nv_grafana_description
        path: failureReason
      analyses_json:
        required: false
        value_ref: nv_grafana_json_text
        path: analyses

  SiftAnalysis:
    id_field: id
    description: Single Sift analysis result attached to an investigation.
    fields:
      id:
        required: true
        value_ref: nv_grafana_uuid
      investigation_id:
        required: false
        value_ref: nv_grafana_investigation_ref
        path: investigationId
      name:
        required: false
        value_ref: nv_wire_str_short
      title:
        required: false
        value_ref: nv_grafana_title
      status:
        required: false
        value_ref: nv_grafana_sift_status
      result_json:
        required: false
        value_ref: nv_grafana_json_text
        path: result

  Incident:
    id_field: incidentId
    description: Grafana Incident (IRM) record — requires grafana-irm-app plugin.
    primary_read: incident_get
    fields:
      incidentId:
        required: true
        value_ref: nv_grafana_uuid
      title:
        required: false
        value_ref: nv_grafana_title
      status:
        required: false
        value_ref: nv_grafana_alert_state
      severity:
        required: false
        value_ref: nv_grafana_incident_severity
        path: severityLabel
      is_drill:
        required: false
        value_ref: nv_wire_bool
        path: isDrill
      created_time:
        required: false
        value_ref: nv_wire_str_short
        path: createdTime
      modified_time:
        required: false
        value_ref: nv_wire_str_short
        path: modifiedTime
      labels_json:
        required: false
        value_ref: nv_grafana_json_text
        path: labels

  IncidentActivity:
    id_field: id
    description: Timeline note or activity on a Grafana incident.
    fields:
      id:
        required: true
        value_ref: nv_grafana_uuid
      incident_id:
        required: false
        value_ref: nv_grafana_incident_ref
        path: incidentID
      body:
        required: false
        value_ref: nv_grafana_annotation_text
      activity_kind:
        required: false
        value_ref: nv_wire_str_short
        path: activityKind

  OnCallSchedule:
    id_field: id
    description: Grafana OnCall schedule — requires IRM / OnCall plugin.
    fields:
      id:
        required: true
        value_ref: nv_grafana_oncall_id
      name:
        required: false
        value_ref: nv_grafana_title
      team_id:
        required: false
        value_ref: nv_grafana_oncall_id
        path: teamId
      timezone:
        required: false
        value_ref: nv_wire_str_short
      shifts_json:
        required: false
        value_ref: nv_grafana_json_text
        path: shifts

  OnCallShift:
    id_field: id
    description: OnCall shift definition within a schedule.
    primary_read: oncall_shift_get
    fields:
      id:
        required: true
        value_ref: nv_grafana_oncall_id
      name:
        required: false
        value_ref: nv_grafana_title
      type:
        required: false
        value_ref: nv_wire_str_short
      frequency:
        required: false
        value_ref: nv_wire_str_short

  OnCallUser:
    id_field: id
    description: OnCall directory user (distinct from Grafana org users).
    fields:
      id:
        required: true
        value_ref: nv_grafana_oncall_id
      username:
        required: false
        value_ref: nv_grafana_login
      email:
        required: false
        value_ref: nv_grafana_email
      role:
        required: false
        value_ref: nv_grafana_org_role

  OnCallTeam:
    id_field: id
    description: Team configured in Grafana OnCall.
    fields:
      id:
        required: true
        value_ref: nv_grafana_oncall_id
      name:
        required: false
        value_ref: nv_grafana_team_name
      email:
        required: false
        value_ref: nv_grafana_email

  OnCallAlertGroup:
    id_field: id
    description: OnCall alert group with routing and lifecycle state.
    primary_read: oncall_alert_group_get
    fields:
      id:
        required: true
        value_ref: nv_grafana_oncall_id
      title:
        required: false
        value_ref: nv_grafana_title
      state:
        required: false
        value_ref: nv_grafana_oncall_state
      integration_id:
        required: false
        value_ref: nv_grafana_oncall_id
        path: integrationId
      alerts_count:
        required: false
        value_ref: nv_wire_int
        path: alertsCount
      created_at:
        required: false
        value_ref: nv_wire_str_short
        path: createdAt

capabilities:
  dashboard_query:
    kind: search
    entity: Dashboard
    description: Full-text search for dashboards by title, tags, or folder scope.
    parameters:
      - name: query
        value_ref: nv_wire_str_short
        role: search
      - name: tag
        value_ref: nv_wire_str_short
        role: filter
      - name: folder_uid
        value_ref: nv_grafana_folder_uid
        role: filter
      - name: limit
        value_ref: nv_wire_int
        role: response_control

  dashboard_get:
    kind: get
    entity: Dashboard
    description: Load a dashboard by uid, including panel and variable JSON.
    parameters:
      - name: uid
        value_ref: nv_grafana_dashboard_uid
        required: true
        role: scope
    provides:
      - uid
      - title
