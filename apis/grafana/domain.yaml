      - discovery_data

  datasource_loki_stats_query:
    kind: action
    entity: Datasource
    description: Approximate Loki index stats for a stream selector.
    preflight:
    - kind: hydrate_invoke_target
      get: datasource_get
      prefix: ds
    parameters:
      - name: logql
        value_ref: nv_grafana_logql
        required: true
      - name: from
        value_ref: nv_grafana_time_range
      - name: to
        value_ref: nv_grafana_time_range
    provides:
      - uid
      - query_results

  datasource_clickhouse_query_run:
    kind: action
    entity: Datasource
    description: Run raw SQL against a ClickHouse datasource through unified query.
    preflight:
    - kind: hydrate_invoke_target
      get: datasource_get
      prefix: ds
    parameters:
      - name: query
        value_ref: nv_grafana_sql
        required: true
      - name: from
        value_ref: nv_grafana_time_range
      - name: to
        value_ref: nv_grafana_time_range
      - name: limit
        value_ref: nv_wire_int
    provides:
      - uid
      - query_results

  datasource_clickhouse_table_query:
    kind: action
    entity: Datasource
    description: List ClickHouse tables from system.tables.
    preflight:
    - kind: hydrate_invoke_target
      get: datasource_get
      prefix: ds
    parameters:
      - name: database
        value_ref: nv_wire_str_short
    provides:
      - uid
      - query_results

  datasource_clickhouse_column_query:
    kind: action
    entity: Datasource
    description: Describe columns for a ClickHouse table via system.columns.
    preflight:
    - kind: hydrate_invoke_target
      get: datasource_get
      prefix: ds
    parameters:
      - name: table
        value_ref: nv_wire_str_short
        required: true
      - name: database
        value_ref: nv_wire_str_short
    provides:
      - uid
      - query_results

  # ── Navigation / render ──────────────────────────────────────────────────────

  frontend_settings_query:
    kind: query
    entity: FrontendSettings
    description: Load public frontend settings (appUrl for deeplinks).
    provides:
      - app_url

  deeplink_generate_query:
    kind: query
    entity: NavigationLink
    description: |
      Compose a Grafana navigation URL (MCP generate_deeplink parity).
      Loads appUrl from frontend settings; returns assembled `url` plus scope echo fields.
    parameters:
      - name: resource_type
        value_ref: nv_grafana_deeplink_type
        required: true
        role: scope
      - name: dashboard_uid
        value_ref: nv_grafana_dashboard_uid
        role: scope
      - name: panel_id
        value_ref: nv_wire_int
        role: scope
      - name: datasource_uid
        value_ref: nv_grafana_datasource_uid
        role: scope
      - name: queries_json
        value_ref: nv_grafana_json_text
        role: scope
      - name: query_params_json
        value_ref: nv_grafana_json_text
        role: scope
      - name: from
        value_ref: nv_grafana_time_range
        role: scope
      - name: to
        value_ref: nv_grafana_time_range
        role: scope
    provides:
      - resource_type
      - url
      - app_url
      - dashboard_uid
      - panel_id
      - datasource_uid
      - queries_json
      - query_params_json
      - from
      - to

  panel_render_query:
    kind: query
    entity: PanelRender
    description: Fetch a PNG render of a dashboard panel (requires image renderer).
    parameters:
      - name: dashboard_uid
        value_ref: nv_grafana_dashboard_uid
        required: true
        role: scope
      - name: panel_id
        value_ref: nv_wire_int
        role: filter
      - name: width
        value_ref: nv_wire_int
        role: response_control
      - name: height
        value_ref: nv_wire_int
        role: response_control
      - name: from
        value_ref: nv_grafana_time_range
        role: filter
      - name: to
        value_ref: nv_grafana_time_range
        role: filter
      - name: theme
        value_ref: nv_wire_str_short
        role: filter
    provides:
      - dashboard_uid
      - panel_id

  panel_query_run:
    kind: action
    entity: Datasource
    description: Run a dashboard panel query when expr and datasource uid are known (from dashboard_get panel targets).
    preflight:
    - kind: hydrate_invoke_target
      get: datasource_get
      prefix: ds
    parameters:
      - name: expr
        value_ref: nv_wire_str_short
        required: true
      - name: dashboard_uid
        value_ref: nv_grafana_dashboard_uid
      - name: panel_id
        value_ref: nv_wire_int
      - name: from
        value_ref: nv_grafana_time_range
      - name: to
        value_ref: nv_grafana_time_range
      - name: instant
        value_ref: nv_wire_bool
    provides:
      - uid
      - query_results

  # ── Sift (grafana-ml-app plugin) ─────────────────────────────────────────────

  sift_investigation_query:
    kind: query
    entity: SiftInvestigation
    description: List Sift investigations (requires grafana-ml-app plugin).
    parameters:
      - name: limit
        value_ref: nv_wire_int
        role: response_control
    provides:
      - id
      - name
      - status

  sift_investigation_get:
    kind: get
    entity: SiftInvestigation
    provides:
      - id
      - name
      - status
      - failure_reason
      - analyses_json

  sift_investigation_create:
    kind: create
    entity: SiftInvestigation
    description: Create a Sift investigation with labels and optional checks.
    parameters:
      - name: name
        value_ref: nv_grafana_title
        required: true
      - name: labels
        value_ref: nv_grafana_json_value
        required: true
      - name: start
        value_ref: nv_wire_str_short
      - name: end
        value_ref: nv_wire_str_short
      - name: checks
        value_ref: nv_grafana_tags
    output:
      type: side_effect
      description: Starts a Sift investigation and returns the created record.

  sift_analysis_query:
    kind: query
    entity: SiftAnalysis
    description: List analyses for a Sift investigation.
    parameters:
      - name: investigation_id
        value_ref: nv_grafana_investigation_ref
        required: true
        role: scope
    provides:
      - id
      - name
      - status
      - title

  # ── Incident (grafana-irm-app plugin RPC) ────────────────────────────────────

  incident_query:
    kind: query
    entity: Incident
    description: Search Grafana Incident previews (requires grafana-irm-app plugin).
    parameters:
      - name: limit
        value_ref: nv_wire_int
        role: response_control
      - name: query_string
        value_ref: nv_wire_str_short
        role: search
    provides:
      - incidentId
      - title
      - status
      - severity

  incident_get:
    kind: get
    entity: Incident
    provides:
      - incidentId
      - title
      - status
      - severity
      - is_drill
      - created_time
      - labels_json

  incident_create:
    kind: create
    entity: Incident
    description: Create a Grafana incident (Editor role; may notify responders).
    parameters:
      - name: title
        value_ref: nv_grafana_title
        required: true
      - name: severity
        value_ref: nv_grafana_incident_severity
        required: true
      - name: room_prefix
        value_ref: nv_wire_str_short
        required: true
      - name: is_drill
        value_ref: nv_wire_bool
      - name: labels
        value_ref: nv_grafana_json_value
    output:
      type: side_effect
      description: Opens a new Grafana incident and returns the incident record.

  incident_activity_create:
    kind: create
    entity: IncidentActivity
    description: Add a user note to an incident timeline.
    parameters:
      - name: incident_id
        value_ref: nv_grafana_incident_ref
        required: true
      - name: body
        value_ref: nv_grafana_annotation_text
        required: true
      - name: event_time
        value_ref: nv_wire_str_short
    output:
      type: side_effect
      description: Appends an activity item to the incident timeline.

  # ── OnCall (grafana-irm-app plugin proxy) ────────────────────────────────────

  oncall_schedule_query:
    kind: query
    entity: OnCallSchedule
    description: List OnCall schedules via the IRM plugin proxy.
    parameters:
      - name: team_id
        value_ref: nv_grafana_oncall_id
        role: filter
      - name: page
        value_ref: nv_wire_int
        role: response_control
    provides:
      - id
      - name
      - timezone

  oncall_shift_get:
    kind: get
    entity: OnCallShift
    provides:
      - id
      - name
      - type
      - frequency

  oncall_user_query:
    kind: query
    entity: OnCallUser
    description: List OnCall directory users.
    parameters:
      - name: username
        value_ref: nv_grafana_login
        role: search
      - name: page
        value_ref: nv_wire_int
        role: response_control
    provides:
      - id
      - username
      - email

  oncall_team_query:
    kind: query
    entity: OnCallTeam
    description: List OnCall teams.
    parameters:
      - name: page
        value_ref: nv_wire_int
        role: response_control
    provides:
      - id
      - name

  oncall_alert_group_query:
    kind: query
    entity: OnCallAlertGroup
    description: List OnCall alert groups with optional filters.
    parameters:
      - name: state
        value_ref: nv_grafana_oncall_state
        role: filter
      - name: team_id
        value_ref: nv_grafana_oncall_id
        role: filter
      - name: name
        value_ref: nv_wire_str_short
        role: search
      - name: page
        value_ref: nv_wire_int
        role: response_control
    provides:
      - id
      - title
      - state

  oncall_alert_group_get:
    kind: get
    entity: OnCallAlertGroup
    provides:
      - id
      - title
      - state
      - integration_id
      - alerts_count
      - created_at

views:
  dashboard_summary:
    description: Compact dashboard overview without loading full panel JSON.
    capability: dashboard_summary_query
    entity: DashboardSummary
    scope:
      - name: dashboard_uid
        value_ref: nv_grafana_dashboard_uid
    nodes:
      - id: dash
        capability: dashboard_get
        bind:
          uid:
            kind: scope
            param: dashboard_uid
    output:
      uid:
        kind: scope
        param: dashboard_uid
      title:
        kind: node_field
        node: dash
        field: title
      description:
        kind: node_field
        node: dash
        field: description
      tags:
        kind: node_field
        node: dash
        field: tags
      folder_uid:
        kind: node_field
        node: dash
        field: folder_uid
      version:
        kind: node_field
        node: dash
        field: version
      schema_version:
        kind: node_field
        node: dash
        field: schema_version
    relation_outputs:
      - relation: dashboard
        target: Dashboard
        cardinality: one
        binding:
          kind: node_single_row
          node: dash

  deeplink_generate:
    description: Fetch appUrl and assemble navigation URL (dashboard, panel, or Explore).
    capability: deeplink_generate_query
    entity: NavigationLink
    scope:
      - name: resource_type
        value_ref: nv_grafana_deeplink_type
        required: true
      - name: dashboard_uid
        value_ref: nv_grafana_dashboard_uid
      - name: panel_id
        value_ref: nv_wire_int
      - name: datasource_uid
        value_ref: nv_grafana_datasource_uid
      - name: queries_json
        value_ref: nv_grafana_json_text
      - name: query_params_json
        value_ref: nv_grafana_json_text
      - name: from
        value_ref: nv_grafana_time_range
      - name: to
        value_ref: nv_grafana_time_range
    nodes:
      - id: frontend
        capability: frontend_settings_query
        bind: {}
    output:
      resource_type:
        kind: scope
        param: resource_type
      app_url:
        kind: node_field
        node: frontend
        field: app_url
      dashboard_uid:
        kind: scope
        param: dashboard_uid
      panel_id:
        kind: scope
        param: panel_id
      datasource_uid:
        kind: scope
        param: datasource_uid
      queries_json:
        kind: scope
        param: queries_json
      query_params_json:
        kind: scope
        param: query_params_json
      from:
        kind: scope
        param: from
      to:
        kind: scope
        param: to
      url:
        kind: computed
        template: |
          {%- set base = app_url | strip_trailing_slash -%}
          {%- if resource_type == 'dashboard' -%}
          {{ base }}/d/{{ dashboard_uid }}{% if from or to or query_params_json %}?{% endif %}{% if from %}from={{ from | wire_time('unix_ms') }}{% endif %}{% if from and to %}&{% endif %}{% if to %}to={{ to | wire_time('unix_ms') }}{% endif %}{% if query_params_json %}{{ query_params_json | wire_query_suffix }}{% endif %}
          {%- elif resource_type == 'panel' -%}
          {{ base }}/d/{{ dashboard_uid }}?viewPanel={{ panel_id }}{% if from or to or query_params_json %}&{% endif %}{% if from %}from={{ from | wire_time('unix_ms') }}{% endif %}{% if from and to %}&{% endif %}{% if to %}to={{ to | wire_time('unix_ms') }}{% endif %}{% if query_params_json %}{{ query_params_json | wire_query_suffix }}{% endif %}
          {%- elif resource_type == 'explore' -%}
          {%- set left = '{"datasource":' ~ (datasource_uid | json_encode) -%}
          {%- if queries_json -%}
          {%- set left = left ~ ',"queries":' ~ queries_json -%}
          {%- endif -%}
          {%- if from or to -%}
          {%- set left = left ~ ',"range":{' -%}
          {%- if from -%}
          {%- set left = left ~ '"from":' ~ (from | wire_time('unix_ms') | json_encode) -%}
          {%- endif -%}
          {%- if from and to -%}
          {%- set left = left ~ ',' -%}
          {%- endif -%}
          {%- if to -%}
          {%- set left = left ~ '"to":' ~ (to | wire_time('unix_ms') | json_encode) -%}
          {%- endif -%}
          {%- set left = left ~ '}' -%}
          {%- endif -%}
          {%- set left = left ~ '}' -%}
          {{ base }}/explore?left={{ left | urlencode }}
          {%- else -%}
          {{ base }}
          {%- endif -%}

auth:
  scheme: bearer_token
  env: GRAFANA_SERVICE_ACCOUNT_TOKEN
