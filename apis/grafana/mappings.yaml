oncall_alert_group_query:
  method: GET
  path:
    - { type: literal, value: plugins }
    - { type: literal, value: grafana-irm-app }
    - { type: literal, value: resources }
    - { type: literal, value: alertgroups }
  query:
    type: object
    fields:
      - - status
        - type: if
          condition:
            type: equals
            left: { type: var, name: state }
            right: { type: const, value: new }
          then_expr: { type: const, value: "0" }
          else_expr:
            type: if
            condition:
              type: equals
              left: { type: var, name: state }
              right: { type: const, value: acknowledged }
            then_expr: { type: const, value: "1" }
            else_expr:
              type: if
              condition:
                type: equals
                left: { type: var, name: state }
                right: { type: const, value: resolved }
              then_expr: { type: const, value: "2" }
              else_expr:
                type: if
                condition:
                  type: equals
                  left: { type: var, name: state }
                  right: { type: const, value: silenced }
                then_expr: { type: const, value: "3" }
                else_expr: { type: const, value: null }
      - [team, { type: if, condition: { type: exists, var: team_id },
                 then_expr: { type: var, name: team_id },
                 else_expr: { type: const, value: null } }]
      - [search, { type: if, condition: { type: exists, var: name },
                    then_expr: { type: var, name: name },
                    else_expr: { type: const, value: null } }]
      - [page, { type: if, condition: { type: exists, var: page },
                 then_expr: { type: var, name: page },
                 else_expr: { type: const, value: null } }]
  response:
    items: results

oncall_alert_group_get:
  method: GET
  path:
