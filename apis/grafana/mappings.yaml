      - [uid, { type: if, condition: { type: exists, var: uid },
                then_expr: { type: var, name: uid },
                else_expr: { type: const, value: null } }]

folder_update:
  method: PUT
  path:
    - { type: literal, value: folders }
    - { type: var, name: id }
  body:
    type: object
    fields:
      - [title, { type: if, condition: { type: exists, var: title },
                  then_expr: { type: var, name: title },
                  else_expr: { type: const, value: null } }]
      - [uid, { type: if, condition: { type: exists, var: uid },
                then_expr: { type: var, name: uid },
                else_expr: { type: const, value: null } }]
      - [overwrite, { type: if, condition: { type: exists, var: overwrite },
                      then_expr: { type: var, name: overwrite },
                      else_expr: { type: const, value: null } }]

folder_delete:
  method: DELETE
  path:
    - { type: literal, value: folders }
    - { type: var, name: id }

# ── Datasource ───────────────────────────────────────────────────────────────

datasource_query:
  method: GET
  path:
    - { type: literal, value: datasources }

datasource_get:
  method: GET
  path:
    - { type: literal, value: datasources }
    - { type: literal, value: uid }
    - { type: var, name: id }

datasource_create:
  method: POST
  path:
    - { type: literal, value: datasources }
  body:
    type: object
    fields:
      - [name, { type: var, name: name }]
      - [type, { type: var, name: type }]
      - [url, { type: if, condition: { type: exists, var: url },
                then_expr: { type: var, name: url },
                else_expr: { type: const, value: null } }]
      - [access, { type: if, condition: { type: exists, var: access },
                   then_expr: { type: var, name: access },
                   else_expr: { type: const, value: null } }]
      - [isDefault, { type: if, condition: { type: exists, var: is_default },
                      then_expr: { type: var, name: is_default },
                      else_expr: { type: const, value: null } }]
      - [jsonData, { type: if, condition: { type: exists, var: json_data },
                     then_expr: { type: var, name: json_data },
                     else_expr: { type: const, value: null } }]
      - [secureJsonData, { type: if, condition: { type: exists, var: secure_json_data },
                           then_expr: { type: var, name: secure_json_data },
                           else_expr: { type: const, value: null } }]

datasource_update:
  method: PUT
  path:
    - { type: literal, value: datasources }
    - { type: literal, value: uid }
    - { type: var, name: id }
  body:
    type: object
    fields:
      - [name, { type: var, name: name }]
      - [type, { type: var, name: type }]
      - [url, { type: if, condition: { type: exists, var: url },
                then_expr: { type: var, name: url },
                else_expr: { type: const, value: null } }]
      - [access, { type: if, condition: { type: exists, var: access },
                   then_expr: { type: var, name: access },
                   else_expr: { type: const, value: null } }]
      - [isDefault, { type: if, condition: { type: exists, var: is_default },
                      then_expr: { type: var, name: is_default },
                      else_expr: { type: const, value: null } }]
      - [jsonData, { type: if, condition: { type: exists, var: json_data },
                     then_expr: { type: var, name: json_data },
                     else_expr: { type: const, value: null } }]
      - [secureJsonData, { type: if, condition: { type: exists, var: secure_json_data },
                           then_expr: { type: var, name: secure_json_data },
                           else_expr: { type: const, value: null } }]

datasource_delete:
  method: DELETE
  path:
    - { type: literal, value: datasources }
    - { type: literal, value: uid }
    - { type: var, name: id }

datasource_query_run:
  method: POST
  path:
    - { type: literal, value: ds }
    - { type: literal, value: query }
  body:
    type: object
    fields:
      - [queries, { type: array, elements: [
          { type: object, fields: [
            [refId, { type: if, condition: { type: exists, var: ref_id },
                      then_expr: { type: var, name: ref_id },
                      else_expr: { type: const, value: "A" } }],
            [datasource, { type: object, fields: [
              [type, { type: var, name: ds_type }],
              [uid, { type: var, name: id }]
            ]}],
            [expr, { type: var, name: expr }],
            [instant, { type: if, condition: { type: exists, var: instant },
                         then_expr: { type: var, name: instant },
                         else_expr: { type: const, value: true } }]
          ]}
        ]}]
      - [from, { type: if, condition: { type: exists, var: from },
                 then_expr: { type: var, name: from },
                 else_expr: { type: const, value: null } }]
      - [to, { type: if, condition: { type: exists, var: to },
               then_expr: { type: var, name: to },
               else_expr: { type: const, value: null } }]
  response:
    single: true

# ── Annotation ───────────────────────────────────────────────────────────────

annotation_query:
  method: GET
  path:
    - { type: literal, value: annotations }
  query:
    type: object
    fields:
      - [from, { type: if, condition: { type: exists, var: from },
                 then_expr: { type: var, name: from },
                 else_expr: { type: const, value: null } }]
      - [to, { type: if, condition: { type: exists, var: to },
               then_expr: { type: var, name: to },
               else_expr: { type: const, value: null } }]
      - [dashboardUID, { type: if, condition: { type: exists, var: dashboard_uid },
                         then_expr: { type: var, name: dashboard_uid },
                         else_expr: { type: const, value: null } }]
      - [tags, { type: if, condition: { type: exists, var: tags },
                 then_expr: { type: var, name: tags },
                 else_expr: { type: const, value: null } }]
      - [limit, { type: if, condition: { type: exists, var: limit },
                  then_expr: { type: var, name: limit },
                  else_expr: { type: const, value: null } }]

annotation_get:
  method: GET
  path:
    - { type: literal, value: annotations }
    - { type: var, name: id }

annotation_create:
  method: POST
  path:
    - { type: literal, value: annotations }
  body:
    type: object
    fields:
      - [text, { type: var, name: text }]
      - [dashboardUID, { type: if, condition: { type: exists, var: dashboard_uid },
                          then_expr: { type: var, name: dashboard_uid },
                          else_expr: { type: const, value: null } }]
      - [panelId, { type: if, condition: { type: exists, var: panel_id },
                     then_expr: { type: var, name: panel_id },
                     else_expr: { type: const, value: null } }]
      - [time, { type: if, condition: { type: exists, var: time },
                 then_expr: { type: var, name: time },
                 else_expr: { type: const, value: null } }]
      - [timeEnd, { type: if, condition: { type: exists, var: time_end },
                    then_expr: { type: var, name: time_end },
                    else_expr: { type: const, value: null } }]
      - [tags, { type: if, condition: { type: exists, var: tags },
                 then_expr: { type: var, name: tags },
                 else_expr: { type: const, value: null } }]

annotation_update:
  method: PATCH
  path:
    - { type: literal, value: annotations }
    - { type: var, name: id }
  body:
    type: object
    fields:
      - [text, { type: if, condition: { type: exists, var: text },
                 then_expr: { type: var, name: text },
                 else_expr: { type: const, value: null } }]
      - [time, { type: if, condition: { type: exists, var: time },
                 then_expr: { type: var, name: time },
                 else_expr: { type: const, value: null } }]
      - [timeEnd, { type: if, condition: { type: exists, var: time_end },
                    then_expr: { type: var, name: time_end },
                    else_expr: { type: const, value: null } }]
      - [tags, { type: if, condition: { type: exists, var: tags },
                 then_expr: { type: var, name: tags },
                 else_expr: { type: const, value: null } }]

annotation_delete:
  method: DELETE
  path:
    - { type: literal, value: annotations }
    - { type: var, name: id }

annotation_tag_query:
  method: GET
  path:
    - { type: literal, value: annotations }
    - { type: literal, value: tags }
  query:
    type: object
    fields:
      - [tag, { type: if, condition: { type: exists, var: tag },
                then_expr: { type: var, name: tag },
                else_expr: { type: const, value: null } }]
  response:
    items_path: [result, tags]

# ── Alert rules (provisioning API) ───────────────────────────────────────────

alert_rule_query:
  method: GET
  path:
    - { type: literal, value: v1 }
    - { type: literal, value: provisioning }
    - { type: literal, value: alert-rules }

alert_rule_get:
  method: GET
  path:
    - { type: literal, value: v1 }
    - { type: literal, value: provisioning }
    - { type: literal, value: alert-rules }
    - { type: var, name: id }

alert_rule_create:
  method: POST
  path:
    - { type: literal, value: v1 }
    - { type: literal, value: provisioning }
    - { type: literal, value: alert-rules }
  headers:
    type: object
    fields:
      - [X-Disable-Provenance, { type: const, value: "true" }]
  body:
    type: object
    fields:
      - [title, { type: var, name: title }]
      - [folderUID, { type: var, name: folderUID }]
      - [ruleGroup, { type: var, name: ruleGroup }]
      - [condition, { type: var, name: condition }]
      - [data, { type: var, name: data }]
      - [for, { type: if, condition: { type: exists, var: for },
               then_expr: { type: var, name: for },
               else_expr: { type: const, value: null } }]
      - [noDataState, { type: if, condition: { type: exists, var: noDataState },
                       then_expr: { type: var, name: noDataState },
                       else_expr: { type: const, value: null } }]
      - [execErrState, { type: if, condition: { type: exists, var: execErrState },
                        then_expr: { type: var, name: execErrState },
                        else_expr: { type: const, value: null } }]

alert_rule_update:
  method: PUT
  path:
    - { type: literal, value: v1 }
    - { type: literal, value: provisioning }
    - { type: literal, value: alert-rules }
    - { type: var, name: id }
  headers:
    type: object
    fields:
      - [X-Disable-Provenance, { type: const, value: "true" }]
  body:
    type: object
    fields:
      - [uid, { type: var, name: id }]
      - [title, { type: var, name: title }]
      - [folderUID, { type: var, name: folderUID }]
      - [ruleGroup, { type: var, name: ruleGroup }]
      - [condition, { type: var, name: condition }]
      - [data, { type: var, name: data }]
      - [for, { type: if, condition: { type: exists, var: for },
               then_expr: { type: var, name: for },
               else_expr: { type: const, value: null } }]
      - [noDataState, { type: if, condition: { type: exists, var: noDataState },
                       then_expr: { type: var, name: noDataState },
                       else_expr: { type: const, value: null } }]
      - [execErrState, { type: if, condition: { type: exists, var: execErrState },
                        then_expr: { type: var, name: execErrState },
                        else_expr: { type: const, value: null } }]

alert_rule_delete:
  method: DELETE
  path:
    - { type: literal, value: v1 }
    - { type: literal, value: provisioning }
    - { type: literal, value: alert-rules }
    - { type: var, name: id }

