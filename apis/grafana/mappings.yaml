# Grafana HTTP API — CML mappings (Phase 1–3).
# Semantic model: domain.yaml. OpenAPI: /public/api-merged.json on a running Grafana instance.
#
# Base URL: Grafana /api prefix (http_backend in domain.yaml; override with --backend).
# Auth: Bearer GRAFANA_SERVICE_ACCOUNT_TOKEN (service account recommended).

# ── Dashboard ────────────────────────────────────────────────────────────────

dashboard_query:
  method: GET
  path:
    - { type: literal, value: search }
  query:
    type: object
    fields:
      - [type, { type: const, value: dash-db }]
      - [query, { type: if, condition: { type: exists, var: query },
                  then_expr: { type: var, name: query },
                  else_expr: { type: const, value: null } }]
      - [tag, { type: if, condition: { type: exists, var: tag },
                then_expr: { type: var, name: tag },
                else_expr: { type: const, value: null } }]
      - [folderUIDs, { type: if, condition: { type: exists, var: folder_uid },
                       then_expr: { type: var, name: folder_uid },
                       else_expr: { type: const, value: null } }]
      - [limit, { type: if, condition: { type: exists, var: limit },
                  then_expr: { type: var, name: limit },
                  else_expr: { type: const, value: null } }]

dashboard_get:
  method: GET
  path:
    - { type: literal, value: dashboards }
    - { type: literal, value: uid }
    - { type: var, name: id }
  response:
    items: dashboard
    single: true

dashboard_save:
  method: POST
  path:
    - { type: literal, value: dashboards }
    - { type: literal, value: db }
  body:
    type: object
    fields:
      - [dashboard, { type: var, name: dashboard }]
      - [folderUid, { type: if, condition: { type: exists, var: folder_uid },
                      then_expr: { type: var, name: folder_uid },
                      else_expr: { type: const, value: null } }]
      - [overwrite, { type: if, condition: { type: exists, var: overwrite },
                     then_expr: { type: var, name: overwrite },
                     else_expr: { type: const, value: null } }]
      - [message, { type: if, condition: { type: exists, var: message },
                    then_expr: { type: var, name: message },
                    else_expr: { type: const, value: null } }]

dashboard_delete:
  method: DELETE
  path:
    - { type: literal, value: dashboards }
    - { type: literal, value: uid }
    - { type: var, name: id }

dashboard_summary_query:
  transport: view
  view: dashboard_summary

dashboard_summary_get:
  transport: view
  view: dashboard_summary

# ── Folder ───────────────────────────────────────────────────────────────────

