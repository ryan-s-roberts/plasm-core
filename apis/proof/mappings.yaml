# Proof — HTTP mappings for hosted `www.proofeditor.ai`.
# Slug-scoped agent routes use `/api/agent/:slug/…` (plain `/documents/:slug/…` returns 404 HTML on hosted).
# Share negotiation stays `GET /d/:slug`; new docs use `POST /share/markdown`. See apis/proof/README.md.
# Auth: domain `auth.env` bearer (PROOF_API_TOKEN); optional share `?token=` maps to `share_token`.

annotation_comment_add:
  method: POST
  path:
  - type: literal
    value: api
  - type: literal
    value: agent
  - type: var
    name: slug
  - type: literal
    value: ops
  query:
    type: object
    fields:
    - - token
      - type: if
        condition:
          type: exists
          var: share_token
        then_expr:
          type: var
          name: share_token
        else_expr:
          type: const
          value: null
  headers:
    type: object
    fields:
    - - X-Agent-Id
      - type: var
        name: agent_id
  body:
    type: object
    fields:
    - - type
      - type: const
        value: comment.add
    - - by
      - type: var
        name: by
    - - quote
      - type: var
        name: quote
    - - text
      - type: var
        name: text
    - - baseToken
      - type: if
        condition:
          type: exists
          var: base_token
        then_expr:
          type: var
          name: base_token
        else_expr:
          type: const
          value: null
  response:
    single: true
