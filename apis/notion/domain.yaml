http_backend: https://api.notion.com
entities:
  Page:
    id_field: id
    description: 'A Notion page object. Covers both standalone document pages and database rows/records (Notion uses the same
      type for both; parent.type distinguishes them).

      '
    fields:
      id:
        required: true
        value_ref: nv_page_id
      url:
        required: false
        value_ref: nv_page_url
      public_url:
        required: false
        value_ref: nv_page_public_url
      created_time:
        required: false
        value_ref: nv_page_created_time
      last_edited_time:
        required: false
        value_ref: nv_page_last_edited_time
      in_trash:
        required: false
        value_ref: nv_page_in_trash
      archived:
        required: false
        value_ref: nv_page_archived
      markdown:
        agent_presentation: reference_only
        required: false
        value_ref: nv_page_markdown
      truncated:
        required: false
        value_ref: nv_page_truncated
    relations:
      created_by:
        target: User
        cardinality: one
      last_edited_by:
        target: User
        cardinality: one
      comments:
        target: Comment
        cardinality: many
        description: Comments on this page
        materialize:
          kind: query_scoped
          capability: comment_query
          param: block_id
  Database:
    id_field: id
    description: A Notion database — a container with a property schema whose rows are Pages.
    fields:
      id:
        required: true
        value_ref: nv_database_id
      url:
        required: false
        value_ref: nv_database_url
      public_url:
        required: false
        value_ref: nv_database_public_url
      created_time:
        required: false
        value_ref: nv_database_created_time
      last_edited_time:
        required: false
        value_ref: nv_database_last_edited_time
      in_trash:
        required: false
        value_ref: nv_database_in_trash
      is_inline:
        required: false
        value_ref: nv_database_is_inline
    relations:
      created_by:
        target: User
        cardinality: one
      last_edited_by:
        target: User
        cardinality: one
      pages:
        target: Page
        cardinality: many
        description: Pages (rows) within this database
        materialize:
          kind: query_scoped
          capability: database_query
          param: database_id
  User:
    id_field: id
    description: A Notion workspace member (person) or integration (bot).
    fields:
      id:
        required: true
        value_ref: nv_user_id
      name:
        required: false
        value_ref: nv_user_name
      type:
        required: false
        value_ref: nv_user_type
      avatar_url:
        required: false
        value_ref: nv_user_avatar_url
      email:
        required: false
        value_ref: nv_user_email
  Comment:
    id_field: id
    description: A comment on a Notion page or block, belonging to a discussion thread.
    fields:
      id:
        required: true
        value_ref: nv_comment_id
      discussion_id:
        required: false
        value_ref: nv_comment_discussion_id
      created_time:
        required: false
        value_ref: nv_comment_created_time
      last_edited_time:
        required: false
        value_ref: nv_comment_last_edited_time
    relations:
      created_by:
        target: User
        cardinality: one
capabilities:
  page_get:
    description: Retrieve page metadata (id, url, timestamps, properties structure) by ID.
    kind: get
    entity: Page
    provides:
    - id
    - url
    - public_url
    - created_time
    - last_edited_time
    - in_trash
    - archived
  page_create:
    description: Create a new page as a child of an existing page or database.
    kind: create
    entity: Page
  page_update:
    description: Update page properties, icon, cover, or archive/trash status.
    kind: update
    entity: Page
  page_trash:
    description: 'Move a page to trash (in_trash: true). Use page_update to restore.'
    kind: action
    entity: Page
    output:
      type: side_effect
      description: 'Move a page to trash (in_trash: true). Use page_update to restore.'
  page_get_markdown:
    description: 'Retrieve full page content as Enhanced Markdown in a single call. Populates the Page entity''s markdown
      and truncated fields via additive merge — the page''s structural metadata (url, timestamps, etc.) is preserved. Requires
      read content capability on the integration.

      '
    kind: action
    entity: Page
    provides:
    - id
    - markdown
    - truncated
  page_update_markdown:
    description: "Update page content using Enhanced Markdown. Supports:\n  update_content  — targeted search-and-replace\
      \ (recommended)\n  replace_content — replace entire page content\nPopulates the Page entity's markdown and truncated\
      \ fields with the updated content. Requires update content capability on the integration.\n"
    kind: action
    entity: Page
    output:
      type: side_effect
      description: "Update page content using Enhanced Markdown. Supports:\n  update_content  — targeted search-and-replace\
        \ (recommended)\n  replace_content — replace entire page content\nPopulates the Page entity's markdown and truncated\
        \ fields with the updated content. Requires update content capability on the integration."
  database_get:
    description: Retrieve a database object including its property schema.
    kind: get
    entity: Database
    provides:
    - id
    - url
    - public_url
    - created_time
    - last_edited_time
    - in_trash
    - is_inline
  database_query:
    description: Query a database and return matching rows as Page objects. Scoped to a specific database.
    kind: query
    entity: Page
    parameters:
    - name: database_id
      value_ref: nv_database_query_database_id
      required: true
      role: scope
    - name: page_size
      value_ref: nv_database_query_page_size
      required: false
      role: response_control
  user_get:
    description: Retrieve a Notion user by their ID.
    kind: get
    entity: User
    provides:
    - id
    - name
    - type
    - avatar_url
    - email
  user_query:
    description: List all users (members and bots) in the workspace.
    kind: query
    entity: User
  comment_query:
    description: List unresolved comments on a page, sorted by creation time.
    kind: query
    entity: Comment
    parameters:
    - name: block_id
      value_ref: nv_comment_query_block_id
      required: true
      role: scope
    - name: page_size
      value_ref: nv_comment_query_page_size
      required: false
      role: response_control
  comment_create:
    description: Create a new comment on a page or within an existing discussion thread.
    kind: create
    entity: Comment
  page_search:
    description: Search Notion pages (and database rows) shared with this integration by title.
    kind: search
    entity: Page
    provides:
    - id
    - url
    - public_url
    - created_time
    - last_edited_time
    - in_trash
    - archived
    parameters:
    - name: query
      value_ref: nv_page_search_query
      required: false
      role: search
    - name: sort_direction
      value_ref: nv_page_search_sort_direction
      required: false
      role: sort_direction
    - name: page_size
      value_ref: nv_page_search_page_size
      required: false
      role: response_control
  database_search:
    description: Search Notion databases shared with this integration by title.
    kind: search
    entity: Database
    provides:
    - id
    - url
    - public_url
    - created_time
    - last_edited_time
    - in_trash
    - is_inline
    parameters:
    - name: query
      value_ref: nv_database_search_query
      required: false
      role: search
    - name: sort_direction
      value_ref: nv_database_search_sort_direction
      required: false
      role: sort_direction
    - name: page_size
      value_ref: nv_database_search_page_size
      required: false
      role: response_control
version: 1
auth:
  scheme: bearer_token
  env: NOTION_API_TOKEN
values:
  nv_page_id:
    type: string
    string_semantics: short
    description: UUIDv4 page identifier
  nv_page_url:
    type: string
    string_semantics: short
    description: Canonical Notion URL for this page
  nv_page_public_url:
    type: string
    string_semantics: short
    description: Public web URL if the page is published, otherwise null
  nv_page_created_time:
    type: date
    value_format: rfc3339
  nv_page_last_edited_time:
    type: date
    value_format: rfc3339
  nv_page_in_trash:
    type: boolean
    description: True if this page has been trashed
  nv_page_archived:
    type: boolean
    description: Deprecated alias for in_trash
  nv_page_markdown:
    type: string
    string_semantics: markdown
    description: Full page content as Enhanced Markdown. Populated by page_get_markdown; absent until that action is invoked.
  nv_page_truncated:
    type: boolean
    description: True if the markdown content was truncated (page exceeded ~20k block limit). Populated by page_get_markdown.
  nv_database_id:
    type: string
    string_semantics: short
  nv_database_url:
    type: string
    string_semantics: short
  nv_database_public_url:
    type: string
    string_semantics: short
  nv_database_created_time:
    type: date
    value_format: rfc3339
  nv_database_last_edited_time:
    type: date
    value_format: rfc3339
  nv_database_in_trash:
    type: boolean
  nv_database_is_inline:
    type: boolean
    description: True if the database is displayed inline in its parent page
  nv_user_id:
    type: string
    string_semantics: short
  nv_user_name:
    type: string
    string_semantics: short
  nv_user_type:
    type: select
    allowed_values:
    - person
    - bot
  nv_user_avatar_url:
    type: string
    string_semantics: short
  nv_user_email:
    type: string
    string_semantics: short
    description: Only available when integration has user email capabilities
  nv_comment_id:
    type: string
    string_semantics: short
  nv_comment_discussion_id:
    type: string
    string_semantics: short
  nv_comment_created_time:
    type: date
    value_format: rfc3339
  nv_comment_last_edited_time:
    type: date
    value_format: rfc3339
  nv_database_query_database_id:
    type: string
    string_semantics: short
    description: ID of the database to query
  nv_database_query_page_size:
    type: integer
    description: Number of results per page (max 100)
  nv_comment_query_block_id:
    type: string
    string_semantics: short
    description: ID of the page whose comments to retrieve
  nv_comment_query_page_size:
    type: integer
  nv_page_search_query:
    type: string
    string_semantics: short
    description: Title text to search for. Omit to retrieve all accessible pages.
  nv_page_search_sort_direction:
    type: select
    allowed_values:
    - ascending
    - descending
  nv_page_search_page_size:
    type: integer
  nv_database_search_query:
    type: string
    string_semantics: short
    description: Title text to search for. Omit to retrieve all accessible databases.
  nv_database_search_sort_direction:
    type: select
    allowed_values:
    - ascending
    - descending
  nv_database_search_page_size:
    type: integer
