version: 3
http_backend: https://discord.com/api/v10
entities:
  Guild:
    id_field: id
    description: A Discord server (guild).
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      owner_id:
        required: false
        value_ref: nv_guild_owner_id
      icon:
        required: false
        value_ref: nv_wire_str_short
      splash:
        required: false
        value_ref: nv_wire_str_short
      verification_level:
        required: false
        value_ref: nv_wire_int
      premium_tier:
        required: false
        value_ref: nv_wire_int
      pruned:
        required: false
        value_ref: nv_wire_int
    relations:
      channels:
        description: Channels belonging to this guild.
        target: Channel
        cardinality: many
        materialize:
          kind: query_scoped
          capability: channel_list_for_guild
          param: guild_id
      members:
        description: Members of this guild.
        target: GuildMember
        cardinality: many
        materialize:
          kind: query_scoped
          capability: guild_member_list
          param: guild_id
      roles:
        description: Roles defined in this guild.
        target: Role
        cardinality: many
        materialize:
          kind: query_scoped
          capability: guild_role_list
          param: guild_id
      bans:
        description: Bans for this guild.
        target: Ban
        cardinality: many
        materialize:
          kind: query_scoped
          capability: ban_list
          param: guild_id
      webhooks:
        description: Webhooks configured on guild channels.
        target: Webhook
        cardinality: many
        materialize:
          kind: query_scoped
          capability: guild_webhook_list
          param: guild_id
      emojis:
        description: Custom emojis uploaded to this guild.
        target: CustomEmoji
        cardinality: many
        materialize:
          kind: query_scoped
          capability: guild_emoji_list
          param: guild_id
      stickers:
        description: Stickers uploaded to this guild.
        target: Sticker
        cardinality: many
        materialize:
          kind: query_scoped
          capability: guild_sticker_list
          param: guild_id
      scheduled_events:
        description: Scheduled community events.
        target: ScheduledEvent
        cardinality: many
        materialize:
          kind: query_scoped
          capability: scheduled_event_list
          param: guild_id
      soundboard_sounds:
        description: Soundboard sounds available in this guild.
        target: SoundboardSound
        cardinality: many
        materialize:
          kind: query_scoped
          capability: soundboard_sound_list
          param: guild_id
      templates:
        description: Server templates derived from this guild.
        target: GuildTemplate
        cardinality: many
        materialize:
          kind: query_scoped
          capability: guild_template_list
          param: guild_id
      auto_moderation_rules:
        description: AutoMod rules for this guild.
        target: AutoModerationRule
        cardinality: many
        materialize:
          kind: query_scoped
          capability: auto_moderation_rule_list
          param: guild_id
      integrations:
        description: Third-party integrations attached to this guild.
        target: GuildIntegration
        cardinality: many
        materialize:
          kind: query_scoped
          capability: guild_integration_list
          param: guild_id
      threads:
        description: Active threads in this guild.
        target: Thread
        cardinality: many
        materialize:
          kind: query_scoped
          capability: guild_active_thread_list
          param: guild_id
  Channel:
    id_field: id
    description: A channel, thread parent, or DM channel.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      type:
        required: false
        value_ref: nv_wire_int
      guild_id:
        required: false
        value_ref: nv_channel_guild_id
      name:
        required: false
        value_ref: nv_wire_str_short
      topic:
        required: false
        value_ref: nv_wire_str_markdown
      parent_id:
        required: false
        value_ref: nv_channel_parent_id
      nsfw:
        required: false
        value_ref: nv_wire_bool
    relations:
      messages:
        description: Messages in this channel (non-thread parent).
        target: Message
        cardinality: many
        materialize:
          kind: query_scoped
          capability: message_in_channel
          param: channel_id
      webhooks:
        description: Webhooks targeting this channel.
        target: Webhook
        cardinality: many
        materialize:
          kind: query_scoped
          capability: channel_webhook_list
          param: channel_id
      threads:
        description: Threads created under this channel.
        target: Thread
        cardinality: many
        materialize:
          kind: query_scoped
          capability: channel_thread_list_archived_public
          param: channel_id
  Message:
    id_field: id
    description: A message in a channel.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      channel_id:
        required: false
        value_ref: nv_message_channel_id
      author_id:
        required: false
        value_ref: nv_message_author_id
      content:
        required: false
        value_ref: nv_wire_str_markdown
      timestamp:
        required: false
        value_ref: nv_wire_date_rfc3339
      edited_timestamp:
        required: false
        value_ref: nv_wire_date_rfc3339
      pinned:
        required: false
        value_ref: nv_wire_bool
      tts:
        required: false
        value_ref: nv_wire_bool
  User:
    id_field: id
    description: A Discord user.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      username:
        required: false
        value_ref: nv_wire_str_short
      discriminator:
        required: false
        value_ref: nv_wire_str_short
      global_name:
        required: false
        value_ref: nv_wire_str_short
      avatar:
        required: false
        value_ref: nv_wire_str_short
      bot:
        required: false
        value_ref: nv_wire_bool
    relations: {}
  GuildMember:
    id_field: user_id
    key_vars:
    - guild_id
    - user_id
    description: A user membership in a guild.
    fields:
      guild_id:
        required: true
        value_ref: nv_guild_member_guild_id
      user_id:
        required: true
        value_ref: nv_guild_member_user_id
      nick:
        required: false
        value_ref: nv_wire_str_short
      joined_at:
        required: false
        value_ref: nv_wire_date_rfc3339
      deaf:
        required: false
        value_ref: nv_wire_bool
      mute:
        required: false
        value_ref: nv_wire_bool
      pending:
        required: false
        value_ref: nv_wire_bool
    relations: {}
  Role:
    id_field: id
    key_vars:
    - guild_id
    - id
    description: A permission role in a guild.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      guild_id:
        required: true
        value_ref: nv_role_guild_id
      name:
        required: false
        value_ref: nv_wire_str_short
      color:
        required: false
        value_ref: nv_wire_int
      hoist:
        required: false
        value_ref: nv_wire_bool
      position:
        required: false
        value_ref: nv_wire_int
      managed:
        required: false
        value_ref: nv_wire_bool
      mentionable:
        required: false
        value_ref: nv_wire_bool
    relations: {}
  Ban:
    id_field: user_id
    key_vars:
    - guild_id
    - user_id
    description: A ban record for a user in a guild.
    fields:
      guild_id:
        required: true
        value_ref: nv_ban_guild_id
      user_id:
        required: true
        value_ref: nv_ban_user_id
      reason:
        required: false
        value_ref: nv_wire_str_short
    relations: {}
  ChannelPermissionOverwrite:
    id_field: id
    key_vars:
    - channel_id
    - id
    description: Permission overwrite for a member or role on a channel.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      channel_id:
        required: true
        value_ref: nv_channel_permission_overwrite_channel_id
      type:
        required: false
        value_ref: nv_wire_int
    relations: {}
  Application:
    id_field: id
    description: A Discord application (developer portal app).
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      icon:
        required: false
        value_ref: nv_wire_str_short
      bot_public:
        required: false
        value_ref: nv_wire_bool
      bot_require_code_grant:
        required: false
        value_ref: nv_wire_bool
    relations:
      commands:
        description: Global application commands.
        target: ApplicationCommand
        cardinality: many
        materialize:
          kind: query_scoped
          capability: application_command_list
          param: application_id
      emojis:
        description: Emojis owned by this application.
        target: CustomEmoji
        cardinality: many
        materialize:
          kind: query_scoped
          capability: application_emoji_list
          param: application_id
      entitlements:
        description: Entitlements for this application.
        target: Entitlement
        cardinality: many
        materialize:
          kind: query_scoped
          capability: entitlement_list
          param: application_id
  ApplicationCommand:
    id_field: id
    key_vars:
    - application_id
    - id
    description: A global slash or context-menu command for an application.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      application_id:
        required: true
        value_ref: nv_application_command_application_id
      name:
        required: false
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      type:
        required: false
        value_ref: nv_wire_int
      version:
        required: false
        value_ref: nv_wire_str_short
    relations: {}
  GuildApplicationCommand:
    id_field: id
    key_vars:
    - application_id
    - guild_id
    - id
    description: A guild-scoped application command (overrides and guild installs).
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      application_id:
        required: true
        value_ref: nv_guild_application_command_application_id
      guild_id:
        required: true
        value_ref: nv_guild_application_command_guild_id
      name:
        required: false
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      type:
        required: false
        value_ref: nv_wire_int
      version:
        required: false
        value_ref: nv_wire_str_short
    relations: {}
  Entitlement:
    id_field: id
    key_vars:
    - application_id
    - id
    description: A monetization entitlement for an SKU.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      application_id:
        required: true
        value_ref: nv_entitlement_application_id
      sku_id:
        required: false
        value_ref: nv_wire_str_short
      user_id:
        required: false
        value_ref: nv_entitlement_user_id
      guild_id:
        required: false
        value_ref: nv_entitlement_guild_id
      type:
        required: false
        value_ref: nv_wire_int
      deleted:
        required: false
        value_ref: nv_wire_bool
    relations: {}
  Webhook:
    id_field: id
    description: A channel webhook (management APIs; execute uses token path and is deferred).
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      type:
        required: false
        value_ref: nv_wire_int
      guild_id:
        required: false
        value_ref: nv_webhook_guild_id
      channel_id:
        required: false
        value_ref: nv_webhook_channel_id
      name:
        required: false
        value_ref: nv_wire_str_short
      token:
        required: false
        value_ref: nv_wire_str_short
      url:
        required: false
        value_ref: nv_wire_str_short
    relations: {}
  Invite:
    id_field: id
    description: An invite code and metadata.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      code:
        required: false
        value_ref: nv_wire_str_short
      guild_id:
        required: false
        value_ref: nv_invite_guild_id
      channel_id:
        required: false
        value_ref: nv_invite_channel_id
      inviter_id:
        required: false
        value_ref: nv_invite_inviter_id
      uses:
        required: false
        value_ref: nv_wire_int
      max_uses:
        required: false
        value_ref: nv_wire_int
      temporary:
        required: false
        value_ref: nv_wire_bool
    relations: {}
  StageInstance:
    id_field: id
    description: A live stage instance tied to a stage channel.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      guild_id:
        required: false
        value_ref: nv_stage_instance_guild_id
      channel_id:
        required: false
        value_ref: nv_stage_instance_channel_id
      topic:
        required: false
        value_ref: nv_wire_str_short
      privacy_level:
        required: false
        value_ref: nv_wire_int
      discoverable_disabled:
        required: false
        value_ref: nv_wire_bool
    relations: {}
  VoiceRegion:
    id_field: id
    description: A voice region identifier.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_wire_str_short
      vip:
        required: false
        value_ref: nv_wire_bool
      optimal:
        required: false
        value_ref: nv_wire_bool
      deprecated:
        required: false
        value_ref: nv_wire_bool
      custom:
        required: false
        value_ref: nv_wire_bool
    relations: {}
  Sticker:
    id_field: id
    description: A sticker (standard or guild-uploaded).
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_short
      tags:
        required: false
        value_ref: nv_wire_str_short
      type:
        required: false
        value_ref: nv_wire_int
      guild_id:
        required: false
        value_ref: nv_sticker_guild_id
      sort_value:
        required: false
        value_ref: nv_wire_int
    relations: {}
  StickerPack:
    id_field: id
    description: A pack of standard stickers.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      stickers:
        required: false
        value_ref: nv_sticker_pack_stickers
    relations: {}
  ScheduledEvent:
    id_field: id
    key_vars:
    - guild_id
    - id
    description: A scheduled guild event.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      guild_id:
        required: true
        value_ref: nv_scheduled_event_guild_id
      channel_id:
        required: false
        value_ref: nv_scheduled_event_channel_id
      name:
        required: false
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      scheduled_start_time:
        required: false
        value_ref: nv_wire_date_rfc3339
      scheduled_end_time:
        required: false
        value_ref: nv_wire_date_rfc3339
      privacy_level:
        required: false
        value_ref: nv_wire_int
      status:
        required: false
        value_ref: nv_wire_int
      entity_type:
        required: false
        value_ref: nv_wire_int
    relations: {}
  SoundboardSound:
    id_field: id
    key_vars:
    - guild_id
    - id
    description: A soundboard sound in a guild.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      guild_id:
        required: true
        value_ref: nv_soundboard_sound_guild_id
      name:
        required: false
        value_ref: nv_wire_str_short
      volume:
        required: false
        value_ref: nv_soundboard_sound_volume
    relations: {}
  PublicGuildTemplate:
    id_field: code
    description: A server template looked up by code before the guild exists.
    fields:
      code:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      usage_count:
        required: false
        value_ref: nv_wire_int
      creator_id:
        required: false
        value_ref: nv_public_guild_template_creator_id
      serialized_source_guild:
        required: false
        path: serialized_source_guild
        value_ref: nv_public_guild_template_serialized_source_guild
    relations: {}
  GuildTemplate:
    id_field: code
    key_vars:
    - guild_id
    - code
    description: A template snapshot and sync code for a guild.
    fields:
      code:
        required: true
        value_ref: nv_wire_str_short
      guild_id:
        required: true
        value_ref: nv_guild_template_guild_id
      name:
        required: false
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      usage_count:
        required: false
        value_ref: nv_wire_int
      creator_id:
        required: false
        value_ref: nv_guild_template_creator_id
    relations: {}
  AutoModerationRule:
    id_field: id
    key_vars:
    - guild_id
    - id
    description: An AutoMod rule in a guild.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      guild_id:
        required: true
        value_ref: nv_auto_moderation_rule_guild_id
      name:
        required: false
        value_ref: nv_wire_str_short
      event_type:
        required: false
        value_ref: nv_wire_int
      trigger_type:
        required: false
        value_ref: nv_wire_int
      enabled:
        required: false
        value_ref: nv_wire_bool
    relations: {}
  GuildIntegration:
    id_field: id
    key_vars:
    - guild_id
    - id
    description: A third-party integration attached to a guild.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      guild_id:
        required: true
        value_ref: nv_guild_integration_guild_id
      name:
        required: false
        value_ref: nv_wire_str_short
      type:
        required: false
        value_ref: nv_wire_str_short
      enabled:
        required: false
        value_ref: nv_wire_bool
    relations: {}
  WelcomeScreen:
    id_field: id
    implicit_request_identity: true
    description: Welcome screen configuration for a guild (identity is the guild id from the request path).
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
    relations: {}
  GuildWidget:
    id_field: id
    implicit_request_identity: true
    description: Guild widget JSON (identity is the guild id from the request path).
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      enabled:
        required: false
        value_ref: nv_wire_bool
      channel_id:
        required: false
        value_ref: nv_guild_widget_channel_id
    relations: {}
  Thread:
    id_field: id
    description: A message thread (forum, public, or private).
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      guild_id:
        required: false
        value_ref: nv_thread_guild_id
      parent_id:
        required: false
        value_ref: nv_thread_parent_id
      name:
        required: false
        value_ref: nv_wire_str_short
      owner_id:
        required: false
        value_ref: nv_thread_owner_id
      type:
        required: false
        value_ref: nv_wire_int
      message_count:
        required: false
        value_ref: nv_wire_int
      member_count:
        required: false
        value_ref: nv_wire_int
      archived:
        required: false
        value_ref: nv_wire_bool
    relations: {}
  CustomEmoji:
    id_field: id
    description: Custom emoji for a guild or for an application (same wire shape; scope depends on the operation).
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      application_id:
        required: false
        value_ref: nv_custom_emoji_application_id
      guild_id:
        required: false
        value_ref: nv_custom_emoji_guild_id
      name:
        required: false
        value_ref: nv_wire_str_short
      animated:
        required: false
        value_ref: nv_wire_bool
    relations: {}
  AuditLog:
    id_field: id
    implicit_request_identity: true
    description: Audit log payload for a guild (identity is the guild id from the request path).
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      audit_log_entries:
        required: false
        path: audit_log_entries
        value_ref: nv_audit_log_audit_log_entries
      users:
        required: false
        path: users
        value_ref: nv_audit_log_users
    relations: {}
  Gateway:
    id_field: id
    id_from: url
    description: Gateway connection URL metadata.
    fields:
      url:
        required: true
        value_ref: nv_wire_str_short
      shards:
        required: false
        value_ref: nv_wire_int
    relations: {}
  GatewayBot:
    id_field: id
    id_from: url
    description: Bot-specific gateway session limits.
    fields:
      url:
        required: true
        value_ref: nv_wire_str_short
      shards:
        required: false
        value_ref: nv_wire_int
      session_start_limit:
        required: false
        path: session_start_limit
        value_ref: nv_gateway_bot_session_start_limit
    relations: {}
  Interaction:
    id_field: interaction_id
    key_vars:
    - interaction_id
    - interaction_token
    description: A gateway interaction (callback acknowledgement).
    fields:
      interaction_id:
        required: true
        value_ref: nv_wire_str_short
      interaction_token:
        required: true
        value_ref: nv_wire_str_short
    relations: {}
  SoundboardDefaultSound:
    id_field: id
    description: A default soundboard sound from Discord.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_wire_str_short
    relations: {}
capabilities:
  guild_get:
    kind: get
    entity: Guild
  guild_create:
    kind: create
    entity: Guild
    input_schema:
      input_type:
        type: object
        additional_fields: true
        fields: []
  guild_update:
    kind: update
    entity: Guild
    input_schema:
      input_type:
        type: object
        additional_fields: true
        fields: []
  guild_delete:
    kind: delete
    entity: Guild
  guild_preview_fetch:
    kind: action
    entity: Guild
    description: Fetches public preview metadata for a discoverable guild.
    provides:
    - id
    - name
    - description
    - icon
    - splash
  channel_get:
    kind: get
    entity: Channel
  channel_update:
    kind: update
    entity: Channel
    input_schema:
      input_type:
        type: object
        additional_fields: true
        fields: []
  channel_delete:
    kind: delete
    entity: Channel
  channel_list_for_guild:
    kind: query
    entity: Channel
    parameters:
    - name: guild_id
      value_ref: nv_channel_list_for_guild_guild_id
      required: true
      role: scope
  channel_dm_create:
    kind: create
    entity: Channel
