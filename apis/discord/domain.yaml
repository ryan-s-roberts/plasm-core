  # --- Prune ---
  guild_prune_preview:
    kind: action
    entity: Guild
    parameters:
      - name: guild_id
        type: entity_ref
        target: Guild
        required: true
        role: scope
      - name: days
        type: integer
        required: false
      - name: include_roles
        type: string
        required: false
        string_semantics: short
    provides:
      - id
      - pruned
  guild_prune_execute:
    kind: action
    entity: Guild
    description: Prunes inactive members from the guild according to the request body.
    parameters:
      - name: guild_id
        type: entity_ref
        target: Guild
        required: true
        role: scope
      - name: days
        type: integer
        required: false
        description: >-
          Minimum number of days since last activity for a member to be pruned
          (Discord rejects the request if omitted on the wire; supply a positive integer).
      - name: compute_prune_count
        type: boolean
        required: false
        description: When true, returns a prune count without removing members.
    provides:
      - id
      - pruned

