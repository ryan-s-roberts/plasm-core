version: 2

http_backend: https://discord.com/api/v10

entities:
  Guild:
    id_field: id
    description: A Discord server (guild).
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      name:
        field_type: string
        required: false
        string_semantics: short
      description:
        field_type: string
        required: false
        string_semantics: markdown
      owner_id:
        field_type: entity_ref
        target: User
        required: false
      icon:
        field_type: string
        required: false
        string_semantics: short
      splash:
        field_type: string
        required: false
        string_semantics: short
      verification_level:
        field_type: integer
        required: false
      premium_tier:
        field_type: integer
        required: false
      pruned:
        field_type: integer
        required: false
    relations:
      channels:
        description: Channels belonging to this guild.
        target: Channel
        cardinality: many
        materialize:
          kind: query_scoped
          capability: channel_list_for_guild
          param: guild_id
      members:
        description: Members of this guild.
        target: GuildMember
        cardinality: many
        materialize:
          kind: query_scoped
          capability: guild_member_list
          param: guild_id
      roles:
        description: Roles defined in this guild.
        target: Role
        cardinality: many
        materialize:
          kind: query_scoped
          capability: guild_role_list
          param: guild_id
      bans:
        description: Bans for this guild.
        target: Ban
        cardinality: many
        materialize:
          kind: query_scoped
          capability: ban_list
          param: guild_id
      webhooks:
        description: Webhooks configured on guild channels.
        target: Webhook
        cardinality: many
        materialize:
          kind: query_scoped
          capability: guild_webhook_list
          param: guild_id
      emojis:
        description: Custom emojis uploaded to this guild.
        target: CustomEmoji
        cardinality: many
        materialize:
          kind: query_scoped
          capability: guild_emoji_list
          param: guild_id
      stickers:
        description: Stickers uploaded to this guild.
        target: Sticker
        cardinality: many
        materialize:
          kind: query_scoped
          capability: guild_sticker_list
          param: guild_id
      scheduled_events:
        description: Scheduled community events.
        target: ScheduledEvent
        cardinality: many
        materialize:
          kind: query_scoped
          capability: scheduled_event_list
          param: guild_id
      soundboard_sounds:
        description: Soundboard sounds available in this guild.
        target: SoundboardSound
        cardinality: many
        materialize:
          kind: query_scoped
          capability: soundboard_sound_list
          param: guild_id
      templates:
        description: Server templates derived from this guild.
        target: GuildTemplate
        cardinality: many
        materialize:
          kind: query_scoped
          capability: guild_template_list
          param: guild_id
      auto_moderation_rules:
        description: AutoMod rules for this guild.
        target: AutoModerationRule
        cardinality: many
        materialize:
          kind: query_scoped
          capability: auto_moderation_rule_list
          param: guild_id
      integrations:
        description: Third-party integrations attached to this guild.
        target: GuildIntegration
        cardinality: many
        materialize:
          kind: query_scoped
          capability: guild_integration_list
          param: guild_id
      threads:
        description: Active threads in this guild.
        target: Thread
        cardinality: many
        materialize:
          kind: query_scoped
          capability: guild_active_thread_list
          param: guild_id

  Channel:
    id_field: id
    description: A channel, thread parent, or DM channel.
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      type:
        field_type: integer
        required: false
      guild_id:
        field_type: entity_ref
        target: Guild
        required: false
      name:
        field_type: string
        required: false
        string_semantics: short
      topic:
        field_type: string
        required: false
        string_semantics: markdown
      parent_id:
        field_type: entity_ref
        target: Channel
        required: false
      nsfw:
        field_type: boolean
        required: false
    relations:
      messages:
        description: Messages in this channel (non-thread parent).
        target: Message
        cardinality: many
        materialize:
          kind: query_scoped
          capability: message_in_channel
          param: channel_id
      webhooks:
        description: Webhooks targeting this channel.
        target: Webhook
        cardinality: many
        materialize:
          kind: query_scoped
          capability: channel_webhook_list
          param: channel_id
      threads:
        description: Threads created under this channel.
        target: Thread
        cardinality: many
        materialize:
          kind: query_scoped
          capability: channel_thread_list_archived_public
          param: channel_id

  Message:
    id_field: id
    description: A message in a channel.
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      channel_id:
        field_type: entity_ref
        target: Channel
        required: false
      author_id:
        field_type: entity_ref
        target: User
        required: false
      content:
        field_type: string
        required: false
        string_semantics: markdown
      timestamp:
        field_type: date
        required: false
        value_format: rfc3339
      edited_timestamp:
        field_type: date
        required: false
        value_format: rfc3339
      pinned:
        field_type: boolean
        required: false
      tts:
        field_type: boolean
        required: false

  User:
    id_field: id
    description: A Discord user.
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      username:
        field_type: string
        required: false
        string_semantics: short
      discriminator:
        field_type: string
        required: false
        string_semantics: short
      global_name:
        field_type: string
        required: false
        string_semantics: short
      avatar:
        field_type: string
        required: false
        string_semantics: short
      bot:
        field_type: boolean
        required: false
    relations: {}

  GuildMember:
    id_field: user_id
    key_vars:
      - guild_id
      - user_id
    description: A user membership in a guild.
    fields:
      guild_id:
        field_type: entity_ref
        target: Guild
        required: true
      user_id:
        field_type: entity_ref
        target: User
        required: true
      nick:
        field_type: string
        required: false
        string_semantics: short
      joined_at:
        field_type: date
        required: false
        value_format: rfc3339
      deaf:
        field_type: boolean
        required: false
      mute:
        field_type: boolean
        required: false
      pending:
        field_type: boolean
        required: false
    relations: {}

  Role:
    id_field: id
    key_vars:
      - guild_id
      - id
    description: A permission role in a guild.
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      guild_id:
        field_type: entity_ref
        target: Guild
        required: true
      name:
        field_type: string
        required: false
        string_semantics: short
      color:
        field_type: integer
        required: false
      hoist:
        field_type: boolean
        required: false
      position:
        field_type: integer
        required: false
      managed:
        field_type: boolean
        required: false
      mentionable:
        field_type: boolean
        required: false
    relations: {}

  Ban:
    id_field: user_id
    key_vars:
      - guild_id
      - user_id
    description: A ban record for a user in a guild.
    fields:
      guild_id:
        field_type: entity_ref
        target: Guild
        required: true
      user_id:
        field_type: entity_ref
        target: User
        required: true
      reason:
        field_type: string
        required: false
        string_semantics: short
    relations: {}

  ChannelPermissionOverwrite:
    id_field: id
    key_vars:
      - channel_id
      - id
    description: Permission overwrite for a member or role on a channel.
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      channel_id:
        field_type: entity_ref
        target: Channel
        required: true
      type:
        field_type: integer
        required: false
    relations: {}

  Application:
    id_field: id
    description: A Discord application (developer portal app).
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      name:
        field_type: string
        required: false
        string_semantics: short
      description:
        field_type: string
        required: false
        string_semantics: markdown
      icon:
        field_type: string
        required: false
        string_semantics: short
      bot_public:
        field_type: boolean
        required: false
      bot_require_code_grant:
        field_type: boolean
        required: false
    relations:
      commands:
        description: Global application commands.
        target: ApplicationCommand
        cardinality: many
        materialize:
          kind: query_scoped
          capability: application_command_list
          param: application_id
      emojis:
        description: Emojis owned by this application.
        target: CustomEmoji
        cardinality: many
        materialize:
          kind: query_scoped
          capability: application_emoji_list
          param: application_id
      entitlements:
        description: Entitlements for this application.
        target: Entitlement
        cardinality: many
        materialize:
          kind: query_scoped
          capability: entitlement_list
          param: application_id

  ApplicationCommand:
    id_field: id
    key_vars:
      - application_id
      - id
    description: A global slash or context-menu command for an application.
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      application_id:
        field_type: entity_ref
        target: Application
        required: true
      name:
        field_type: string
        required: false
        string_semantics: short
      description:
        field_type: string
        required: false
        string_semantics: markdown
      type:
        field_type: integer
        required: false
      version:
        field_type: string
        required: false
        string_semantics: short
    relations: {}

  GuildApplicationCommand:
    id_field: id
    key_vars:
      - application_id
      - guild_id
      - id
    description: A guild-scoped application command (overrides and guild installs).
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      application_id:
        field_type: entity_ref
        target: Application
        required: true
      guild_id:
        field_type: entity_ref
        target: Guild
        required: true
      name:
        field_type: string
        required: false
        string_semantics: short
      description:
        field_type: string
        required: false
        string_semantics: markdown
      type:
        field_type: integer
        required: false
      version:
        field_type: string
        required: false
        string_semantics: short
    relations: {}

  Entitlement:
    id_field: id
    key_vars:
      - application_id
      - id
    description: A monetization entitlement for an SKU.
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      application_id:
        field_type: entity_ref
        target: Application
        required: true
      sku_id:
        field_type: string
        required: false
        string_semantics: short
      user_id:
        field_type: entity_ref
        target: User
        required: false
      guild_id:
        field_type: entity_ref
        target: Guild
        required: false
      type:
        field_type: integer
        required: false
      deleted:
        field_type: boolean
        required: false
    relations: {}

  Webhook:
    id_field: id
    description: A channel webhook (management APIs; execute uses token path and is deferred).
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      type:
        field_type: integer
        required: false
      guild_id:
        field_type: entity_ref
        target: Guild
        required: false
      channel_id:
        field_type: entity_ref
        target: Channel
        required: false
      name:
        field_type: string
        required: false
        string_semantics: short
      token:
        field_type: string
        required: false
        string_semantics: short
      url:
        field_type: string
        required: false
        string_semantics: short
    relations: {}

  Invite:
    id_field: id
    description: An invite code and metadata.
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      code:
        field_type: string
        required: false
        string_semantics: short
      guild_id:
        field_type: entity_ref
        target: Guild
        required: false
      channel_id:
        field_type: entity_ref
        target: Channel
        required: false
      inviter_id:
        field_type: entity_ref
        target: User
        required: false
      uses:
        field_type: integer
        required: false
      max_uses:
        field_type: integer
        required: false
      temporary:
        field_type: boolean
        required: false
    relations: {}

  StageInstance:
    id_field: id
    description: A live stage instance tied to a stage channel.
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      guild_id:
        field_type: entity_ref
        target: Guild
        required: false
      channel_id:
        field_type: entity_ref
        target: Channel
        required: false
      topic:
        field_type: string
        required: false
        string_semantics: short
      privacy_level:
        field_type: integer
        required: false
      discoverable_disabled:
        field_type: boolean
        required: false
    relations: {}

  VoiceRegion:
    id_field: id
    description: A voice region identifier.
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      name:
        field_type: string
        required: false
        string_semantics: short
      vip:
        field_type: boolean
        required: false
      optimal:
        field_type: boolean
        required: false
      deprecated:
        field_type: boolean
        required: false
      custom:
        field_type: boolean
        required: false
    relations: {}

  Sticker:
    id_field: id
    description: A sticker (standard or guild-uploaded).
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      name:
        field_type: string
        required: false
        string_semantics: short
      description:
        field_type: string
        required: false
        string_semantics: short
      tags:
        field_type: string
        required: false
        string_semantics: short
      type:
        field_type: integer
        required: false
      guild_id:
        field_type: entity_ref
        target: Guild
        required: false
      sort_value:
        field_type: integer
        required: false
    relations: {}

  StickerPack:
    id_field: id
    description: A pack of standard stickers.
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      stickers:
        field_type: json
        required: false
    relations: {}

  ScheduledEvent:
    id_field: id
    key_vars:
      - guild_id
      - id
    description: A scheduled guild event.
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      guild_id:
        field_type: entity_ref
        target: Guild
        required: true
      channel_id:
        field_type: entity_ref
        target: Channel
        required: false
      name:
        field_type: string
        required: false
        string_semantics: short
      description:
        field_type: string
        required: false
        string_semantics: markdown
      scheduled_start_time:
        field_type: date
        required: false
        value_format: rfc3339
      scheduled_end_time:
        field_type: date
        required: false
        value_format: rfc3339
      privacy_level:
        field_type: integer
        required: false
      status:
        field_type: integer
        required: false
      entity_type:
        field_type: integer
        required: false
    relations: {}

  SoundboardSound:
    id_field: id
    key_vars:
      - guild_id
      - id
    description: A soundboard sound in a guild.
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      guild_id:
        field_type: entity_ref
        target: Guild
        required: true
      name:
        field_type: string
        required: false
        string_semantics: short
      volume:
        field_type: number
        required: false
    relations: {}

  PublicGuildTemplate:
    id_field: code
    description: A server template looked up by code before the guild exists.
    fields:
      code:
        field_type: string
        required: true
        string_semantics: short
      name:
        field_type: string
        required: false
        string_semantics: short
      description:
        field_type: string
        required: false
        string_semantics: markdown
      usage_count:
        field_type: integer
        required: false
      creator_id:
        field_type: entity_ref
        target: User
        required: false
      serialized_source_guild:
        field_type: json
        required: false
        path: serialized_source_guild
    relations: {}

  GuildTemplate:
    id_field: code
    key_vars:
      - guild_id
      - code
    description: A template snapshot and sync code for a guild.
    fields:
      code:
        field_type: string
        required: true
        string_semantics: short
      guild_id:
        field_type: entity_ref
        target: Guild
        required: true
      name:
        field_type: string
        required: false
        string_semantics: short
      description:
        field_type: string
        required: false
        string_semantics: markdown
      usage_count:
        field_type: integer
        required: false
      creator_id:
        field_type: entity_ref
        target: User
        required: false
    relations: {}

  AutoModerationRule:
    id_field: id
    key_vars:
      - guild_id
      - id
    description: An AutoMod rule in a guild.
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      guild_id:
        field_type: entity_ref
        target: Guild
        required: true
      name:
        field_type: string
        required: false
        string_semantics: short
      event_type:
        field_type: integer
        required: false
      trigger_type:
        field_type: integer
        required: false
      enabled:
        field_type: boolean
        required: false
    relations: {}

  GuildIntegration:
    id_field: id
    key_vars:
      - guild_id
      - id
    description: A third-party integration attached to a guild.
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      guild_id:
        field_type: entity_ref
        target: Guild
        required: true
      name:
        field_type: string
        required: false
        string_semantics: short
      type:
        field_type: string
        required: false
        string_semantics: short
      enabled:
        field_type: boolean
        required: false
    relations: {}

  WelcomeScreen:
    id_field: id
    implicit_request_identity: true
    description: Welcome screen configuration for a guild (identity is the guild id from the request path).
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      description:
        field_type: string
        required: false
        string_semantics: markdown
    relations: {}

  GuildWidget:
    id_field: id
    implicit_request_identity: true
    description: Guild widget JSON (identity is the guild id from the request path).
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      enabled:
        field_type: boolean
        required: false
      channel_id:
        field_type: entity_ref
        target: Channel
        required: false
    relations: {}

  Thread:
    id_field: id
    description: A message thread (forum, public, or private).
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      guild_id:
        field_type: entity_ref
        target: Guild
        required: false
      parent_id:
        field_type: entity_ref
        target: Channel
        required: false
      name:
        field_type: string
        required: false
        string_semantics: short
      owner_id:
        field_type: entity_ref
        target: User
        required: false
      type:
        field_type: integer
        required: false
      message_count:
        field_type: integer
        required: false
      member_count:
        field_type: integer
        required: false
      archived:
        field_type: boolean
        required: false
    relations: {}

  CustomEmoji:
    id_field: id
    description: Custom emoji for a guild or for an application (same wire shape; scope depends on the operation).
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      application_id:
        field_type: entity_ref
        target: Application
        required: false
      guild_id:
        field_type: entity_ref
        target: Guild
        required: false
      name:
        field_type: string
        required: false
        string_semantics: short
      animated:
        field_type: boolean
        required: false
    relations: {}

  AuditLog:
    id_field: id
    implicit_request_identity: true
    description: Audit log payload for a guild (identity is the guild id from the request path).
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      audit_log_entries:
        field_type: json
        required: false
        path: audit_log_entries
      users:
        field_type: json
        required: false
        path: users
    relations: {}

  Gateway:
    id_field: id
    id_from: url
    description: Gateway connection URL metadata.
    fields:
      url:
        field_type: string
        required: true
        string_semantics: short
      shards:
        field_type: integer
        required: false
    relations: {}

  GatewayBot:
    id_field: id
    id_from: url
    description: Bot-specific gateway session limits.
    fields:
      url:
        field_type: string
        required: true
        string_semantics: short
      shards:
        field_type: integer
        required: false
      session_start_limit:
        field_type: json
        required: false
        path: session_start_limit
    relations: {}

  Interaction:
    id_field: interaction_id
    key_vars:
      - interaction_id
      - interaction_token
    description: A gateway interaction (callback acknowledgement).
    fields:
      interaction_id:
        field_type: string
        required: true
        string_semantics: short
      interaction_token:
        field_type: string
        required: true
        string_semantics: short
    relations: {}

  SoundboardDefaultSound:
    id_field: id
    description: A default soundboard sound from Discord.
    fields:
      id:
        field_type: string
        required: true
        string_semantics: short
      name:
        field_type: string
        required: false
        string_semantics: short
    relations: {}

capabilities:
  # --- Guild ---
  guild_get:
    kind: get
    entity: Guild
  guild_create:
    kind: create
    entity: Guild
    input_schema:
      input_type:
        type: object
        additional_fields: true
        fields: []
  guild_update:
    kind: update
    entity: Guild
    input_schema:
      input_type:
        type: object
        additional_fields: true
        fields: []
  guild_delete:
    kind: delete
    entity: Guild
  guild_preview_fetch:
    kind: action
    entity: Guild
    description: Fetches public preview metadata for a discoverable guild.
    provides:
      - id
      - name
      - description
      - icon
      - splash

  # --- Channel ---
  channel_get:
    kind: get
    entity: Channel
  channel_update:
    kind: update
    entity: Channel
    input_schema:
      input_type:
        type: object
        additional_fields: true
        fields: []
  channel_delete:
    kind: delete
    entity: Channel
  channel_list_for_guild:
    kind: query
    entity: Channel
    parameters:
      - name: guild_id
        type: entity_ref
        target: Guild
        required: true
        role: scope
  channel_dm_create:
    kind: create
    entity: Channel
    description: Opens a DM channel with recipients described in the JSON body.
    input_schema:
      input_type:
        type: object
