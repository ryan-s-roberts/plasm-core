  method: POST
  path:
  - type: literal
    value: channels
  - name: channel_id
    type: var
  - type: literal
    value: messages
  body:
    type: object
    fields:
    - - content
      - type: var
        name: content
    - - message_reference
      - type: object
        fields:
        - - message_id
          - type: var
            name: parent_id
        - - channel_id
          - type: var
            name: parent_channel_id
        - - fail_if_not_exists
          - type: const
            value: false
    - - tts
      - type: if
        condition:
