- id: pk-17
  schema: pokeapi
  goal: "Pick a species, then list encounter locations where it appears in the wild"
  tags: [multi_step]
  covers: [multi_step, chain]
  expect:
    entities_any: [PokemonSpecies, Location]

- id: pk-18
  schema: pokeapi
  goal: "Pikachu — only name, height, and weight for the team roster card"
  tags: [get, projection]
  covers: [get, projection]
  expect:
    entities_any: [Pokemon]
    pred_values_any: [pikachu]
    projection_contains: [name, height, weight]

- id: pk-19
  schema: pokeapi
  goal: "Which Pokémon have Electric as a secondary type — reverse from the type graph"
  tags: [reverse]
  covers: [reverse]
  expect:
    entities_any: [Pokemon, Type]

