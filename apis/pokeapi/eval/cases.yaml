# PokéAPI — NL→Plasm eval (full surface). Goals read like Pokédex / team-building tasks.
- id: pk-01
  schema: pokeapi
  goal: "Look up Pikachu's base stats for a battle simulator"
  tags: [get]
  covers: [get]
  expect:
    entities_any: [Pokemon]
    pred_values_any: [pikachu]

- id: pk-02
  schema: pokeapi
  goal: "Evolution and flavor text for Pikachu's species record"
  tags: [chain]
  covers: [chain]
  expect:
    entities_any: [Pokemon, PokemonSpecies]
    chain_selectors_any: [species]

- id: pk-03
  schema: pokeapi
  goal: "All fire-type species I could breed for a mono-fire run"
  tags: [query, filter]
  covers: [query_filtered]
  expect:
    entities_any: [PokemonSpecies]

- id: pk-04
  schema: pokeapi
  goal: "Move data for Thunderbolt (PP, power, type) for the moveset planner"
  tags: [get]
  covers: [get]
  expect:
    entities_any: [Move]
    pred_values_any: [thunderbolt]

- id: pk-05
  schema: pokeapi
  goal: "Starter Bulbasaur spread for a Nuzlocke sheet"
  tags: [get]
  covers: [get]
  expect:
    entities_any: [Pokemon]
    pred_values_any: [bulbasaur]

