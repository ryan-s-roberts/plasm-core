    fields:
      id:
        required: false
        value_ref: nv_language_id
      name:
        required: true
        value_ref: nv_language_name
      url:
        required: false
        value_ref: nv_language_url
      official:
        required: false
        value_ref: nv_language_official
      iso639:
        required: false
        value_ref: nv_language_iso639
      iso3166:
        required: false
        value_ref: nv_language_iso3166
  Location:
    id_field: name
    description: A location in the Pokémon world
    fields:
      id:
        required: false
        value_ref: nv_location_id
      name:
        required: true
        value_ref: nv_location_name
      url:
        required: false
        value_ref: nv_location_url
