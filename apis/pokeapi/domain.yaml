version: 1
auth:
  scheme: none
http_backend: https://pokeapi.co
entities:
  Ability:
    id_field: name
    description: A special power a Pokémon can have
    fields:
      id:
        required: false
        value_ref: nv_ability_id
      name:
        required: true
        value_ref: nv_ability_name
      url:
        required: false
        value_ref: nv_ability_url
      is_main_series:
        required: false
        value_ref: nv_ability_is_main_series
    relations:
      generation:
        description: Generation this ability was introduced
        target: Generation
        cardinality: one
      pokemon:
        description: Pokémon that can have this ability
        target: Pokemon
        cardinality: many
        materialize:
          kind: from_parent_get
          path:
          - key: pokemon
          - wildcard: true
          - key: pokemon
  Berry:
    id_field: name
    description: A berry item found in the Pokémon world
    fields:
      id:
        required: false
        value_ref: nv_berry_id
      name:
        required: true
        value_ref: nv_berry_name
      url:
        required: false
        value_ref: nv_berry_url
      growth_time:
        required: false
        value_ref: nv_berry_growth_time
      max_harvest:
        required: false
        value_ref: nv_berry_max_harvest
      natural_gift_power:
        required: false
        value_ref: nv_berry_natural_gift_power
      size:
        required: false
        value_ref: nv_berry_size
      smoothness:
        required: false
        value_ref: nv_berry_smoothness
      soil_dryness:
        required: false
        value_ref: nv_berry_soil_dryness
    relations:
      firmness:
        description: Firmness category of this berry
        target: BerryFirmness
        cardinality: one
      item:
        description: Corresponding item resource
        target: Item
        cardinality: one
      natural_gift_type:
        description: Type granted by Natural Gift
        target: Type
        cardinality: one
  BerryFirmness:
    id_field: name
    description: Firmness rating for berries
    fields:
      id:
        required: false
        value_ref: nv_berry_firmness_id
      name:
        required: true
        value_ref: nv_berry_firmness_name
      url:
        required: false
        value_ref: nv_berry_firmness_url
    relations:
      berries:
        description: Berries with this firmness
        target: Berry
        cardinality: many
  BerryFlavor:
    id_field: name
    description: A flavor profile for berries
    fields:
      id:
        required: false
        value_ref: nv_berry_flavor_id
      name:
        required: true
        value_ref: nv_berry_flavor_name
      url:
        required: false
        value_ref: nv_berry_flavor_url
    relations:
      contest_type:
        description: Contest type linked to this flavor
        target: ContestType
        cardinality: one
  Characteristic:
    id_field: url
    description: A genetic characteristic from IVs
    fields:
      id:
        required: false
        value_ref: nv_characteristic_id
      url:
        required: true
        value_ref: nv_characteristic_url
      gene_modulo:
        required: false
        value_ref: nv_characteristic_gene_modulo
      possible_values:
        required: false
        value_ref: nv_characteristic_possible_values
    relations:
      highest_stat:
        description: Stat this characteristic indicates
        target: Stat
        cardinality: one
  ContestType:
    id_field: name
    description: A Pokémon contest category
    fields:
      id:
        required: false
        value_ref: nv_contest_type_id
      name:
        required: true
        value_ref: nv_contest_type_name
      url:
        required: false
        value_ref: nv_contest_type_url
    relations:
      berry_flavor:
        description: Berry flavor linked to this contest type
        target: BerryFlavor
        cardinality: one
  ContestEffect:
    id_field: url
    description: Effect of a move in a Pokémon contest
    fields:
      id:
        required: false
        value_ref: nv_contest_effect_id
      url:
        required: true
        value_ref: nv_contest_effect_url
      appeal:
        required: false
        value_ref: nv_contest_effect_appeal
      jam:
        required: false
        value_ref: nv_contest_effect_jam
  EggGroup:
    id_field: name
    description: A breeding compatibility group
    fields:
      id:
        required: false
        value_ref: nv_egg_group_id
      name:
        required: true
        value_ref: nv_egg_group_name
      url:
        required: false
        value_ref: nv_egg_group_url
    relations:
      pokemon_species:
        description: Species in this egg group
        target: PokemonSpecies
        cardinality: many
  EncounterMethod:
    id_field: name
    description: Method of encountering wild Pokémon
    fields:
      id:
        required: false
        value_ref: nv_encounter_method_id
      name:
        required: true
        value_ref: nv_encounter_method_name
      url:
        required: false
        value_ref: nv_encounter_method_url
      order:
        required: false
        value_ref: nv_encounter_method_order
  EncounterCondition:
    id_field: name
    description: A condition affecting wild encounters
    fields:
      id:
        required: false
        value_ref: nv_encounter_condition_id
      name:
        required: true
        value_ref: nv_encounter_condition_name
      url:
        required: false
        value_ref: nv_encounter_condition_url
    relations:
      values:
        description: Possible values for this condition
        target: EncounterConditionValue
        cardinality: many
  EncounterConditionValue:
    id_field: name
    description: A specific value for an encounter condition
    fields:
      id:
        required: false
        value_ref: nv_encounter_condition_value_id
      name:
        required: true
        value_ref: nv_encounter_condition_value_name
      url:
        required: false
        value_ref: nv_encounter_condition_value_url
    relations:
      condition:
        description: Parent encounter condition
        target: EncounterCondition
        cardinality: one
  EvolutionChain:
    id_field: url
    description: A chain of Pokémon evolution stages
    fields:
      id:
        required: false
        value_ref: nv_evolution_chain_id
      url:
        required: true
        value_ref: nv_evolution_chain_url
    relations:
      baby_trigger_item:
        description: Item that triggers baby Pokémon breeding
        target: Item
        cardinality: one
  EvolutionTrigger:
    id_field: name
    description: An event that triggers evolution
    fields:
      id:
        required: false
        value_ref: nv_evolution_trigger_id
      name:
        required: true
        value_ref: nv_evolution_trigger_name
      url:
        required: false
        value_ref: nv_evolution_trigger_url
    relations:
      pokemon_species:
        description: Species that evolve via this trigger
        target: PokemonSpecies
        cardinality: many
  Generation:
    id_field: name
    description: A game generation (e.g. Gen I, Gen II)
    fields:
      id:
        required: false
        value_ref: nv_generation_id
      name:
        required: true
        value_ref: nv_generation_name
      url:
        required: false
        value_ref: nv_generation_url
    relations:
      main_region:
        description: Primary region for this generation
        target: Region
        cardinality: one
  Gender:
    id_field: name
    description: A Pokémon gender option
    fields:
      id:
        required: false
        value_ref: nv_gender_id
      name:
        required: true
        value_ref: nv_gender_name
      url:
        required: false
        value_ref: nv_gender_url
    relations:
      pokemon_species_details:
        description: Species with gender-specific details
        target: PokemonSpecies
        cardinality: many
      required_for_evolution:
        description: Species requiring this gender to evolve
        target: PokemonSpecies
        cardinality: many
  GrowthRate:
    id_field: name
    description: An experience growth rate curve
    fields:
      id:
        required: false
        value_ref: nv_growth_rate_id
      name:
        required: true
        value_ref: nv_growth_rate_name
      url:
        required: false
        value_ref: nv_growth_rate_url
      formula:
        required: false
        value_ref: nv_growth_rate_formula
    relations:
      pokemon_species:
        description: Species that use this growth rate
        target: PokemonSpecies
        cardinality: many
  Item:
    id_field: name
    description: A collectible item in the Pokémon world
    fields:
      id:
        required: false
        value_ref: nv_item_id
      name:
        required: true
        value_ref: nv_item_name
      url:
        required: false
        value_ref: nv_item_url
      cost:
        required: false
        value_ref: nv_item_cost
      fling_power:
        required: false
        value_ref: nv_item_fling_power
    relations:
      fling_effect:
        description: Effect when used with Fling
        target: ItemFlingEffect
        cardinality: one
      category:
        description: Item category classification
        target: ItemCategory
        cardinality: one
      baby_trigger_for:
        description: Evolution chain this item triggers
        target: EvolutionChain
        cardinality: one
  ItemCategory:
    id_field: name
    description: A category grouping for items
    fields:
      id:
        required: false
        value_ref: nv_item_category_id
      name:
        required: true
        value_ref: nv_item_category_name
      url:
        required: false
        value_ref: nv_item_category_url
    relations:
      pocket:
        description: Bag pocket this category belongs to
        target: ItemPocket
        cardinality: one
      items:
        description: Items in this category
        target: Item
        cardinality: many
  ItemAttribute:
    id_field: name
    description: A trait or property of items
    fields:
      id:
        required: false
        value_ref: nv_item_attribute_id
      name:
        required: true
        value_ref: nv_item_attribute_name
      url:
        required: false
        value_ref: nv_item_attribute_url
    relations:
      items:
        description: Items with this attribute
        target: Item
        cardinality: many
  ItemFlingEffect:
    id_field: name
