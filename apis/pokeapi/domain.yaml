      id:
        required: false
        value_ref: nv_item_fling_effect_id
      name:
        required: true
        value_ref: nv_item_fling_effect_name
      url:
        required: false
        value_ref: nv_item_fling_effect_url
    relations:
      items:
        description: Items with this fling effect
        target: Item
        cardinality: many
  ItemPocket:
    id_field: name
