      region:
        description: Region this location belongs to
        target: Region
        cardinality: one
      areas:
        description: Sub-areas within this location
        target: LocationArea
        cardinality: many
  LocationArea:
    id_field: name
    description: A sub-area within a location
    fields:
      id:
        required: false
        value_ref: nv_location_area_id
      name:
        required: true
        value_ref: nv_location_area_name
      url:
        required: false
        value_ref: nv_location_area_url
