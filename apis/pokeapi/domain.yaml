    fields:
      id:
        required: false
        value_ref: nv_item_pocket_id
      name:
        required: true
        value_ref: nv_item_pocket_name
      url:
        required: false
        value_ref: nv_item_pocket_url
    relations:
      categories:
        description: Item categories in this pocket
