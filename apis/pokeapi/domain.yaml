version: 1

auth:
  scheme: none

http_backend: https://pokeapi.co

entities:
  Ability:
    id_field: name
    description: A special power a Pokémon can have
    fields:
      id:
        description: Numeric ability identifier
        field_type: integer
        required: false
      name:
        description: Ability name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
      is_main_series:
        description: Whether this ability is from the main series
        field_type: boolean
        required: false
    relations:
      generation:
        description: Generation this ability was introduced
        target: Generation
        cardinality: one
      pokemon:
        description: Pokémon that can have this ability
        target: Pokemon
        cardinality: many
        materialize:
          kind: from_parent_get
          path:
          - key: pokemon
          - wildcard: true
          - key: pokemon
  Berry:
    id_field: name
    description: A berry item found in the Pokémon world
    fields:
      id:
        description: Numeric berry identifier
        field_type: integer
        required: false
      name:
        description: Berry name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
      growth_time:
        description: Hours for one growth stage
        field_type: integer
        required: false
      max_harvest:
        description: Maximum number harvestable at once
        field_type: integer
        required: false
      natural_gift_power:
        description: Power of Natural Gift when held
        field_type: integer
        required: false
      size:
        description: Size of the berry in millimeters
        field_type: integer
        required: false
      smoothness:
        description: Smoothness value for Pokéblocks
        field_type: integer
        required: false
      soil_dryness:
        description: Rate at which soil dries with this berry
        field_type: integer
        required: false
    relations:
      firmness:
        description: Firmness category of this berry
        target: BerryFirmness
        cardinality: one
      item:
        description: Corresponding item resource
        target: Item
        cardinality: one
      natural_gift_type:
        description: Type granted by Natural Gift
        target: Type
        cardinality: one
  BerryFirmness:
    id_field: name
    description: Firmness rating for berries
    fields:
      id:
        description: Numeric firmness identifier
        field_type: integer
        required: false
      name:
        description: Firmness name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
    relations:
      berries:
        description: Berries with this firmness
        target: Berry
        cardinality: many
  BerryFlavor:
    id_field: name
    description: A flavor profile for berries
    fields:
      id:
        description: Numeric flavor identifier
        field_type: integer
        required: false
      name:
        description: Flavor name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
    relations:
      contest_type:
        description: Contest type linked to this flavor
        target: ContestType
        cardinality: one
  Characteristic:
    id_field: url
    description: A genetic characteristic from IVs
    fields:
      id:
        description: Numeric characteristic identifier
        field_type: integer
        required: false
      url:
        description: API resource URL (unique key)
        field_type: string
        required: true
        string_semantics: short
      gene_modulo:
        description: Remainder when dividing highest IV by 5
        field_type: integer
        required: false
      possible_values:
        description: Possible IV values for this characteristic
        field_type: array
        required: false
        items:
          type: string
    relations:
      highest_stat:
        description: Stat this characteristic indicates
        target: Stat
        cardinality: one
  ContestType:
    id_field: name
    description: A Pokémon contest category
    fields:
      id:
        description: Numeric contest type identifier
        field_type: integer
        required: false
      name:
        description: Contest type name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
    relations:
      berry_flavor:
        description: Berry flavor linked to this contest type
        target: BerryFlavor
        cardinality: one
  ContestEffect:
    id_field: url
    description: Effect of a move in a Pokémon contest
    fields:
      id:
        description: Numeric contest effect identifier
        field_type: integer
        required: false
      url:
        description: API resource URL (unique key)
        field_type: string
        required: true
        string_semantics: short
      appeal:
        description: Appeal points gained in contest
        field_type: integer
        required: false
      jam:
        description: Jam points caused to opponents
        field_type: integer
        required: false
  EggGroup:
    id_field: name
    description: A breeding compatibility group
    fields:
      id:
        description: Numeric egg group identifier
        field_type: integer
        required: false
      name:
        description: Egg group name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
    relations:
      pokemon_species:
        description: Species in this egg group
        target: PokemonSpecies
        cardinality: many
  EncounterMethod:
    id_field: name
    description: Method of encountering wild Pokémon
    fields:
      id:
        description: Numeric encounter method identifier
        field_type: integer
        required: false
      name:
        description: Method name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
      order:
        description: Display sort order
        field_type: integer
        required: false
  EncounterCondition:
    id_field: name
    description: A condition affecting wild encounters
    fields:
      id:
        description: Numeric condition identifier
        field_type: integer
        required: false
      name:
        description: Condition name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
    relations:
      values:
        description: Possible values for this condition
        target: EncounterConditionValue
        cardinality: many
  EncounterConditionValue:
    id_field: name
    description: A specific value for an encounter condition
    fields:
      id:
        description: Numeric condition value identifier
        field_type: integer
        required: false
      name:
        description: Value name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
    relations:
      condition:
        description: Parent encounter condition
        target: EncounterCondition
        cardinality: one
  EvolutionChain:
    id_field: url
    description: A chain of Pokémon evolution stages
    fields:
      id:
        description: Numeric evolution chain identifier
        field_type: integer
        required: false
      url:
        description: API resource URL (unique key)
        field_type: string
        required: true
        string_semantics: short
    relations:
      baby_trigger_item:
        description: Item that triggers baby Pokémon breeding
        target: Item
        cardinality: one
  EvolutionTrigger:
    id_field: name
    description: An event that triggers evolution
    fields:
      id:
        description: Numeric trigger identifier
        field_type: integer
        required: false
      name:
        description: Trigger name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
    relations:
      pokemon_species:
        description: Species that evolve via this trigger
        target: PokemonSpecies
        cardinality: many
  Generation:
    id_field: name
    description: A game generation (e.g. Gen I, Gen II)
    fields:
      id:
        description: Numeric generation identifier
        field_type: integer
        required: false
      name:
        description: Generation name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
    relations:
      main_region:
        description: Primary region for this generation
        target: Region
        cardinality: one
  Gender:
    id_field: name
    description: A Pokémon gender option
    fields:
      id:
        description: Numeric gender identifier
        field_type: integer
        required: false
      name:
        description: Gender name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
    relations:
      pokemon_species_details:
        description: Species with gender-specific details
        target: PokemonSpecies
        cardinality: many
      required_for_evolution:
        description: Species requiring this gender to evolve
        target: PokemonSpecies
        cardinality: many
  GrowthRate:
    id_field: name
    description: An experience growth rate curve
    fields:
      id:
        description: Numeric growth rate identifier
        field_type: integer
        required: false
      name:
        description: Growth rate name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
      formula:
        description: Mathematical formula for leveling
        field_type: string
        required: false
        string_semantics: short
    relations:
      pokemon_species:
        description: Species that use this growth rate
        target: PokemonSpecies
        cardinality: many
  Item:
    id_field: name
    description: A collectible item in the Pokémon world
    fields:
      id:
        description: Numeric item identifier
        field_type: integer
        required: false
      name:
        description: Item name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
      cost:
        description: Price in Pokémon currency
        field_type: integer
        required: false
      fling_power:
        description: Power when used with Fling
        field_type: integer
        required: false
    relations:
      fling_effect:
        description: Effect when used with Fling
        target: ItemFlingEffect
        cardinality: one
      category:
        description: Item category classification
        target: ItemCategory
        cardinality: one
      baby_trigger_for:
        description: Evolution chain this item triggers
        target: EvolutionChain
        cardinality: one
  ItemCategory:
    id_field: name
    description: A category grouping for items
    fields:
      id:
        description: Numeric category identifier
        field_type: integer
        required: false
      name:
        description: Category name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
    relations:
      pocket:
        description: Bag pocket this category belongs to
        target: ItemPocket
        cardinality: one
      items:
        description: Items in this category
        target: Item
        cardinality: many
  ItemAttribute:
    id_field: name
    description: A trait or property of items
    fields:
      id:
        description: Numeric attribute identifier
        field_type: integer
        required: false
      name:
        description: Attribute name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
    relations:
      items:
        description: Items with this attribute
        target: Item
        cardinality: many
  ItemFlingEffect:
    id_field: name
    description: Effect when an item is flung in battle
    fields:
      id:
        description: Numeric fling effect identifier
        field_type: integer
        required: false
      name:
        description: Fling effect name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
    relations:
      items:
        description: Items with this fling effect
        target: Item
        cardinality: many
  ItemPocket:
    id_field: name
    description: A pocket in the player's bag
    fields:
      id:
        description: Numeric pocket identifier
        field_type: integer
        required: false
      name:
        description: Pocket name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
    relations:
      categories:
        description: Item categories in this pocket
        target: ItemCategory
        cardinality: many
  Language:
    id_field: name
    description: A language for localized game text
    fields:
      id:
        description: Numeric language identifier
        field_type: integer
        required: false
      name:
        description: Language name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
      official:
        description: Whether this is an official game language
        field_type: boolean
        required: false
      iso639:
        description: ISO 639 language code
        field_type: string
        required: false
        string_semantics: short
      iso3166:
        description: ISO 3166 country code
        field_type: string
        required: false
        string_semantics: short
  Location:
    id_field: name
    description: A location in the Pokémon world
    fields:
      id:
        description: Numeric location identifier
        field_type: integer
        required: false
      name:
        description: Location name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
    relations:
      region:
        description: Region this location belongs to
        target: Region
        cardinality: one
      areas:
        description: Sub-areas within this location
        target: LocationArea
        cardinality: many
  LocationArea:
    id_field: name
    description: A sub-area within a location
    fields:
      id:
        description: Numeric area identifier
        field_type: integer
        required: false
      name:
        description: Area name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
      game_index:
        description: Internal game index for this area
        field_type: integer
        required: false
    relations:
      location:
        description: Parent location
        target: Location
        cardinality: one
  Machine:
    id_field: url
    description: A TM or HM that teaches a move
    fields:
      id:
        description: Numeric machine identifier
        field_type: integer
        required: false
      url:
        description: API resource URL (unique key)
        field_type: string
        required: true
        string_semantics: short
    relations:
      item:
        description: Item form of this machine
        target: Item
        cardinality: one
      version_group:
        description: Version group this machine appears in
        target: VersionGroup
        cardinality: one
      move:
        description: Move this machine teaches
        target: Move
        cardinality: one
  Move:
    id_field: name
    description: An attack or technique usable in battle
    fields:
      id:
        description: Numeric move identifier
        field_type: integer
        required: false
      name:
        description: Move name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
      accuracy:
        description: Move accuracy percentage
        field_type: integer
        required: false
      effect_chance:
        description: Chance of secondary effect occurring
        field_type: integer
        required: false
      pp:
        description: Base power points
        field_type: integer
        required: false
      priority:
        description: Move priority bracket
        field_type: integer
        required: false
      power:
        description: Base power of the move
        field_type: integer
        required: false
    relations:
      contest_type:
        description: Contest type this move belongs to
        target: ContestType
        cardinality: one
      contest_effect:
        description: Effect in Pokémon contests
        target: ContestEffect
        cardinality: one
      damage_class:
        description: Physical, special, or status
        target: MoveDamageClass
        cardinality: one
      generation:
        description: Generation this move was introduced
        target: Generation
        cardinality: one
      super_contest_effect:
        description: Effect in Super Contests
        target: SuperContestEffect
        cardinality: one
      target:
        description: Targeting mode for this move
        target: MoveTarget
        cardinality: one
      type:
        description: Elemental type of this move
        target: Type
        cardinality: one
      ailment:
        description: Status ailment this move inflicts
        target: MoveAilment
        cardinality: one
        materialize:
          kind: from_parent_get
          path:
          - key: meta
          - key: ailment
  MoveAilment:
    id_field: name
    description: A status condition caused by moves
    fields:
      id:
        description: Numeric ailment identifier
        field_type: integer
        required: false
      name:
        description: Ailment name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
    relations:
      moves:
        description: Moves that cause this ailment
        target: Move
        cardinality: many
  MoveBattleStyle:
    id_field: name
    description: A battle style for move preferences
    fields:
      id:
        description: Numeric battle style identifier
        field_type: integer
        required: false
      name:
        description: Battle style name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
  MoveCategory:
    id_field: name
    description: A meta-category grouping for moves
    fields:
      id:
        description: Numeric category identifier
        field_type: integer
        required: false
      name:
        description: Category name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
    relations:
      moves:
        description: Moves in this category
        target: Move
        cardinality: many
  MoveDamageClass:
    id_field: name
    description: Physical, special, or status classification
    fields:
      id:
        description: Numeric damage class identifier
        field_type: integer
        required: false
      name:
        description: Damage class name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
    relations:
      moves:
        description: Moves with this damage class
        target: Move
        cardinality: many
  MoveLearnMethod:
    id_field: name
    description: How a Pokémon can learn a move
    fields:
      id:
        description: Numeric learn method identifier
        field_type: integer
        required: false
      name:
        description: Learn method name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
    relations:
      version_groups:
        description: Version groups using this learn method
        target: VersionGroup
        cardinality: many
  MoveTarget:
    id_field: name
    description: What a move can target in battle
    fields:
      id:
        description: Numeric target identifier
        field_type: integer
        required: false
      name:
        description: Target name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
    relations:
      moves:
        description: Moves with this target type
        target: Move
        cardinality: many
  Nature:
    id_field: name
    description: A nature affecting stat growth
    fields:
      id:
        description: Numeric nature identifier
        field_type: integer
        required: false
      name:
        description: Nature name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
    relations:
      decreased_stat:
        description: Stat decreased by this nature
        target: Stat
        cardinality: one
      increased_stat:
        description: Stat increased by this nature
        target: Stat
        cardinality: one
      likes_flavor:
        description: Flavor preferred by this nature
        target: BerryFlavor
        cardinality: one
      hates_flavor:
        description: Flavor disliked by this nature
        target: BerryFlavor
        cardinality: one
      berries:
        description: Berries associated with this nature
        target: Berry
        cardinality: many
  PalParkArea:
    id_field: name
    description: An area in Pal Park for migration
    fields:
      id:
        description: Numeric Pal Park area identifier
        field_type: integer
        required: false
      name:
        description: Area name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
    relations:
      pokemon_species:
        description: Species found in this area
        target: PokemonSpecies
        cardinality: many
  Pokedex:
    id_field: name
    description: A regional Pokédex catalog
    fields:
      id:
        description: Numeric Pokédex identifier
        field_type: integer
        required: false
      name:
        description: Pokédex name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
      is_main_series:
        description: Whether from the main game series
        field_type: boolean
        required: false
    relations:
      region:
        description: Region this Pokédex covers
        target: Region
        cardinality: one
  Pokemon:
    id_field: name
    description: A Pokémon with base stats and forms
    fields:
      id:
        description: National Pokédex number
        field_type: integer
        required: false
      name:
        description: Pokémon name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
      base_experience:
        description: Base experience yield when defeated
        field_type: integer
        required: false
      height:
        description: Height in decimetres
        field_type: integer
        required: false
      is_default:
        description: Whether this is the default form
        field_type: boolean
        required: false
      order:
        description: Display sort order
        field_type: integer
        required: false
      weight:
        description: Weight in hectograms
        field_type: integer
        required: false
    relations:
      species:
        description: Species this Pokémon belongs to
        target: PokemonSpecies
        cardinality: one
      forms:
        description: Visual forms of this Pokémon
        target: PokemonForm
        cardinality: many
        materialize:
          kind: from_parent_get
          path:
          - key: forms
          - wildcard: true
      abilities:
        description: Abilities this Pokémon can have
        target: Ability
        cardinality: many
        materialize:
          kind: from_parent_get
          path:
          - key: abilities
          - wildcard: true
          - key: ability
      types:
        description: Elemental types of this Pokémon
        target: Type
        cardinality: many
        materialize:
          kind: from_parent_get
          path:
          - key: types
          - wildcard: true
          - key: type
      moves:
        description: Moves this Pokémon can learn
        target: Move
        cardinality: many
        materialize:
          kind: from_parent_get
          path:
          - key: moves
          - wildcard: true
          - key: move
  PokemonColor:
    id_field: name
    description: A color used to categorize Pokémon
    fields:
      id:
        description: Numeric color identifier
        field_type: integer
        required: false
      name:
        description: Color name (unique key)
        field_type: string
        required: true
        string_semantics: short
      url:
        description: API resource URL
        field_type: string
        required: false
        string_semantics: short
    relations:
      pokemon_species:
        description: Species with this body color
        target: PokemonSpecies
        cardinality: many
  PokemonEncounter:
    id_field: url
    description: Where a specific Pokémon can be found
    id_from: location_area.url
