    description: An attack or technique usable in battle
    fields:
      id:
        required: false
        value_ref: nv_move_id
      name:
        required: true
        value_ref: nv_move_name
      url:
        required: false
        value_ref: nv_move_url
      accuracy:
        required: false
        value_ref: nv_move_accuracy
      effect_chance:
        required: false
        value_ref: nv_move_effect_chance
      pp:
        required: false
        value_ref: nv_move_pp
      priority:
        required: false
        value_ref: nv_move_priority
      power:
        required: false
        value_ref: nv_move_power
    relations:
      contest_type:
        description: Contest type this move belongs to
        target: ContestType
        cardinality: one
      contest_effect:
        description: Effect in Pokémon contests
        target: ContestEffect
        cardinality: one
      damage_class:
        description: Physical, special, or status
        target: MoveDamageClass
        cardinality: one
      generation:
        description: Generation this move was introduced
        target: Generation
        cardinality: one
      super_contest_effect:
        description: Effect in Super Contests
        target: SuperContestEffect
        cardinality: one
      target:
        description: Targeting mode for this move
        target: MoveTarget
        cardinality: one
      type:
        description: Elemental type of this move
        target: Type
        cardinality: one
      ailment:
        description: Status ailment this move inflicts
        target: MoveAilment
        cardinality: one
        materialize:
          kind: from_parent_get
          path:
          - key: meta
          - key: ailment
  MoveAilment:
