version: 1
http_backend: https://api.rawg.io
entities:
  Game:
    id_field: id
    description: A video game entry in the RAWG database
    fields:
      id:
        required: true
        value_ref: nv_game_id
      name:
        required: true
        value_ref: nv_game_name
      slug:
        required: false
        value_ref: nv_game_slug
      released:
        required: false
        value_ref: nv_game_released
      rating:
        required: false
        value_ref: nv_game_rating
      metacritic:
        required: false
        value_ref: nv_game_metacritic
      playtime:
        required: false
        value_ref: nv_game_playtime
      tba:
        required: false
        value_ref: nv_game_tba
      background_image:
        required: false
        value_ref: nv_game_background_image
capabilities:
  game_query:
    description: Search and filter the RAWG games catalog
    kind: query
    entity: Game
    parameters:
    - name: search
      value_ref: nv_game_query_search
      required: false
      role: search
    - name: genres
      value_ref: nv_game_query_genres
      required: false
      role: filter
    - name: platforms
      value_ref: nv_game_query_platforms
      required: false
      role: filter
    - name: developers
      value_ref: nv_game_query_developers
      required: false
      role: filter
    - name: publishers
      value_ref: nv_game_query_publishers
      required: false
      role: filter
    - name: tags
      value_ref: nv_game_query_tags
      required: false
      role: filter
    - name: dates
      value_ref: nv_game_query_dates
      required: false
      role: filter
    - name: metacritic
      value_ref: nv_game_query_metacritic
      required: false
      role: filter
    - name: ordering
      value_ref: nv_game_query_ordering
      required: false
      role: sort
  game_get:
    description: Retrieve full details for a single game
    kind: get
    entity: Game
    provides:
    - id
    - name
    - slug
    - released
    - rating
    - metacritic
    - playtime
    - tba
    - background_image
auth:
  scheme: api_key_query
  param: key
  env: RAWG_API_KEY
values:
  nv_game_id:
    type: integer
    description: Unique RAWG game identifier
  nv_game_name:
    type: string
    string_semantics: short
    description: Game title
  nv_game_slug:
    type: string
    string_semantics: short
    description: URL-friendly game identifier
  nv_game_released:
    type: date
    value_format: iso8601_date
    description: Game release date (RAWG returns YYYY-MM-DD or null)
  nv_game_rating:
    type: number
    description: Average user rating
  nv_game_metacritic:
    type: integer
    description: Metacritic aggregated score
  nv_game_playtime:
    type: integer
    description: Average playtime in hours
  nv_game_tba:
    type: boolean
    description: Whether the release date is to be announced
  nv_game_background_image:
    type: string
    string_semantics: short
    description: URL of the game's background image
  nv_game_query_search:
    type: string
    string_semantics: short
  nv_game_query_genres:
    type: string
    string_semantics: short
  nv_game_query_platforms:
    type: string
    string_semantics: short
  nv_game_query_developers:
    type: string
    string_semantics: short
  nv_game_query_publishers:
    type: string
    string_semantics: short
  nv_game_query_tags:
    type: string
    string_semantics: short
  nv_game_query_dates:
    type: string
    string_semantics: short
  nv_game_query_metacritic:
    type: string
    string_semantics: short
  nv_game_query_ordering:
    type: string
    string_semantics: short
