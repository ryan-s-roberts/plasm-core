# Gmail API v1 — CML (Capability Mapping Language). Semantic model is in domain.yaml.
#
# Base URL: Gmail API (gmail.googleapis.com — set Google API HTTPS origin with --backend).
# All paths start with: gmail/v1/users/me/
#
# Auth: Bearer token injected as Authorization header by the runtime.
#
# Pagination: nextPageToken / pageToken cursor style.
# - Request: pageToken=<token>, maxResults=<n>
# - Response: {"messages": [...], "nextPageToken": "abc", "resultSizeEstimate": N}
# - Stop: implicit when nextPageToken absent (from_response extraction returns None).
#
# The `userId` path variable is hardcoded to `me` in all paths — the Gmail API
# uses this as shorthand for the authenticated user's mailbox.
#
# Note on message body: messages.list returns minimal rows {id, threadId}.
# Full message content (headers, body) comes from messages.get with format=full.
# Plasm's auto-hydration (query + get) handles this automatically: running
# `message query` automatically calls `message_get` per row unless --summary is passed.
#
# Threads: threads.list returns richer JSON, but the CGS models thread_list/thread_search
# as {id, historyId} only so rows hydrate via threads.get (N GETs for N threads unless --summary).

# ── Message ───────────────────────────────────────────────────────────────

message_list:
  response:
    items: messages
  method: GET
  path:
    - type: literal
      value: gmail
    - type: literal
      value: v1
    - type: literal
      value: users
    - type: literal
      value: me
    - type: literal
      value: messages
  query:
    type: object
    fields:
      - - q
        - type: if
          condition: { type: exists, var: q }
          then_expr: { type: var, name: q }
          else_expr: { type: const, value: null }
      - - labelIds
        - type: if
          condition: { type: exists, var: labelIds }
          then_expr: { type: var, name: labelIds }
          else_expr: { type: const, value: null }
      - - includeSpamTrash
        - type: if
          condition: { type: exists, var: includeSpamTrash }
          then_expr: { type: var, name: includeSpamTrash }
          else_expr: { type: const, value: null }
  pagination:
    params:
      pageToken: { from_response: nextPageToken }
      maxResults: { fixed: 100 }
    location: query

# Same HTTP as message_list — enables Message~"…" / `message search` (kind: search).
message_search:
  response:
