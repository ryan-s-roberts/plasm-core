attachment_get:
  # GET /gmail/v1/users/me/messages/{messageId}/attachments/{id}
  # key_vars: [messageId, id] — both injected from compound Ref
  response: single
  method: GET
  path:
    - type: literal
      value: gmail
    - type: literal
      value: v1
    - type: literal
      value: users
    - type: literal
      value: me
    - type: literal
      value: messages
    - type: var
      name: messageId
    - type: literal
      value: attachments
    - type: var
      name: id

