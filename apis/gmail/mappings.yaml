      value: gmail
    - type: literal
      value: v1
    - type: literal
      value: users
    - type: literal
      value: me
    - type: literal
      value: messages
  query:
    type: object
    fields:
      - - q
        - type: if
          condition: { type: exists, var: q }
          then_expr: { type: var, name: q }
          else_expr: { type: const, value: null }
      - - labelIds
        - type: if
          condition: { type: exists, var: labelIds }
          then_expr: { type: var, name: labelIds }
          else_expr: { type: const, value: null }
      - - includeSpamTrash
        - type: if
          condition: { type: exists, var: includeSpamTrash }
          then_expr: { type: var, name: includeSpamTrash }
          else_expr: { type: const, value: null }
  pagination:
    params:
      pageToken: { from_response: nextPageToken }
      maxResults: { fixed: 100 }
    location: query

message_get:
  response: single
  method: GET
  path:
    - type: literal
      value: gmail
    - type: literal
      value: v1
    - type: literal
      value: users
    - type: literal
      value: me
    - type: literal
      value: messages
    - type: var
      name: id
  query:
    type: object
    fields:
      - - format
        - type: if
          condition: { type: exists, var: format }
          then_expr: { type: var, name: format }
          else_expr: { type: const, value: null }

message_send:
  response: single
  method: POST
  path:
    - type: literal
      value: gmail
    - type: literal
      value: v1
    - type: literal
      value: users
    - type: literal
      value: me
    - type: literal
      value: messages
    - type: literal
      value: send
  body:
    type: var
    name: input

# Same POST as message_send — body built from from/to/subject/plainBody (+ optional threadId, inReplyTo, references) via CML.
message_send_simple:
  response: single
  method: POST
  path:
    - type: literal
      value: gmail
    - type: literal
      value: v1
    - type: literal
      value: users
    - type: literal
      value: me
    - type: literal
      value: messages
    - type: literal
      value: send
  body:
    type: gmail_rfc5322_send_body

# Same POST — reply defaults from preflight `parent_*` (invoke_preflight + message_get).
