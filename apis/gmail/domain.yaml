version: 11
http_backend: https://gmail.googleapis.com
entities:
  Message:
    id_field: id
    description: A Gmail message (email). messages.list returns only id+threadId; messages.get returns full content including
      RFC 5322 headers flattened from payload.headers (headerFrom, headerSubject, …). Mailbox-wide text search uses the q
      parameter or Message~"…" (not the snippet field — snippet is a preview string returned on each row).
    fields:
      id:
        required: true
        value_ref: nv_message_id
      threadId:
        required: false
        value_ref: nv_message_thread_id
      labelIds:
        required: false
        value_ref: nv_message_label_ids
      snippet:
        required: false
        value_ref: nv_message_snippet
      historyId:
        required: false
        value_ref: nv_message_history_id
      internalDate:
        required: false
        value_ref: nv_message_internal_date
      sizeEstimate:
        required: false
        value_ref: nv_message_size_estimate
      headerFrom:
        derive:
          type: name_value_array_lookup
          equals: From
          case_insensitive: true
        required: false
        path:
        - payload
        - headers
        value_ref: nv_message_header_from
      headerTo:
        derive:
          type: name_value_array_lookup
          equals: To
          case_insensitive: true
        required: false
        path:
        - payload
        - headers
        value_ref: nv_message_header_to
      headerSubject:
        derive:
          type: name_value_array_lookup
          equals: Subject
          case_insensitive: true
        required: false
        path:
        - payload
        - headers
        value_ref: nv_message_header_subject
      headerDate:
        derive:
          type: name_value_array_lookup
          equals: Date
          case_insensitive: true
        required: false
        path:
        - payload
        - headers
        value_ref: nv_message_header_date
      headerReplyTo:
        derive:
          type: name_value_array_lookup
          equals: Reply-To
          case_insensitive: true
        required: false
        path:
        - payload
        - headers
        value_ref: nv_message_header_reply_to
      headerCc:
        derive:
          type: name_value_array_lookup
          equals: Cc
          case_insensitive: true
        required: false
        path:
        - payload
        - headers
        value_ref: nv_message_header_cc
      headerBcc:
        derive:
          type: name_value_array_lookup
          equals: Bcc
          case_insensitive: true
        required: false
        path:
        - payload
        - headers
        value_ref: nv_message_header_bcc
      headerMessageId:
        derive:
          type: name_value_array_lookup
          equals: Message-Id
          case_insensitive: true
        required: false
        path:
        - payload
        - headers
        value_ref: nv_message_header_message_id
      headerReferences:
        derive:
          type: name_value_array_lookup
          equals: References
          case_insensitive: true
        required: false
        path:
        - payload
        - headers
        value_ref: nv_message_header_references
      headerInReplyTo:
        derive:
          type: name_value_array_lookup
          equals: In-Reply-To
          case_insensitive: true
        required: false
        path:
        - payload
        - headers
        value_ref: nv_message_header_in_reply_to
    relations:
      attachments:
        description: Attachments on this message
        target: Attachment
        cardinality: many
  Thread:
    id_field: id
    primary_read: thread_get
    description: A conversation thread — a collection of related messages. Full-text search uses q or Thread~"…"; snippet
      is a preview of the thread (filled by threads.get), not the Gmail search box parameter.
    fields:
      id:
        required: true
        value_ref: nv_thread_id
      snippet:
        required: false
        value_ref: nv_thread_snippet
      historyId:
        required: false
        value_ref: nv_thread_history_id
    relations:
      messages:
        description: Messages in this thread
        target: Message
        cardinality: many
        materialize:
          kind: from_parent_get
          path:
          - key: messages
          - wildcard: true
  Label:
    id_field: id
    description: A mailbox label. Includes system labels (INBOX, SENT, SPAM, etc.) and user-created labels.
    fields:
      id:
        required: true
        value_ref: nv_label_id
      name:
        required: false
        value_ref: nv_label_name
      type:
        required: false
        value_ref: nv_label_type
      messageListVisibility:
        required: false
        value_ref: nv_label_message_list_visibility
      labelListVisibility:
        required: false
        value_ref: nv_label_label_list_visibility
      messagesTotal:
        required: false
        value_ref: nv_label_messages_total
      messagesUnread:
        required: false
        value_ref: nv_label_messages_unread
      threadsTotal:
        required: false
        value_ref: nv_label_threads_total
      threadsUnread:
        required: false
        value_ref: nv_label_threads_unread
    relations: {}
  Draft:
    id_field: id
    description: A draft email. The message content lives in the embedded 'message' field.
    fields:
      id:
        required: true
        value_ref: nv_draft_id
    relations: {}
    domain_projection_examples: false
  Attachment:
    abstract: true
    id_field: id
    key_vars:
    - messageId
    - id
    description: A file attached to a message. Only fetchable with both messageId and attachmentId.
    fields:
      id:
        required: true
        value_ref: nv_attachment_id
      messageId:
        required: false
        value_ref: nv_attachment_message_id
      size:
        required: false
        value_ref: nv_attachment_size
      data:
        required: false
        mime_type_hint: application/octet-stream
        attachment_media: generic
        value_ref: nv_attachment_data
    relations: {}
  Profile:
    id_field: emailAddress
    description: The authenticated user's Gmail profile
    fields:
      emailAddress:
        required: true
        value_ref: nv_profile_email_address
      messagesTotal:
        required: false
        value_ref: nv_profile_messages_total
      threadsTotal:
        required: false
        value_ref: nv_profile_threads_total
      historyId:
        required: false
        value_ref: nv_profile_history_id
    relations: {}
capabilities:
  message_list:
    description: 'List messages in the mailbox.

      '
    kind: query
    entity: Message
    provides:
    - id
    - threadId
    parameters:
    - name: q
      value_ref: nv_message_list_q
      required: false
      role: search
    - name: labelIds
      value_ref: nv_message_list_label_ids
      required: false
      role: filter
    - name: includeSpamTrash
      value_ref: nv_message_list_include_spam_trash
      required: false
      role: filter
  message_search:
    description: Gmail full-text search (same endpoint as message list). Use Message~"text" or message search --q; combine
      with labelIds/includeSpamTrash as needed.
    kind: search
    entity: Message
    provides:
    - id
    - threadId
    parameters:
    - name: q
      value_ref: nv_message_search_q
      required: true
      role: search
    - name: labelIds
      value_ref: nv_message_search_label_ids
      required: false
      role: filter
    - name: includeSpamTrash
      value_ref: nv_message_search_include_spam_trash
      required: false
      role: filter
  message_get:
    description: Fetch a complete message including headers and body
    kind: get
    entity: Message
    provides:
    - id
    - threadId
    - labelIds
    - snippet
    - historyId
    - internalDate
    - sizeEstimate
    - headerFrom
    - headerTo
    - headerSubject
    - headerDate
    - headerReplyTo
    - headerCc
    - headerBcc
    - headerMessageId
    - headerReferences
    - headerInReplyTo
    parameters:
    - name: format
      value_ref: nv_message_get_format
      required: false
      role: response_control
  message_send:
    description: Send an email message immediately
    kind: create
    entity: Message
    parameters:
    - name: raw
      value_ref: nv_message_send_raw
      required: true
    - name: threadId
      value_ref: nv_message_send_thread_id
      required: false
  message_send_simple:
    description: Send a plain-text email without hand-built MIME; runtime builds RFC 5322 and base64url `raw` for users.messages.send.
    kind: create
    entity: Message
    parameters:
    - name: from
      value_ref: nv_message_send_simple_from
      required: true
    - name: to
      value_ref: nv_message_send_simple_to
      required: true
    - name: subject
      value_ref: nv_wire_str_short
      required: true
    - name: plainBody
      value_ref: nv_message_send_simple_plain_body
      required: true
    - name: threadId
      value_ref: nv_message_send_simple_thread_id
      required: false
    - name: inReplyTo
      value_ref: nv_message_send_simple_in_reply_to
      required: false
    - name: references
      value_ref: nv_message_send_simple_references
      required: false
  message_reply:
    description: Reply to the invoke target message (plain text). Runtime preflight runs message_get on the target id to fill
      threading; same POST users.messages.send as message_send_simple.
    kind: action
    entity: Message
    invoke_preflight:
      hydrate_capability: message_get
      env_prefix: parent
    provides:
    - id
    - threadId
    - labelIds
    parameters:
    - name: from
      value_ref: nv_message_reply_from
      required: true
    - name: plainBody
      value_ref: nv_message_reply_plain_body
      required: true
    - name: to
      value_ref: nv_message_reply_to
      required: false
    - name: subject
      value_ref: nv_message_reply_subject
      required: false
    output:
      type: side_effect
      description: Sends the reply and returns the new Message row from Gmail (same response shape as message send).
  message_trash:
    description: Move a message to TRASH
    kind: action
    entity: Message
    output:
      type: side_effect
      description: Move a message to TRASH
  message_untrash:
    description: Remove a message from TRASH
    kind: action
    entity: Message
    output:
      type: side_effect
      description: Remove a message from TRASH
  message_delete:
    description: Permanently delete a message (irreversible — prefer message_trash)
    kind: delete
    entity: Message
  message_modify:
    description: Add or remove labels on a message
    kind: update
    entity: Message
    parameters:
    - name: addLabelIds
      value_ref: nv_message_modify_add_label_ids
      required: false
    - name: removeLabelIds
      value_ref: nv_message_modify_remove_label_ids
      required: false
  thread_list:
    description: 'List threads in the mailbox. Returns only {id, historyId} per thread in this CGS; default auto-hydration
      issues threads.get for each row in the page (one threads.list per page plus N threads.get for N rows) to fill snippet
      and nested messages. Use query --summary to skip get and keep id+historyId only. To restrict to a mailbox or label (e.g.
      INBOX), use labelIds — not includeSpamTrash (that flag is only true/false for whether Spam and Trash folders are included).

      '
    kind: query
    entity: Thread
    provides:
    - id
    - historyId
    parameters:
    - name: q
      value_ref: nv_thread_list_q
      required: false
      role: search
    - name: labelIds
      value_ref: nv_thread_list_label_ids
      required: false
      role: filter
    - name: includeSpamTrash
      value_ref: nv_thread_list_include_spam_trash
      required: false
      role: filter
  thread_search:
    description: Gmail full-text search over threads (same endpoint as thread list). Same minimal row shape and default thread_get
      hydration as thread_list. Use Thread~"text" or thread search --q; combine with labelIds/includeSpamTrash as needed.
    kind: search
    entity: Thread
    provides:
    - id
    - historyId
    parameters:
    - name: q
      value_ref: nv_thread_search_q
      required: true
      role: search
    - name: labelIds
      value_ref: nv_thread_search_label_ids
      required: false
      role: filter
    - name: includeSpamTrash
      value_ref: nv_thread_search_include_spam_trash
      required: false
      role: filter
  thread_get:
    description: Fetch a thread with nested messages (threads.get). Used by default after thread_list/thread_search to upgrade
      summary rows; each row costs one HTTP GET.
    kind: get
    entity: Thread
    provides:
    - id
    - snippet
    - historyId
    parameters:
    - name: format
      value_ref: nv_thread_get_format
      required: false
      role: response_control
  thread_trash:
    description: Move a thread and all its messages to TRASH
    kind: action
    entity: Thread
    output:
      type: side_effect
      description: Move a thread and all its messages to TRASH
  thread_untrash:
    description: Remove a thread and all its messages from TRASH
    kind: action
    entity: Thread
    output:
      type: side_effect
      description: Remove a thread and all its messages from TRASH
  thread_delete:
    description: Permanently delete a thread and all its messages (irreversible)
    kind: delete
    entity: Thread
  thread_modify:
    description: Add or remove labels on a thread
    kind: update
    entity: Thread
    parameters:
    - name: addLabelIds
      value_ref: nv_thread_modify_add_label_ids
      required: false
    - name: removeLabelIds
      value_ref: nv_thread_modify_remove_label_ids
      required: false
  label_list:
    description: List all labels in the mailbox (system + user-created)
    kind: query
    entity: Label
  label_get:
    description: Get a specific label by ID
    kind: get
    entity: Label
    provides:
    - id
    - name
    - type
    - messageListVisibility
    - labelListVisibility
    - messagesTotal
    - messagesUnread
    - threadsTotal
    - threadsUnread
  label_create:
    description: Create a new user label
    kind: create
    entity: Label
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: true
    - name: messageListVisibility
      value_ref: nv_wire_sel_03b11827825981b3
      required: false
    - name: labelListVisibility
      value_ref: nv_wire_sel_959d1eda8c7176e2
      required: false
  label_update:
    description: Update an existing label
    kind: update
    entity: Label
    parameters:
    - name: name
      value_ref: nv_wire_str_short
      required: false
    - name: messageListVisibility
      value_ref: nv_wire_sel_03b11827825981b3
      required: false
    - name: labelListVisibility
      value_ref: nv_wire_sel_959d1eda8c7176e2
      required: false
  label_delete:
    description: Permanently delete a label (removes it from all messages)
    kind: delete
    entity: Label
  draft_list:
    description: List drafts in the mailbox
    kind: query
    entity: Draft
    provides:
    - id
  draft_get:
    description: Get a specific draft by ID
    kind: get
    entity: Draft
    parameters:
    - name: format
      value_ref: nv_draft_get_format
      required: false
      role: response_control
    provides:
    - id
  draft_create:
    description: Create a new draft
    kind: create
    entity: Draft
    parameters:
    - name: raw
      value_ref: nv_draft_create_raw
      required: false
    - name: threadId
      value_ref: nv_draft_create_thread_id
      required: false
  draft_update:
    description: Replace the content of an existing draft
    kind: update
    entity: Draft
    parameters:
    - name: raw
      value_ref: nv_draft_update_raw
      required: false
  draft_delete:
    description: Permanently delete a draft
    kind: delete
    entity: Draft
  draft_send:
    description: Send an existing draft immediately
    kind: action
    entity: Draft
    output:
      type: side_effect
      description: Send an existing draft immediately
  attachment_get:
    description: Fetch an attachment's data. Requires both messageId (scope) and attachment id.
    kind: action
    entity: Attachment
    parameters:
    - name: messageId
      value_ref: nv_attachment_get_message_id
      required: true
      role: scope
    output:
      type: side_effect
      description: Fetch an attachment's data. Requires both messageId (scope) and attachment id.
  profile_get:
    description: Get the authenticated user's Gmail profile (email address, message/thread counts)
    kind: singleton
    entity: Profile
oauth:
  provider: google
  scopes:
    https://mail.google.com/:
      label: Full Gmail (including permanent delete)
      notes: Broadest scope; subsumes narrower Gmail scopes. Use when this CGS must satisfy message_delete/thread_delete and
        other full-mailbox operations.
      docs_url: https://developers.google.com/gmail/api/auth/scopes
    https://www.googleapis.com/auth/gmail.readonly:
      label: Read mail and settings
      notes: List/search messages and threads, read bodies and attachments, labels, drafts, profile — the default functional
        read-only grant for this schema (including default query hydration).
      docs_url: https://developers.google.com/gmail/api/auth/scopes
    https://www.googleapis.com/auth/gmail.modify:
      label: Read, compose, send (not permanent delete bypassing trash)
      notes: Everything in readonly plus trash/modify labels and non-permanent deletes; typical triage agents.
      docs_url: https://developers.google.com/gmail/api/auth/scopes
    https://www.googleapis.com/auth/gmail.compose:
      label: Manage drafts and send
      notes: Drafts and send; pair with readonly-class scopes for read if needed.
      docs_url: https://developers.google.com/gmail/api/auth/scopes
    https://www.googleapis.com/auth/gmail.send:
      label: Send only
      notes: Minimal send automation; insufficient alone for inbox read/search in this CGS.
      docs_url: https://developers.google.com/gmail/api/auth/scopes
    https://www.googleapis.com/auth/gmail.labels:
      label: See and edit labels (narrower than message label mutation)
      notes: Label CRUD; can combine with readonly for read-heavy label workflows.
      docs_url: https://developers.google.com/gmail/api/auth/scopes
    https://www.googleapis.com/auth/gmail.insert:
      label: Insert messages into mailbox
      docs_url: https://developers.google.com/gmail/api/auth/scopes
    https://www.googleapis.com/auth/userinfo.profile:
      label: OpenID Connect basic profile
      notes: Identity bundle scopes (People/Contacts) are optional for Gmail mailbox operations; listed for toolkit parity.
    https://www.googleapis.com/auth/userinfo.email:
      label: OpenID Connect email
      notes: Often paired with userinfo.profile for sign-in flows.
    https://www.googleapis.com/auth/contacts.readonly:
      label: Google Contacts read
      notes: Not required for Gmail REST capabilities in this CGS.
    https://www.googleapis.com/auth/contacts.other.readonly:
      label: Other contacts read
      notes: Not required for Gmail REST capabilities in this CGS.
    https://www.googleapis.com/auth/profile.language.read:
      label: People API language preferences
      notes: Not required for Gmail REST capabilities in this CGS.
    https://www.googleapis.com/auth/user.addresses.read:
      label: People API addresses read
      notes: Not required for Gmail REST capabilities in this CGS.
    https://www.googleapis.com/auth/user.birthday.read:
      label: People API birthday read
      notes: Not required for Gmail REST capabilities in this CGS.
    https://www.googleapis.com/auth/user.emails.read:
      label: People API emails read
      notes: Not required for Gmail REST capabilities in this CGS.
    https://www.googleapis.com/auth/user.phonenumbers.read:
      label: People API phone numbers read
      notes: Not required for Gmail REST capabilities in this CGS.
    https://www.googleapis.com/auth/profile.emails.read:
      label: People API profile emails read
      notes: Not required for Gmail REST capabilities in this CGS.
  default_scope_sets:
    plasm_gmail_readonly_mailbox:
      description: Functional read-only mailbox — list, search (q / Message~ / Thread~), get bodies, attachments, drafts read,
        labels read, profile; matches default Plasm hydration.
      scopes:
      - https://www.googleapis.com/auth/gmail.readonly
    plasm_gmail_modify_mailbox:
      description: Triage and mailbox edits — readonly-class reads plus trash, label changes on messages/threads, and related
        modify operations in this CGS.
      scopes:
      - https://www.googleapis.com/auth/gmail.modify
    plasm_gmail_compose_and_drafts:
      description: Drafts and composition — create/update/send drafts and message_send; combine with gmail.readonly or gmail.modify
        for read paths as needed.
      scopes:
      - https://www.googleapis.com/auth/gmail.compose
    plasm_gmail_send_only:
      description: Narrow automation — send mail only; insufficient alone for search/list/get in this CGS.
      scopes:
      - https://www.googleapis.com/auth/gmail.send
    plasm_gmail_full_mailbox:
      description: Full mailbox including permanent message/thread delete (mail.google.com scope).
      scopes:
      - https://mail.google.com/
    plasm_gmail_integrator_bundle:
      description: Broad integration bundle (OpenID userinfo + Google Contacts/People read scopes + full mail.google.com).
        Includes mail.google.com but omits explicit gmail.readonly; prefer plasm_gmail_readonly_mailbox for read automation
        unless an integrator requires this wide grant.
      scopes:
      - https://www.googleapis.com/auth/userinfo.profile
      - https://www.googleapis.com/auth/userinfo.email
      - https://www.googleapis.com/auth/contacts.readonly
      - https://www.googleapis.com/auth/contacts.other.readonly
      - https://www.googleapis.com/auth/profile.language.read
      - https://www.googleapis.com/auth/user.addresses.read
      - https://www.googleapis.com/auth/user.birthday.read
      - https://www.googleapis.com/auth/user.emails.read
      - https://www.googleapis.com/auth/user.phonenumbers.read
      - https://www.googleapis.com/auth/profile.emails.read
      - https://mail.google.com/
  requirements:
    capabilities:
      message_list:
        any_of:
        - https://www.googleapis.com/auth/gmail.readonly
        - https://www.googleapis.com/auth/gmail.modify
        - https://www.googleapis.com/auth/gmail.compose
        - https://mail.google.com/
      message_search:
        any_of:
        - https://www.googleapis.com/auth/gmail.readonly
        - https://www.googleapis.com/auth/gmail.modify
        - https://www.googleapis.com/auth/gmail.compose
        - https://mail.google.com/
      message_get:
        any_of:
        - https://www.googleapis.com/auth/gmail.readonly
        - https://www.googleapis.com/auth/gmail.modify
        - https://www.googleapis.com/auth/gmail.compose
        - https://mail.google.com/
      message_send:
        any_of:
        - https://www.googleapis.com/auth/gmail.send
        - https://www.googleapis.com/auth/gmail.modify
        - https://www.googleapis.com/auth/gmail.compose
        - https://mail.google.com/
      message_send_simple:
        any_of:
        - https://www.googleapis.com/auth/gmail.send
        - https://www.googleapis.com/auth/gmail.modify
        - https://www.googleapis.com/auth/gmail.compose
        - https://mail.google.com/
      message_reply:
        any_of:
        - https://www.googleapis.com/auth/gmail.send
        - https://www.googleapis.com/auth/gmail.modify
        - https://www.googleapis.com/auth/gmail.compose
        - https://mail.google.com/
      message_trash:
        any_of:
        - https://www.googleapis.com/auth/gmail.modify
        - https://mail.google.com/
      message_untrash:
        any_of:
        - https://www.googleapis.com/auth/gmail.modify
        - https://mail.google.com/
      message_delete:
        any_of:
        - https://mail.google.com/
      message_modify:
        any_of:
        - https://www.googleapis.com/auth/gmail.modify
        - https://mail.google.com/
      thread_list:
        any_of:
        - https://www.googleapis.com/auth/gmail.readonly
        - https://www.googleapis.com/auth/gmail.modify
        - https://www.googleapis.com/auth/gmail.compose
        - https://mail.google.com/
      thread_search:
        any_of:
        - https://www.googleapis.com/auth/gmail.readonly
        - https://www.googleapis.com/auth/gmail.modify
        - https://www.googleapis.com/auth/gmail.compose
        - https://mail.google.com/
      thread_get:
        any_of:
        - https://www.googleapis.com/auth/gmail.readonly
        - https://www.googleapis.com/auth/gmail.modify
        - https://www.googleapis.com/auth/gmail.compose
        - https://mail.google.com/
      thread_trash:
        any_of:
        - https://www.googleapis.com/auth/gmail.modify
        - https://mail.google.com/
      thread_untrash:
        any_of:
        - https://www.googleapis.com/auth/gmail.modify
        - https://mail.google.com/
      thread_delete:
        any_of:
        - https://mail.google.com/
      thread_modify:
        any_of:
        - https://www.googleapis.com/auth/gmail.modify
        - https://mail.google.com/
      label_list:
        any_of:
        - https://www.googleapis.com/auth/gmail.readonly
        - https://www.googleapis.com/auth/gmail.modify
        - https://www.googleapis.com/auth/gmail.labels
        - https://mail.google.com/
      label_get:
