# Outlook / Microsoft Graph mailbox wave 1 — NL eval cases.

- id: out-01
  schema: outlook
  goal: "List the top-level folders in my mailbox so I can choose where to triage next."
  tags: [query]
  covers: [query_filtered]
  expect:
    entities_any: [MailFolder]

- id: out-02
  schema: outlook
  goal: "Open folder id inbox-folder-001 so I can inspect its unread and total item counts."
  tags: [get]
  covers: [get]
  expect:
    entities_any: [MailFolder]

- id: out-03
  schema: outlook
  goal: "Show the messages inside folder id inbox-folder-001 and only keep subject, sender, and received time in view."
  tags: [query, projection, chain]
  covers: [query_filtered, projection, chain, reverse]
  expect:
    entities_any: [MailFolder, Message]

- id: out-04
  schema: outlook
  goal: "Fetch message id AAMkAGI2TAAA= for the reader pane with the full body."
  tags: [get]
  covers: [get]
  expect:
    entities_any: [Message]

- id: out-05
  schema: outlook
  goal: "Mark message id AAMkAGI2TAAA= as read and set its importance to high."
  tags: [update]
  covers: [update]
  expect:
    entities_any: [Message]

- id: out-06
  schema: outlook
  goal: "Move message id AAMkAGI2TAAA= into folder id archive-folder-009."
  tags: [invoke]
  covers: [invoke]
  expect:
    entities_any: [Message, MailFolder]

- id: out-07
  schema: outlook
  goal: "Send draft message id AAMkAGI2Draft= now."
  tags: [invoke]
  covers: [invoke]
  expect:
    entities_any: [Message]

- id: out-08
  schema: outlook
  goal: "Delete message id AAMkAGI2TAAA= from the mailbox."
  tags: [delete]
  covers: [delete]
  expect:
    entities_any: [Message]

- id: out-09
  schema: outlook
  goal: "List the attachments on message id AAMkAGI2TAAA= and then fetch attachment id AQMkAGFiZAAu for download."
  tags: [multi_step, chain]
  covers: [multi_step, chain]
  expect:
    entities_any: [Message, Attachment]

- id: out-10
  schema: outlook
  goal: "Show every message in the mailbox so I can skim the recent subjects."
  tags: [query]
  covers: [page_next]
  expect:
    entities_any: [Message]

- id: out-11
  schema: outlook
  goal: "Include hidden folders while listing the children under folder id inbox-folder-001."
  tags: [adversarial, query]
  covers: [query_filtered]
  expect:
    entities_any: [MailFolder]

- id: out-12
  schema: outlook
  goal: "Compose a new draft email to finance@example.com with subject Invoice Q1 and a short body asking them to review the attached PDF."
  tags: [create]
  covers: [create]
  expect:
    entities_any: [Message]
    # Attachment upload remains out of scope; agent should create the draft then explain attachment limits.

- id: out-15
  schema: outlook
  goal: "Give me a mailbox triage snapshot with root folders and highlight the inbox folder so I can see unread counts next."
  tags: [query, chain]
  covers: [query_all, chain]
  expect:
    entities_any: [MailboxTriage, MailFolder]

- id: out-16
  schema: outlook
  goal: "List my calendars, then show meetings for the next seven days with subject, start time, and location only."
  tags: [query, projection, chain]
  covers: [query_filtered, projection, page_next, chain]
  expect:
    entities_any: [Calendar, Event]

- id: out-17
  schema: outlook
  goal: "Schedule a 30-minute focus block tomorrow at 2pm UTC titled Deep work with location Home office."
  tags: [create]
  covers: [create]
  expect:
    entities_any: [Event]

- id: out-18
  schema: outlook
  goal: "Cancel event id AAMkAGI2CalendarEvent= that I no longer need on my calendar."
  tags: [delete]
  covers: [delete]
  expect:
    entities_any: [Event]

- id: out-13
  schema: outlook
  goal: "Show the next page of inbox messages after the first hundred so I can keep skimming older mail."
  tags: [query]
  covers: [page_next]
  expect:
    entities_any: [Message]
    # Exercises @odata.nextLink pagination via page(pg1) when the mailbox exceeds one page.

- id: out-14
  schema: outlook
  goal: "List unread messages received this week, newest first, using a server-side filter."
  tags: [query, projection]
  covers: [query_filtered, projection]
  expect:
    entities_any: [Message]
    # Exercises optional filter and orderBy parameters on message_query.
