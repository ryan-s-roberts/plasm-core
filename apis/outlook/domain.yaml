version: 3
http_backend: https://graph.microsoft.com
entities:
  MailFolder:
    id_field: id
    description: A mail folder in the signed-in mailbox.
    fields:
      id:
        required: true
        value_ref: nv_mail_folder_id
      displayName:
        required: false
        value_ref: nv_mail_folder_display_name
      parentFolderId:
        required: false
        value_ref: nv_mail_folder_parent_folder_id
      childFolderCount:
        required: false
        value_ref: nv_mail_folder_child_folder_count
      unreadItemCount:
        required: false
        value_ref: nv_mail_folder_unread_item_count
      totalItemCount:
        required: false
        value_ref: nv_mail_folder_total_item_count
      wellKnownName:
        required: false
        value_ref: nv_mail_folder_well_known_name
      isHidden:
        required: false
        value_ref: nv_mail_folder_is_hidden
    relations:
      childFolders:
        target: MailFolder
        cardinality: many
        materialize:
          kind: query_scoped
          capability: mail_folder_child_query
          param: mailFolderId
      messages:
        target: Message
        cardinality: many
        materialize:
          kind: query_scoped
          capability: message_folder_query
          param: mailFolderId
  Message:
    id_field: id
    description: A message in the signed-in mailbox.
    fields:
      id:
        required: true
        value_ref: nv_message_id
      subject:
        required: false
        value_ref: nv_message_subject
      bodyPreview:
        required: false
        value_ref: nv_message_body_preview
      bodyContentType:
        required: false
        path: body.contentType
        value_ref: nv_message_body_content_type
      bodyContent:
        required: false
        path: body.content
        value_ref: nv_message_body_content
      internetMessageId:
        required: false
        value_ref: nv_message_internet_message_id
      conversationId:
        required: false
        value_ref: nv_message_conversation_id
      parentFolderId:
        required: false
        value_ref: nv_message_parent_folder_id
      fromAddress:
        required: false
        path: from.emailAddress.address
        value_ref: nv_message_from_address
      fromName:
        required: false
        path: from.emailAddress.name
        value_ref: nv_message_from_name
      receivedDateTime:
        required: false
        value_ref: nv_message_received_date_time
      sentDateTime:
        required: false
        value_ref: nv_message_sent_date_time
      hasAttachments:
        required: false
        value_ref: nv_message_has_attachments
      isDraft:
        required: false
        value_ref: nv_message_is_draft
      isRead:
        required: false
        value_ref: nv_message_is_read
      importance:
        required: false
        value_ref: nv_message_importance
      categories:
        required: false
        value_ref: nv_message_categories
      webLink:
        required: false
        value_ref: nv_message_web_link
    relations:
      attachments:
        target: Attachment
        cardinality: many
        materialize:
          kind: query_scoped
          capability: attachment_query
          param: messageId
  Attachment:
    id_field: id
    description: A file or embedded item attached to a message.
    fields:
      id:
        required: true
        value_ref: nv_attachment_id
      name:
        required: false
        value_ref: nv_attachment_name
      contentType:
        required: false
        value_ref: nv_attachment_content_type
      size:
        required: false
        value_ref: nv_attachment_size
      isInline:
        required: false
        value_ref: nv_attachment_is_inline
      lastModifiedDateTime:
        required: false
        value_ref: nv_attachment_last_modified_date_time
      contentId:
        required: false
        value_ref: nv_attachment_content_id
      contentBytes:
        required: false
        mime_type_hint: application/octet-stream
        attachment_media: generic
        value_ref: nv_attachment_content_bytes
    relations: {}
capabilities:
  mail_folder_query:
    kind: query
    entity: MailFolder
    description: List the root-level folders in the mailbox.
    parameters:
    - name: includeHiddenFolders
      value_ref: nv_mail_folder_query_include_hidden_folders
      required: false
  mail_folder_child_query:
    kind: query
    entity: MailFolder
    description: List child folders underneath a folder.
    parameters:
    - name: mailFolderId
      value_ref: nv_mail_folder_child_query_mail_folder_id
      required: true
      role: scope
    - name: includeHiddenFolders
      value_ref: nv_mail_folder_child_query_include_hidden_folders
      required: false
  mail_folder_get:
    kind: get
    entity: MailFolder
    description: Get details for a known folder.
    provides:
    - id
    - displayName
    - parentFolderId
    - childFolderCount
    - unreadItemCount
    - totalItemCount
    - wellKnownName
    - isHidden
  message_query:
    kind: query
    entity: Message
    description: List messages across the mailbox.
    provides:
    - id
    - subject
    - bodyPreview
    - parentFolderId
    - fromAddress
    - fromName
    - receivedDateTime
    - sentDateTime
    - hasAttachments
    - isDraft
    - isRead
    - importance
    - categories
    - webLink
  message_folder_query:
    kind: query
    entity: Message
    description: List messages in a specific folder.
    provides:
    - id
    - subject
    - bodyPreview
    - parentFolderId
    - fromAddress
    - fromName
    - receivedDateTime
    - sentDateTime
    - hasAttachments
    - isDraft
    - isRead
    - importance
    - categories
    - webLink
    parameters:
    - name: mailFolderId
      value_ref: nv_message_folder_query_mail_folder_id
      required: true
      role: scope
  message_get:
    kind: get
    entity: Message
    description: Get the full message body and metadata for a known message.
    provides:
    - id
    - subject
    - bodyPreview
    - bodyContentType
    - bodyContent
    - internetMessageId
    - conversationId
    - parentFolderId
    - fromAddress
    - fromName
    - receivedDateTime
    - sentDateTime
    - hasAttachments
    - isDraft
    - isRead
    - importance
    - categories
    - webLink
  message_update:
    kind: update
    entity: Message
    description: Update mailbox state fields on a message.
    parameters:
    - name: isRead
      value_ref: nv_message_update_is_read
      required: false
    - name: importance
      value_ref: nv_message_update_importance
      required: false
    - name: categories
      value_ref: nv_message_update_categories
      required: false
    provides:
    - id
    - parentFolderId
    - isRead
    - importance
    - categories
  message_move:
    kind: action
    entity: Message
    description: Move a message into another folder.
    parameters:
    - name: destinationFolderId
      value_ref: nv_message_move_destination_folder_id
      required: true
    output:
      type: side_effect
      description: Moves the message into another folder in the mailbox.
  message_send:
    kind: action
    entity: Message
    description: Send a draft message.
    output:
      type: side_effect
      description: Sends the draft message from the mailbox.
  message_delete:
    kind: delete
    entity: Message
    description: Permanently remove a message from the mailbox.
  attachment_query:
    kind: query
    entity: Attachment
    description: List attachments on a message.
    provides:
    - id
    - name
    - contentType
    - size
    - isInline
    - lastModifiedDateTime
    - contentId
    parameters:
    - name: messageId
      value_ref: nv_attachment_query_message_id
      required: true
      role: scope
  attachment_get:
    kind: action
    entity: Attachment
    description: Fetch attachment content for a known attachment on a message.
    provides:
    - id
    - name
    - contentType
    - size
    - isInline
    - lastModifiedDateTime
    - contentId
    - contentBytes
    parameters:
    - name: messageId
      value_ref: nv_attachment_get_message_id
      required: true
      role: scope
auth:
  scheme: bearer_token
  env: MICROSOFT_GRAPH_ACCESS_TOKEN
values:
  nv_mail_folder_id:
    type: string
    string_semantics: short
  nv_mail_folder_display_name:
    type: string
    string_semantics: short
  nv_mail_folder_parent_folder_id:
    type: entity_ref
    target: MailFolder
  nv_mail_folder_child_folder_count:
    type: integer
  nv_mail_folder_unread_item_count:
    type: integer
  nv_mail_folder_total_item_count:
    type: integer
  nv_mail_folder_well_known_name:
    type: string
    string_semantics: short
  nv_mail_folder_is_hidden:
    type: boolean
  nv_message_id:
    type: string
    string_semantics: short
  nv_message_subject:
    type: string
    string_semantics: short
  nv_message_body_preview:
    type: string
    string_semantics: short
  nv_message_body_content_type:
    type: select
    allowed_values:
    - text
    - html
  nv_message_body_content:
    type: string
    string_semantics: markdown
  nv_message_internet_message_id:
    type: string
    string_semantics: short
  nv_message_conversation_id:
    type: string
    string_semantics: short
  nv_message_parent_folder_id:
    type: entity_ref
    target: MailFolder
  nv_message_from_address:
    type: string
    string_semantics: short
  nv_message_from_name:
    type: string
    string_semantics: short
  nv_message_received_date_time:
    type: date
    value_format: rfc3339
  nv_message_sent_date_time:
    type: date
    value_format: rfc3339
  nv_message_has_attachments:
    type: boolean
  nv_message_is_draft:
    type: boolean
  nv_message_is_read:
    type: boolean
  nv_message_importance:
    type: select
    allowed_values:
    - low
    - normal
    - high
  nv_message_categories_item:
    type: string
  nv_message_categories:
    type: array
    items:
      value_ref: nv_message_categories_item
  nv_message_web_link:
    type: string
    string_semantics: short
  nv_attachment_id:
    type: string
    string_semantics: short
  nv_attachment_name:
    type: string
    string_semantics: short
  nv_attachment_content_type:
    type: string
    string_semantics: short
  nv_attachment_size:
    type: integer
  nv_attachment_is_inline:
    type: boolean
  nv_attachment_last_modified_date_time:
    type: date
    value_format: rfc3339
  nv_attachment_content_id:
    type: string
    string_semantics: short
  nv_attachment_content_bytes:
    type: blob
  nv_mail_folder_query_include_hidden_folders:
    type: boolean
    description: Include hidden folders in the root folder listing.
  nv_mail_folder_child_query_mail_folder_id:
    type: entity_ref
    target: MailFolder
    description: Folder whose child folders should be listed.
  nv_mail_folder_child_query_include_hidden_folders:
    type: boolean
    description: Include hidden folders in the child folder listing.
  nv_message_folder_query_mail_folder_id:
    type: entity_ref
    target: MailFolder
    description: Folder whose messages should be listed.
  nv_message_update_is_read:
    type: boolean
    description: Whether the message should be marked read.
  nv_message_update_importance:
    type: select
    allowed_values:
    - low
    - normal
    - high
    description: Importance marker to store on the message.
  nv_message_update_categories_item:
    type: string
  nv_message_update_categories:
    type: array
    items:
      value_ref: nv_message_update_categories_item
    description: Categories to store on the message.
  nv_message_move_destination_folder_id:
    type: entity_ref
    target: MailFolder
    description: Folder that should receive the moved message.
  nv_attachment_query_message_id:
    type: entity_ref
    target: Message
    description: Message whose attachments should be listed.
  nv_attachment_get_message_id:
    type: entity_ref
    target: Message
    description: Message that owns the attachment.
