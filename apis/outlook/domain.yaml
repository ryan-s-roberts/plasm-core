version: 7
http_backend: https://graph.microsoft.com
entities:
  MailFolder:
    id_field: id
    description: A mail folder in the signed-in mailbox.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      displayName:
        required: false
        value_ref: nv_mail_folder_display_name
      parentFolderId:
        required: false
        value_ref: nv_mail_folder_parent_folder_id
      childFolderCount:
        required: false
        value_ref: nv_mail_folder_child_folder_count
      unreadItemCount:
        required: false
        value_ref: nv_mail_folder_unread_item_count
      totalItemCount:
        required: false
        value_ref: nv_mail_folder_total_item_count
      wellKnownName:
        required: false
        value_ref: nv_mail_folder_well_known_name
      isHidden:
        required: false
        value_ref: nv_wire_bool
    relations:
      childFolders:
        target: MailFolder
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: mail_folder_child_query
          bindings:
            mailFolderId: id
      messages:
        target: Message
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: message_folder_query
          bindings:
            mailFolderId: id
  Message:
    id_field: id
    description: A message in the signed-in mailbox.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      subject:
        required: false
        value_ref: nv_message_subject
      bodyPreview:
        required: false
        value_ref: nv_message_body_preview
      bodyContentType:
        required: false
        path: body.contentType
        value_ref: nv_message_body_content_type
      bodyContent:
        required: false
        path: body.content
        value_ref: nv_message_body_content
      internetMessageId:
        required: false
        value_ref: nv_message_internet_message_id
      conversationId:
        required: false
        value_ref: nv_message_conversation_id
      parentFolderId:
        required: false
        value_ref: nv_message_parent_folder_id
      fromAddress:
        required: false
        path: from.emailAddress.address
        value_ref: nv_message_from_address
      fromName:
        required: false
        path: from.emailAddress.name
        value_ref: nv_message_from_name
      receivedDateTime:
        required: false
        value_ref: nv_wire_date_rfc3339
      sentDateTime:
        required: false
        value_ref: nv_wire_date_rfc3339
      hasAttachments:
        required: false
        value_ref: nv_wire_bool
      isDraft:
        required: false
        value_ref: nv_wire_bool
      isRead:
        required: false
        value_ref: nv_wire_bool
      importance:
        required: false
        value_ref: nv_message_importance
      categories:
        required: false
        value_ref: nv_message_categories
      webLink:
        required: false
        value_ref: nv_message_web_link
    relations:
      attachments:
        target: Attachment
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: attachment_query
          bindings:
            messageId: id
  Attachment:
    id_field: id
    description: A file or embedded item attached to a message.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_attachment_name
      contentType:
        required: false
        value_ref: nv_attachment_content_type
      size:
        required: false
        value_ref: nv_wire_int
      isInline:
        required: false
        value_ref: nv_wire_bool
      lastModifiedDateTime:
        required: false
        value_ref: nv_wire_date_rfc3339
      contentId:
        required: false
        value_ref: nv_wire_str_short
      contentBytes:
        required: false
        mime_type_hint: application/octet-stream
        attachment_media: generic
        value_ref: nv_attachment_content_bytes
    relations: {}
  MailboxTriage:
    id_field: snapshotKey
    description: Composed mailbox folder triage snapshot for the signed-in user.
    primary_read: mailbox_triage_get
    fields:
      snapshotKey:
        required: true
        value_ref: nv_mailbox_triage_snapshot_key
      folder_count:
        required: false
        value_ref: nv_mailbox_triage_folder_count
      has_folders:
        required: false
        value_ref: nv_wire_bool
      triage_status:
        required: false
        value_ref: nv_mailbox_triage_status
    relations:
      root_folders:
        target: MailFolder
        cardinality: many
      inbox_folder:
        target: MailFolder
        cardinality: one
  Calendar:
    id_field: id
    description: A calendar in the signed-in user's mailbox.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_calendar_name
      color:
        required: false
        value_ref: nv_calendar_color
      isDefaultCalendar:
        required: false
        value_ref: nv_wire_bool
      canEdit:
        required: false
        value_ref: nv_wire_bool
      ownerName:
        required: false
        path: owner.name
        value_ref: nv_calendar_owner_name
      ownerAddress:
        required: false
        path: owner.address
        value_ref: nv_calendar_owner_address
    relations:
      events:
        target: Event
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: event_calendar_query
          bindings:
            calendarId: id
  Event:
    id_field: id
    description: A calendar event in the signed-in user's schedule.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      subject:
        required: false
        value_ref: nv_event_subject
      bodyPreview:
        required: false
        value_ref: nv_event_body_preview
      startDateTime:
        required: false
        path: start.dateTime
        value_ref: nv_wire_date_rfc3339
      endDateTime:
        required: false
        path: end.dateTime
        value_ref: nv_wire_date_rfc3339
      startTimeZone:
        required: false
        path: start.timeZone
        value_ref: nv_event_time_zone
      endTimeZone:
        required: false
        path: end.timeZone
        value_ref: nv_event_time_zone
      locationDisplayName:
        required: false
        path: location.displayName
        value_ref: nv_event_location_display_name
      isAllDay:
        required: false
        value_ref: nv_wire_bool
      isCancelled:
        required: false
        value_ref: nv_wire_bool
      organizerName:
        required: false
        path: organizer.emailAddress.name
        value_ref: nv_event_organizer_name
      organizerAddress:
        required: false
        path: organizer.emailAddress.address
        value_ref: nv_event_organizer_address
      webLink:
        required: false
        value_ref: nv_event_web_link
    relations: {}
capabilities:
  mail_folder_query:
    kind: query
    entity: MailFolder
    description: List the root-level folders in the mailbox.
    parameters:
    - name: includeHiddenFolders
      value_ref: nv_mail_folder_query_include_hidden_folders
      required: false
  mail_folder_child_query:
    kind: query
    entity: MailFolder
    description: List child folders underneath a folder.
    parameters:
    - name: mailFolderId
      value_ref: nv_mail_folder_child_query_mail_folder_id
      required: true
      role: scope
    - name: includeHiddenFolders
      value_ref: nv_mail_folder_child_query_include_hidden_folders
      required: false
  mail_folder_get:
    kind: get
    entity: MailFolder
    description: Get details for a known folder.
    provides:
    - id
    - displayName
    - parentFolderId
    - childFolderCount
    - unreadItemCount
    - totalItemCount
    - wellKnownName
    - isHidden
  message_query:
    kind: query
    entity: Message
    description: List messages across the mailbox.
    provides:
    - id
    - subject
    - bodyPreview
    - parentFolderId
    - fromAddress
    - fromName
    - receivedDateTime
    - sentDateTime
    - hasAttachments
    - isDraft
    - isRead
    - importance
    - categories
    - webLink
    parameters:
    - name: filter
      value_ref: nv_message_query_filter
      required: false
    - name: orderBy
      value_ref: nv_message_query_order_by
      required: false
  message_folder_query:
    kind: query
    entity: Message
    description: List messages in a specific folder.
    provides:
    - id
    - subject
    - bodyPreview
    - parentFolderId
    - fromAddress
    - fromName
    - receivedDateTime
    - sentDateTime
    - hasAttachments
    - isDraft
    - isRead
    - importance
    - categories
    - webLink
    parameters:
    - name: mailFolderId
      value_ref: nv_message_folder_query_mail_folder_id
      required: true
      role: scope
    - name: filter
      value_ref: nv_message_folder_query_filter
      required: false
    - name: orderBy
      value_ref: nv_message_folder_query_order_by
      required: false
  message_get:
    kind: get
    entity: Message
    description: Get the full message body and metadata for a known message.
    provides:
    - id
    - subject
    - bodyPreview
    - bodyContentType
    - bodyContent
    - internetMessageId
    - conversationId
    - parentFolderId
    - fromAddress
    - fromName
    - receivedDateTime
    - sentDateTime
    - hasAttachments
    - isDraft
    - isRead
    - importance
    - categories
    - webLink
  message_create:
    kind: create
    entity: Message
    description: Create a draft message in the mailbox.
    parameters:
    - name: subject
      value_ref: nv_message_create_subject
      required: true
    - name: bodyContent
      value_ref: nv_message_create_body_content
      required: true
    - name: bodyContentType
      value_ref: nv_message_create_body_content_type
      required: false
    - name: toAddress
      value_ref: nv_message_create_to_address
      required: true
    provides:
    - id
    - subject
    - bodyPreview
    - isDraft
    - parentFolderId
  message_update:
    kind: update
    entity: Message
    description: Update mailbox state fields on a message.
    parameters:
    - name: isRead
      value_ref: nv_message_update_is_read
      required: false
    - name: importance
      value_ref: nv_message_update_importance
      required: false
    - name: categories
      value_ref: nv_message_update_categories
      required: false
    provides:
    - id
    - parentFolderId
    - isRead
    - importance
    - categories
  message_move:
    kind: action
    entity: Message
    description: Move a message into another folder.
    parameters:
    - name: destinationFolderId
      value_ref: nv_message_move_destination_folder_id
      required: true
    output:
      type: side_effect
      description: Moves the message into another folder in the mailbox.
  message_send:
    kind: action
    entity: Message
    description: Send a draft message.
    output:
      type: side_effect
      description: Sends the draft message from the mailbox.
  message_delete:
    kind: delete
    entity: Message
    description: Permanently remove a message from the mailbox.
  attachment_query:
    kind: query
    entity: Attachment
    description: List attachments on a message.
    provides:
    - id
    - name
    - contentType
    - size
    - isInline
    - lastModifiedDateTime
    - contentId
    parameters:
    - name: messageId
      value_ref: nv_attachment_query_message_id
      required: true
      role: scope
  attachment_get:
    kind: action
    entity: Attachment
    description: Fetch attachment content for a known attachment on a message.
    provides:
    - id
    - name
    - contentType
    - size
    - isInline
    - lastModifiedDateTime
    - contentId
    - contentBytes
    parameters:
    - name: messageId
      value_ref: nv_attachment_get_message_id
      required: true
      role: scope
  mailbox_triage_query:
    kind: query
    entity: MailboxTriage
    description: Load root mailbox folders and inbox triage refs in one composed read.
    provides:
    - snapshotKey
    - folder_count
    - has_folders
    - triage_status
  mailbox_triage_get:
    kind: get
    entity: MailboxTriage
    description: Mailbox triage snapshot for the signed-in user.
    provides:
    - snapshotKey
    - folder_count
    - has_folders
    - triage_status
  calendar_query:
    kind: query
    entity: Calendar
    description: List calendars in the signed-in user's mailbox.
    provides:
    - id
    - name
    - color
    - isDefaultCalendar
    - canEdit
    - ownerName
    - ownerAddress
  calendar_get:
    kind: get
    entity: Calendar
    description: Get a calendar by identifier.
    provides:
    - id
    - name
    - color
    - isDefaultCalendar
    - canEdit
    - ownerName
    - ownerAddress
  event_query:
    kind: query
    entity: Event
    description: List events across all calendars in the default mailbox view.
    provides:
    - id
    - subject
    - bodyPreview
    - startDateTime
    - endDateTime
    - startTimeZone
    - endTimeZone
    - locationDisplayName
    - isAllDay
    - isCancelled
    - organizerName
    - organizerAddress
    - webLink
    parameters:
    - name: filter
      value_ref: nv_event_query_filter
      required: false
    - name: orderBy
      value_ref: nv_event_query_order_by
      required: false
  event_calendar_query:
    kind: query
    entity: Event
    description: List events in a specific calendar.
    provides:
    - id
    - subject
    - bodyPreview
    - startDateTime
    - endDateTime
    - startTimeZone
    - endTimeZone
    - locationDisplayName
    - isAllDay
    - isCancelled
    - organizerName
    - organizerAddress
    - webLink
    parameters:
    - name: calendarId
      value_ref: nv_event_calendar_query_calendar_id
      required: true
      role: scope
    - name: filter
      value_ref: nv_event_calendar_query_filter
      required: false
    - name: orderBy
      value_ref: nv_event_calendar_query_order_by
      required: false
  event_get:
    kind: get
    entity: Event
    description: Get a calendar event by identifier.
    provides:
    - id
    - subject
    - bodyPreview
    - startDateTime
    - endDateTime
    - startTimeZone
    - endTimeZone
    - locationDisplayName
    - isAllDay
    - isCancelled
    - organizerName
    - organizerAddress
    - webLink
  event_create:
    kind: create
    entity: Event
    description: Create a new calendar event.
    parameters:
    - name: subject
      value_ref: nv_event_create_subject
      required: true
    - name: startDateTime
      value_ref: nv_event_create_start_date_time
      required: true
    - name: endDateTime
      value_ref: nv_event_create_end_date_time
      required: true
    - name: timeZone
      value_ref: nv_event_create_time_zone
      required: false
    - name: bodyContent
      value_ref: nv_event_create_body_content
      required: false
    - name: bodyContentType
      value_ref: nv_event_create_body_content_type
      required: false
    - name: locationDisplayName
      value_ref: nv_event_create_location_display_name
      required: false
    provides:
    - id
    - subject
    - startDateTime
    - endDateTime
    - webLink
  event_delete:
    kind: delete
    entity: Event
    description: Cancel and remove a calendar event.
views:
  mailbox_triage:
    description: Root mailbox folders with counts and inbox ref for triage.
    capability: mailbox_triage_query
    entity: MailboxTriage
    scope: []
    nodes:
    - id: folders
      capability: mail_folder_query
      bind: {}
    output:
      snapshotKey:
        kind: computed
        template: mailbox
      folder_count:
        kind: node_row_count
        node: folders
      has_folders:
        kind: node_row_count_positive
        node: folders
      triage_status:
        kind: computed
        template: |
          {%- if not has_folders -%}empty_mailbox{%- else -%}folders_ready{%- endif -%}
    relation_outputs:
    - relation: root_folders
      target: MailFolder
      cardinality: many
      binding:
        kind: node_all_rows
        node: folders
    - relation: inbox_folder
      target: MailFolder
      cardinality: one
      binding:
        kind: first_node_row_where
        node: folders
        where_field: wellKnownName
        equals: inbox
auth:
  scheme: bearer_token
  env: MICROSOFT_GRAPH_ACCESS_TOKEN
  hosted_kv: plasm:outbound:v1:catalog:outlook
values:
  nv_calendar_color:
    type: string
    string_semantics: short
    description: Calendar color label from the service when present.
  nv_calendar_name:
    type: string
    string_semantics: short
    description: Human-facing calendar label.
  nv_calendar_owner_address:
    type: string
    string_semantics: short
    description: Owner SMTP address when the service returns one.
  nv_calendar_owner_name:
    type: string
    string_semantics: short
    description: Owner display name when the service returns one.
  nv_event_body_preview:
    type: string
    string_semantics: short
    description: Truncated preview of the event body for list views.
  nv_event_calendar_query_calendar_id:
    type: entity_ref
    target: Calendar
    description: Calendar whose events should be listed.
  nv_event_calendar_query_filter:
    type: string
    string_semantics: short
    description: OData filter expression for events in the scoped calendar.
  nv_event_calendar_query_order_by:
    type: string
    string_semantics: short
    description: OData orderBy clause for scoped calendar events.
  nv_event_create_body_content:
    type: string
    string_semantics: markdown
    description: Event body content when creating a new event.
  nv_event_create_body_content_type:
    type: select
    allowed_values:
    - text
    - html
  nv_event_create_end_date_time:
    type: string
    string_semantics: short
    description: Event end instant in RFC3339 form.
  nv_event_create_location_display_name:
    type: string
    string_semantics: short
    description: Location label for the new event.
  nv_event_create_start_date_time:
    type: string
    string_semantics: short
    description: Event start instant in RFC3339 form.
  nv_event_create_subject:
    type: string
    string_semantics: short
    description: Subject line for the new event.
  nv_event_create_time_zone:
    type: string
    string_semantics: short
    description: IANA or Windows time zone name for start/end (defaults to UTC on the wire).
  nv_event_location_display_name:
    type: string
    string_semantics: short
    description: Location label for the event.
  nv_event_organizer_address:
    type: string
    string_semantics: short
    description: Organizer email address when present.
  nv_event_organizer_name:
    type: string
    string_semantics: short
    description: Organizer display name when present.
  nv_event_query_filter:
    type: string
    string_semantics: short
    description: OData filter expression for mailbox-wide event listing.
  nv_event_query_order_by:
    type: string
    string_semantics: short
    description: OData orderBy clause for mailbox-wide event listing.
  nv_event_subject:
    type: string
    string_semantics: short
    description: Event title shown in calendar views.
  nv_event_time_zone:
    type: string
    string_semantics: short
    description: Time zone name associated with an event start or end.
  nv_event_web_link:
    type: string
    string_semantics: short
    description: Browser URL that opens the event in Outlook on the web when available.
  nv_attachment_content_bytes:
    type: blob
  nv_attachment_content_type:
    type: string
    string_semantics: short
    description: MIME type of the attachment payload when the service returns one.
  nv_attachment_get_message_id:
    type: entity_ref
    target: Message
    description: Message that owns the attachment.
  nv_attachment_name:
    type: string
    string_semantics: short
    description: Filename or label shown for the attachment.
  nv_attachment_query_message_id:
    type: entity_ref
    target: Message
    description: Message whose attachments should be listed.
  nv_mail_folder_child_folder_count:
    type: integer
    description: Number of immediate child folders under this folder.
  nv_mail_folder_child_query_include_hidden_folders:
    type: boolean
    description: Include hidden folders in the child folder listing.
  nv_mail_folder_child_query_mail_folder_id:
    type: entity_ref
    target: MailFolder
    description: Folder whose child folders should be listed.
  nv_mail_folder_display_name:
    type: string
    string_semantics: short
    description: Human-facing folder label in the mailbox tree.
  nv_mail_folder_parent_folder_id:
    type: entity_ref
    target: MailFolder
  nv_mail_folder_query_include_hidden_folders:
    type: boolean
    description: Include hidden folders in the root folder listing.
  nv_mail_folder_total_item_count:
    type: integer
    description: Total messages stored in the folder when the service reports a count.
  nv_mail_folder_unread_item_count:
    type: integer
    description: Unread message count for triage in this folder.
  nv_mail_folder_well_known_name:
    type: string
    string_semantics: short
    description: Well-known folder role when the service exposes one (inbox, drafts, sentitems, etc.).
  nv_mailbox_triage_folder_count:
    type: integer
    description: Number of root-level folders returned for triage.
  nv_mailbox_triage_snapshot_key:
    type: string
    string_semantics: short
    description: Stable singleton key for the mailbox triage snapshot row.
  nv_mailbox_triage_status:
    type: string
    string_semantics: short
    description: Coarse triage label derived from folder load state.
  nv_message_create_body_content:
    type: string
    string_semantics: markdown
    description: Draft body content to store on the new message.
  nv_message_create_body_content_type:
    type: select
    allowed_values:
    - text
    - html
    description: Body format for the draft message.
  nv_message_create_subject:
    type: string
    string_semantics: short
    description: Subject line for the draft message.
  nv_message_create_to_address:
    type: string
    string_semantics: short
    description: Primary recipient email address for the draft message.
  nv_message_body_content:
    type: string
    string_semantics: markdown
  nv_message_body_content_type:
    type: select
    allowed_values:
    - text
    - html
  nv_message_body_preview:
    type: string
    string_semantics: short
    description: Truncated preview of the message body for list views.
  nv_message_conversation_id:
    type: string
    string_semantics: short
    description: Conversation thread identifier grouping related messages.
  nv_message_folder_query_filter:
    type: string
    string_semantics: short
    description: OData filter expression for messages in the scoped folder (e.g. isRead eq false).
  nv_message_folder_query_mail_folder_id:
    type: entity_ref
    target: MailFolder
    description: Folder whose messages should be listed.
  nv_message_folder_query_order_by:
    type: string
    string_semantics: short
    description: OData orderBy clause for folder message listing (e.g. receivedDateTime desc).
  nv_message_from_address:
    type: string
    string_semantics: short
    description: Sender email address on the message envelope.
  nv_message_from_name:
    type: string
    string_semantics: short
    description: Sender display name on the message envelope.
  nv_message_importance:
    type: select
    allowed_values:
    - low
    - normal
    - high
  nv_message_internet_message_id:
    type: string
    string_semantics: short
    description: RFC822 Message-ID header value when present.
  nv_message_move_destination_folder_id:
    type: entity_ref
    target: MailFolder
    description: Folder that should receive the moved message.
  nv_message_parent_folder_id:
    type: entity_ref
    target: MailFolder
  nv_message_query_filter:
    type: string
    string_semantics: short
    description: OData filter expression for server-side message filtering (e.g. isRead eq false).
  nv_message_query_order_by:
    type: string
    string_semantics: short
    description: OData orderBy clause for mailbox-wide message listing (e.g. receivedDateTime desc).
  nv_message_subject:
    type: string
    string_semantics: short
    description: Subject line shown in list and detail views.
  nv_message_update_importance:
    type: select
    allowed_values:
    - low
    - normal
    - high
    description: Importance marker to store on the message.
  nv_message_update_is_read:
    type: boolean
    description: Whether the message should be marked read.
  nv_message_web_link:
    type: string
    string_semantics: short
    description: Browser URL that opens the message in Outlook on the web when available.
  nv_wire_bool:
    type: boolean
  nv_wire_date_rfc3339:
    type: date
    value_format: rfc3339
  nv_wire_int:
    type: integer
