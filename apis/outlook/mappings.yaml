# Outlook / Microsoft Graph v1.0 — CML mappings. Semantic model lives in domain.yaml.
#
# Base origin: https://graph.microsoft.com
# Auth: bearer token via MICROSOFT_GRAPH_ACCESS_TOKEN
#
# Graph collections paginate with @odata.nextLink absolute URLs in the JSON body.
# List capabilities declare `pagination.location: response_next_url` so the runtime
# replays those URLs on `page(pg#)` continuations.

mail_folder_query:
  method: GET
  path:
    - { type: literal, value: "v1.0" }
    - { type: literal, value: me }
    - { type: literal, value: mailFolders }
  response:
    items: value
  query:
    type: object
    fields:
      - - includeHiddenFolders
        - type: if
          condition: { type: exists, var: includeHiddenFolders }
          then_expr: { type: var, name: includeHiddenFolders }
          else_expr: { type: const, value: null }
  pagination:
    location: response_next_url
    response_next_url_field: "@odata.nextLink"
    params:
      $top: { fixed: 100 }

mail_folder_child_query:
  method: GET
  path:
    - { type: literal, value: "v1.0" }
    - { type: literal, value: me }
    - { type: literal, value: mailFolders }
    - { type: var, name: mailFolderId }
    - { type: literal, value: childFolders }
  response:
    items: value
  query:
    type: object
    fields:
      - - includeHiddenFolders
        - type: if
          condition: { type: exists, var: includeHiddenFolders }
          then_expr: { type: var, name: includeHiddenFolders }
          else_expr: { type: const, value: null }
  pagination:
    location: response_next_url
    response_next_url_field: "@odata.nextLink"
    params:
      $top: { fixed: 100 }

mail_folder_get:
  method: GET
  path:
    - { type: literal, value: "v1.0" }
    - { type: literal, value: me }
    - { type: literal, value: mailFolders }
    - { type: var, name: id }
  response: single

