        - { type: const, value: "id,subject,bodyPreview,body,internetMessageId,conversationId,parentFolderId,from,receivedDateTime,sentDateTime,hasAttachments,isDraft,isRead,importance,categories,webLink" }

message_create:
  method: POST
  path:
    - { type: literal, value: "v1.0" }
    - { type: literal, value: me }
    - { type: literal, value: messages }
  response: single
  body:
    type: object
    fields:
      - - subject
        - { type: var, name: subject }
      - - body
        - type: object
          fields:
            - - contentType
              - type: if
                condition: { type: exists, var: bodyContentType }
                then_expr: { type: var, name: bodyContentType }
                else_expr: { type: const, value: html }
            - - content
              - { type: var, name: bodyContent }
      - - toRecipients
        - type: array
          elements:
            - type: object
              fields:
                - - emailAddress
                  - type: object
                    fields:
                      - - address
                        - { type: var, name: toAddress }

