- id: ji-20
  schema: jira
  goal: "Integration hardening: boards, sprints, webhooks, saved filters, vote/edit metadata, permissions, attachments, and groups for automation tooling"
  tags: [coverage, surface]
  covers: [query_filtered]
  expect:
    entities_any:
      - Attachment
      - Board
      - Dashboard
      - Group
      - IssueCreateMetaBundle
      - IssueEditMeta
      - IssueVoteState
      - MyPermissionSet
      - SavedFilter
      - Sprint
      - Webhook
