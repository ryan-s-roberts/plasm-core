# Jira Cloud — issues, projects, boards (triage, search, planning).
- id: ji-01
  schema: jira
  goal: "Run JQL 'project = PLASM AND status = Open' for the daily standup board"
  tags: [search, jql]
  covers: [search_text]
  expect:
    entities_any: [Issue]

- id: ji-02
  schema: jira
  goal: "List issues in project PLASM with assignee = currentUser()"
  tags: [query, filter]
  covers: [query_filtered]
  expect:
    entities_any: [Issue]

- id: ji-03
  schema: jira
  goal: "Fetch issue PLASM-42 for the detail drawer"
  tags: [get]
  covers: [get]
  expect:
    entities_any: [Issue]

- id: ji-04
  schema: jira
  goal: "Search projects whose key starts with 'PLAS' for org onboarding"
  tags: [search]
  covers: [search_text]
  expect:
    entities_any: [Project]

- id: ji-05
  schema: jira
  goal: "From issue PLASM-1, load the assignee's profile for the avatar tooltip"
  tags: [chain]
  covers: [chain]
  expect:
    entities_any: [Issue, User]

- id: ji-06
  schema: jira
  goal: "Get sprint PLASM-1 issues, then list comments on the top blocker"
