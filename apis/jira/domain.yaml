auth:
  scheme: api_key_header
  header: Authorization
  env: JIRA_AUTH
  hosted_kv: plasm:outbound:v1:catalog:jira
values:
  nv_jira_browse_url:
    type: string
    string_semantics: short
    description: Assembled /browse/{key} URL for the issue.
  nv_jira_issue_browse_link_issue_key:
    type: entity_ref
    target: Issue
  nv_jira_issue_transition_context_issue_key:
    type: entity_ref
    target: Issue
  nv_jira_sprint_board_sprint_id:
    type: entity_ref
    target: Sprint
  nv_jira_site_base:
    type: string
    string_semantics: short
    description: Jira Cloud site origin (e.g. https://your-team.atlassian.net); must match http_backend host.
  nv_attachment_author_id:
    type: entity_ref
    target: User
  nv_board_query_project_key_or_id:
    type: entity_ref
    target: Project
  nv_changelog_author_id:
    type: entity_ref
    target: User
  nv_changelog_query_issue_id_or_key:
    type: entity_ref
    target: Issue
  nv_comment_author_id:
    type: entity_ref
    target: User
  nv_comment_create_issue_id_or_key:
    type: entity_ref
    target: Issue
    description: Issue key or id to comment on.
  nv_comment_create_text:
    type: string
    string_semantics: markdown
    description: Plain comment text (wrapped to minimal ADF for the API).
  nv_comment_query_issue_id_or_key:
    type: entity_ref
    target: Issue
  nv_comment_query_order_by:
    type: select
    allowed_values:
    - created
    - -created
  nv_component_assignee_type:
    type: select
    allowed_values:
    - PROJECT_LEAD
    - COMPONENT_LEAD
    - UNASSIGNED
    - PROJECT_DEFAULT
  nv_component_query_order_by:
    type: select
    allowed_values:
    - description
    - -description
    - issueCount
    - -issueCount
    - lead
    - -lead
    - name
    - -name
  nv_component_query_project_id_or_key:
    type: entity_ref
    target: Project
  nv_issue_assignee_id:
    type: entity_ref
    target: User
  nv_issue_create_description:
    type: string
    string_semantics: markdown
    description: Optional plain-text description; Jira Cloud may require Atlassian Document Format instead—if create fails,
      leave empty and edit in the UI or use issue update.
  nv_issue_create_issue_type:
    type: string
    string_semantics: short
    description: Issue type name as configured in the project (e.g. Task, Bug, Story).
  nv_issue_create_meta_bundle_projects:
    type: json
  nv_issue_create_project_key:
    type: entity_ref
    target: Project
    description: Target project key (e.g. PROJ).
  nv_issue_create_summary:
    type: string
    string_semantics: short
    description: One-line title for the new issue.
  nv_issue_edit_meta_fields:
    type: json
  nv_issue_jql_expand:
    type: string
    string_semantics: short
    description: Names of optional expansions to include (Jira-specific; often comma-separated, e.g. renderedFields or names
      of entities to hydrate).
  nv_issue_jql_jql:
    type: string
    string_semantics: short
    description: JQL expression (filters, ordering, and functions such as currentUser()).
  nv_issue_parent_key:
    type: entity_ref
    target: Issue
  nv_issue_project_key:
    type: entity_ref
    target: Project
  nv_issue_reporter_id:
    type: entity_ref
    target: User
  nv_issue_transition_transition_id:
    type: string
    string_semantics: short
    description: Workflow transition id (numeric string from the transitions list for this issue).
  nv_issue_update_assignee_id:
    type: string
    string_semantics: short
    description: Account ID to assign; omit to leave assignee unchanged.
  nv_issue_update_description:
    type: string
    string_semantics: markdown
    description: Replacement description; on Cloud this may need to be valid ADF JSON for some sites.
  nv_issue_update_priority_name:
