    - name
    - description
  board_query:
    kind: query
    entity: Board
    description: Boards on the site, optionally narrowed to a project (Jira Software).
    parameters:
    - name: projectKeyOrId
      value_ref: nv_board_query_project_key_or_id
      required: false
      role: filter
  board_get:
    kind: get
    entity: Board
    description: Board details including configuration context.
    provides:
    - id
    - name
    - type
  sprint_query:
    kind: query
    entity: Sprint
    description: Sprints on a board (active, future, closed).
    parameters:
    - name: boardId
      value_ref: nv_wire_int
      required: true
      role: scope
  sprint_get:
    kind: get
    entity: Sprint
    description: One sprint’s dates, state, and backlog scope.
    provides:
