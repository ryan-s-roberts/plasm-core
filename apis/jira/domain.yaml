    - name: events
      value_ref: nv_webhook_register_events
      required: true
  webhook_delete:
    kind: delete
    entity: Webhook
    description: Remove a webhook subscription.
  issue_transition_context_query:
    kind: query
    entity: IssueTransitionContext
    description: Load issue summary and available workflow transitions in one composed read.
    parameters:
    - name: issue_key
      value_ref: nv_jira_issue_transition_context_issue_key
      required: true
      role: scope
    provides:
    - issue_key
    - summary
    - status
    - transition_count
    - has_transitions
  issue_transition_context_get:
    kind: get
    entity: IssueTransitionContext
    description: Transition readiness snapshot scoped by issue key.
    provides:
    - issue_key
    - summary
    - status
    - transition_count
    - has_transitions
  issue_browse_link_query:
    kind: query
    entity: IssueBrowseLink
    description: Assemble the Jira web browse URL for an issue.
    parameters:
    - name: issue_key
      value_ref: nv_jira_issue_browse_link_issue_key
      required: true
      role: scope
    provides:
    - issue_key
    - summary
    - site_base
    - url
  issue_browse_link_get:
    kind: get
    entity: IssueBrowseLink
    description: Browse URL for an issue when you already hold the key.
    provides:
    - issue_key
    - summary
    - site_base
    - url
  sprint_board_snapshot_query:
    kind: query
    entity: SprintBoardSnapshot
    description: Load sprint dates/state and issues in that sprint in one composed read.
    parameters:
    - name: sprint_id
      value_ref: nv_jira_sprint_board_sprint_id
      required: true
      role: scope
    provides:
    - sprint_id
    - name
    - state
    - startDate
    - endDate
    - issue_count
  sprint_board_snapshot_get:
    kind: get
    entity: SprintBoardSnapshot
    description: Sprint board snapshot scoped by sprint id.
    provides:
    - sprint_id
    - name
    - state
    - startDate
    - endDate
    - issue_count
views:
  issue_transition_context:
    description: Issue triage row with transition count and refs to available workflow moves.
    capability: issue_transition_context_query
    entity: IssueTransitionContext
    scope:
    - name: issue_key
      value_ref: nv_jira_issue_transition_context_issue_key
    nodes:
    - id: issue_row
      capability: issue_get
      bind:
        id:
          kind: scope
          param: issue_key
    - id: transitions
      capability: transition_query
      bind:
        issueIdOrKey:
          kind: scope
          param: issue_key
    output:
      issue_key:
        kind: scope
        param: issue_key
      summary:
        kind: node_field
        node: issue_row
        field: summary
      status:
        kind: node_field
        node: issue_row
        field: status
      transition_count:
        kind: node_row_count
        node: transitions
      has_transitions:
        kind: node_row_count_positive
        node: transitions
    relation_outputs:
    - relation: issue
      target: Issue
      cardinality: one
      binding:
        kind: node_single_row
        node: issue_row
    - relation: transitions
      target: Transition
      cardinality: many
      binding:
        kind: node_all_rows
        node: transitions
  issue_browse_link:
    description: Web browse URL for sharing or opening an issue in the Jira UI.
    capability: issue_browse_link_query
    entity: IssueBrowseLink
    scope:
    - name: issue_key
      value_ref: nv_jira_issue_browse_link_issue_key
    - name: site_base
      value_ref: nv_jira_site_base
      required: false
      inject: session_ui_origin
    nodes:
    - id: issue_row
      capability: issue_get
      bind:
        id:
          kind: scope
          param: issue_key
    output:
      issue_key:
        kind: scope
        param: issue_key
      summary:
        kind: node_field
        node: issue_row
        field: summary
      site_base:
        kind: scope
        param: site_base
      url:
        kind: computed
        template: |
          {{ site_base | strip_trailing_slash }}/browse/{{ issue_key }}
    relation_outputs:
    - relation: issue
      target: Issue
      cardinality: one
      binding:
        kind: node_single_row
        node: issue_row
  sprint_board_snapshot:
    description: Sprint row plus issues matched by JQL sprint filter (cycle board pattern).
    capability: sprint_board_snapshot_query
    entity: SprintBoardSnapshot
    scope:
    - name: sprint_id
      value_ref: nv_jira_sprint_board_sprint_id
    nodes:
    - id: sprint_row
      capability: sprint_get
      bind:
        id:
          kind: scope
          param: sprint_id
    - id: sprint_issues
      capability: issue_jql
      bind:
        jql:
          kind: computed
          template: sprint = {{ sprint_row.id }}
    output:
      sprint_id:
        kind: scope
        param: sprint_id
      name:
        kind: node_field
        node: sprint_row
        field: name
      state:
        kind: node_field
        node: sprint_row
        field: state
      startDate:
        kind: node_field
        node: sprint_row
        field: startDate
      endDate:
        kind: node_field
        node: sprint_row
        field: endDate
      issue_count:
        kind: node_row_count
        node: sprint_issues
    relation_outputs:
    - relation: sprint
      target: Sprint
      cardinality: one
      binding:
        kind: node_single_row
        node: sprint_row
    - relation: issues
      target: Issue
      cardinality: many
      binding:
        kind: node_all_rows
        node: sprint_issues
oauth:
  provider: atlassian_jira_cloud
  scopes:
    read:jira-user:
      label: View user profiles (Jira classic scope)
      notes: Jira permissions still apply; scopes do not override project access.
      docs_url: https://developer.atlassian.com/cloud/jira/platform/scopes-for-oauth-2-3LO-and-forge-apps
    read:jira-work:
      label: Read Jira issue and project data (classic)
      docs_url: https://developer.atlassian.com/cloud/jira/platform/scopes-for-oauth-2-3LO-and-forge-apps
    write:jira-work:
      label: Create and edit issues, comments, worklogs (classic)
      docs_url: https://developer.atlassian.com/cloud/jira/platform/scopes-for-oauth-2-3LO-and-forge-apps
    manage:jira-project:
      label: Manage project settings (classic)
      docs_url: https://developer.atlassian.com/cloud/jira/platform/scopes-for-oauth-2-3LO-and-forge-apps
    manage:jira-configuration:
      label: Manage global Jira configuration (classic)
      docs_url: https://developer.atlassian.com/cloud/jira/platform/scopes-for-oauth-2-3LO-and-forge-apps
    manage:jira-webhook:
      label: Manage Jira webhooks (classic)
      docs_url: https://developer.atlassian.com/cloud/jira/platform/scopes-for-oauth-2-3LO-and-forge-apps
    read:board-scope:jira-software:
      label: Read Jira Software boards (granular)
      notes: Jira Software does not support classic scopes; use granular scopes for Software REST.
      docs_url: https://developer.atlassian.com/cloud/jira/software/scopes-for-oauth-2-3LO-and-forge-apps
    read:sprint:jira-software:
      label: Read Jira Software sprints (granular)
      docs_url: https://developer.atlassian.com/cloud/jira/software/scopes-for-oauth-2-3LO-and-forge-apps
