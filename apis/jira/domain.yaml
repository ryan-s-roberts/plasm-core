    description: List changelog entries (field change history) for an issue
    parameters:
    - name: issueIdOrKey
      value_ref: nv_changelog_query_issue_id_or_key
      required: true
      role: scope
  remotelink_query:
    kind: query
    entity: RemoteLink
    description: List remote links attached to an issue
    parameters:
    - name: issueIdOrKey
      value_ref: nv_remotelink_query_issue_id_or_key
      required: true
      role: scope
  transition_query:
    kind: query
