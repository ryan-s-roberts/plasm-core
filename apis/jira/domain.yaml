version: 4
http_backend: https://your-domain.atlassian.net
entities:
  Issue:
    id_field: key
    description: A Jira issue (bug, story, task, epic, etc.)
    fields:
      key:
        required: true
        value_ref: nv_wire_str_short
      id:
        required: true
        value_ref: nv_wire_str_short
      summary:
        required: false
        path: fields.summary
        value_ref: nv_wire_str_short
      description:
        required: false
        path: fields.description
        value_ref: nv_wire_str_markdown
      status:
        required: false
        path: fields.status.name
        value_ref: nv_wire_str_short
      status_category:
        required: false
        path: fields.status.statusCategory.name
        value_ref: nv_wire_str_short
      priority:
        required: false
        path: fields.priority.name
        value_ref: nv_wire_str_short
      issuetype:
        required: false
        path: fields.issuetype.name
        value_ref: nv_wire_str_short
      resolution:
        required: false
        path: fields.resolution.name
        value_ref: nv_wire_str_short
      assignee_id:
        required: false
        path: fields.assignee.accountId
        value_ref: nv_issue_assignee_id
      assignee_name:
        required: false
        path: fields.assignee.displayName
        value_ref: nv_wire_str_short
      reporter_id:
        required: false
        path: fields.reporter.accountId
        value_ref: nv_issue_reporter_id
      reporter_name:
        required: false
        path: fields.reporter.displayName
        value_ref: nv_wire_str_short
      project_key:
        required: false
        path: fields.project.key
        value_ref: nv_issue_project_key
      project_name:
        required: false
        path: fields.project.name
        value_ref: nv_wire_str_short
      parent_key:
        required: false
        path: fields.parent.key
        value_ref: nv_issue_parent_key
      labels:
        required: false
        path: fields.labels
        value_ref: nv_issue_labels
      duedate:
        required: false
        path: fields.duedate
        value_ref: nv_wire_date_rfc3339
      created:
        required: false
        path: fields.created
        value_ref: nv_wire_date_rfc3339
      updated:
        required: false
        path: fields.updated
        value_ref: nv_wire_date_rfc3339
      resolutiondate:
        required: false
        path: fields.resolutiondate
        value_ref: nv_wire_date_rfc3339
    relations:
      comments:
        target: Comment
        cardinality: many
        materialize:
          kind: query_scoped
          capability: comment_query
          param: issueIdOrKey
      worklogs:
        target: Worklog
        cardinality: many
        materialize:
          kind: query_scoped
          capability: worklog_query
          param: issueIdOrKey
      changelog:
        target: Changelog
        cardinality: many
        materialize:
          kind: query_scoped
          capability: changelog_query
          param: issueIdOrKey
      remotelinks:
        target: RemoteLink
        cardinality: many
        materialize:
          kind: query_scoped
          capability: remotelink_query
          param: issueIdOrKey
      transitions:
        target: Transition
        cardinality: many
        materialize:
          kind: query_scoped
          capability: transition_query
          param: issueIdOrKey
      attachments:
        description: Files uploaded to this issue (present when the issue payload includes attachment metadata).
        target: Attachment
        cardinality: many
        materialize:
          kind: from_parent_get
          path:
          - key: fields
          - key: attachment
          - wildcard: true
  Project:
    id_field: key
    description: A Jira project
    fields:
      key:
        required: true
        value_ref: nv_wire_str_short
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: true
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      projectTypeKey:
        required: false
        value_ref: nv_project_project_type_key
      archived:
        required: false
        value_ref: nv_wire_bool
      isPrivate:
        required: false
        value_ref: nv_wire_bool
      lead_account_id:
        required: false
        path: lead.accountId
        value_ref: nv_wire_str_short
      lead_name:
        required: false
        path: lead.displayName
        value_ref: nv_wire_str_short
    relations:
      components:
        target: Component
        cardinality: many
        materialize:
          kind: query_scoped
          capability: component_query
          param: projectIdOrKey
  User:
    id_field: accountId
    description: A Jira user account
    fields:
      accountId:
        required: true
        value_ref: nv_wire_str_short
      displayName:
        required: false
        value_ref: nv_wire_str_short
      emailAddress:
        required: false
        value_ref: nv_wire_str_short
      active:
        required: false
        value_ref: nv_wire_bool
      timeZone:
        required: false
        value_ref: nv_wire_str_short
      accountType:
        required: false
        value_ref: nv_wire_str_short
  Comment:
    id_field: id
    description: A comment on a Jira issue
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      body:
        required: false
        value_ref: nv_wire_str_markdown
      author_id:
        required: false
        path: author.accountId
        value_ref: nv_comment_author_id
      author_name:
        required: false
        path: author.displayName
        value_ref: nv_wire_str_short
      created:
        required: false
        value_ref: nv_wire_date_rfc3339
      updated:
        required: false
        value_ref: nv_wire_date_rfc3339
  Priority:
    id_field: id
    description: An issue priority level
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: true
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      isDefault:
        required: false
        value_ref: nv_wire_bool
      statusColor:
        required: false
        value_ref: nv_wire_str_short
  Status:
    id_field: id
    description: An issue workflow status
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: true
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      statusCategory:
        required: false
        path: statusCategory.name
        value_ref: nv_wire_str_short
  IssueType:
    id_field: id
    description: An issue type (Bug, Story, Task, Epic, etc.)
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: true
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      subtask:
        required: false
        value_ref: nv_wire_bool
      hierarchyLevel:
        required: false
        value_ref: nv_wire_int
  Worklog:
    id_field: id
    description: A time-tracking worklog entry on a Jira issue
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      issueId:
        required: false
        value_ref: nv_wire_str_short
      author_id:
        required: false
        path: author.accountId
        value_ref: nv_worklog_author_id
      author_name:
        required: false
        path: author.displayName
        value_ref: nv_wire_str_short
      comment:
        required: false
        value_ref: nv_wire_str_markdown
      started:
        required: false
        value_ref: nv_wire_date_rfc3339
      timeSpent:
        required: false
        value_ref: nv_wire_str_short
      timeSpentSeconds:
        required: false
        value_ref: nv_wire_int
      created:
        required: false
        value_ref: nv_wire_date_rfc3339
      updated:
        required: false
        value_ref: nv_wire_date_rfc3339
  Changelog:
    id_field: id
    description: An audit-log entry recording field changes on a Jira issue
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      author_id:
        required: false
        path: author.accountId
        value_ref: nv_changelog_author_id
      author_name:
        required: false
        path: author.displayName
        value_ref: nv_wire_str_short
      created:
        required: false
        value_ref: nv_wire_date_rfc3339
      items:
        required: false
        value_ref: nv_changelog_items
  RemoteLink:
    id_field: id
    description: A remote link attached to a Jira issue (external tracker, document, etc.)
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      globalId:
        required: false
        value_ref: nv_wire_str_short
      relationship:
        required: false
        value_ref: nv_wire_str_short
      object_title:
        required: false
        path: object.title
        value_ref: nv_wire_str_short
      object_url:
        required: false
        path: object.url
        value_ref: nv_wire_str_short
      object_summary:
        required: false
        path: object.summary
        value_ref: nv_wire_str_short
      application_name:
        required: false
        path: application.name
        value_ref: nv_wire_str_short
      application_type:
        required: false
        path: application.type
        value_ref: nv_wire_str_short
  Transition:
    id_field: id
    description: An available workflow transition for a Jira issue
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: true
        value_ref: nv_wire_str_short
      isAvailable:
        required: false
        value_ref: nv_wire_bool
      isConditional:
        required: false
        value_ref: nv_wire_bool
      isGlobal:
        required: false
        value_ref: nv_wire_bool
      isInitial:
        required: false
        value_ref: nv_wire_bool
  Component:
    id_field: id
    description: A project component grouping issues within a Jira project
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: true
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      assigneeType:
        required: false
        value_ref: nv_component_assignee_type
      lead_id:
        required: false
        path: lead.accountId
        value_ref: nv_wire_str_short
      lead_name:
        required: false
        path: lead.displayName
        value_ref: nv_wire_str_short
      project:
        required: false
        value_ref: nv_wire_str_short
  Version:
    id_field: id
    description: A project version (fix version / affects version)
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: true
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      released:
        required: false
        value_ref: nv_wire_bool
      archived:
        required: false
        value_ref: nv_wire_bool
      releaseDate:
        required: false
        value_ref: nv_wire_date_rfc3339
      startDate:
        required: false
        value_ref: nv_wire_date_rfc3339
      project:
        required: false
        value_ref: nv_wire_str_short
      overdue:
        required: false
        value_ref: nv_wire_bool
  Attachment:
    id_field: id
    description: A file attached to an issue (metadata and download links, not the binary upload itself).
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      filename:
        required: false
        value_ref: nv_wire_str_short
      mimeType:
        required: false
        value_ref: nv_wire_str_short
      size:
        required: false
        value_ref: nv_wire_int
      author_id:
        required: false
        path: author.accountId
        value_ref: nv_attachment_author_id
      created:
        required: false
        value_ref: nv_wire_date_rfc3339
  IssueVoteState:
    id_field: issue_key
    implicit_request_identity: true
    description: How many users have voted on an issue and whether the current identity has voted.
    domain_projection_examples: false
    fields:
      issue_key:
        required: true
        value_ref: nv_wire_str_short
      vote_count:
        required: false
        path: votes
        value_ref: nv_wire_int
      has_voted:
        required: false
        path: hasVoted
        value_ref: nv_wire_bool
  IssueEditMeta:
    id_field: issue_key
    implicit_request_identity: true
    description: Field-level editability and allowed values for an issue before you change it.
    domain_projection_examples: false
    fields:
      issue_key:
        required: true
        value_ref: nv_wire_str_short
      fields:
        required: false
        path: fields
        value_ref: nv_issue_edit_meta_fields
  IssueCreateMetaBundle:
    id_field: id
    implicit_request_identity: true
    description: Creation-time field metadata for a project (issue types and field requirements for the create form).
    domain_projection_examples: false
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      projects:
        required: false
        path: projects
        value_ref: nv_issue_create_meta_bundle_projects
  Group:
    id_field: name
    description: A named group used for permissions and notifications.
    fields:
      groupId:
        required: false
        value_ref: nv_wire_str_short
      name:
        required: true
        value_ref: nv_wire_str_short
      self:
        required: false
        value_ref: nv_wire_str_short
  MyPermissionSet:
    id_field: id
    implicit_request_identity: true
    description: Effective permissions for the current user, optionally narrowed to a project or issue.
    domain_projection_examples: false
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      permissions:
        required: false
        path: permissions
        value_ref: nv_my_permission_set_permissions
  SavedFilter:
    id_field: id
    description: A saved JQL filter (stored search) a user can reuse or share.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      jql:
        required: false
        value_ref: nv_wire_str_short
      favourite:
        required: false
        value_ref: nv_wire_bool
  Dashboard:
    id_field: id
    description: A dashboard layout of gadgets for a team or personal view.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
  Board:
    id_field: id
    description: A Jira Software board (backlog or sprint view) for a project or filter.
    domain_projection_examples: false
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_wire_str_short
      type:
        required: false
        value_ref: nv_wire_str_short
      self:
        required: false
        value_ref: nv_wire_str_short
  Sprint:
    id_field: id
    description: A time-boxed iteration on a board used for planning and tracking work.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_wire_str_short
      state:
        required: false
        value_ref: nv_wire_str_short
      startDate:
        required: false
        value_ref: nv_wire_date_rfc3339
      endDate:
        required: false
        value_ref: nv_wire_date_rfc3339
      boardId:
        required: false
        path: originBoardId
        value_ref: nv_wire_int
  Webhook:
    id_field: id
    description: An outbound webhook subscription that delivers Jira events to your app URL.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      jql:
        required: false
        value_ref: nv_wire_str_short
      url:
        required: false
        path: url
        value_ref: nv_wire_str_short
      events:
        required: false
        value_ref: nv_webhook_events
  IssueTransitionContext:
    id_field: issue_key
    primary_read: issue_transition_context_get
    description: Issue triage snapshot with available workflow transitions for status changes.
    fields:
      issue_key:
        required: true
        value_ref: nv_wire_str_short
      summary:
        required: false
        value_ref: nv_wire_str_short
      status:
        required: false
        value_ref: nv_wire_str_short
      transition_count:
        required: false
        value_ref: nv_wire_int
      has_transitions:
        required: false
        value_ref: nv_wire_bool
    relations:
      issue:
        target: Issue
        cardinality: one
      transitions:
        target: Transition
        cardinality: many
  IssueBrowseLink:
    id_field: issue_key
    primary_read: issue_browse_link_get
    description: Shareable Jira web browse URL for an issue.
    fields:
      issue_key:
        required: true
        value_ref: nv_wire_str_short
      summary:
        required: false
        value_ref: nv_wire_str_short
      site_base:
        required: false
        value_ref: nv_jira_site_base
      url:
        required: false
        value_ref: nv_jira_browse_url
    relations:
      issue:
        target: Issue
        cardinality: one
  SprintBoardSnapshot:
    id_field: sprint_id
    primary_read: sprint_board_snapshot_get
    description: Sprint metadata plus issues scheduled in that sprint (board snapshot).
    fields:
      sprint_id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_wire_str_short
      state:
        required: false
        value_ref: nv_wire_str_short
      startDate:
        required: false
        value_ref: nv_wire_date_rfc3339
      endDate:
        required: false
        value_ref: nv_wire_date_rfc3339
      issue_count:
        required: false
        value_ref: nv_wire_int
    relations:
      sprint:
        target: Sprint
        cardinality: one
      issues:
        target: Issue
        cardinality: many
capabilities:
  issue_get:
    kind: get
    entity: Issue
    description: Get a single issue by key or ID (e.g. PROJ-123)
    provides:
    - key
    - id
    - summary
    - description
    - status
    - status_category
    - priority
    - issuetype
    - resolution
    - assignee_id
    - assignee_name
    - reporter_id
    - reporter_name
    - project_key
    - project_name
    - parent_key
    - labels
    - duedate
    - created
    - updated
    - resolutiondate
  issue_jql:
    kind: search
    entity: Issue
    description: Search issues with JQL—filter, sort, and shape the result set; optional field and expansion hints narrow
      or enrich what comes back per issue.
    parameters:
    - name: jql
      value_ref: nv_issue_jql_jql
      required: true
      role: search
    - name: fields
      value_ref: nv_issue_jql_fields
      required: false
      role: response_control
    - name: expand
      value_ref: nv_issue_jql_expand
      required: false
      role: response_control
  issue_create:
    kind: create
    entity: Issue
    description: Create a new issue in a project with the given type and summary.
    provides:
    - key
    - id
    - summary
    parameters:
    - name: project_key
      value_ref: nv_issue_create_project_key
      required: true
    - name: issue_type
      value_ref: nv_issue_create_issue_type
      required: true
    - name: summary
      value_ref: nv_issue_create_summary
      required: true
    - name: description
      value_ref: nv_issue_create_description
      required: false
  issue_update:
    kind: update
    entity: Issue
    description: Edit fields on an existing issue (partial update). Pass at least one field flag.
    provides:
    - key
    - id
    - summary
    - description
    - status
    - priority
    - assignee_id
    - assignee_name
    - labels
    parameters:
    - name: summary
      value_ref: nv_issue_update_summary
      required: false
    - name: description
      value_ref: nv_issue_update_description
      required: false
    - name: assignee_id
      value_ref: nv_issue_update_assignee_id
      required: false
    - name: priority_name
      value_ref: nv_issue_update_priority_name
      required: false
    - name: labels
      value_ref: nv_issue_update_labels
      required: false
  issue_delete:
    kind: delete
    entity: Issue
    description: Permanently delete an issue (subject to permissions and workflow).
  issue_transition:
    kind: action
    entity: Issue
    description: Move an issue along its workflow using a transition id from transition query.
    output:
      type: side_effect
      description: The issue leaves its current status and enters the status targeted by the chosen transition.
    parameters:
    - name: transition_id
      value_ref: nv_issue_transition_transition_id
      required: true
  project_get:
    kind: get
    entity: Project
    description: Get a project by key or ID
    provides:
    - key
    - id
    - name
    - description
    - projectTypeKey
    - archived
    - isPrivate
    - lead_account_id
    - lead_name
  project_query:
    kind: query
    entity: Project
    description: List and search projects
    parameters:
    - name: query
      value_ref: nv_wire_str_short
      required: false
      role: search
    - name: typeKey
      value_ref: nv_wire_str_short
      required: false
    - name: status
      value_ref: nv_project_query_status
      required: false
    - name: orderBy
      value_ref: nv_project_query_order_by
      required: false
      role: sort
  project_version_query:
    kind: query
    entity: Version
    description: List versions for a project
    parameters:
    - name: projectIdOrKey
      value_ref: nv_project_version_query_project_id_or_key
      required: true
      role: scope
    - name: query
      value_ref: nv_wire_str_short
      required: false
      role: search
    - name: status
      value_ref: nv_wire_str_short
      required: false
    - name: orderBy
      value_ref: nv_project_version_query_order_by
      required: false
      role: sort
  user_get:
    kind: get
    entity: User
    description: Resolve a user by their stable account id.
    provides:
    - accountId
    - displayName
    - emailAddress
    - active
    - timeZone
    - accountType
  user_myself:
    kind: query
    entity: User
    description: Current authenticated user (who the credentials represent).
    provides:
    - accountId
    - displayName
    - emailAddress
    - active
    - timeZone
    - accountType
  user_search:
    kind: search
    entity: User
    description: Search for users by display name or accountId
    parameters:
    - name: query
      value_ref: nv_wire_str_short
      required: false
      role: search
    - name: accountId
      value_ref: nv_wire_str_short
      required: false
    - name: property
      value_ref: nv_wire_str_short
      required: false
  comment_create:
    kind: create
    entity: Comment
    description: Add a comment to an issue; body is sent as Atlassian Document Format wrapping plain text.
    provides:
    - id
    - body
    - author_id
    - created
    parameters:
    - name: issueIdOrKey
      value_ref: nv_comment_create_issue_id_or_key
      required: true
      role: scope
    - name: text
      value_ref: nv_comment_create_text
      required: true
  comment_query:
    kind: query
    entity: Comment
    description: List comments on an issue
    parameters:
    - name: issueIdOrKey
      value_ref: nv_comment_query_issue_id_or_key
      required: true
      role: scope
    - name: orderBy
      value_ref: nv_comment_query_order_by
      required: false
      role: sort
  priority_query:
    kind: query
    entity: Priority
    description: List issue priorities
    parameters:
    - name: priorityName
      value_ref: nv_wire_str_short
      required: false
  priority_get:
    kind: get
    entity: Priority
    description: Get a priority by ID
    provides:
    - id
    - name
    - description
    - isDefault
    - statusColor
  status_query:
    kind: query
    entity: Status
    description: List workflow statuses
  status_get:
    kind: get
