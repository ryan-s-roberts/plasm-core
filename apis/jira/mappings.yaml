# Jira Cloud REST API v3 — CML mappings. Domain model in domain.yaml.
#
# Base URL: Jira Cloud site host (e.g. your-domain.atlassian.net — set the full HTTPS origin with --backend).
# All paths are relative to the base URL.
#
# Authentication: JIRA_AUTH env var is injected as the Authorization header.
#   Cloud:  JIRA_AUTH="Basic $(echo -n 'email@domain.com:api_token' | base64)"
#   Server: JIRA_AUTH="Bearer <personal_access_token>"
#
# Issue fields are nested under the `fields` wrapper in Jira responses.
# The `path:` annotations in domain.yaml handle the navigation automatically.
# The decoder reads e.g. response["fields"]["summary"] for the `summary` field.
#
# JQL search (GET /rest/api/3/search/jql): primary issue discovery. Query params
# `jql` (required), optional repeated `fields` (issue field ids), optional `expand`.
# Cursor pagination: nextPageToken / isLast. Use --all to fetch all pages.
#
# Issue GET: uses `key` (e.g. PROJ-123) as the path variable — passed as `id`
# from the entity id_field.
#
# User GET: unusual — accountId goes in the query string (?accountId=...), not
# the path. The CML mapping puts `id` into the query block.
#
# Comment query: scoped to issueIdOrKey (the issue key from via_params).

# ── Issue ────────────────────────────────────────────────────────────────────

issue_get:
  # GET /rest/api/3/issue/{issueIdOrKey}  — id = issue key (e.g. PROJ-123)
  method: GET
  path:
    - { type: literal, value: rest }
    - { type: literal, value: api }
    - { type: literal, value: "3" }
    - { type: literal, value: issue }
    - { type: var, name: id }
  response: single

issue_jql:
  # GET /rest/api/3/search/jql?jql=…&fields=…&fields=…&expand=…
  # Cursor pagination: nextPageToken (absent when isLast=true).
  # Returns {issues: [...], nextPageToken: "...", isLast: bool}
  method: GET
  path:
    - { type: literal, value: rest }
    - { type: literal, value: api }
    - { type: literal, value: "3" }
    - { type: literal, value: search }
    - { type: literal, value: jql }
  query:
    type: object
    fields:
      - [jql, { type: var, name: jql }]
      - [fields, { type: if, condition: { type: exists, var: fields },
                  then_expr: { type: var, name: fields },
                  else_expr: { type: const, value: null } }]
      - [expand, { type: if, condition: { type: exists, var: expand },
                  then_expr: { type: var, name: expand },
                  else_expr: { type: const, value: null } }]
  response:
    items: issues
  pagination:
    params:
      nextPageToken: {from_response: nextPageToken}
      maxResults: {fixed: 50}
    stop_when: {field: nextPageToken, absent: true}

# ── Project ──────────────────────────────────────────────────────────────────

project_get:
  # GET /rest/api/3/project/{projectIdOrKey}  — id = project key (e.g. PROJ)
  method: GET
  path:
    - { type: literal, value: rest }
    - { type: literal, value: api }
    - { type: literal, value: "3" }
    - { type: literal, value: project }
    - { type: var, name: id }
  response: single

project_query:
  # GET /rest/api/3/project/search
  # Offset pagination: startAt + maxResults + total.
  # Returns PageBeanProject {values: [...], total, isLast}
  method: GET
  path:
    - { type: literal, value: rest }
    - { type: literal, value: api }
    - { type: literal, value: "3" }
    - { type: literal, value: project }
    - { type: literal, value: search }
  query:
    type: object
    fields:
      - [query, { type: if, condition: { type: exists, var: query },
                  then_expr: { type: var, name: query },
                  else_expr: { type: const, value: null } }]
      - [typeKey, { type: if, condition: { type: exists, var: typeKey },
                    then_expr: { type: var, name: typeKey },
                    else_expr: { type: const, value: null } }]
      - [status,  { type: if, condition: { type: exists, var: status },
                    then_expr: { type: var, name: status },
                    else_expr: { type: const, value: null } }]
      - [orderBy, { type: if, condition: { type: exists, var: orderBy },
                    then_expr: { type: var, name: orderBy },
                    else_expr: { type: const, value: null } }]
  response:
    items: values
  pagination:
    params:
      startAt: {counter: 0}
      maxResults: {fixed: 50}

project_version_query:
  # GET /rest/api/3/project/{projectIdOrKey}/version
  # Scoped to a project; projectIdOrKey comes from the scope param.
  method: GET
  path:
