    type: object
    fields:
      - [query,   { type: if, condition: { type: exists, var: query },
                    then_expr: { type: var, name: query },
                    else_expr: { type: const, value: null } }]
      - [status,  { type: if, condition: { type: exists, var: status },
                    then_expr: { type: var, name: status },
                    else_expr: { type: const, value: null } }]
      - [orderBy, { type: if, condition: { type: exists, var: orderBy },
                    then_expr: { type: var, name: orderBy },
                    else_expr: { type: const, value: null } }]
  response:
    items: values
  pagination:
    params:
      startAt: {counter: 0}
      maxResults: {fixed: 50}

# ── User ─────────────────────────────────────────────────────────────────────

user_get:
  # GET /rest/api/3/user?accountId=<id>
  # Unusual: accountId in query string, not path.
  # The `id` var (= accountId value from Ref) goes into the query block.
  method: GET
  path:
    - { type: literal, value: rest }
    - { type: literal, value: api }
    - { type: literal, value: "3" }
    - { type: literal, value: user }
  response: single
  query:
    type: object
    fields:
      - [accountId, { type: var, name: id }]

user_myself:
  # GET /rest/api/3/myself — single User JSON (wrapped for decode via response: single)
  method: GET
  path:
    - { type: literal, value: rest }
    - { type: literal, value: api }
    - { type: literal, value: "3" }
    - { type: literal, value: myself }
  response: single

user_search:
  # GET /rest/api/3/user/search?query=<text>
  # Returns a bare array; stops when page is shorter than maxResults.
  method: GET
  path:
    - { type: literal, value: rest }
    - { type: literal, value: api }
    - { type: literal, value: "3" }
    - { type: literal, value: user }
    - { type: literal, value: search }
  query:
    type: object
    fields:
      - [query,     { type: if, condition: { type: exists, var: query },
                      then_expr: { type: var, name: query },
                      else_expr: { type: const, value: null } }]
      - [accountId, { type: if, condition: { type: exists, var: accountId },
                      then_expr: { type: var, name: accountId },
                      else_expr: { type: const, value: null } }]
      - [property,  { type: if, condition: { type: exists, var: property },
                      then_expr: { type: var, name: property },
                      else_expr: { type: const, value: null } }]
  response:
    items: values
  pagination:
    params:
      startAt: {counter: 0}
      maxResults: {fixed: 50}

