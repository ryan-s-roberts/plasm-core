# ── Writes (Issue) ────────────────────────────────────────────────────────────

issue_create:
  # POST /rest/api/3/issue  — body IssueUpdateDetails { fields: { project, issuetype, summary, ... } }
  method: POST
  path:
    - { type: literal, value: rest }
    - { type: literal, value: api }
    - { type: literal, value: "3" }
    - { type: literal, value: issue }
  body:
    type: object
    fields:
      - [fields, { type: object, fields: [
          [project, { type: object, fields: [[key, { type: var, name: project_key }]] }],
          [issuetype, { type: object, fields: [[name, { type: var, name: issue_type }]] }],
          [summary, { type: var, name: summary }],
          [description, { type: if, condition: { type: exists, var: description },
                          then_expr: { type: var, name: description },
                          else_expr: { type: const, value: null } }]
        ]}]
  response: single

issue_update:
  # PUT /rest/api/3/issue/{issueIdOrKey}
  method: PUT
  path:
    - { type: literal, value: rest }
    - { type: literal, value: api }
    - { type: literal, value: "3" }
    - { type: literal, value: issue }
    - { type: var, name: id }
  body:
    type: object
    fields:
      - [fields, { type: object, fields: [
          [summary, { type: if, condition: { type: exists, var: summary },
                      then_expr: { type: var, name: summary },
                      else_expr: { type: const, value: null } }],
          [description, { type: if, condition: { type: exists, var: description },
                          then_expr: { type: var, name: description },
                          else_expr: { type: const, value: null } }],
          [assignee, { type: if, condition: { type: exists, var: assignee_id },
                       then_expr: { type: object, fields: [[accountId, { type: var, name: assignee_id }]] },
                       else_expr: { type: const, value: null } }],
          [priority, { type: if, condition: { type: exists, var: priority_name },
                       then_expr: { type: object, fields: [[name, { type: var, name: priority_name }]] },
                       else_expr: { type: const, value: null } }],
          [labels, { type: if, condition: { type: exists, var: labels },
                     then_expr: { type: var, name: labels },
                     else_expr: { type: const, value: null } }]
        ]}]
  response: single

issue_delete:
  # DELETE /rest/api/3/issue/{issueIdOrKey}
  method: DELETE
  path:
    - { type: literal, value: rest }
    - { type: literal, value: api }
    - { type: literal, value: "3" }
    - { type: literal, value: issue }
    - { type: var, name: id }
  response: single

issue_transition:
  # POST /rest/api/3/issue/{issueIdOrKey}/transitions  — typically HTTP 204
  method: POST
  path:
    - { type: literal, value: rest }
    - { type: literal, value: api }
    - { type: literal, value: "3" }
    - { type: literal, value: issue }
    - { type: var, name: id }
    - { type: literal, value: transitions }
  body:
    type: object
    fields:
      - [transition, { type: object, fields: [[id, { type: var, name: transition_id }]] }]
  response: single

# ── Writes (Comment) ────────────────────────────────────────────────────────

comment_create:
  # POST /rest/api/3/issue/{issueIdOrKey}/comment  — minimal Atlassian Document Format body
  method: POST
  path:
    - { type: literal, value: rest }
    - { type: literal, value: api }
    - { type: literal, value: "3" }
    - { type: literal, value: issue }
    - { type: var, name: issueIdOrKey }
    - { type: literal, value: comment }
  body:
    type: object
    fields:
      - [body, { type: object, fields: [
          [type, { type: const, value: doc }],
          [version, { type: const, value: 1 }],
          [content, { type: array, elements: [
              { type: object, fields: [
                [type, { type: const, value: paragraph }],
                [content, { type: array, elements: [
                    { type: object, fields: [
                      [type, { type: const, value: text }],
                      [text, { type: var, name: text }]
                    ]}
                ]}]
              ]}
          ]}]
        ]}]
  response: single

