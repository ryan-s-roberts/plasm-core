version: 1
auth:
  scheme: none
http_backend: https://www.themealdb.com
entities:
  Meal:
    id_field: idMeal
    description: A recipe in the meal database; idMeal is the numeric string ID
    fields:
      idMeal:
        required: true
        value_ref: nv_meal_id_meal
      strMeal:
        required: true
        value_ref: nv_meal_str_meal
      strCategory:
        required: false
        value_ref: nv_meal_str_category
      strArea:
        required: false
        value_ref: nv_meal_str_area
      strMealThumb:
        required: false
        value_ref: nv_meal_str_meal_thumb
      strTags:
        required: false
        value_ref: nv_meal_str_tags
capabilities:
  meal_search:
    description: Search meals by name using the s parameter
    kind: search
    entity: Meal
    parameters:
    - name: s
      value_ref: nv_meal_search_s
      required: true
      role: search
  meal_filter:
    description: Filter meals by category, area, or ingredient
    kind: query
    entity: Meal
    parameters:
    - name: c
      value_ref: nv_meal_filter_c
      required: false
      role: filter
    - name: a
      value_ref: nv_meal_filter_a
      required: false
      role: filter
    - name: i
      value_ref: nv_meal_filter_i
      required: false
      role: filter
  meal_get:
    description: Retrieve full meal detail including ingredients by ID
    kind: get
    entity: Meal
    provides:
    - idMeal
    - strMeal
    - strCategory
    - strArea
    - strMealThumb
    - strTags
values:
  nv_meal_id_meal:
    type: string
    string_semantics: short
    description: Unique numeric string identifier for the meal
  nv_meal_str_meal:
    type: string
    string_semantics: short
    description: The recipe or dish name
  nv_meal_str_category:
    type: string
    string_semantics: short
    description: Cuisine category (e.g. Chicken, Seafood, Dessert)
  nv_meal_str_area:
    type: string
    string_semantics: short
    description: Country of origin (e.g. British, Italian, Japanese)
  nv_meal_str_meal_thumb:
    type: string
    string_semantics: short
    description: URL of the meal thumbnail image
  nv_meal_str_tags:
    type: string
    string_semantics: short
    description: Comma-separated tags for the meal
  nv_meal_search_s:
    type: string
    string_semantics: short
  nv_meal_filter_c:
    type: string
    string_semantics: short
  nv_meal_filter_a:
    type: string
    string_semantics: short
  nv_meal_filter_i:
    type: string
    string_semantics: short
