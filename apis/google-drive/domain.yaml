version: 3
http_backend: https://www.googleapis.com/drive/v3
entities:
  File:
    id_field: id
    description: A Drive file or folder — metadata the API returns on get and list.
    primary_read: files_get
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_wire_str_short
      mimeType:
        required: false
        value_ref: nv_wire_str_short
      kind:
        required: false
        value_ref: nv_wire_str_short
      size:
        required: false
        value_ref: nv_file_size
      parents:
        required: false
        value_ref: nv_file_parents
      spaces:
        required: false
        value_ref: nv_file_spaces
      driveId:
        required: false
        value_ref: nv_wire_str_short
      teamDriveId:
        required: false
        value_ref: nv_wire_str_short
      webViewLink:
        required: false
        value_ref: nv_wire_str_short
      webContentLink:
        required: false
        value_ref: nv_wire_str_short
      iconLink:
        required: false
        value_ref: nv_wire_str_short
      createdTime:
        required: false
        value_ref: nv_wire_str_short
      modifiedTime:
        required: false
        value_ref: nv_wire_str_short
      trashed:
        required: false
        value_ref: nv_wire_bool
      starred:
        required: false
        value_ref: nv_wire_bool
      shared:
        required: false
        value_ref: nv_wire_bool
      ownedByMe:
        required: false
        value_ref: nv_wire_bool
      fileExtension:
        required: false
        value_ref: nv_wire_str_short
      fullFileExtension:
        required: false
        value_ref: nv_wire_str_short
      md5Checksum:
        required: false
        value_ref: nv_wire_str_short
      shortcutDetails:
        required: false
        value_ref: nv_file_shortcut_details
      capabilities:
        required: false
        value_ref: nv_file_capabilities
      owners:
        required: false
        value_ref: nv_file_owners
      lastModifyingUser:
        required: false
        value_ref: nv_file_last_modifying_user
      labelInfo:
        required: false
        value_ref: nv_file_label_info
    relations:
      permissions:
        target: DrivePermission
        cardinality: many
        description: ACL entries when the API includes them or when loaded via the permissions API.
        materialize:
          kind: query_scoped_bindings
          capability: permissions_list
          bindings:
            fileId: id
      comments:
        target: DriveComment
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: comments_list
          bindings:
            fileId: id
      revisions:
        target: DriveRevision
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: revisions_list
          bindings:
            fileId: id
  About:
    id_field: kind
    description: Per-user Drive capabilities, quotas, and import or export format metadata.
    fields:
      kind:
        required: false
        value_ref: nv_wire_str_short
      user:
        required: false
        value_ref: nv_about_user
      storageQuota:
        required: false
        value_ref: nv_about_storage_quota
      importFormats:
        required: false
        value_ref: nv_about_import_formats
      exportFormats:
        required: false
        value_ref: nv_about_export_formats
      maxImportSizes:
        required: false
        value_ref: nv_about_max_import_sizes
      maxUploadSize:
        required: false
        value_ref: nv_wire_str_short
      appInstalled:
        required: false
        value_ref: nv_wire_bool
      canCreateDrives:
        required: false
        value_ref: nv_wire_bool
      canCreateTeamDrives:
        required: false
        value_ref: nv_wire_bool
      folderColorPalette:
        required: false
        value_ref: nv_wire_str_short
      driveThemes:
        required: false
        value_ref: nv_about_drive_themes
      teamDriveThemes:
        required: false
        value_ref: nv_about_team_drive_themes
    relations: {}
  StartPageToken:
    id_field: startPageToken
    description: Starting token for the changes feed.
    fields:
      startPageToken:
        required: true
        value_ref: nv_wire_str_short
      kind:
        required: false
        value_ref: nv_wire_str_short
    relations: {}
  DriveChange:
    id_field: id
    description: A single change record in the changes.list feed.
    fields:
      id:
        required: false
        value_ref: nv_wire_str_short
      kind:
        required: false
        value_ref: nv_wire_str_short
      fileId:
        required: false
        value_ref: nv_wire_str_short
      removed:
        required: false
        value_ref: nv_wire_bool
      file:
        required: false
        value_ref: nv_drive_change_file
    relations: {}
  SharedDrive:
    id_field: id
    description: A shared drive (top-level Drive teamwork container).
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_wire_str_short
      kind:
        required: false
        value_ref: nv_wire_str_short
      colorRgb:
        required: false
        value_ref: nv_wire_str_short
      capabilities:
        required: false
        value_ref: nv_shared_drive_capabilities
      hidden:
        required: false
        value_ref: nv_wire_bool
      createdTime:
        required: false
        value_ref: nv_wire_str_short
      restrictions:
        required: false
        value_ref: nv_shared_drive_restrictions
    relations: {}
  TeamDrive:
    id_field: id
    description: Legacy team drive resource — prefer SharedDrive for new integrations when possible.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_wire_str_short
      kind:
        required: false
        value_ref: nv_wire_str_short
      capabilities:
        required: false
        value_ref: nv_team_drive_capabilities
    relations: {}
  DrivePermission:
    id_field: id
    key_vars:
    - fileId
    - id
    description: A permission row on a file (user, group, domain, or link).
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      fileId:
        required: true
        value_ref: nv_drive_permission_file_id
      type:
        required: false
        value_ref: nv_wire_str_short
      role:
        required: false
        value_ref: nv_wire_str_short
      emailAddress:
        required: false
        value_ref: nv_wire_str_short
      domain:
        required: false
        value_ref: nv_wire_str_short
      displayName:
        required: false
        value_ref: nv_wire_str_short
      photoLink:
        required: false
        value_ref: nv_wire_str_short
      kind:
        required: false
        value_ref: nv_wire_str_short
    relations: {}
  DriveComment:
    id_field: id
    key_vars:
    - fileId
    - id
    description: A top-level comment on a file.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      fileId:
        required: true
        value_ref: nv_drive_comment_file_id
      content:
        required: false
        value_ref: nv_wire_str_markdown
      htmlContent:
        required: false
        value_ref: nv_wire_str_short
      createdTime:
        required: false
        value_ref: nv_wire_str_short
      modifiedTime:
        required: false
        value_ref: nv_wire_str_short
      kind:
        required: false
        value_ref: nv_wire_str_short
      resolved:
        required: false
        value_ref: nv_wire_bool
      deleted:
        required: false
        value_ref: nv_wire_bool
      anchor:
        required: false
        value_ref: nv_drive_comment_anchor
      quotedFileContent:
        required: false
        value_ref: nv_drive_comment_quoted_file_content
    relations:
      replies:
        target: DriveReply
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: replies_list
          bindings:
            fileId: fileId
            commentId: id
  ChannelStop:
    id_field: id
    description: Acknowledgement for stopping a push notification channel (no stable resource id on the wire).
    domain_projection_examples: false
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
    relations: {}
  DriveReply:
    id_field: id
    key_vars:
    - fileId
    - commentId
    - id
    description: A reply under a comment thread.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      fileId:
        required: true
        value_ref: nv_drive_reply_file_id
      commentId:
        required: true
        value_ref: nv_wire_str_short
      content:
        required: false
        value_ref: nv_wire_str_markdown
      htmlContent:
        required: false
        value_ref: nv_wire_str_short
      createdTime:
        required: false
        value_ref: nv_wire_str_short
      modifiedTime:
        required: false
        value_ref: nv_wire_str_short
      kind:
        required: false
        value_ref: nv_wire_str_short
      deleted:
        required: false
        value_ref: nv_wire_bool
      action:
        required: false
        value_ref: nv_drive_reply_action
    relations: {}
  DriveRevision:
    id_field: id
    key_vars:
    - fileId
    - id
    description: A binary or Google Workspace revision of a file.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      fileId:
        required: true
        value_ref: nv_drive_revision_file_id
      mimeType:
        required: false
        value_ref: nv_wire_str_short
      modifiedTime:
        required: false
        value_ref: nv_wire_str_short
      size:
        required: false
        value_ref: nv_wire_str_short
      keepForever:
        required: false
        value_ref: nv_wire_bool
      originalFilename:
        required: false
        value_ref: nv_wire_str_short
      kind:
        required: false
        value_ref: nv_wire_str_short
    relations: {}
  DriveOperation:
    id_field: name
    description: Long-running Drive operation (for example initiated by files.download).
    fields:
      name:
        required: true
        value_ref: nv_wire_str_short
      done:
        required: false
        value_ref: nv_wire_bool
      kind:
        required: false
        value_ref: nv_wire_str_short
      error:
        required: false
        value_ref: nv_drive_operation_error
      response:
        required: false
        value_ref: nv_drive_operation_response
      metadata:
        required: false
        value_ref: nv_drive_operation_metadata
    relations: {}
capabilities:
  about_get:
    kind: singleton
    entity: About
    description: Return storage and capability metadata for the authenticated user.
  files_list:
    kind: query
    entity: File
    description: List or search files — combine q, corpora, and drive scoping as needed.
    parameters:
    - name: q
      value_ref: nv_wire_str_short
      required: false
      role: search
    - name: corpora
      value_ref: nv_wire_str_short
      required: false
    - name: driveId
      value_ref: nv_wire_str_short
      required: false
    - name: spaces
      value_ref: nv_wire_str_short
      required: false
    - name: orderBy
      value_ref: nv_wire_str_short
      required: false
      role: sort
    - name: includeItemsFromAllDrives
      value_ref: nv_wire_bool
      required: false
    - name: supportsAllDrives
      value_ref: nv_wire_bool
      required: false
    - name: includeLabels
      value_ref: nv_wire_str_short
      required: false
    - name: includePermissionsForView
      value_ref: nv_wire_str_short
      required: false
  files_get:
    kind: get
    entity: File
    description: Fetch one file by id including metadata the token can see.
  files_create:
    kind: create
    entity: File
    description: Create a file or folder — supply metadata in the JSON input body as the API expects.
    parameters:
    - name: input
      value_ref: nv_files_create_input
      required: false
  files_update:
    kind: update
    entity: File
    description: Patch file metadata or placement (addParents, removeParents via query flags).
    parameters:
    - name: addParents
      value_ref: nv_wire_str_short
      required: false
    - name: removeParents
      value_ref: nv_wire_str_short
      required: false
    - name: enforceSingleParent
      value_ref: nv_wire_bool
      required: false
    - name: keepRevisionForever
      value_ref: nv_wire_bool
      required: false
    - name: supportsAllDrives
      value_ref: nv_wire_bool
      required: false
    - name: useDomainAdminAccess
      value_ref: nv_wire_bool
      required: false
    - name: input
      value_ref: nv_files_update_input
      required: false
  files_delete:
    kind: delete
    entity: File
    description: Permanently delete a file when permitted.
    parameters:
    - name: supportsAllDrives
      value_ref: nv_wire_bool
      required: false
  files_copy:
    kind: action
    entity: File
    description: Copy an existing file to a new file entry.
    parameters:
    - name: input
      value_ref: nv_files_copy_input
      required: false
    provides:
    - id
    - name
    - mimeType
    - kind
  files_export:
    kind: action
    entity: File
    description: Export a Google Workspace file to a downloadable MIME type (binary response).
    parameters:
    - name: mimeType
      value_ref: nv_wire_str_short
      required: true
    output:
      type: side_effect
      description: Returns exported bytes for the requested MIME type.
  files_emptyTrash:
    kind: action
    entity: File
    output:
      type: side_effect
      description: Permanently deletes all files in the user trash.
  files_download:
    kind: action
    entity: DriveOperation
    description: Start a long-running download of file bytes (returns an Operation).
    parameters:
    - name: fileId
      value_ref: nv_files_download_file_id
      required: true
      role: scope
    - name: mimeType
      value_ref: nv_wire_str_short
      required: false
    - name: revisionId
      value_ref: nv_wire_str_short
      required: false
    provides:
    - name
    - done
    - kind
    - response
    - error
  permissions_list:
    kind: query
    entity: DrivePermission
    description: List permissions on a file.
    parameters:
    - name: fileId
      value_ref: nv_permissions_list_file_id
      required: true
    - name: supportsAllDrives
      value_ref: nv_wire_bool
      required: false
    - name: useDomainAdminAccess
      value_ref: nv_wire_bool
      required: false
  permissions_get:
    kind: get
    entity: DrivePermission
    description: Fetch one permission by id on a file.
    parameters:
    - name: supportsAllDrives
      value_ref: nv_wire_bool
      required: false
    - name: useDomainAdminAccess
      value_ref: nv_wire_bool
      required: false
  permissions_create:
    kind: create
    entity: DrivePermission
    description: Create a permission (share the file).
    parameters:
    - name: fileId
      value_ref: nv_permissions_create_file_id
      required: true
      role: scope
    - name: emailMessage
      value_ref: nv_wire_str_short
      required: false
    - name: sendNotificationEmail
      value_ref: nv_wire_bool
      required: false
    - name: supportsAllDrives
      value_ref: nv_wire_bool
      required: false
    - name: transferOwnership
      value_ref: nv_wire_bool
      required: false
    - name: useDomainAdminAccess
      value_ref: nv_wire_bool
      required: false
    - name: input
      value_ref: nv_permissions_create_input
      required: false
  permissions_update:
    kind: update
    entity: DrivePermission
    parameters:
    - name: removeExpiration
      value_ref: nv_wire_bool
      required: false
    - name: supportsAllDrives
      value_ref: nv_wire_bool
      required: false
    - name: transferOwnership
      value_ref: nv_wire_bool
      required: false
    - name: useDomainAdminAccess
      value_ref: nv_wire_bool
      required: false
    - name: input
      value_ref: nv_permissions_update_input
      required: false
  permissions_delete:
    kind: delete
    entity: DrivePermission
    parameters:
    - name: supportsAllDrives
      value_ref: nv_wire_bool
      required: false
    - name: useDomainAdminAccess
      value_ref: nv_wire_bool
      required: false
  comments_list:
    kind: query
    entity: DriveComment
    parameters:
    - name: fileId
      value_ref: nv_comments_list_file_id
      required: true
    - name: includeDeleted
      value_ref: nv_wire_bool
      required: false
    - name: pageSize
      value_ref: nv_wire_int
      required: false
    - name: startModifiedTime
      value_ref: nv_wire_str_short
      required: false
  comments_get:
    kind: get
    entity: DriveComment
    parameters:
    - name: includeDeleted
      value_ref: nv_wire_bool
      required: false
  comments_create:
    kind: create
    entity: DriveComment
    parameters:
    - name: fileId
      value_ref: nv_comments_create_file_id
      required: true
      role: scope
    - name: input
      value_ref: nv_comments_create_input
      required: false
  comments_update:
    kind: update
    entity: DriveComment
    description: Patch a comment. Preflight runs comments_get and merges parent_*; the wire body merges optional overrides
      with the parent row (content, anchor, quotedFileContent).
    preflight:
    - kind: hydrate_invoke_target
      get: comments_get
      prefix: parent
    parameters:
    - name: content
      value_ref: nv_comments_update_content
      required: false
    - name: anchor
      value_ref: nv_comments_update_anchor
      required: false
    - name: quotedFileContent
      value_ref: nv_comments_update_quoted_file_content
      required: false
  comments_delete:
    kind: delete
    entity: DriveComment
  replies_list:
    kind: query
    entity: DriveReply
    parameters:
    - name: fileId
      value_ref: nv_replies_list_file_id
      required: true
    - name: commentId
      value_ref: nv_wire_str_short
      required: true
    - name: includeDeleted
      value_ref: nv_wire_bool
      required: false
    - name: pageSize
      value_ref: nv_wire_int
      required: false
  replies_get:
    kind: get
    entity: DriveReply
    parameters:
    - name: includeDeleted
      value_ref: nv_wire_bool
      required: false
  replies_create:
    kind: create
    entity: DriveReply
    parameters:
    - name: fileId
      value_ref: nv_replies_create_file_id
      required: true
      role: scope
    - name: commentId
      value_ref: nv_wire_str_short
      required: true
      role: scope
    - name: input
      value_ref: nv_replies_create_input
      required: false
  replies_update:
    kind: update
    entity: DriveReply
    description: Patch a reply. Preflight runs replies_get and merges parent_*; the wire body merges optional overrides with
      the parent row (content, action).
    preflight:
    - kind: hydrate_invoke_target
      get: replies_get
      prefix: parent
    parameters:
    - name: content
      value_ref: nv_replies_update_content
      required: false
    - name: action
      value_ref: nv_replies_update_action
      required: false
  replies_delete:
    kind: delete
    entity: DriveReply
  revisions_list:
    kind: query
    entity: DriveRevision
    parameters:
    - name: fileId
      value_ref: nv_revisions_list_file_id
      required: true
    - name: pageSize
      value_ref: nv_wire_int
      required: false
  revisions_get:
    kind: get
    entity: DriveRevision
  revisions_update:
    kind: update
    entity: DriveRevision
    parameters:
    - name: input
      value_ref: nv_revisions_update_input
      required: false
  revisions_delete:
    kind: delete
    entity: DriveRevision
  drives_list:
    kind: query
    entity: SharedDrive
    parameters:
    - name: pageSize
      value_ref: nv_wire_int
      required: false
    - name: q
      value_ref: nv_wire_str_short
      required: false
    - name: useDomainAdminAccess
      value_ref: nv_wire_bool
      required: false
  drives_get:
    kind: get
    entity: SharedDrive
    parameters:
    - name: useDomainAdminAccess
      value_ref: nv_wire_bool
      required: false
  drives_create:
    kind: create
    entity: SharedDrive
    parameters:
    - name: requestId
      value_ref: nv_wire_str_short
      required: true
    - name: input
      value_ref: nv_drives_create_input
      required: false
  drives_update:
    kind: update
    entity: SharedDrive
    parameters:
    - name: useDomainAdminAccess
      value_ref: nv_wire_bool
      required: false
    - name: input
      value_ref: nv_drives_update_input
      required: false
  drives_delete:
    kind: delete
    entity: SharedDrive
    parameters:
    - name: allowItemDeletion
      value_ref: nv_wire_bool
      required: false
  drives_hide:
    kind: action
    entity: SharedDrive
    output:
      type: side_effect
      description: Hides a shared drive from the default list.
  drives_unhide:
    kind: action
    entity: SharedDrive
    output:
      type: side_effect
      description: Restores a hidden shared drive to the default list.
  changes_getStartPageToken:
    kind: singleton
    entity: StartPageToken
    parameters:
    - name: driveId
      value_ref: nv_wire_str_short
      required: false
    - name: supportsAllDrives
      value_ref: nv_wire_bool
      required: false
    - name: teamDriveId
      value_ref: nv_wire_str_short
      required: false
  changes_list:
    kind: query
    entity: DriveChange
    parameters:
    - name: startPageToken
      value_ref: nv_wire_str_short
      required: true
    - name: driveId
      value_ref: nv_wire_str_short
      required: false
    - name: includeCorpusRemovals
      value_ref: nv_wire_bool
      required: false
    - name: includeItemsFromAllDrives
      value_ref: nv_wire_bool
      required: false
    - name: includePermissionsForView
      value_ref: nv_wire_str_short
      required: false
    - name: includeRemoved
      value_ref: nv_wire_bool
      required: false
    - name: restrictToMyDrive
      value_ref: nv_wire_bool
      required: false
    - name: spaces
      value_ref: nv_wire_str_short
      required: false
    - name: supportsAllDrives
      value_ref: nv_wire_bool
      required: false
    - name: teamDriveId
      value_ref: nv_wire_str_short
      required: false
  channels_stop:
    kind: action
    entity: ChannelStop
    parameters:
    - name: input
      value_ref: nv_channels_stop_input
      required: false
    output:
      type: side_effect
      description: Stops push notifications for the given channel id.
  operations_get:
    kind: get
    entity: DriveOperation
  teamdrives_list:
    kind: query
    entity: TeamDrive
    parameters:
    - name: pageSize
      value_ref: nv_wire_int
      required: false
    - name: q
      value_ref: nv_wire_str_short
      required: false
    - name: useDomainAdminAccess
      value_ref: nv_wire_bool
      required: false
  teamdrives_get:
    kind: get
    entity: TeamDrive
    parameters:
    - name: useDomainAdminAccess
      value_ref: nv_wire_bool
      required: false
  teamdrives_create:
    kind: create
    entity: TeamDrive
    parameters:
    - name: requestId
      value_ref: nv_wire_str_short
      required: true
    - name: input
      value_ref: nv_teamdrives_create_input
      required: false
  teamdrives_update:
    kind: update
    entity: TeamDrive
    parameters:
    - name: useDomainAdminAccess
      value_ref: nv_wire_bool
      required: false
    - name: input
      value_ref: nv_teamdrives_update_input
      required: false
  teamdrives_delete:
    kind: delete
    entity: TeamDrive
oauth:
  provider: google
  scopes:
    https://www.googleapis.com/auth/drive:
      label: Full access to Google Drive files
      docs_url: https://developers.google.com/drive/api/guides/about-auth
    https://www.googleapis.com/auth/drive.readonly:
      label: See and download all Google Drive files
      docs_url: https://developers.google.com/drive/api/guides/about-auth
    https://www.googleapis.com/auth/drive.file:
      label: Per-file access to files opened or created by the app
      docs_url: https://developers.google.com/drive/api/guides/about-auth
