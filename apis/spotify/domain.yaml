version: 1
http_backend: https://api.spotify.com
entities:
  Album:
    id_field: id
    description: A music album on Spotify
    fields:
      id:
        required: true
        value_ref: nv_album_id
      name:
        required: false
        value_ref: nv_album_name
      album_type:
        required: false
        value_ref: nv_album_album_type
      total_tracks:
        required: false
        value_ref: nv_album_total_tracks
      release_date:
        required: false
        value_ref: nv_album_release_date
      popularity:
        required: false
        value_ref: nv_album_popularity
    relations: {}
  Artist:
    id_field: id
    description: A musical artist or band on Spotify
    fields:
      id:
        required: true
        value_ref: nv_artist_id
      name:
        required: false
        value_ref: nv_artist_name
      popularity:
        required: false
        value_ref: nv_artist_popularity
      genres:
        required: false
        value_ref: nv_artist_genres
    relations: {}
  Track:
    id_field: id
    description: A single music track on Spotify
    fields:
      id:
        required: true
        value_ref: nv_track_id
      name:
        required: false
        value_ref: nv_track_name
      duration_ms:
        required: false
        value_ref: nv_track_duration_ms
      explicit:
        required: false
        value_ref: nv_track_explicit
      popularity:
        required: false
        value_ref: nv_track_popularity
      danceability:
        required: false
        value_ref: nv_track_danceability
      energy:
        required: false
        value_ref: nv_track_energy
      valence:
        required: false
        value_ref: nv_track_valence
      tempo:
        required: false
        value_ref: nv_track_tempo
      acousticness:
        required: false
        value_ref: nv_track_acousticness
      instrumentalness:
        required: false
        value_ref: nv_track_instrumentalness
      liveness:
        required: false
        value_ref: nv_track_liveness
      speechiness:
        required: false
        value_ref: nv_track_speechiness
      loudness:
        required: false
        value_ref: nv_track_loudness
      key:
        required: false
        value_ref: nv_track_key
      mode:
        required: false
        value_ref: nv_track_mode
      time_signature:
        required: false
        value_ref: nv_track_time_signature
    relations: {}
  Playlist:
    id_field: id
    description: A curated playlist of tracks
    fields:
      id:
        required: true
        value_ref: nv_playlist_id
      name:
        required: false
        value_ref: nv_playlist_name
      description:
        required: false
        value_ref: nv_playlist_description
      public:
        required: false
        value_ref: nv_playlist_public
      collaborative:
        required: false
        value_ref: nv_playlist_collaborative
      snapshot_id:
        required: false
        value_ref: nv_playlist_snapshot_id
    relations: {}
  User:
    id_field: id
    description: A Spotify user profile
    fields:
      id:
        required: true
        value_ref: nv_user_id
      display_name:
        required: false
        value_ref: nv_user_display_name
    relations: {}
capabilities:
  album_query:
    description: Batch-fetch multiple albums by their Spotify IDs
    kind: query
    entity: Album
    parameters:
    - name: ids
      value_ref: nv_album_query_ids
      required: true
      role: filter
    - name: market
      value_ref: nv_album_query_market
      required: false
      role: response_control
  album_get:
    description: Retrieve a single album by ID
    kind: get
    entity: Album
    provides:
    - id
    - name
    - album_type
    - total_tracks
    - release_date
    - popularity
  album_tracks:
    description: List tracks belonging to an album
    kind: action
    entity: Album
    parameters:
    - name: market
      value_ref: nv_album_tracks_market
      required: false
      role: response_control
    - name: limit
      value_ref: nv_album_tracks_limit
      required: false
      role: response_control
    - name: offset
      value_ref: nv_album_tracks_offset
      required: false
      role: response_control
    output:
      type: side_effect
      description: List tracks belonging to an album
  artist_query:
    description: Batch-fetch multiple artists by their Spotify IDs
    kind: query
    entity: Artist
    parameters:
    - name: ids
      value_ref: nv_artist_query_ids
      required: true
      role: filter
  artist_get:
    description: Retrieve a single artist by ID
    kind: get
    entity: Artist
    provides:
    - id
    - name
    - popularity
    - genres
  artist_albums:
    description: List albums released by an artist
    kind: action
    entity: Artist
    parameters:
    - name: include_groups
      value_ref: nv_artist_albums_include_groups
      required: false
      role: filter
    - name: market
      value_ref: nv_artist_albums_market
      required: false
      role: response_control
    - name: limit
      value_ref: nv_artist_albums_limit
      required: false
      role: response_control
    - name: offset
      value_ref: nv_artist_albums_offset
      required: false
      role: response_control
    output:
      type: side_effect
      description: List albums released by an artist
  artist_related:
    description: Get artists related to a given artist
    kind: action
    entity: Artist
    output:
      type: side_effect
      description: Get artists related to a given artist
  artist_top_tracks:
    description: Get an artist's most popular tracks
    kind: action
    entity: Artist
    parameters:
    - name: market
      value_ref: nv_artist_top_tracks_market
      required: false
      role: response_control
    output:
      type: side_effect
      description: Get an artist's most popular tracks
  track_query:
    description: Batch-fetch multiple tracks by their Spotify IDs
    kind: query
    entity: Track
    parameters:
    - name: ids
      value_ref: nv_track_query_ids
      required: true
      role: filter
    - name: market
      value_ref: nv_track_query_market
      required: false
      role: response_control
  track_get:
    description: 'Retrieve a single track by ID (catalog metadata: name, duration, explicit, popularity).'
    kind: get
    entity: Track
    provides:
    - id
    - name
    - duration_ms
    - explicit
    - popularity
  track_get_audio_features:
    description: 'Retrieve audio analysis features for a track. Populates the Track entity''s audio projection fields (danceability,
      energy, valence, tempo, key, mode, etc.) via additive merge — the catalog fields from track_get are preserved. Same
      Spotify track ID. Pattern: GET /audio-features/{id} — disjoint field projection of the Track entity.

      '
    kind: action
    entity: Track
    provides:
    - id
    - danceability
    - energy
    - valence
    - tempo
    - acousticness
    - instrumentalness
    - liveness
    - speechiness
    - loudness
    - key
    - mode
    - time_signature
  playlist_get:
    description: Retrieve a single playlist by ID
    kind: get
    entity: Playlist
    provides:
    - id
    - name
    - description
    - public
    - collaborative
    - snapshot_id
  playlist_tracks:
    description: List tracks contained in a playlist
    kind: action
    entity: Playlist
    parameters:
    - name: market
      value_ref: nv_playlist_tracks_market
      required: false
      role: response_control
    - name: limit
      value_ref: nv_playlist_tracks_limit
      required: false
      role: response_control
    - name: offset
      value_ref: nv_playlist_tracks_offset
      required: false
      role: response_control
    - name: fields
      value_ref: nv_playlist_tracks_fields
      required: false
      role: response_control
    output:
      type: side_effect
      description: List tracks contained in a playlist
  playlist_update:
    description: Update a playlist's metadata
    kind: update
    entity: Playlist
    parameters:
    - name: name
      value_ref: nv_playlist_update_name
      required: false
    - name: description
      value_ref: nv_playlist_update_description
      required: false
    - name: public
      value_ref: nv_playlist_update_public
      required: false
    - name: collaborative
      value_ref: nv_playlist_update_collaborative
      required: false
  user_get:
    description: Retrieve a user profile by ID
    kind: get
    entity: User
    provides:
    - id
    - display_name
  user_playlists:
    description: List playlists owned by a user
    kind: action
    entity: User
    parameters:
    - name: limit
      value_ref: nv_user_playlists_limit
      required: false
    - name: offset
      value_ref: nv_user_playlists_offset
      required: false
    output:
      type: side_effect
      description: List playlists owned by a user
  user_create_playlist:
    description: Create a new playlist for a user
    kind: action
    entity: User
    parameters:
    - name: name
      value_ref: nv_user_create_playlist_name
      required: true
    - name: description
      value_ref: nv_user_create_playlist_description
      required: false
    - name: public
      value_ref: nv_user_create_playlist_public
      required: false
    - name: collaborative
      value_ref: nv_user_create_playlist_collaborative
      required: false
    output:
      type: side_effect
      description: Create a new playlist for a user
auth:
  scheme: oauth2_client_credentials
  token_url: https://accounts.spotify.com/api/token
  client_id_env: SPOTIFY_CLIENT_ID
  client_secret_env: SPOTIFY_CLIENT_SECRET
values:
  nv_album_id:
    type: string
    string_semantics: short
    description: Unique Spotify album identifier
  nv_album_name:
    type: string
    string_semantics: short
    description: Album title
  nv_album_album_type:
    type: select
    allowed_values:
    - album
    - single
    - compilation
    description: Album, single, or compilation
  nv_album_total_tracks:
    type: integer
    description: Number of tracks on the album
  nv_album_release_date:
    type: string
    string_semantics: short
    description: Date the album was released
  nv_album_popularity:
    type: integer
    description: Popularity score from 0 to 100
  nv_artist_id:
    type: string
    string_semantics: short
    description: Unique Spotify artist identifier
  nv_artist_name:
    type: string
    string_semantics: short
    description: Artist or band name
  nv_artist_popularity:
    type: integer
    description: Popularity score from 0 to 100
  nv_artist_genres_item:
    type: string
  nv_artist_genres:
    type: array
    items:
      value_ref: nv_artist_genres_item
    description: List of associated music genres
  nv_track_id:
    type: string
    string_semantics: short
    description: Unique Spotify track identifier
  nv_track_name:
    type: string
    string_semantics: short
    description: Track title
  nv_track_duration_ms:
    type: integer
    description: Track length in milliseconds
  nv_track_explicit:
    type: boolean
    description: Whether the track has explicit lyrics
  nv_track_popularity:
    type: integer
    description: Popularity score from 0 to 100
  nv_track_danceability:
    type: number
    description: How suitable for dancing 0.0–1.0. Populated by track_get_audio_features.
  nv_track_energy:
    type: number
    description: Intensity/activity 0.0–1.0. Populated by track_get_audio_features.
  nv_track_valence:
    type: number
    description: Musical positiveness 0.0–1.0. Populated by track_get_audio_features.
  nv_track_tempo:
    type: number
    description: Estimated beats per minute. Populated by track_get_audio_features.
  nv_track_acousticness:
    type: number
    description: Confidence the track is acoustic 0.0–1.0. Populated by track_get_audio_features.
  nv_track_instrumentalness:
    type: number
    description: Predicts whether track has no vocals 0.0–1.0. Populated by track_get_audio_features.
  nv_track_liveness:
    type: number
    description: Presence of live audience 0.0–1.0. Populated by track_get_audio_features.
  nv_track_speechiness:
    type: number
    description: Presence of spoken words 0.0–1.0. Populated by track_get_audio_features.
  nv_track_loudness:
    type: number
    description: Overall loudness in dB, typically -60 to 0. Populated by track_get_audio_features.
  nv_track_key:
    type: integer
    description: Estimated key (0=C, 1=C#, ... 11=B). Populated by track_get_audio_features.
  nv_track_mode:
    type: integer
    description: 'Modality: 1=major, 0=minor. Populated by track_get_audio_features.'
  nv_track_time_signature:
    type: integer
    description: Estimated meter (beats per bar, usually 3–7). Populated by track_get_audio_features.
  nv_playlist_id:
    type: string
    string_semantics: short
    description: Unique Spotify playlist identifier
  nv_playlist_name:
    type: string
    string_semantics: short
    description: Playlist name
  nv_playlist_description:
    type: string
    string_semantics: markdown
    description: User-provided playlist description text
  nv_playlist_public:
    type: boolean
    description: Whether the playlist is publicly visible
  nv_playlist_collaborative:
    type: boolean
    description: Whether others can add tracks
  nv_playlist_snapshot_id:
    type: string
    string_semantics: short
    description: Version identifier for playlist state
  nv_user_id:
    type: string
    string_semantics: short
    description: Unique Spotify user identifier
  nv_user_display_name:
    type: string
    string_semantics: short
    description: User's public display name
  nv_album_query_ids:
    type: string
    string_semantics: short
  nv_album_query_market:
    type: string
    string_semantics: short
  nv_album_tracks_market:
    type: string
    string_semantics: short
  nv_album_tracks_limit:
    type: integer
  nv_album_tracks_offset:
    type: integer
  nv_artist_query_ids:
    type: string
    string_semantics: short
  nv_artist_albums_include_groups:
    type: string
    string_semantics: short
  nv_artist_albums_market:
    type: string
    string_semantics: short
  nv_artist_albums_limit:
    type: integer
  nv_artist_albums_offset:
    type: integer
  nv_artist_top_tracks_market:
    type: string
    string_semantics: short
  nv_track_query_ids:
    type: string
    string_semantics: short
  nv_track_query_market:
    type: string
    string_semantics: short
  nv_playlist_tracks_market:
    type: string
    string_semantics: short
  nv_playlist_tracks_limit:
    type: integer
  nv_playlist_tracks_offset:
    type: integer
  nv_playlist_tracks_fields:
    type: string
    string_semantics: short
  nv_playlist_update_name:
    type: string
    string_semantics: short
  nv_playlist_update_description:
    type: string
    string_semantics: markdown
  nv_playlist_update_public:
    type: boolean
  nv_playlist_update_collaborative:
    type: boolean
  nv_user_playlists_limit:
    type: integer
  nv_user_playlists_offset:
    type: integer
  nv_user_create_playlist_name:
    type: string
    string_semantics: short
  nv_user_create_playlist_description:
    type: string
    string_semantics: markdown
  nv_user_create_playlist_public:
    type: boolean
  nv_user_create_playlist_collaborative:
    type: boolean
