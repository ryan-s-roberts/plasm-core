version: 2
http_backend: https://api.linkedin.com
entities:
  OpenIdProfile:
    id_field: sub
    description: OpenID Connect userinfo claims for the authorized LinkedIn member.
    fields:
      sub:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_wire_str_short
      given_name:
        required: false
        value_ref: nv_wire_str_short
      family_name:
        required: false
        value_ref: nv_wire_str_short
      picture:
        required: false
        value_ref: nv_wire_str_short
      locale:
        required: false
        value_ref: nv_wire_str_short
      email:
        required: false
        value_ref: nv_wire_str_short
      email_verified:
        required: false
        value_ref: nv_open_id_profile_email_verified
    relations: {}
  Member:
    id_field: id
    description: Authenticated member profile from the v2 Profile API.
    fields:
      id:
        required: true
        value_ref: nv_member_id
      localizedFirstName:
        required: false
        value_ref: nv_wire_str_short
      localizedLastName:
        required: false
        value_ref: nv_wire_str_short
      localizedHeadline:
        required: false
        value_ref: nv_wire_str_short
      vanityName:
        required: false
        value_ref: nv_wire_str_short
    relations:
      feed_posts:
        target: UgcPost
        cardinality: many
        materialize:
          kind: query_scoped
          capability: ugc_post_query_for_member
          param: member
  Organization:
    id_field: id
    description: Organization page identity used as a UGC post author.
    abstract: true
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: false
        value_ref: nv_wire_str_short
    relations:
      feed_posts:
        target: UgcPost
        cardinality: many
        materialize:
          kind: query_scoped
          capability: ugc_post_query_for_organization
          param: organization
  UgcPost:
    id_field: id
    description: User-generated content post in the LinkedIn feed graph.
    fields:
      id:
        required: true
        value_ref: nv_ugc_post_id
      authorUrn:
        required: false
        value_ref: nv_ugc_post_author_urn
      lifecycleState:
        required: false
        value_ref: nv_wire_str_short
      shareCommentaryText:
        required: false
        value_ref: nv_wire_str_short
      shareMediaCategory:
        required: false
        value_ref: nv_wire_str_short
      visibility:
        required: false
        value_ref: nv_wire_str_short
    relations: {}
  MediaUploadRegistration:
    id_field: asset
    description: Registration envelope for a media upload used in UGC creation.
    fields:
      asset:
        required: true
        value_ref: nv_wire_str_short
      uploadUrl:
        required: false
        value_ref: nv_wire_str_short
    relations: {}
capabilities:
  openid_userinfo_get:
    kind: singleton
    entity: OpenIdProfile
    description: Load OIDC userinfo claims for the authenticated member.
    provides:
    - sub
    - name
    - given_name
    - family_name
    - picture
    - locale
    - email
    - email_verified
  member_me_get:
    kind: singleton
    entity: Member
    description: Load the authenticated member profile.
    provides:
    - id
    - localizedFirstName
    - localizedLastName
    - localizedHeadline
    - vanityName
  ugc_post_query:
    kind: query
    entity: UgcPost
    description: Finder query for posts using an explicit Rest.li authors token.
    provides:
    - id
    - authorUrn
    - lifecycleState
    parameters:
    - name: authors
      value_ref: nv_ugc_post_query_authors
      required: true
      role: scope
    - name: sortBy
      value_ref: nv_wire_sel_8874eda015d84434
      required: false
      role: sort
  ugc_post_query_for_member:
    kind: query
    entity: UgcPost
    description: Query posts authored by a specific member.
    provides:
    - id
    - authorUrn
    - lifecycleState
    parameters:
    - name: member
      value_ref: nv_ugc_post_query_for_member_member
      required: true
      role: scope
    - name: sortBy
      value_ref: nv_wire_sel_8874eda015d84434
      required: false
      role: sort
  ugc_post_query_for_organization:
    kind: query
    entity: UgcPost
    description: Query posts authored by a specific organization.
    provides:
    - id
    - authorUrn
    - lifecycleState
    parameters:
    - name: organization
      value_ref: nv_ugc_post_query_for_organization_organization
      required: true
      role: scope
    - name: sortBy
      value_ref: nv_wire_sel_8874eda015d84434
      required: false
      role: sort
  ugc_post_get:
    kind: get
    entity: UgcPost
    description: Retrieve one post by encoded URN.
    provides:
    - id
    - authorUrn
    - lifecycleState
    - shareCommentaryText
    - shareMediaCategory
    - visibility
    parameters:
    - name: viewContext
      value_ref: nv_ugc_post_get_view_context
      required: false
      role: response_control
  ugc_post_create:
    kind: create
    entity: UgcPost
    description: Create a feed post as a member or organization author URN.
    provides:
    - id
    - authorUrn
    - lifecycleState
    parameters:
    - name: authorUrn
      value_ref: nv_wire_str_short
      required: true
    - name: shareCommentary
      value_ref: nv_wire_str_short
      required: true
    - name: visibility
      value_ref: nv_ugc_post_create_visibility
      required: true
    - name: shareMediaCategory
      value_ref: nv_ugc_post_create_share_media_category
      required: true
    - name: articleOriginalUrl
      value_ref: nv_wire_str_short
      required: false
    - name: articleTitle
      value_ref: nv_wire_str_short
      required: false
    - name: articleDescription
      value_ref: nv_wire_str_short
      required: false
    - name: imageMediaUrn
      value_ref: nv_wire_str_short
      required: false
  media_upload_register:
    kind: action
    entity: MediaUploadRegistration
    description: Register an image or video upload and return asset/upload URL.
    parameters:
    - name: ownerUrn
      value_ref: nv_wire_str_short
      required: true
    - name: recipe
      value_ref: nv_media_upload_register_recipe
      required: true
    provides:
    - asset
    - uploadUrl
oauth:
  provider: linkedin
  scopes:
    openid:
      label: OpenID Connect sign-in
      docs_url: https://learn.microsoft.com/en-us/linkedin/consumer/integrations/self-serve/sign-in-with-linkedin-v2
    profile:
      label: OIDC profile claims
      docs_url: https://learn.microsoft.com/en-us/linkedin/consumer/integrations/self-serve/sign-in-with-linkedin-v2
    email:
      label: OIDC email claims
      docs_url: https://learn.microsoft.com/en-us/linkedin/consumer/integrations/self-serve/sign-in-with-linkedin-v2
    r_liteprofile:
      label: Profile API read access
      docs_url: https://learn.microsoft.com/en-us/linkedin/shared/integrations/people/profile-api
    r_basicprofile:
      label: Extended profile read access
      docs_url: https://learn.microsoft.com/en-us/linkedin/shared/integrations/people/profile-api
    w_member_social:
      label: Post as member
      docs_url: https://learn.microsoft.com/en-us/linkedin/consumer/integrations/self-serve/share-on-linkedin
    r_member_social:
      label: Read member social content (restricted)
      docs_url: https://learn.microsoft.com/en-us/linkedin/marketing/integrations/community-management/shares/ugc-post-api
    r_organization_social:
      label: Read organization social content
      docs_url: https://learn.microsoft.com/en-us/linkedin/marketing/integrations/community-management/shares/ugc-post-api
    w_organization_social:
      label: Post as organization
      docs_url: https://learn.microsoft.com/en-us/linkedin/marketing/integrations/community-management/shares/ugc-post-api
  default_scope_sets:
    consumer_self_serve:
      description: Sign in with LinkedIn plus member posting.
      scopes:
      - openid
      - profile
      - email
      - w_member_social
  requirements:
    capabilities:
      openid_userinfo_get:
        any_of:
        - openid
      member_me_get:
        any_of:
        - r_liteprofile
        - r_basicprofile
      ugc_post_query:
        any_of:
        - r_member_social
        - r_organization_social
        - w_member_social
      ugc_post_query_for_member:
        any_of:
        - r_member_social
        - w_member_social
      ugc_post_query_for_organization:
        any_of:
        - r_organization_social
        - w_organization_social
      ugc_post_get:
        any_of:
        - r_member_social
        - r_organization_social
        - w_member_social
      ugc_post_create:
        any_of:
        - w_member_social
        - w_organization_social
      media_upload_register:
        any_of:
        - w_member_social
        - w_organization_social
    relations:
      Member.feed_posts:
        any_of:
        - r_member_social
        - w_member_social
      Organization.feed_posts:
        any_of:
        - r_organization_social
        - w_organization_social
auth:
  scheme: oauth_bearer
  env: LINKEDIN_ACCESS_TOKEN
  hosted_kv: plasm:outbound:v1:catalog:linkedin
values:
  nv_media_upload_register_recipe:
    type: select
    allowed_values:
    - feedshare-image
    - feedshare-video
  nv_member_id:
    type: string
    string_semantics: short
    description: LinkedIn person ID for this app.
  nv_open_id_profile_email_verified:
    type: boolean
  nv_ugc_post_author_urn:
    type: string
    string_semantics: short
    description: Author URN (person or organization).
  nv_ugc_post_create_share_media_category:
    type: select
    allowed_values:
    - NONE
    - ARTICLE
    - IMAGE
    - VIDEO
  nv_ugc_post_create_visibility:
    type: select
    allowed_values:
    - PUBLIC
    - CONNECTIONS
  nv_ugc_post_get_view_context:
    type: select
    allowed_values:
    - AUTHOR
    - READER
  nv_ugc_post_id:
    type: string
    string_semantics: short
    description: ugcPost or share URN identifier.
  nv_ugc_post_query_authors:
    type: string
    string_semantics: short
    description: Rest.li token such as List(urn%3Ali%3Aperson%3A8675309).
  nv_ugc_post_query_for_member_member:
    type: entity_ref
    target: Member
    description: Member id; mapping composes the Rest.li authors finder token.
  nv_ugc_post_query_for_organization_organization:
    type: entity_ref
    target: Organization
    description: Organization id; mapping composes the Rest.li authors finder token.
  nv_wire_sel_8874eda015d84434:
    type: select
    allowed_values:
    - CREATED
    - LAST_MODIFIED
  nv_wire_str_short:
    type: string
    string_semantics: short
