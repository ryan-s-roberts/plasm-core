# X API v2 — CML mappings. Semantic model in domain.yaml.
#
# Base URL: set via domain `http_backend` (https://api.x.com) or override with
# `plasm-agent --backend https://api.twitter.com`.
#
# Responses commonly wrap entities as { "data": ... , "meta": { "next_token": ... } }.
# Pagination uses meta.next_token with request param `pagination_token` (timelines, lists)
# or `next_token` (recent search), per upstream OpenAPI.
#
# Auth: Bearer OAuth 2 user token or app-only bearer; runtime injects Authorization.

# ── User ─────────────────────────────────────────────────────────────────────

user_get:
  method: GET
  path:
    - { type: literal, value: "2" }
    - { type: literal, value: users }
    - { type: var, name: id }
  response:
    single: true
    items_path: [data]

user_get_me:
  method: GET
  path:
    - { type: literal, value: "2" }
    - { type: literal, value: users }
    - { type: literal, value: me }
  response:
    single: true
    items_path: [data]

user_query:
  method: GET
  path:
    - { type: literal, value: "2" }
    - { type: literal, value: users }
    - { type: literal, value: by }
  response:
    items: data
  query:
    type: object
    fields:
      - - usernames
        - type: join
          sep: ","
          expr: { type: var, name: usernames }

# ── Tweet ────────────────────────────────────────────────────────────────────

tweet_get:
  method: GET
  path:
    - { type: literal, value: "2" }
    - { type: literal, value: tweets }
    - { type: var, name: id }
  response:
    single: true
    items_path: [data]

tweet_lookup_query:
  method: GET
  path:
    - { type: literal, value: "2" }
    - { type: literal, value: tweets }
  response:
    items: data
  query:
    type: object
    fields:
      - - ids
        - type: join
          sep: ","
          expr: { type: var, name: ids }

tweet_search:
  method: GET
  path:
    - { type: literal, value: "2" }
    - { type: literal, value: tweets }
    - { type: literal, value: search }
    - { type: literal, value: recent }
  response:
    items: data
  query:
    type: object
    fields:
      - - query
        - { type: var, name: query }
      - - sort_order
        - type: if
          condition: { type: exists, var: sort_order }
          then_expr: { type: var, name: sort_order }
          else_expr: { type: const, value: null }
      - - start_time
        - type: if
          condition: { type: exists, var: start_time }
          then_expr: { type: var, name: start_time }
          else_expr: { type: const, value: null }
      - - end_time
        - type: if
          condition: { type: exists, var: end_time }
          then_expr: { type: var, name: end_time }
          else_expr: { type: const, value: null }
      - - since_id
        - type: if
          condition: { type: exists, var: since_id }
          then_expr: { type: var, name: since_id }
          else_expr: { type: const, value: null }
      - - until_id
        - type: if
          condition: { type: exists, var: until_id }
          then_expr: { type: var, name: until_id }
          else_expr: { type: const, value: null }
  pagination:
    location: query
    response_prefix: [meta]
    params:
      max_results: { fixed: 25 }
      next_token: { from_response: next_token }

tweet_timeline_query:
  method: GET
  path:
    - { type: literal, value: "2" }
    - { type: literal, value: users }
    - { type: var, name: id }
    - { type: literal, value: tweets }
  response:
    items: data
  query:
    type: object
    fields:
      - - exclude
        - type: if
          condition: { type: exists, var: exclude }
          then_expr:
            type: join
            sep: ","
            expr: { type: var, name: exclude }
          else_expr: { type: const, value: null }
      - - start_time
        - type: if
          condition: { type: exists, var: start_time }
          then_expr: { type: var, name: start_time }
          else_expr: { type: const, value: null }
      - - end_time
        - type: if
          condition: { type: exists, var: end_time }
          then_expr: { type: var, name: end_time }
          else_expr: { type: const, value: null }
      - - since_id
        - type: if
          condition: { type: exists, var: since_id }
          then_expr: { type: var, name: since_id }
          else_expr: { type: const, value: null }
      - - until_id
        - type: if
          condition: { type: exists, var: until_id }
          then_expr: { type: var, name: until_id }
          else_expr: { type: const, value: null }
  pagination:
    location: query
    response_prefix: [meta]
    params:
      max_results: { fixed: 25 }
      pagination_token: { from_response: next_token }

