user_liked_tweets_query:
  method: GET
  path:
    - { type: literal, value: "2" }
    - { type: literal, value: users }
    - { type: var, name: id }
    - { type: literal, value: liked_tweets }
  response:
    items: data
  query:
    type: object
    fields: []
  pagination:
    location: query
    response_prefix: [meta]
    params:
      max_results: { fixed: 25 }
      pagination_token: { from_response: next_token }

tweet_create:
  method: POST
  path:
    - { type: literal, value: "2" }
    - { type: literal, value: tweets }
  response:
    single: true
    items_path: [data]
  body:
    type: object
    fields:
      - - text
        - { type: var, name: text }
      - - quote_tweet_id
        - type: if
          condition: { type: exists, var: quote_tweet_id }
          then_expr: { type: var, name: quote_tweet_id }
          else_expr: { type: const, value: null }
      - - reply
        - type: if
          condition: { type: exists, var: reply_to_tweet_id }
          then_expr:
            type: object
            fields:
              - - in_reply_to_tweet_id
                - { type: var, name: reply_to_tweet_id }
          else_expr: { type: const, value: null }

tweet_delete:
  method: DELETE
  path:
    - { type: literal, value: "2" }
    - { type: literal, value: tweets }
    - { type: var, name: id }

