version: 1
http_backend: https://api.x.com
entities:
  User:
    id_field: id
    description: An X user account (handle, profile, and identifiers).
    fields:
      id:
        required: true
        value_ref: nv_user_id
      name:
        required: true
        value_ref: nv_user_name
      username:
        required: true
        value_ref: nv_user_username
      created_at:
        required: false
        value_ref: nv_user_created_at
      description:
        required: false
        value_ref: nv_user_description
      location:
        required: false
        value_ref: nv_user_location
      url:
        required: false
        value_ref: nv_user_url
      protected:
        required: false
        value_ref: nv_user_protected
      verified:
        required: false
        value_ref: nv_user_verified
      verified_type:
        required: false
        value_ref: nv_user_verified_type
      profile_image_url:
        required: false
        value_ref: nv_user_profile_image_url
      most_recent_tweet_id:
        required: false
        value_ref: nv_user_most_recent_tweet_id
    relations:
      tweets:
        description: Posts authored by this user (reverse-chronological when paginated).
        target: Tweet
        cardinality: many
        materialize:
          kind: query_scoped
          capability: tweet_timeline_query
          param: id
      mentions:
        description: Posts that mention this user.
        target: Tweet
        cardinality: many
        materialize:
          kind: query_scoped
          capability: tweet_mentions_query
          param: id
      liked_tweets:
        description: Posts this user has liked.
        target: Tweet
        cardinality: many
        materialize:
          kind: query_scoped
          capability: user_liked_tweets_query
          param: id
  Tweet:
    id_field: id
    description: A post on X (tweet), including text, author, and reply metadata.
    fields:
      id:
        required: true
        value_ref: nv_tweet_id
      text:
        required: false
        value_ref: nv_tweet_text
      author_id:
        required: false
        value_ref: nv_tweet_author_id
      created_at:
        required: false
        value_ref: nv_tweet_created_at
      conversation_id:
        required: false
        value_ref: nv_tweet_conversation_id
      in_reply_to_user_id:
        required: false
        value_ref: nv_tweet_in_reply_to_user_id
      lang:
        required: false
        value_ref: nv_tweet_lang
      possibly_sensitive:
        required: false
        value_ref: nv_tweet_possibly_sensitive
      reply_count:
        required: false
        path: public_metrics.reply_count
        value_ref: nv_tweet_reply_count
      retweet_count:
        required: false
        path: public_metrics.retweet_count
        value_ref: nv_tweet_retweet_count
      like_count:
        required: false
        path: public_metrics.like_count
        value_ref: nv_tweet_like_count
      quote_count:
        required: false
        path: public_metrics.quote_count
        value_ref: nv_tweet_quote_count
      impression_count:
        required: false
        path: public_metrics.impression_count
        value_ref: nv_tweet_impression_count
      bookmark_count:
        required: false
        path: public_metrics.bookmark_count
        value_ref: nv_tweet_bookmark_count
    relations:
      author:
        target: User
        cardinality: one
  List:
    id_field: id
    description: A curated list of accounts; list timelines surface member posts.
    fields:
      id:
        required: true
        value_ref: nv_list_id
      name:
        required: true
        value_ref: nv_list_name
      description:
        required: false
        value_ref: nv_list_description
      private:
        required: false
        value_ref: nv_list_private
      follower_count:
        required: false
        value_ref: nv_list_follower_count
      member_count:
        required: false
        value_ref: nv_list_member_count
      created_at:
        required: false
        value_ref: nv_list_created_at
      owner_id:
        required: false
        value_ref: nv_list_owner_id
    relations:
      owner:
        target: User
        cardinality: one
      tweets:
        description: Posts from accounts that are members of this list.
        target: Tweet
        cardinality: many
        materialize:
          kind: query_scoped
          capability: list_tweets_query
          param: id
capabilities:
  user_get:
    kind: get
    entity: User
  user_get_me:
    kind: singleton
    entity: User
    description: The authenticated user for the current bearer token.
  user_query:
    kind: query
    entity: User
    description: Resolve up to 100 users by handle (username).
    parameters:
    - name: usernames
      value_ref: nv_user_query_usernames
      required: true
  tweet_get:
    kind: get
    entity: Tweet
  tweet_lookup_query:
    kind: query
    entity: Tweet
    description: Batch lookup of posts by snowflake id (comma-separated on the wire).
    parameters:
    - name: ids
      value_ref: nv_tweet_lookup_query_ids
      required: true
  tweet_search:
    kind: search
    entity: Tweet
    description: Recent search over the last seven days of public posts.
    parameters:
    - name: query
      value_ref: nv_tweet_search_query
      required: true
      role: search
    - name: sort_order
      value_ref: nv_tweet_search_sort_order
      required: false
      role: sort
    - name: start_time
      value_ref: nv_tweet_search_start_time
      required: false
    - name: end_time
      value_ref: nv_tweet_search_end_time
      required: false
    - name: since_id
      value_ref: nv_tweet_search_since_id
      required: false
    - name: until_id
      value_ref: nv_tweet_search_until_id
      required: false
  tweet_timeline_query:
    kind: query
    entity: Tweet
    description: Posts authored by a specific user.
    parameters:
    - name: id
      value_ref: nv_tweet_timeline_query_id
      required: true
      role: scope
    - name: exclude
      value_ref: nv_tweet_timeline_query_exclude
      required: false
    - name: start_time
      value_ref: nv_tweet_timeline_query_start_time
      required: false
    - name: end_time
      value_ref: nv_tweet_timeline_query_end_time
      required: false
    - name: since_id
      value_ref: nv_tweet_timeline_query_since_id
      required: false
    - name: until_id
      value_ref: nv_tweet_timeline_query_until_id
      required: false
  tweet_mentions_query:
    kind: query
    entity: Tweet
    description: Posts that mention a specific user.
    parameters:
    - name: id
      value_ref: nv_tweet_mentions_query_id
      required: true
      role: scope
    - name: start_time
      value_ref: nv_tweet_mentions_query_start_time
      required: false
    - name: end_time
      value_ref: nv_tweet_mentions_query_end_time
      required: false
    - name: since_id
      value_ref: nv_tweet_mentions_query_since_id
      required: false
    - name: until_id
      value_ref: nv_tweet_mentions_query_until_id
      required: false
  user_liked_tweets_query:
    kind: query
    entity: Tweet
    description: Posts liked by a specific user.
    parameters:
    - name: id
      value_ref: nv_user_liked_tweets_query_id
      required: true
      role: scope
  tweet_create:
    kind: create
    entity: Tweet
    description: Create a new post for the authenticated user.
    provides:
    - id
    - text
    parameters:
    - name: text
      value_ref: nv_tweet_create_text
      required: true
    - name: quote_tweet_id
      value_ref: nv_tweet_create_quote_tweet_id
      required: false
    - name: reply_to_tweet_id
      value_ref: nv_tweet_create_reply_to_tweet_id
      required: false
  tweet_delete:
    kind: action
    entity: Tweet
    output:
      type: side_effect
      description: Removes the post from X when the authenticated user is allowed to delete it.
  list_get:
    kind: get
    entity: List
  list_create:
    kind: create
    entity: List
    provides:
    - id
    - name
    parameters:
    - name: name
      value_ref: nv_list_create_name
      required: true
    - name: description
      value_ref: nv_list_create_description
      required: false
    - name: private
      value_ref: nv_list_create_private
      required: false
  list_delete:
    kind: action
    entity: List
    output:
      type: side_effect
      description: Deletes the list when the authenticated user owns it.
  list_tweets_query:
    kind: query
    entity: Tweet
    description: Posts from members of a specific list.
    parameters:
    - name: id
      value_ref: nv_list_tweets_query_id
      required: true
      role: scope
oauth:
  provider: twitter
  scopes:
    tweet.read:
      label: Read posts, timelines, search, and metrics surfaced with reads.
      docs_url: https://docs.x.com/fundamentals/authentication/guides/v2-authentication-mapping
    tweet.write:
      label: Create, delete, repost, like, and other post mutations.
      docs_url: https://docs.x.com/fundamentals/authentication/guides/v2-authentication-mapping
    users.read:
      label: Read account profile and identifiers for users you can access.
      docs_url: https://docs.x.com/fundamentals/authentication/guides/v2-authentication-mapping
    list.read:
      label: Read lists, memberships, and pinned lists.
      docs_url: https://docs.x.com/fundamentals/authentication/guides/v2-authentication-mapping
    list.write:
      label: Create, update, or delete lists you own.
      docs_url: https://docs.x.com/fundamentals/authentication/guides/v2-authentication-mapping
    like.read:
      label: Read who liked a post or which posts a user liked.
      docs_url: https://docs.x.com/fundamentals/authentication/guides/v2-authentication-mapping
    like.write:
      label: Like or unlike posts on behalf of the user.
      docs_url: https://docs.x.com/fundamentals/authentication/guides/v2-authentication-mapping
    follows.read:
      label: Read follow relationships.
      docs_url: https://docs.x.com/fundamentals/authentication/guides/v2-authentication-mapping
    follows.write:
      label: Follow or unfollow accounts.
      docs_url: https://docs.x.com/fundamentals/authentication/guides/v2-authentication-mapping
    bookmark.read:
      label: Read bookmarks.
      docs_url: https://docs.x.com/fundamentals/authentication/guides/v2-authentication-mapping
    bookmark.write:
      label: Add or remove bookmarks.
      docs_url: https://docs.x.com/fundamentals/authentication/guides/v2-authentication-mapping
    offline.access:
      label: Receive a refresh token for long-lived user authorization.
      docs_url: https://docs.x.com/fundamentals/authentication/oauth-2-0/overview
    space.read:
      label: Read Spaces metadata and participants.
      docs_url: https://docs.x.com/fundamentals/authentication/guides/v2-authentication-mapping
    dm.read:
      label: Read direct message events.
      docs_url: https://docs.x.com/fundamentals/authentication/guides/v2-authentication-mapping
    dm.write:
      label: Send and manage direct messages.
      docs_url: https://docs.x.com/fundamentals/authentication/guides/v2-authentication-mapping
    mute.read:
      label: Read muted accounts.
      docs_url: https://docs.x.com/fundamentals/authentication/guides/v2-authentication-mapping
    mute.write:
      label: Mute or unmute accounts.
      docs_url: https://docs.x.com/fundamentals/authentication/guides/v2-authentication-mapping
    block.read:
      label: Read blocked accounts.
      docs_url: https://docs.x.com/fundamentals/authentication/guides/v2-authentication-mapping
    block.write:
      label: Block or unblock accounts.
      docs_url: https://docs.x.com/fundamentals/authentication/guides/v2-authentication-mapping
  default_scope_sets:
    plasm_twitter_read_core:
      description: Read timelines, profiles, list metadata, and recent search.
      scopes:
      - tweet.read
      - users.read
      - list.read
      - like.read
    plasm_twitter_write_core:
      description: Post, delete, manage lists, and read relationships needed for writes.
      scopes:
      - tweet.read
      - tweet.write
      - users.read
      - list.read
      - list.write
      - offline.access
  requirements:
    capabilities:
      user_get:
        all_of:
        - any_of:
          - tweet.read
        - any_of:
          - users.read
      user_get_me:
        all_of:
        - any_of:
          - tweet.read
        - any_of:
          - users.read
      user_query:
        all_of:
        - any_of:
          - tweet.read
        - any_of:
          - users.read
      tweet_get:
        all_of:
        - any_of:
          - tweet.read
        - any_of:
          - users.read
      tweet_lookup_query:
        all_of:
        - any_of:
          - tweet.read
        - any_of:
          - users.read
      tweet_search:
        all_of:
        - any_of:
          - tweet.read
        - any_of:
          - users.read
      tweet_timeline_query:
        all_of:
        - any_of:
          - tweet.read
        - any_of:
          - users.read
      tweet_mentions_query:
        all_of:
        - any_of:
          - tweet.read
        - any_of:
          - users.read
      user_liked_tweets_query:
        all_of:
        - any_of:
          - like.read
        - any_of:
          - tweet.read
        - any_of:
          - users.read
      tweet_create:
        all_of:
        - any_of:
          - tweet.read
        - any_of:
          - tweet.write
        - any_of:
          - users.read
      tweet_delete:
        all_of:
        - any_of:
          - tweet.read
        - any_of:
          - tweet.write
        - any_of:
          - users.read
      list_get:
        all_of:
        - any_of:
          - list.read
        - any_of:
          - tweet.read
        - any_of:
          - users.read
      list_create:
        all_of:
        - any_of:
          - list.read
        - any_of:
          - list.write
        - any_of:
          - tweet.read
        - any_of:
          - users.read
      list_delete:
        all_of:
        - any_of:
          - list.write
        - any_of:
          - tweet.read
        - any_of:
          - users.read
      list_tweets_query:
        all_of:
        - any_of:
          - list.read
        - any_of:
          - tweet.read
        - any_of:
          - users.read
    relations:
      User.tweets:
        all_of:
        - any_of:
          - tweet.read
        - any_of:
          - users.read
      User.mentions:
        all_of:
        - any_of:
          - tweet.read
        - any_of:
          - users.read
      User.liked_tweets:
        all_of:
        - any_of:
          - like.read
        - any_of:
          - tweet.read
        - any_of:
          - users.read
      Tweet.author:
        all_of:
        - any_of:
          - tweet.read
        - any_of:
          - users.read
      List.owner:
        all_of:
        - any_of:
          - list.read
        - any_of:
          - tweet.read
        - any_of:
          - users.read
      List.tweets:
        all_of:
        - any_of:
          - list.read
        - any_of:
          - tweet.read
        - any_of:
          - users.read
auth:
  scheme: bearer_token
  env: TWITTER_ACCESS_TOKEN
values:
  nv_user_id:
    type: string
    string_semantics: short
  nv_user_name:
    type: string
    string_semantics: short
  nv_user_username:
    type: string
    string_semantics: short
  nv_user_created_at:
    type: date
    value_format: rfc3339
  nv_user_description:
    type: string
    string_semantics: markdown
  nv_user_location:
    type: string
    string_semantics: short
  nv_user_url:
    type: string
    string_semantics: short
  nv_user_protected:
    type: boolean
  nv_user_verified:
    type: boolean
  nv_user_verified_type:
    type: string
    string_semantics: short
  nv_user_profile_image_url:
    type: string
    string_semantics: short
  nv_user_most_recent_tweet_id:
    type: entity_ref
    target: Tweet
  nv_tweet_id:
    type: string
    string_semantics: short
  nv_tweet_text:
    type: string
    string_semantics: markdown
  nv_tweet_author_id:
    type: entity_ref
    target: User
  nv_tweet_created_at:
    type: date
    value_format: rfc3339
  nv_tweet_conversation_id:
    type: entity_ref
    target: Tweet
  nv_tweet_in_reply_to_user_id:
    type: entity_ref
    target: User
  nv_tweet_lang:
    type: string
    string_semantics: short
  nv_tweet_possibly_sensitive:
    type: boolean
  nv_tweet_reply_count:
    type: integer
  nv_tweet_retweet_count:
    type: integer
  nv_tweet_like_count:
    type: integer
  nv_tweet_quote_count:
    type: integer
  nv_tweet_impression_count:
    type: integer
  nv_tweet_bookmark_count:
    type: integer
  nv_list_id:
    type: string
    string_semantics: short
  nv_list_name:
    type: string
    string_semantics: short
  nv_list_description:
    type: string
    string_semantics: markdown
  nv_list_private:
    type: boolean
  nv_list_follower_count:
    type: integer
  nv_list_member_count:
    type: integer
  nv_list_created_at:
    type: date
    value_format: rfc3339
  nv_list_owner_id:
    type: entity_ref
    target: User
  nv_user_query_usernames_item:
    type: string
  nv_user_query_usernames:
    type: array
    items:
      value_ref: nv_user_query_usernames_item
  nv_tweet_lookup_query_ids_item:
    type: string
  nv_tweet_lookup_query_ids:
    type: array
    items:
      value_ref: nv_tweet_lookup_query_ids_item
  nv_tweet_search_query:
    type: string
    string_semantics: short
  nv_tweet_search_sort_order:
    type: select
    allowed_values:
    - recency
    - relevancy
  nv_tweet_search_start_time:
    type: date
    value_format: rfc3339
  nv_tweet_search_end_time:
    type: date
    value_format: rfc3339
  nv_tweet_search_since_id:
    type: string
    string_semantics: short
  nv_tweet_search_until_id:
    type: string
    string_semantics: short
  nv_tweet_timeline_query_id:
    type: entity_ref
    target: User
  nv_tweet_timeline_query_exclude:
    type: multi_select
    allowed_values:
    - replies
    - retweets
  nv_tweet_timeline_query_start_time:
    type: date
    value_format: rfc3339
  nv_tweet_timeline_query_end_time:
    type: date
    value_format: rfc3339
  nv_tweet_timeline_query_since_id:
    type: string
    string_semantics: short
  nv_tweet_timeline_query_until_id:
    type: string
    string_semantics: short
  nv_tweet_mentions_query_id:
    type: entity_ref
    target: User
  nv_tweet_mentions_query_start_time:
    type: date
    value_format: rfc3339
  nv_tweet_mentions_query_end_time:
    type: date
    value_format: rfc3339
  nv_tweet_mentions_query_since_id:
    type: string
    string_semantics: short
  nv_tweet_mentions_query_until_id:
    type: string
    string_semantics: short
  nv_user_liked_tweets_query_id:
    type: entity_ref
    target: User
  nv_tweet_create_text:
    type: string
    string_semantics: markdown
  nv_tweet_create_quote_tweet_id:
    type: entity_ref
    target: Tweet
  nv_tweet_create_reply_to_tweet_id:
    type: entity_ref
    target: Tweet
  nv_list_create_name:
    type: string
    string_semantics: short
  nv_list_create_description:
    type: string
    string_semantics: markdown
  nv_list_create_private:
    type: boolean
  nv_list_tweets_query_id:
    type: entity_ref
    target: List
