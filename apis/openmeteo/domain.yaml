version: 1
auth:
  scheme: none
http_backend: https://api.open-meteo.com
entities:
  Forecast:
    id_field: id
    id_from:
    - latitude
    description: Weather forecast data for a geographic location
    fields:
      latitude:
        required: true
        value_ref: nv_forecast_latitude
      longitude:
        required: true
        value_ref: nv_forecast_longitude
      timezone:
        required: false
        value_ref: nv_forecast_timezone
      elevation:
        required: false
        value_ref: nv_forecast_elevation
capabilities:
  weather_forecast:
    description: Fetch weather forecast for a lat/lon coordinate
    kind: query
    entity: Forecast
    parameters:
    - name: latitude
      value_ref: nv_weather_forecast_latitude
      required: true
      role: filter
    - name: longitude
      value_ref: nv_weather_forecast_longitude
      required: true
      role: filter
    - name: current_weather
      value_ref: nv_weather_forecast_current_weather
      required: false
      role: response_control
    - name: temperature_unit
      value_ref: nv_weather_forecast_temperature_unit
      required: false
      role: response_control
    - name: wind_speed_unit
      value_ref: nv_weather_forecast_wind_speed_unit
      required: false
      role: response_control
    - name: timezone
      value_ref: nv_weather_forecast_timezone
      required: false
      role: response_control
    - name: past_days
      value_ref: nv_weather_forecast_past_days
      required: false
      role: filter
values:
  nv_forecast_latitude:
    type: number
    description: Decimal latitude of the forecast location
  nv_forecast_longitude:
    type: number
    description: Decimal longitude of the forecast location
  nv_forecast_timezone:
    type: string
    string_semantics: short
    description: IANA timezone name for the location
  nv_forecast_elevation:
    type: number
    description: Terrain elevation in metres
  nv_weather_forecast_latitude:
    type: number
  nv_weather_forecast_longitude:
    type: number
  nv_weather_forecast_current_weather:
    type: boolean
  nv_weather_forecast_temperature_unit:
    type: select
    allowed_values:
    - celsius
    - fahrenheit
  nv_weather_forecast_wind_speed_unit:
    type: select
    allowed_values:
    - kmh
    - ms
    - mph
    - kn
  nv_weather_forecast_timezone:
    type: string
    string_semantics: short
  nv_weather_forecast_past_days:
    type: integer
