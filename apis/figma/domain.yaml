version: 2
http_backend: https://api.figma.com
entities:
  User:
    id_field: id
    description: The authenticated Figma user profile.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      handle:
        required: true
        value_ref: nv_wire_str_short
      img_url:
        required: true
        value_ref: nv_wire_str_short
      email:
        required: false
        value_ref: nv_wire_str_short
  Team:
    id_field: id
    implicit_request_identity: true
    description: A Figma team container identified by a known team id.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: true
        value_ref: nv_wire_str_short
    relations:
      projects:
        target: Project
        cardinality: many
        materialize:
          kind: query_scoped
          capability: project_query
          param: team_id
  Project:
    id_field: id
    implicit_request_identity: true
    description: A project within a Figma team.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: true
        value_ref: nv_wire_str_short
    relations:
      files:
        target: File
        cardinality: many
        materialize:
          kind: query_scoped
          capability: file_query
          param: project_id
  File:
    id_field: key
    description: A Figma design file or branch, including collaboration metadata and optional structured document payloads.
    fields:
      key:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: true
        value_ref: nv_wire_str_short
      role:
        required: false
        value_ref: nv_wire_str_short
      editorType:
        required: false
        value_ref: nv_wire_str_short
      version:
        required: false
        value_ref: nv_wire_str_short
      lastModified:
        required: false
        value_ref: nv_wire_date_rfc3339
      last_modified:
        required: false
        value_ref: nv_wire_date_rfc3339
      linkAccess:
        required: false
        value_ref: nv_wire_str_short
      mainFileKey:
        required: false
        value_ref: nv_wire_str_short
      document:
        required: false
        value_ref: nv_file_document
      components:
        required: false
        value_ref: nv_file_components
      componentSets:
        required: false
        value_ref: nv_file_component_sets
      styles:
        required: false
        value_ref: nv_file_styles
      branches:
        required: false
        value_ref: nv_file_branches
    relations:
      comments:
        target: Comment
        cardinality: many
        materialize:
          kind: query_scoped
          capability: comment_query
          param: file_key
  FileMetadata:
    id_field: key
    implicit_request_identity: true
    description: Collaboration and ownership metadata for a known file key.
    domain_projection_examples: false
    fields:
      key:
        required: true
        value_ref: nv_wire_str_short
      name:
        required: true
        value_ref: nv_wire_str_short
      folder_name:
        required: false
        value_ref: nv_wire_str_short
      last_touched_at:
        required: false
        value_ref: nv_wire_date_rfc3339
      editorType:
        required: false
        value_ref: nv_wire_str_short
      role:
        required: false
        value_ref: nv_wire_str_short
      link_access:
        required: false
        value_ref: nv_wire_str_short
      url:
        required: false
        value_ref: nv_wire_str_short
      version:
        required: false
        value_ref: nv_wire_str_short
      creator_id:
        required: false
        path: creator.id
        value_ref: nv_wire_str_short
      creator_handle:
        required: false
        path: creator.handle
        value_ref: nv_wire_str_short
      creator_img_url:
        required: false
        path: creator.img_url
        value_ref: nv_wire_str_short
      last_touched_by_id:
        required: false
        path: last_touched_by.id
        value_ref: nv_wire_str_short
      last_touched_by_handle:
        required: false
        path: last_touched_by.handle
        value_ref: nv_wire_str_short
      last_touched_by_img_url:
        required: false
        path: last_touched_by.img_url
        value_ref: nv_wire_str_short
  Comment:
    id_field: id
    description: A comment or reply attached to a Figma file.
    fields:
      id:
        required: true
        value_ref: nv_wire_str_short
      file_key:
        required: true
        value_ref: nv_comment_file_key
      parent_id:
        required: false
        value_ref: nv_wire_str_short
      user_id:
        required: false
        path: user.id
        value_ref: nv_wire_str_short
      user_handle:
        required: false
        path: user.handle
        value_ref: nv_wire_str_short
      user_img_url:
        required: false
        path: user.img_url
        value_ref: nv_wire_str_short
      created_at:
        required: true
        value_ref: nv_wire_date_rfc3339
      resolved_at:
        required: false
        value_ref: nv_wire_date_rfc3339
      message:
        required: true
        value_ref: nv_comment_message
      order_id:
        required: false
        value_ref: nv_wire_str_short
      reactions:
        required: false
        value_ref: nv_comment_reactions
capabilities:
  user_get_me:
    kind: singleton
    entity: User
    description: Load the profile for the authenticated Figma user.
    provides:
    - id
    - handle
    - img_url
    - email
  team_get:
    kind: get
    entity: Team
    description: Open a known Figma team by id so its projects can be traversed.
    provides:
    - id
    - name
  project_query:
    kind: query
    entity: Project
    description: List projects visible within a specific team.
    parameters:
    - name: team_id
      value_ref: nv_project_query_team_id
      required: true
      role: scope
    provides:
    - id
    - name
  project_get:
    kind: get
    entity: Project
    description: Open a known project by id so its files can be traversed.
    provides:
    - id
    - name
  file_query:
    kind: query
    entity: File
    description: List files in a project.
    parameters:
    - name: project_id
      value_ref: nv_file_query_project_id
      required: true
      role: scope
    - name: branch_data
      value_ref: nv_file_query_branch_data
      required: false
      role: response_control
    provides:
    - key
    - name
    - last_modified
  file_get:
    kind: get
    entity: File
    description: Load a file document and its structured node tree for a known file key.
    provides:
    - key
    - name
    - role
    - editorType
    - version
    - lastModified
    - linkAccess
    - mainFileKey
    - document
    - components
    - componentSets
    - styles
    - branches
  file_metadata_get:
    kind: get
    entity: FileMetadata
    description: Load collaboration and ownership metadata for a known file key.
    provides:
    - key
    - name
    - folder_name
    - last_touched_at
    - creator_id
    - creator_handle
    - creator_img_url
    - last_touched_by_id
    - last_touched_by_handle
    - last_touched_by_img_url
    - editorType
    - role
    - link_access
    - url
    - version
  comment_query:
    kind: query
    entity: Comment
    description: List comments on a file.
    parameters:
    - name: file_key
      value_ref: nv_comment_query_file_key
      required: true
      role: scope
    - name: as_md
      value_ref: nv_comment_query_as_md
      required: false
      role: response_control
    provides:
    - id
    - file_key
    - parent_id
    - user_id
    - user_handle
    - user_img_url
    - created_at
    - resolved_at
    - message
    - order_id
    - reactions
  comment_create:
    kind: create
    entity: Comment
    description: Add a new comment or reply in a file.
    parameters:
    - name: file_key
      value_ref: nv_comment_create_file_key
      required: true
      role: scope
    input_schema:
      input_type:
        type: object
        additional_fields: true
        fields: []
    provides:
    - id
    - file_key
    - parent_id
    - user_id
    - user_handle
    - user_img_url
    - created_at
    - resolved_at
    - message
    - order_id
    - reactions
oauth:
  provider: figma
  scopes:
    current_user:read:
      label: Read the authenticated user's profile.
      docs_url: https://developers.figma.com/docs/rest-api/scopes/
    projects:read:
      label: List projects and files in projects.
      notes: Required for team and project traversal in this catalog.
      docs_url: https://developers.figma.com/docs/rest-api/scopes/
    file_content:read:
      label: Read file structure, nodes, and rendered exports.
      docs_url: https://developers.figma.com/docs/rest-api/scopes/
    file_metadata:read:
      label: Read file ownership and sharing metadata.
      docs_url: https://developers.figma.com/docs/rest-api/scopes/
    file_comments:read:
      label: Read comments on files.
      docs_url: https://developers.figma.com/docs/rest-api/scopes/
    file_comments:write:
      label: Create and delete comments and reactions.
      docs_url: https://developers.figma.com/docs/rest-api/scopes/
    files:read:
      label: Deprecated broad read scope
      notes: Figma still documents this legacy scope, but granular scopes are preferred.
      docs_url: https://developers.figma.com/docs/rest-api/scopes/
  default_scope_sets:
    figma_readonly_core:
      description: Current user profile, team/project traversal, file content and metadata reads, and file comments reads.
      scopes:
      - current_user:read
      - projects:read
      - file_content:read
      - file_metadata:read
      - file_comments:read
    figma_commenter_core:
      description: Read-heavy design review automation that can also create comments.
      scopes:
      - current_user:read
      - projects:read
      - file_content:read
      - file_metadata:read
      - file_comments:read
      - file_comments:write
  requirements:
    capabilities:
      user_get_me:
        any_of:
        - current_user:read
      team_get:
        any_of:
        - projects:read
      project_query:
        any_of:
        - projects:read
      project_get:
        any_of:
        - projects:read
      file_query:
        any_of:
        - projects:read
      file_get:
        any_of:
        - file_content:read
      file_metadata_get:
        any_of:
        - file_metadata:read
      comment_query:
        any_of:
        - file_comments:read
      comment_create:
        any_of:
        - file_comments:write
    relations:
      Team.projects:
        any_of:
        - projects:read
      Project.files:
        any_of:
        - projects:read
      File.comments:
        any_of:
        - file_comments:read
auth:
  scheme: bearer_token
  env: FIGMA_ACCESS_TOKEN
  hosted_kv: plasm:outbound:v1:catalog:figma
values:
  nv_comment_create_file_key:
    type: entity_ref
    target: File
    description: File where the comment should be created.
  nv_comment_file_key:
    type: entity_ref
    target: File
  nv_comment_message:
    type: string
    string_semantics: markdown
  nv_comment_query_as_md:
    type: boolean
    description: Return comment text in markdown form when available.
  nv_comment_query_file_key:
    type: entity_ref
    target: File
    description: File whose comments to list.
  nv_comment_reactions:
    type: json
    description: Reactions recorded on the comment.
  nv_file_branches:
    type: json
    description: Branch metadata returned with the file document.
  nv_file_component_sets:
    type: json
    description: Component set metadata keyed by node id.
  nv_file_components:
    type: json
    description: Component metadata keyed by node id.
  nv_file_document:
    type: json
    description: Structured document tree for the file or requested slice.
  nv_file_query_branch_data:
    type: boolean
    description: Include branch summaries for main files that have branches.
  nv_file_query_project_id:
    type: entity_ref
    target: Project
    description: Project whose files to list.
  nv_file_styles:
    type: json
    description: Style metadata keyed by style id.
  nv_project_query_team_id:
    type: entity_ref
    target: Team
    description: Team whose projects to list.
  nv_wire_date_rfc3339:
    type: date
    value_format: rfc3339
  nv_wire_str_short:
    type: string
    string_semantics: short
