version: 1
auth:
  scheme: none
http_backend: https://api.openbrewerydb.org
entities:
  Brewery:
    id_field: id
    description: A beer brewing establishment
    fields:
      id:
        required: true
        value_ref: nv_brewery_id
      name:
        required: true
        value_ref: nv_brewery_name
      brewery_type:
        required: false
        value_ref: nv_brewery_brewery_type
      address_1:
        required: false
        value_ref: nv_brewery_address_1
      city:
        required: false
        value_ref: nv_brewery_city
      state:
        required: false
        value_ref: nv_brewery_state
      postal_code:
        required: false
        value_ref: nv_brewery_postal_code
      country:
        required: false
        value_ref: nv_brewery_country
      longitude:
        required: false
        value_ref: nv_brewery_longitude
      latitude:
        required: false
        value_ref: nv_brewery_latitude
      phone:
        required: false
        value_ref: nv_brewery_phone
      website_url:
        required: false
        value_ref: nv_brewery_website_url
capabilities:
  brewery_query:
    description: List breweries with optional field filters and sort
    kind: query
    entity: Brewery
    parameters:
    - name: by_city
      value_ref: nv_brewery_query_by_city
      required: false
      role: filter
    - name: by_state
      value_ref: nv_brewery_query_by_state
      required: false
      role: filter
    - name: by_postal
      value_ref: nv_brewery_query_by_postal
      required: false
      role: filter
    - name: by_country
      value_ref: nv_brewery_query_by_country
      required: false
      role: filter
    - name: by_type
      value_ref: nv_brewery_query_by_type
      required: false
      role: filter
    - name: by_name
      value_ref: nv_brewery_query_by_name
      required: false
      role: filter
    - name: by_ids
      value_ref: nv_brewery_query_by_ids
      required: false
      role: filter
    - name: sort
      value_ref: nv_brewery_query_sort
      required: false
      role: sort
  brewery_search:
    description: Free-text search across brewery name and location fields
    kind: search
    entity: Brewery
    parameters:
    - name: query
      value_ref: nv_brewery_search_query
      required: true
      role: search
  brewery_get:
    description: Retrieve a single brewery by its UUID
    kind: get
    entity: Brewery
    provides:
    - id
    - name
    - brewery_type
    - address_1
    - city
    - state
    - postal_code
    - country
    - longitude
    - latitude
    - phone
    - website_url
  brewery_autocomplete:
    description: Fast typeahead name lookup returning only id and name
    kind: search
    entity: Brewery
    parameters:
    - name: query
      value_ref: nv_brewery_autocomplete_query
      required: true
      role: search
  brewery_random:
    description: Return N random breweries; size controls count
    kind: action
    entity: Brewery
    parameters:
    - name: size
      value_ref: nv_brewery_random_size
      required: false
      role: response_control
    output:
      type: side_effect
      description: Return N random breweries; size controls count
values:
  nv_brewery_id:
    type: string
    string_semantics: short
    description: Unique UUID string identifier
  nv_brewery_name:
    type: string
    string_semantics: short
    description: Brewery name
  nv_brewery_brewery_type:
    type: select
    allowed_values:
    - micro
    - nano
    - regional
    - brewpub
    - large
    - planning
    - bar
    - contract
    - proprietor
    - closed
    description: Classification (micro, nano, regional, brewpub, large, etc.)
  nv_brewery_address_1:
    type: string
    string_semantics: short
    description: Street address
  nv_brewery_city:
    type: string
    string_semantics: short
    description: City name
  nv_brewery_state:
    type: string
    string_semantics: short
    description: US state or international equivalent
  nv_brewery_postal_code:
    type: string
    string_semantics: short
    description: ZIP or postal code
  nv_brewery_country:
    type: string
    string_semantics: short
    description: Country name
  nv_brewery_longitude:
    type: string
    string_semantics: short
    description: Geographic longitude coordinate as string
  nv_brewery_latitude:
    type: string
    string_semantics: short
    description: Geographic latitude coordinate as string
  nv_brewery_phone:
    type: string
    string_semantics: short
    description: Contact phone number
  nv_brewery_website_url:
    type: string
    string_semantics: short
    description: Official website URL
  nv_brewery_query_by_city:
    type: string
    string_semantics: short
  nv_brewery_query_by_state:
    type: string
    string_semantics: short
  nv_brewery_query_by_postal:
    type: string
    string_semantics: short
  nv_brewery_query_by_country:
    type: string
    string_semantics: short
  nv_brewery_query_by_type:
    type: select
    allowed_values:
    - micro
    - nano
    - regional
    - brewpub
    - large
    - planning
    - bar
    - contract
    - proprietor
    - closed
  nv_brewery_query_by_name:
    type: string
    string_semantics: short
  nv_brewery_query_by_ids:
    type: string
    string_semantics: short
  nv_brewery_query_sort:
    type: string
    string_semantics: short
  nv_brewery_search_query:
    type: string
    string_semantics: short
  nv_brewery_autocomplete_query:
    type: string
    string_semantics: short
  nv_brewery_random_size:
    type: integer
