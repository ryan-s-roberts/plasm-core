version: 1
http_backend: https://YOUR_ACCOUNT.fibery.io

schema_overlay:
  source:
    capability: schema_query
  projection:
    mode: per_scope_entity
    items_path:
      - result
      - fibery/types
  entity:
    from_template: Record
    name:
      template: "{{ row['fibery/name'] | join_sanitize('__', '/') }}"
    expression_aliases:
      - template: "{{ row['fibery/name'] }}"
    scope_key:
      template: "{{ row['fibery/name'] }}"
    static_fields:
      database:
        template: "{{ row['fibery/name'] }}"
        value_ref: nv_fibery_database_name
    dynamic_fields:
      from:
        kind: array
        path:
          - fibery/fields
      skip:
        wire_name_path:
          - fibery/name
        values_in:
          - fibery/id
          - fibery/public-id
      wire_name_path:
        - fibery/name
      wire_type_path:
        - fibery/type
      name:
        template: "{{ field['fibery/name'] | sanitize_identifier }}"
      type_map:
        fibery/text: nv_wire_str_short
        fibery/bool: nv_wire_bool
        fibery/int: nv_wire_int
        fibery/decimal: nv_wire_num
        fibery/date-time: nv_wire_date_rfc3339
        fibery/date-range: nv_fibery_payload_json
        fibery/uuid: nv_fibery_id
      default: nv_fibery_payload_json
      extract:
        kind: top_level_key
  decode:
    scope:
      params:
        - database
      key:
        template: "{{ ambient.database }}"
    capabilities:
      - entity_query
      - entity_get
auth:
  scheme: api_key_header
  header: Authorization
  env: FIBERY_API_TOKEN
entities:
  Space:
    id_field: name
    description: A Fibery space (API app) grouping databases and views for one process area.
    fields:
      name:
        required: true
        value_ref: nv_fibery_space_name
    relations:
      databases:
        description: Databases belonging to this space
        target: Database
        cardinality: many
        materialize:
          kind: query_scoped
          capability: schema_query
          param: space_name
  Database:
    id_field: qualified_name
    description: A Fibery database (API type) from workspace schema metadata.
    fields:
      qualified_name:
        required: true
        value_ref: nv_fibery_database_name
        path:
          - fibery/name
      type_id:
        required: false
        value_ref: nv_fibery_id
        path:
          - fibery/id
      space_name:
        required: false
        value_ref: nv_fibery_space_name
    relations:
      fields:
        description: Field definitions for this database
        target: Field
        cardinality: many
        materialize:
          kind: query_scoped
          capability: schema_detail_query
          param: database
      records:
        description: Rows in this database
        target: Record
        cardinality: many
        materialize:
          kind: query_scoped
          capability: entity_query
          param: database
  Field:
    id_field: id
    description: A field definition on a Fibery database.
    fields:
      id:
        required: true
        value_ref: nv_fibery_id
        path:
          - fibery/id
      name:
        required: false
        value_ref: nv_fibery_field_name
        path:
          - fibery/name
      field_type:
        required: false
        value_ref: nv_fibery_field_type
        path:
          - fibery/type
      database:
        required: false
        value_ref: nv_fibery_database_name
  Record:
    id_field: id
    key_vars:
      - database
      - id
    description: Generic Fibery database row; runtime overlay adds typed entities per database.
    primary_read: entity_get
    fields:
      id:
        required: true
        value_ref: nv_fibery_id
        path:
          - fibery/id
      public_id:
        required: false
        value_ref: nv_fibery_public_id
        path:
          - fibery/public-id
      database:
        required: true
        value_ref: nv_fibery_database_name
      payload:
        required: false
        value_ref: nv_fibery_payload_json
      document:
        required: false
        value_ref: nv_fibery_document_markdown
        agent_presentation: reference_only
  User:
    id_field: id
    description: A Fibery workspace member.
    fields:
      id:
        required: true
        value_ref: nv_fibery_id
        path:
          - fibery/id
      name:
        required: false
        value_ref: nv_fibery_user_name
        path:
          - user/name
      email:
        required: false
        value_ref: nv_fibery_user_email
        path:
          - user/email
      role:
        required: false
        value_ref: nv_wire_str_short
        path:
          - user/role
      admin:
        required: false
        value_ref: nv_wire_bool
        path:
          - user/admin?
  File:
    id_field: id
    description: A Fibery file entity backed by object storage.
    fields:
      id:
        required: true
        value_ref: nv_fibery_id
        path:
          - fibery/id
      name:
        required: false
        value_ref: nv_fibery_file_name
        path:
          - fibery/name
      secret:
        required: false
        value_ref: nv_fibery_file_secret
        path:
          - fibery/secret
      content_type:
        required: false
        value_ref: nv_fibery_file_content_type
        path:
          - fibery/content-type
      content_length:
        required: false
        value_ref: nv_fibery_file_content_length
        path:
          - fibery/content-length
  View:
    id_field: id
    description: A saved Fibery view (board, grid, document, timeline, etc.).
    fields:
      id:
        required: true
        value_ref: nv_fibery_id
        path:
          - fibery/id
      name:
        required: false
        value_ref: nv_fibery_view_name
        path:
          - fibery/name
      view_type:
        required: false
        value_ref: nv_fibery_view_type
        path:
          - fibery/type
      space_name:
        required: false
        value_ref: nv_fibery_space_name
      public_id:
        required: false
        value_ref: nv_fibery_public_id
        path:
          - fibery/public-id
  Webhook:
    id_field: id
    description: A webhook subscription for database change notifications.
    fields:
      id:
        required: true
        value_ref: nv_fibery_webhook_id
      url:
        required: false
        value_ref: nv_fibery_webhook_url
      database:
        required: false
        value_ref: nv_fibery_database_name
        path:
          - type
      state:
        required: false
        value_ref: nv_fibery_webhook_state
  SearchResult:
    id_field: id
    description: A ranked workspace search hit (entity or view).
    fields:
      id:
        required: true
        value_ref: nv_fibery_id
      public_id:
        required: false
        value_ref: nv_fibery_public_id
        path:
          - publicId
      title:
        required: false
        value_ref: nv_wire_str_short
      score:
        required: false
        value_ref: nv_wire_num
      kind:
        required: false
        value_ref: nv_fibery_search_kind
      space:
        required: false
        value_ref: nv_fibery_space_name
  HistoryEvent:
    id_field: id
    description: A workspace history audit entry for entity or schema changes.
    fields:
      id:
        required: true
        value_ref: nv_fibery_history_id
      action:
        required: false
        value_ref: nv_fibery_history_action
      date:
        required: false
        value_ref: nv_wire_date_rfc3339
      database:
        required: false
        value_ref: nv_fibery_database_name
        path:
          - type
          - name
      entity_name:
        required: false
        value_ref: nv_wire_str_short
        path:
          - entity
          - name
      url:
        required: false
        value_ref: nv_wire_str_short
  DatabaseContext:
    id_field: database
    description: Schema fields plus a sample of rows for one database.
    domain_projection_examples: true
    fields:
      database:
        required: true
        value_ref: nv_fibery_database_name
      field_count:
        required: false
        value_ref: nv_wire_int
      sample_count:
        required: false
        value_ref: nv_wire_int
  RecordWithDocument:
    id_field: id
    description: One entity row with its rich-text document body loaded.
    fields:
      id:
        required: true
        value_ref: nv_fibery_id
      public_id:
        required: false
        value_ref: nv_fibery_public_id
      database:
        required: true
        value_ref: nv_fibery_database_name
      payload:
        required: false
        value_ref: nv_fibery_payload_json
      document:
        required: false
        value_ref: nv_fibery_document_markdown
        agent_presentation: reference_only
capabilities:
  schema_query:
    description: List workspace databases from schema metadata.
    kind: query
    entity: Database
    parameters:
      - name: space_name
        value_ref: nv_fibery_space_name
        required: false
        role: scope
  schema_detail_query:
    description: Get field definitions for one database from schema metadata.
    kind: query
    entity: Field
    parameters:
      - name: database
        value_ref: nv_fibery_database_name
        required: true
        role: scope
      - name: input
        value_ref: nv_fibery_command_input_json
        required: false
  user_get_me:
    description: Get the authenticated Fibery user profile.
    kind: singleton
    entity: User
  entity_query:
    description: Query rows in a database with Fibery query DSL.
    kind: query
    entity: Record
    parameters:
      - name: database
        value_ref: nv_fibery_database_name
        required: true
        role: scope
      - name: input
        value_ref: nv_fibery_command_input_json
        required: false
  entity_get:
    description: Get one row by fibery/id within a database.
    kind: get
    entity: Record
    provides:
      - id
      - public_id
      - database
      - payload
    parameters:
      - name: database
        value_ref: nv_fibery_database_name
        required: true
        role: scope
  entity_create:
    description: Create a row in a database.
    kind: create
    entity: Record
    provides:
      - id
      - public_id
      - database
      - payload
    parameters:
      - name: database
        value_ref: nv_fibery_database_name
        required: true
      - name: input
        value_ref: nv_fibery_payload_json
        required: true
  entity_update:
    description: Update fields on an existing row.
    kind: update
    entity: Record
    provides:
      - id
      - database
      - payload
    parameters:
      - name: database
        value_ref: nv_fibery_database_name
        required: true
      - name: id
        value_ref: nv_fibery_id
        required: true
      - name: input
        value_ref: nv_fibery_payload_json
        required: true
  entity_delete:
    description: Delete a row by fibery/id.
    kind: delete
    entity: Record
  entity_upsert:
    description: Batch create-or-update rows with conflict resolution.
    kind: action
    entity: Record
    output:
      type: side_effect
      description: Creates or updates rows via fibery.entity.batch/create-or-update; returns per-row create, skip, or update outcomes.
    parameters:
      - name: database
        value_ref: nv_fibery_database_name
        required: true
      - name: input
        value_ref: nv_fibery_command_input_json
        required: true
  entity_search:
    description: Full-text search workspace entities and views by keyword.
    kind: search
    entity: SearchResult
    parameters:
      - name: query
        value_ref: nv_fibery_search_query
        required: true
      - name: database
        value_ref: nv_fibery_database_name
        required: false
      - name: limit
        value_ref: nv_wire_int
        required: false
        role: response_control
  search_history:
    description: Search workspace change history with filters and pagination.
    kind: query
    entity: HistoryEvent
    parameters:
      - name: input
        value_ref: nv_fibery_command_input_json
        required: false
      - name: limit
        value_ref: nv_wire_int
        required: false
        role: response_control
  document_get:
    description: Load rich-text document content for a collaborative document secret.
    kind: get
    entity: Record
    provides:
      - document
    parameters:
      - name: secret
        value_ref: nv_fibery_document_secret
        required: true
      - name: format
        value_ref: nv_fibery_document_format
        required: false
  document_set:
    description: Replace rich-text document content.
    kind: action
    entity: Record
    output:
      type: side_effect
      description: Overwrites the collaborative document body for the given secret.
    parameters:
      - name: secret
        value_ref: nv_fibery_document_secret
        required: true
      - name: content
        value_ref: nv_fibery_document_markdown
        required: true
      - name: format
        value_ref: nv_fibery_document_format
        required: false
  document_append:
    description: Append content to a rich-text document.
    kind: action
    entity: Record
    output:
      type: side_effect
      description: Appends markdown or HTML to the collaborative document body.
    parameters:
      - name: secret
        value_ref: nv_fibery_document_secret
        required: true
      - name: content
        value_ref: nv_fibery_document_markdown
        required: true
      - name: format
        value_ref: nv_fibery_document_format
        required: false
  collection_add:
    description: Add items to an entity collection field.
    kind: action
    entity: Record
    output:
      type: side_effect
      description: Adds related entity ids to a collection field on the target row.
    parameters:
      - name: database
        value_ref: nv_fibery_database_name
        required: true
      - name: id
        value_ref: nv_fibery_id
        required: true
      - name: input
        value_ref: nv_fibery_command_input_json
        required: true
  collection_remove:
    description: Remove items from an entity collection field.
    kind: action
    entity: Record
    output:
      type: side_effect
      description: Removes related entity ids from a collection field on the target row.
    parameters:
      - name: database
        value_ref: nv_fibery_database_name
        required: true
      - name: id
        value_ref: nv_fibery_id
        required: true
      - name: input
        value_ref: nv_fibery_command_input_json
        required: true
  workflow_state_set:
    description: Move a row to a workflow state.
    kind: action
    entity: Record
    output:
      type: side_effect
      description: Updates workflow/state on the target row.
    parameters:
      - name: database
        value_ref: nv_fibery_database_name
        required: true
      - name: id
        value_ref: nv_fibery_id
        required: true
      - name: input
        value_ref: nv_fibery_payload_json
        required: true
  schema_batch:
    description: Run one or more schema mutation commands in a batch.
    kind: action
    entity: Database
    output:
      type: side_effect
      description: Applies fibery.schema/batch commands (types, fields, mixins).
    parameters:
      - name: input
        value_ref: nv_fibery_command_input_json
        required: true
  space_create:
    description: Create a new Fibery space.
    kind: create
    entity: Space
    provides:
      - name
    parameters:
      - name: input
        value_ref: nv_fibery_command_input_json
        required: true
  space_delete:
    description: Delete a Fibery space.
    kind: delete
    entity: Space
  database_create:
    description: Create a database in a space via schema batch.
    kind: create
    entity: Database
    provides:
      - qualified_name
      - type_id
    parameters:
      - name: input
        value_ref: nv_fibery_command_input_json
        required: true
  database_rename:
    description: Rename a database (schema type).
    kind: update
    entity: Database
    provides:
      - qualified_name
    parameters:
      - name: qualified_name
        value_ref: nv_fibery_database_name
        required: true
      - name: input
        value_ref: nv_fibery_command_input_json
        required: true
  database_delete:
    description: Delete a database and optionally its rows.
    kind: delete
    entity: Database
  field_create_primitive:
    description: Add a primitive field to a database.
    kind: create
    entity: Field
    provides:
      - id
      - name
      - field_type
      - database
    parameters:
      - name: database
        value_ref: nv_fibery_database_name
        required: true
      - name: input
        value_ref: nv_fibery_command_input_json
        required: true
  field_create_relation:
    description: Add a relation field to a database.
    kind: create
    entity: Field
    provides:
      - id
      - name
      - field_type
      - database
    parameters:
      - name: database
        value_ref: nv_fibery_database_name
        required: true
      - name: input
        value_ref: nv_fibery_command_input_json
        required: true
  field_create_select:
    description: Add a single- or multi-select field to a database.
    kind: create
    entity: Field
    provides:
      - id
      - name
      - field_type
      - database
    parameters:
      - name: database
        value_ref: nv_fibery_database_name
        required: true
      - name: input
        value_ref: nv_fibery_command_input_json
        required: true
  field_update_select:
    description: Update select field options or metadata.
    kind: update
    entity: Field
    parameters:
      - name: id
        value_ref: nv_fibery_id
        required: true
      - name: database
        value_ref: nv_fibery_database_name
        required: true
      - name: input
        value_ref: nv_fibery_command_input_json
        required: true
  field_create_workflow:
    description: Add a workflow state field to a database.
    kind: create
    entity: Field
    provides:
      - id
      - name
      - field_type
      - database
    parameters:
      - name: database
        value_ref: nv_fibery_database_name
        required: true
      - name: input
        value_ref: nv_fibery_command_input_json
        required: true
  field_delete:
    description: Delete a field from a database.
    kind: delete
    entity: Field
  view_query:
    description: List saved views with optional filters.
    kind: query
    entity: View
    parameters:
      - name: input
        value_ref: nv_fibery_command_input_json
        required: false
  view_create:
    description: Create a saved view in a space.
    kind: create
    entity: View
    provides:
      - id
      - name
      - view_type
      - public_id
    parameters:
      - name: input
        value_ref: nv_fibery_command_input_json
        required: true
  view_update:
    description: Update view name, config, or content.
    kind: update
    entity: View
    parameters:
      - name: id
        value_ref: nv_fibery_id
        required: true
      - name: input
        value_ref: nv_fibery_command_input_json
        required: true
  view_delete:
    description: Delete one or more saved views.
    kind: delete
    entity: View
  view_fetch_data:
    description: Execute a saved view query and return its entity rows.
    kind: action
    entity: View
    provides:
      - id
      - public_id
    parameters:
      - name: public_id
        value_ref: nv_fibery_public_id
        required: true
      - name: input
        value_ref: nv_fibery_command_input_json
        required: false
  webhook_query:
    description: List registered webhooks and recent delivery runs.
    kind: query
    entity: Webhook
  webhook_create:
    description: Register a webhook for a database.
    kind: create
    entity: Webhook
    provides:
      - id
      - url
      - database
      - state
    parameters:
      - name: url
        value_ref: nv_fibery_webhook_url
        required: true
      - name: database
        value_ref: nv_fibery_database_name
        required: true
  webhook_delete:
    description: Delete a webhook subscription.
    kind: delete
    entity: Webhook
  file_upload_from_url:
    description: Import a file from a remote URL into Fibery storage.
    kind: create
    entity: File
    provides:
      - id
      - name
      - secret
      - content_type
      - content_length
    parameters:
      - name: url
        value_ref: nv_fibery_file_source_url
        required: true
      - name: name
        value_ref: nv_fibery_file_name
        required: false
      - name: input
        value_ref: nv_fibery_command_input_json
        required: false
  file_download:
    description: Download file bytes by storage secret.
    kind: action
    entity: File
    output:
      type: side_effect
      description: Streams raw file bytes for the given fibery/secret; not mapped onto entity fields.
    parameters:
      - name: secret
        value_ref: nv_fibery_file_secret
        required: true
  file_sign_urls:
    description: Mint temporary signed download URLs for file secrets.
    kind: action
    entity: File
    provides:
      - secret
    parameters:
      - name: input
        value_ref: nv_fibery_command_input_json
        required: true
  file_attach:
    description: Attach a file entity to a row collection field.
    kind: action
    entity: Record
    output:
      type: side_effect
      description: Adds file entity ids to a files collection field on the target row.
    parameters:
      - name: database
        value_ref: nv_fibery_database_name
        required: true
      - name: id
        value_ref: nv_fibery_id
        required: true
      - name: input
        value_ref: nv_fibery_command_input_json
        required: true
  database_context_query:
    description: Composed field schema and sample rows for one database.
    kind: query
    entity: DatabaseContext
    parameters:
      - name: database
        value_ref: nv_fibery_database_name
        required: true
        role: scope
  database_context_get:
    description: Get composed database context for one database.
    kind: get
    entity: DatabaseContext
    parameters:
      - name: database
        value_ref: nv_fibery_database_name
        required: true
        role: scope
  entity_with_document_get:
    description: Get one entity row with rich-text document content loaded.
    kind: get
    entity: RecordWithDocument
    parameters:
      - name: database
        value_ref: nv_fibery_database_name
        required: true
        role: scope
      - name: id
        value_ref: nv_fibery_id
        required: true
      - name: document_secret
        value_ref: nv_fibery_document_secret
        required: true
views:
  database_context:
    description: Field schema and a sample of rows for one database.
    capability: database_context_query
    entity: DatabaseContext
    scope:
      - name: database
        value_ref: nv_fibery_database_name
        required: true
    nodes:
      - id: fields
        capability: schema_detail_query
        bind:
          database:
            kind: scope
            param: database
      - id: sample
        capability: entity_query
        bind:
          database:
            kind: scope
            param: database
    output:
      database:
        kind: scope
        param: database
      field_count:
        kind: node_row_count
        node: fields
      sample_count:
        kind: node_row_count
        node: sample
  entity_with_document:
    description: One entity row with rich-text document content loaded.
    capability: entity_with_document_get
    entity: RecordWithDocument
    scope:
      - name: database
        value_ref: nv_fibery_database_name
        required: true
      - name: id
        value_ref: nv_fibery_id
        required: true
      - name: document_secret
        value_ref: nv_fibery_document_secret
        required: true
    nodes:
      - id: entity_row
        capability: entity_get
        bind:
          database:
            kind: scope
            param: database
          id:
            kind: scope
            param: id
      - id: document_row
        capability: document_get
        bind:
          secret:
            kind: scope
            param: document_secret
    output:
      id:
        kind: node_field
        node: entity_row
        field: id
      public_id:
        kind: node_field
        node: entity_row
        field: public_id
      database:
        kind: scope
        param: database
      payload:
        kind: node_field
        node: entity_row
        field: payload
      document:
        kind: node_field
        node: document_row
        field: document
values:
  nv_fibery_id:
    type: string
    string_semantics: short
    description: Fibery UUID identifier
  nv_fibery_public_id:
    type: string
    string_semantics: short
    description: Fibery public id (numeric string in UI)
  nv_fibery_database_name:
    type: string
    string_semantics: short
    description: Qualified database name Space/Name
  nv_fibery_payload_json:
    type: json
    description: Fibery entity field map or unmapped row payload
  nv_fibery_command_input_json:
