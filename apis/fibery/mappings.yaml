  method: GET
  path:
    - type: literal
      value: api
    - type: literal
      value: documents
    - type: var
      name: secret
  query:
    type: object
    fields:
      - - format
        - type: if
          condition:
            type: exists
            var: format
          then_expr:
            type: var
            name: format
          else_expr:
            type: const
            value: md
  response: single

document_set:
  method: PUT
  path:
    - type: literal
      value: api
    - type: literal
      value: documents
    - type: var
      name: secret
  query:
    type: object
    fields:
      - - format
        - type: if
          condition:
            type: exists
            var: format
          then_expr:
            type: var
            name: format
          else_expr:
            type: const
            value: md
  body:
    type: var
    name: content
  response: single

document_append:
  method: POST
  path:
    - type: literal
      value: api
    - type: literal
      value: documents
    - type: literal
      value: commands
  query:
    type: object
    fields:
      - - format
        - type: if
          condition:
            type: exists
            var: format
          then_expr:
            type: var
            name: format
          else_expr:
            type: const
            value: md
  body:
    type: object
    fields:
      - - command
        - type: const
          value: append-to-documents
      - - args
        - type: object
          fields:
            - - secret
              - type: var
                name: secret
            - - content
              - type: var
                name: content
  response: single

