# Fibery HTTP API — CML mappings. Semantic model is in domain.yaml.
#
# Base URL: https://YOUR_ACCOUNT.fibery.io (per-account host; set via --backend).
# Auth: api_key_header — token sent verbatim as Authorization (Fibery expects "Token …" prefix in the token value).
#
# Command envelope: POST /api/commands with { "command": "…", "args": {…} } unless noted.
# Views use JSON-RPC at /api/views/json-rpc. History and search use dedicated REST paths.

# ── Discovery ────────────────────────────────────────────────────────────────

schema_query:
  method: POST
  path:
    - type: literal
      value: api
    - type: literal
      value: commands
  body:
    type: object
    fields:
      - - command
        - type: const
          value: fibery.schema/query
      - - args
        - type: if
          condition:
            type: exists
            var: input
          then_expr:
            type: var
            name: input
          else_expr:
            type: object
            fields:
              - - "with-description?"
                - type: const
                  value: false
  response:
    items: result
    items_path:
      - result
      - fibery/types

schema_detail_query:
  method: POST
  path:
    - type: literal
      value: api
    - type: literal
      value: commands
  body:
    type: object
    fields:
      - - command
        - type: const
          value: fibery.schema/query
      - - args
        - type: if
          condition:
            type: exists
            var: input
          then_expr:
            type: var
            name: input
          else_expr:
            type: object
            fields:
              - - "with-description?"
                - type: const
                  value: false
  response:
    items: result
    items_path:
      - result
      - fibery/types
      - "0"
      - fibery/fields

user_get_me:
  method: POST
  path:
    - type: literal
      value: api
    - type: literal
      value: commands
  body:
    type: object
    fields:
      - - command
        - type: const
          value: fibery.entity/query
      - - args
        - type: object
          fields:
            - - query
              - type: object
                fields:
                  - - q/from
                    - type: const
                      value: fibery/user
                  - - q/select
                    - type: const
                      value:
                        - fibery/id
                        - user/name
                        - user/email
                        - user/role
                        - "user/admin?"
                  - - q/where
                    - type: const
                      value:
                        - "="
                        - - fibery/id
                        - $my-id
                  - - q/limit
                    - type: const
                      value: 1
  response:
    items: result
    single: true

# ── Entities ─────────────────────────────────────────────────────────────────

entity_query:
  method: POST
  path:
    - type: literal
      value: api
    - type: literal
      value: commands
  body:
    type: object
    fields:
      - - command
        - type: const
          value: fibery.entity/query
      - - args
        - type: if
          condition:
            type: exists
            var: input
          then_expr:
            type: var
            name: input
          else_expr:
            type: object
            fields:
              - - query
                - type: object
                  fields:
                    - - q/from
                      - type: var
                        name: database
                    - - q/select
                      - type: const
                        value:
                          - fibery/id
                          - fibery/public-id
                    - - q/limit
                      - type: const
                        value: 100
  response:
    items: result

entity_get:
  method: POST
  path:
    - type: literal
      value: api
    - type: literal
      value: commands
  body:
    type: object
    fields:
      - - command
        - type: const
          value: fibery.entity/query
      - - args
        - type: object
          fields:
            - - query
              - type: object
                fields:
                  - - q/from
                    - type: var
                      name: database
                  - - q/select
                    - type: const
                      value: ["fibery/id", "fibery/public-id"]
                  - - q/where
                    - type: const
                      value: ["=", ["fibery/id"], "$entity-id"]
                  - - q/limit
                    - type: const
                      value: 1
            - - params
              - type: object
                fields:
                  - - $entity-id
                    - type: var
                      name: id
  response:
    items: result
    single: true

