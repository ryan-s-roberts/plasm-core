    - type: literal
      value: search
  body:
    type: if
    condition:
      type: exists
      var: input
    then_expr:
      type: var
      name: input
    else_expr:
      type: object
      fields:
        - - where
          - type: const
            value: []
        - - limit
          - type: if
            condition:
              type: exists
              var: limit
            then_expr:
              type: var
              name: limit
            else_expr:
              type: const
              value: 50
  response:
    items: items

