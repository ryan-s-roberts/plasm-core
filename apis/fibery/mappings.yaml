      - - database
        - type: if
          condition:
            type: exists
            var: database
          then_expr:
            type: var
            name: database
          else_expr:
            type: const
            value: null
      - - limit
        - type: if
          condition:
            type: exists
            var: limit
          then_expr:
            type: var
            name: limit
          else_expr:
            type: const
            value: 20
  response:
