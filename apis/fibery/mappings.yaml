# ── Views (JSON-RPC) ─────────────────────────────────────────────────────────

view_query:
  method: POST
  path:
    - type: literal
      value: api
    - type: literal
      value: views
    - type: literal
      value: json-rpc
  body:
    type: if
    condition:
      type: exists
      var: input
    then_expr:
      type: var
      name: input
    else_expr:
      type: object
      fields:
        - - jsonrpc
          - type: const
            value: "2.0"
        - - method
          - type: const
            value: query-views
        - - params
          - type: object
            fields: []
  response:
    items: result
    items_path:
      - result
      - views

view_create:
  method: POST
  path:
    - type: literal
      value: api
    - type: literal
      value: views
