  path:
    - type: literal
      value: api
  body:
    type: object
    fields:
      - - query
        - type: const
          value: 'mutation($input: CreatePostInput!){ createPost(input: $input) { id title body } }'
      - - variables
        - type: object
          fields:
            - - input
              - type: object
                fields:
                  - - title
                    - type: var
                      name: title
                  - - body
