# GraphQL over HTTP — `transport: graphql` (POST JSON with `query` / `variables`).
# List endpoints use `PageQueryOptions` (`variables.o.paginate.{page,limit}`); pagination is merged via `body_merge_path`.

user_query:
  transport: graphql
  method: POST
  path:
    - type: literal
      value: api
  body:
    type: object
    fields:
      - - query
        - type: const
          value: 'query($o: PageQueryOptions){ users(options: $o) { data { id name username email } meta { totalCount } } }'
      - - variables
        - type: object
          fields:
            - - o
              - type: object
                fields: []
  response:
    items_path: [data, users, data]
  pagination:
    location: body
    body_merge_path: [variables, o, paginate]
    params:
      page: {counter: 1}
      limit: {fixed: 20}

user_get:
  transport: graphql
  method: POST
  path:
    - type: literal
      value: api
  body:
    type: object
    fields:
      - - query
        - type: const
          value: 'query($id: ID!){ user(id: $id) { id name username email phone website } }'
      - - variables
        - type: object
          fields:
            - - id
              - type: var
                name: id
  response:
    single: true
    items_path: [data, user]

