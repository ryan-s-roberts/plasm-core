version: 1
auth:
  scheme: none
http_backend: https://graphqlzero.almansi.network
entities:
  User:
    id_field: id
    description: A user account (GraphQLZero / JSONPlaceholder).
    fields:
      id:
        required: true
        value_ref: nv_user_id
      name:
        required: false
        value_ref: nv_user_name
      username:
        required: false
        value_ref: nv_user_username
      email:
        required: false
        value_ref: nv_user_email
      phone:
        required: false
        value_ref: nv_user_phone
      website:
        required: false
        value_ref: nv_user_website
    relations:
      posts:
        target: Post
        cardinality: many
        description: Posts authored by this user.
      albums:
        target: Album
        cardinality: many
        description: Albums owned by this user.
      todos:
        target: Todo
        cardinality: many
        description: Todos for this user.
  Post:
    id_field: id
    description: A blog post.
    fields:
      id:
        required: true
        value_ref: nv_post_id
      title:
        required: false
        value_ref: nv_post_title
      body:
        required: false
        value_ref: nv_post_body
    relations:
      user:
        target: User
        cardinality: one
        description: Author of the post.
      comments:
        target: Comment
        cardinality: many
        description: Comments on this post.
  Comment:
    id_field: id
    description: A comment on a post.
    fields:
      id:
        required: true
        value_ref: nv_comment_id
      name:
        required: false
        value_ref: nv_comment_name
      email:
        required: false
        value_ref: nv_comment_email
      body:
        required: false
        value_ref: nv_comment_body
    relations:
      post:
        target: Post
        cardinality: one
        description: Post this comment belongs to.
  Todo:
    id_field: id
    description: A todo item for a user.
    fields:
      id:
        required: true
        value_ref: nv_todo_id
      title:
        required: false
        value_ref: nv_todo_title
      completed:
        required: false
        value_ref: nv_todo_completed
    relations:
      user:
        target: User
        cardinality: one
        description: User this todo belongs to.
  Album:
    id_field: id
    description: A photo album owned by a user.
    fields:
      id:
        required: true
        value_ref: nv_album_id
      title:
        required: false
        value_ref: nv_album_title
    relations:
      user:
        target: User
        cardinality: one
        description: Owner of the album.
      photos:
        target: Photo
        cardinality: many
        description: Photos in this album.
  Photo:
    id_field: id
    description: A photo in an album.
    fields:
      id:
        required: true
        value_ref: nv_photo_id
      title:
        required: false
        value_ref: nv_photo_title
      url:
        required: false
        value_ref: nv_photo_url
      thumbnailUrl:
        required: false
        value_ref: nv_photo_thumbnail_url
    relations:
      album:
        target: Album
        cardinality: one
        description: Album containing this photo.
capabilities:
  user_query:
    kind: query
    entity: User
    description: List users (paginated list; use --summary to skip per-row user_get hydration).
    provides:
    - id
    - name
    - username
    - email
  user_get:
    kind: get
    entity: User
    description: Fetch one user by id.
    provides:
    - id
    - name
    - username
    - email
    - phone
    - website
  post_query:
    kind: query
    entity: Post
    description: List posts (paginated; use --summary when you only need list fields).
    provides:
    - id
    - title
    - body
  post_get:
    kind: get
    entity: Post
    description: Fetch one post by id (includes author summary for relation navigation).
    provides:
    - id
    - title
    - body
  comment_query:
    kind: query
    entity: Comment
    description: List comments (paginated).
    provides:
    - id
    - name
    - email
    - body
  comment_get:
    kind: get
    entity: Comment
    description: Fetch one comment by id.
    provides:
    - id
    - name
    - email
    - body
  todo_query:
    kind: query
    entity: Todo
    description: List todos (paginated).
    provides:
    - id
    - title
    - completed
  todo_get:
    kind: get
    entity: Todo
    description: Fetch one todo by id.
    provides:
    - id
    - title
    - completed
  album_query:
    kind: query
    entity: Album
    description: List albums (paginated).
    provides:
    - id
    - title
  album_get:
    kind: get
    entity: Album
    description: Fetch one album by id.
    provides:
    - id
    - title
  photo_query:
    kind: query
    entity: Photo
    description: List photos (paginated).
    provides:
    - id
    - title
    - url
    - thumbnailUrl
  photo_get:
    kind: get
    entity: Photo
    description: Fetch one photo by id.
    provides:
    - id
    - title
    - url
    - thumbnailUrl
  post_create:
    kind: create
    entity: Post
    description: Create a new post (shared demo dataset — visible to all clients).
    provides:
    - id
    - title
    - body
    parameters:
    - name: title
      value_ref: nv_post_create_title
      required: true
    - name: body
      value_ref: nv_post_create_body
      required: true
  post_update:
    kind: update
    entity: Post
    description: Update an existing post (shared demo dataset).
    provides:
    - id
    - title
    - body
    parameters:
    - name: title
      value_ref: nv_post_update_title
      required: false
    - name: body
      value_ref: nv_post_update_body
      required: false
  post_delete:
    kind: delete
    entity: Post
    description: Delete a post by id (shared demo dataset).
values:
  nv_user_id:
    type: string
    string_semantics: short
    description: User identifier.
  nv_user_name:
    type: string
    string_semantics: short
  nv_user_username:
    type: string
    string_semantics: short
  nv_user_email:
    type: string
    string_semantics: short
  nv_user_phone:
    type: string
    string_semantics: short
  nv_user_website:
    type: string
    string_semantics: short
  nv_post_id:
    type: string
    string_semantics: short
    description: Post identifier.
  nv_post_title:
    type: string
    string_semantics: short
  nv_post_body:
    type: string
    string_semantics: markdown
  nv_comment_id:
    type: string
    string_semantics: short
  nv_comment_name:
    type: string
    string_semantics: short
  nv_comment_email:
    type: string
    string_semantics: short
  nv_comment_body:
    type: string
    string_semantics: markdown
  nv_todo_id:
    type: string
    string_semantics: short
  nv_todo_title:
    type: string
    string_semantics: short
  nv_todo_completed:
    type: boolean
  nv_album_id:
    type: string
    string_semantics: short
  nv_album_title:
    type: string
    string_semantics: short
  nv_photo_id:
    type: string
    string_semantics: short
  nv_photo_title:
    type: string
    string_semantics: short
  nv_photo_url:
    type: string
    string_semantics: short
  nv_photo_thumbnail_url:
    type: string
    string_semantics: short
  nv_post_create_title:
    type: string
    string_semantics: short
  nv_post_create_body:
    type: string
    string_semantics: markdown
  nv_post_update_title:
    type: string
    string_semantics: short
  nv_post_update_body:
    type: string
    string_semantics: markdown
