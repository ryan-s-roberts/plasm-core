                      else_expr: { type: const, value: null } }]
  pagination:
    params:
      page:     {counter: 1}
      per_page: {fixed: 30}

repo_get:
  # GET /repos/{owner}/{repo} — second segment is the repo slug (domain field `repo`, wire `name`).
  method: GET
  path:
    - { type: literal, value: repos }
    - { type: var, name: owner }
