    type: object
    fields:
      - [visibility, { type: if, condition: { type: exists, var: visibility },
                       then_expr: { type: var, name: visibility },
                       else_expr: { type: const, value: null } }]
      - [affiliation, { type: if, condition: { type: exists, var: affiliation },
                       then_expr: { type: var, name: affiliation },
                       else_expr: { type: const, value: null } }]
      - [sort, { type: if, condition: { type: exists, var: sort },
