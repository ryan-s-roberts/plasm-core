# ── Issue ────────────────────────────────────────────────────────────────────

issue_get:
  # GET /repos/{owner}/{repo}/issues/{number}
  # key_vars [owner, repo, number] are injected into CML env from the compound Ref.
  # The runtime also pre-injects them into the response JSON so the decoder can
  # reconstruct the compound Ref from the response body.
  method: GET
  path:
    - { type: literal, value: repos }
    - { type: var, name: owner }
    - { type: var, name: repo }
    - { type: literal, value: issues }
    - { type: var, name: number }
  response: single

issue_query:
  method: GET
  path:
    - { type: literal, value: repos }
    - { type: var, name: owner }
    - { type: var, name: repo }
    - { type: literal, value: issues }
  response: bare_list
  query:
    type: object
    fields:
      - [state, { type: if, condition: { type: exists, var: state },
                  then_expr: { type: var, name: state },
                  else_expr: { type: const, value: null } }]
      - [assignee, { type: if, condition: { type: exists, var: assignee },
                     then_expr: { type: var, name: assignee },
                     else_expr: { type: const, value: null } }]
      - [labels, { type: if, condition: { type: exists, var: labels },
                   then_expr: { type: var, name: labels },
                   else_expr: { type: const, value: null } }]
      - [milestone, { type: if, condition: { type: exists, var: milestone },
                      then_expr: { type: var, name: milestone },
                      else_expr: { type: const, value: null } }]
      - [since, { type: if, condition: { type: exists, var: since },
                  then_expr: { type: var, name: since },
                  else_expr: { type: const, value: null } }]
      - [sort, { type: if, condition: { type: exists, var: sort },
                 then_expr: { type: var, name: sort },
                 else_expr: { type: const, value: null } }]
      - [direction, { type: if, condition: { type: exists, var: direction },
                      then_expr: { type: var, name: direction },
                      else_expr: { type: const, value: null } }]
  pagination:
    params:
      page:     {counter: 1}
      per_page: {fixed: 30}

issue_search:
  method: GET
  path:
    - { type: literal, value: search }
    - { type: literal, value: issues }
  response:
    items: items
  query:
    type: object
    fields:
      - [q, { type: var, name: q }]
      - [sort, { type: if, condition: { type: exists, var: sort },
                 then_expr: { type: var, name: sort },
                 else_expr: { type: const, value: null } }]
      - [order, { type: if, condition: { type: exists, var: order },
                  then_expr: { type: var, name: order },
                  else_expr: { type: const, value: null } }]
  pagination:
    params:
      page:     {counter: 1}
      per_page: {fixed: 30}

