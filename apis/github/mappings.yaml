# GitHub REST API — CML mappings (HTTP wiring). Domain model in domain.yaml.
#
# Base URL: GitHub REST (api.github.com origin — set the HTTPS base with --backend).
#
# Compound-key path variables (owner, repo, number) are injected into the CML
# environment automatically from Ref.key_vars when capabilities that carry a
# compound Ref are executed. Plain-scope params (owner, repo on query/search
# capabilities) resolve from the predicate environment as usual.
#
# Pagination: GitHub list endpoints use per_page + page with Link: rel=next
# header. We use offset_limit-style Counter params (page counter + fixed
# per_page) and stop on short-page heuristic since GitHub doesn't return a
# `next` URL field in the body (only in the Link header). Bare-list response
# because GitHub list endpoints return plain JSON arrays.
#
# Search endpoints return {"total_count": N, "items": [...]} — use items_list
# response preset.

# ── Repository ──────────────────────────────────────────────────────────────

repo_search:
  method: GET
  path:
    - { type: literal, value: search }
    - { type: literal, value: repositories }
  response:
    items: items
  query:
    type: object
    fields:
      - [q, { type: var, name: q }]
      - [sort, { type: if, condition: { type: exists, var: sort },
                 then_expr: { type: var, name: sort },
                 else_expr: { type: const, value: null } }]
      - [order, { type: if, condition: { type: exists, var: order },
                  then_expr: { type: var, name: order },
                  else_expr: { type: const, value: null } }]
  pagination:
    params:
      page:     {counter: 1}
      per_page: {fixed: 30}

user_repos_query:
  method: GET
  path:
    - { type: literal, value: users }
    - { type: var, name: username }
    - { type: literal, value: repos }
  response: bare_list
