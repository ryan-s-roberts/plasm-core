# GitHub REST — repos, issues, PRs, users (search, query, get, chain across graph).
#
# Goals are outcome-oriented (triage, dashboards, onboarding), not REST transcriptions.
# Light noise (“for the retro”, “while onboarding”) is intentional distractor text.
# Coverage: `cargo run -p plasm-eval -- coverage --schema apis/github --cases apis/github/eval/cases.yaml`
