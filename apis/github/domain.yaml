      body:
        required: false
        value_ref: nv_release_body
      draft:
        required: false
        value_ref: nv_release_draft
      prerelease:
        required: false
        value_ref: nv_release_prerelease
      created_at:
        required: false
        value_ref: nv_github_created_at
      published_at:
        required: false
        value_ref: nv_release_published_at
      html_url:
        required: false
        value_ref: nv_github_html_url
    relations:
      author:
        target: User
        cardinality: one
  IssueComment:
