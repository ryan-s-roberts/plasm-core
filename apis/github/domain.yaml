    description: Open a PR (head into base).
    provides:
    - id
    - owner
    - repo
    - number
    - title
    - body
    - state
    - locked
    - draft
    - merged_at
    - created_at
    - updated_at
    - closed_at
    - html_url
    scope_aggregate_key_policy: omit_when_redundant
    parameters:
    - name: repository
      value_ref: nv_github_scope_repository
      required: true
      role: scope
    - name: title
      value_ref: nv_pr_create_title
      required: true
    - name: head
      value_ref: nv_pr_create_head
      required: true
    - name: base
      value_ref: nv_pr_create_base
      required: true
    - name: body
      value_ref: nv_pr_create_body
      required: false
    - name: draft
      value_ref: nv_pr_create_draft
      required: false
    - name: maintainer_can_modify
      value_ref: nv_pr_create_maintainer_can_modify
      required: false
    - name: issue
      value_ref: nv_pr_create_issue
      required: false
  label_create:
    kind: create
    entity: Label
    description: Create a label in a repository.
    provides:
    - name
    - owner
    - repo
    - id
    - description
    - color
    - default
    scope_aggregate_key_policy: omit_when_redundant
    parameters:
    - name: repository
      value_ref: nv_github_scope_repository
      required: true
      role: scope
    - name: name
      value_ref: nv_label_create_name
      required: true
    - name: color
      value_ref: nv_label_create_color
      required: false
    - name: description
      value_ref: nv_label_create_description
      required: false
  label_update:
    kind: update
    entity: Label
    description: Update a label (name, color, or description).
    provides:
    - name
    - owner
    - repo
    - id
    - description
    - color
    - default
    scope_aggregate_key_policy: omit_when_redundant
    parameters:
    - name: new_name
      value_ref: nv_label_update_new_name
      required: false
    - name: color
      value_ref: nv_label_update_color
      required: false
    - name: description
      value_ref: nv_label_update_description
      required: false
  label_delete:
    kind: delete
    entity: Label
    description: Delete a label from a repository.
  repo_content_put:
    kind: action
    entity: Repository
    description: Create or update a file in a repository.
    scope_aggregate_key_policy: omit_when_redundant
    parameters:
    - name: repository
      value_ref: nv_github_scope_repository
      required: true
      role: scope
    - name: path
      value_ref: nv_repo_content_put_path
      required: true
    - name: message
      value_ref: nv_repo_content_put_message
      required: true
    - name: content
      value_ref: nv_repo_content_put_content
      required: true
    - name: branch
      value_ref: nv_github_branch_name
      required: false
    - name: sha
      value_ref: nv_github_git_sha
      required: false
    output:
      type: side_effect
      description: Write the file at the path.
  repo_content_delete:
    kind: action
    entity: Repository
    description: Delete a file from a repository.
    scope_aggregate_key_policy: omit_when_redundant
    parameters:
    - name: repository
      value_ref: nv_github_scope_repository
      required: true
      role: scope
    - name: path
      value_ref: nv_repo_content_delete_path
      required: true
    - name: message
      value_ref: nv_repo_content_delete_message
      required: true
    - name: sha
      value_ref: nv_github_git_sha
      required: true
    - name: branch
      value_ref: nv_github_branch_name
      required: false
    output:
      type: side_effect
      description: Remove the file at the path.
oauth:
  provider: github
  scopes:
    admin:gpg_key:
      label: Full control of GPG keys
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    admin:org:
      label: Full organization control (teams, projects, memberships)
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    admin:org_hook:
      label: Full control of organization webhooks (OAuth-created hooks)
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    admin:public_key:
      label: Full control of user SSH keys
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    admin:repo_hook:
      label: Full control of repository hooks
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    codespace:
      label: Create and manage GitHub Codespaces
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    delete:packages:
      label: Delete packages from GitHub Packages
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    delete_repo:
      label: Delete repositories you can administer
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    gist:
      label: Create and update gists
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    notifications:
      label: Notifications inbox, mark read, watch/unwatch, thread subscriptions
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    project:
      label: Read and write user and organization projects (classic)
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    public_repo:
      label: Access public repositories only (read/write on public repos and orgs)
      notes: 'Narrower than repo: only public repositories (and related public-org operations).'
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    read:audit_log:
      label: Read organization audit log data (where available)
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    read:org:
      label: Read organization membership, teams, and projects
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    read:packages:
      label: Download and install packages from GitHub Packages
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    read:project:
      label: Read-only access to user and organization projects (classic)
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    read:public_key:
      label: List and view SSH public keys
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    read:repo_hook:
      label: Read and ping repository hooks
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    read:user:
      label: Read user profile data
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    repo:
      label: Full control of private and public repositories, issues, PRs, and related org resources
      notes: Classic OAuth-app scopes (space-separated on /login/oauth/authorize). Not GitHub App installation permissions
        or fine-grained PAT permission sets.
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    repo:invite:
      label: Accept or decline repository collaboration invitations
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    repo:status:
      label: Read/write commit statuses without full code access
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    repo_deployment:
      label: View deployment statuses without full code access
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    security_events:
      label: Read and write code scanning security events
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    user:
      label: Read/write profile (includes read:user, user:email, user:follow when normalized)
      notes: 'GitHub normalizes tokens: requesting user may drop redundant read:user / user:email entries.'
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    user:email:
      label: Read user email addresses
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    user:follow:
      label: Follow and unfollow users
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    workflow:
      label: Add or update GitHub Actions workflow files (.github/workflows); often needed with repo for new workflow YAML
      notes: Required in addition to repo for many new or changed workflow files under .github/workflows (see GitHub Actions
        docs).
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    write:gpg_key:
      label: Create, list, and view GPG keys
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    write:org:
      label: Read and write organization membership and organization projects
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    write:packages:
      label: Upload and publish packages to GitHub Packages
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    write:public_key:
      label: Create, list, and view SSH public keys
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    write:repo_hook:
      label: Read, write, and ping repository hooks
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
  default_scope_sets:
    plasm_github_readonly_core:
      description: Read-only scope — repos, org, notifications, profile.
      scopes:
      - read:user
      - repo
      - read:org
      - notifications
    plasm_github_contributor_core:
      description: Edits, pushes, workflow YAML, gists, inbox.
      scopes:
      - user
      - repo
      - workflow
      - notifications
      - gist
      - read:org
    plasm_github_public_repo_focus:
