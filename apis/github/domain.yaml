        - removed
        - modified
        - renamed
        - copied
        - changed
        - unchanged
        required: false
      additions:
        field_type: integer
        required: false
      deletions:
        field_type: integer
        required: false
      patch:
        field_type: string
        string_semantics: markdown
        required: false
  User:
