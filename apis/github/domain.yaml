version: 16

http_backend: https://api.github.com

entities:
  Repository:
    id_field: id
    key_vars:
    - owner
    - repo
    description: A GitHub repository
    fields:
      id:
        field_type: integer
        required: true
      owner:
        field_type: string
        path: owner.login
        string_semantics: short
        required: false
      repo:
        field_type: string
        path: name
        string_semantics: short
        required: true
      full_name:
        field_type: string
        string_semantics: short
        required: true
      description:
        field_type: string
        string_semantics: markdown
        required: false
      private:
        field_type: boolean
        required: true
      fork:
        field_type: boolean
        required: true
      language:
        field_type: string
        string_semantics: short
        required: false
      stargazers_count:
        field_type: integer
        required: false
      forks_count:
        field_type: integer
        required: false
      open_issues_count:
        field_type: integer
        required: false
      default_branch:
        field_type: string
        string_semantics: short
        required: false
      archived:
        field_type: boolean
        required: false
      visibility:
        field_type: select
        allowed_values:
        - public
        - private
        - internal
        required: false
      created_at:
        field_type: date
        value_format: rfc3339
        required: false
      updated_at:
        field_type: date
        value_format: rfc3339
        required: false
      pushed_at:
        field_type: date
        value_format: rfc3339
        required: false
      html_url:
        field_type: string
        string_semantics: short
        required: false
    relations:
      repo_owner:
        target: User
        cardinality: one
      workflows:
        target: Workflow
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: workflow_query
          bindings:
            owner: owner
            repo: repo
      workflow_runs:
        target: WorkflowRun
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: workflow_run_query
          bindings:
            owner: owner
            repo: repo
  Issue:
    id_field: id
    key_vars:
    - owner
    - repo
    - number
    description: A GitHub issue in a repository
    fields:
      repository_url:
        field_type: string
        string_semantics: short
        required: false
      owner:
        field_type: string
        string_semantics: short
        required: true
        path: repository_url
        derive:
          type: segments_after_prefix
          prefix: https://api.github.com/repos/
          alternate_prefixes:
          - http://api.github.com/repos/
          part_index: 0
      repo:
        field_type: string
        string_semantics: short
        required: true
        path: repository_url
        derive:
          type: segments_after_prefix
          prefix: https://api.github.com/repos/
          alternate_prefixes:
          - http://api.github.com/repos/
          part_index: 1
      number:
        field_type: integer
        required: true
      id:
        field_type: integer
        required: true
      title:
        field_type: string
        string_semantics: short
        required: true
      body:
        field_type: string
        string_semantics: markdown
        required: false
      state:
        field_type: select
        allowed_values:
        - open
        - closed
        required: true
      state_reason:
        field_type: select
        allowed_values:
        - completed
        - reopened
        - not_planned
        - duplicate
        required: false
      issue_type_id:
        field_type: integer
        path: type.id
        required: false
      issue_type_node_id:
        field_type: string
        path: type.node_id
        string_semantics: short
        required: false
      issue_type_name:
        field_type: string
        path: type.name
        string_semantics: short
        required: false
      issue_type_color:
        field_type: select
        path: type.color
        allowed_values:
        - gray
        - blue
        - green
        - yellow
        - orange
        - red
        - pink
        - purple
        required: false
      issue_type_is_enabled:
        field_type: boolean
        path: type.is_enabled
        required: false
      sub_issues_total:
        field_type: integer
        path: sub_issues_summary.total
        required: false
      sub_issues_completed:
        field_type: integer
        path: sub_issues_summary.completed
        required: false
      sub_issues_percent_completed:
        field_type: number
        path: sub_issues_summary.percent_completed
        required: false
      locked:
        field_type: boolean
        required: false
      comments:
        field_type: integer
        required: false
      created_at:
        field_type: date
        value_format: rfc3339
        required: false
      updated_at:
        field_type: date
        value_format: rfc3339
        required: false
      closed_at:
        field_type: date
        value_format: rfc3339
        required: false
      html_url:
        field_type: string
        string_semantics: short
        required: false
    relations:
      user:
        target: User
        cardinality: one
      assignee:
        target: User
        cardinality: one
      milestone:
        target: Milestone
        cardinality: one
      issue_type:
        target: IssueType
        cardinality: one
      labels:
        target: Label
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: issue_label_query
          bindings:
            owner: owner
            repo: repo
            issue_number: number
      sub_issues:
        target: Issue
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: issue_sub_issue_query
          bindings:
            owner: owner
            repo: repo
            issue_number: number
  PullRequest:
    id_field: id
    key_vars:
    - owner
    - repo
    - number
    description: A pull request in a repository.
    fields:
      repository_url:
        field_type: string
        string_semantics: short
        required: false
      owner:
        field_type: string
        string_semantics: short
        required: true
        path: repository_url
        derive:
          type: segments_after_prefix
          prefix: https://api.github.com/repos/
          alternate_prefixes:
          - http://api.github.com/repos/
          part_index: 0
      repo:
        field_type: string
        string_semantics: short
        required: true
        path: repository_url
        derive:
          type: segments_after_prefix
          prefix: https://api.github.com/repos/
          alternate_prefixes:
          - http://api.github.com/repos/
          part_index: 1
      number:
        field_type: integer
        required: true
      id:
        field_type: integer
        required: true
      title:
        field_type: string
        string_semantics: short
        required: true
      body:
        field_type: string
        string_semantics: markdown
        required: false
      state:
        field_type: select
        allowed_values:
        - open
        - closed
        required: true
      locked:
        field_type: boolean
        required: false
      draft:
        field_type: boolean
        required: false
      head_ref:
        field_type: string
        path: head.ref
        string_semantics: short
        required: false
      head_sha:
        field_type: string
        path: head.sha
        string_semantics: short
        required: false
      base_ref:
        field_type: string
        path: base.ref
        string_semantics: short
        required: false
      base_sha:
        field_type: string
        path: base.sha
        string_semantics: short
        required: false
      mergeable:
        field_type: boolean
        required: false
      mergeable_state:
        field_type: string
        string_semantics: short
        required: false
      merged_at:
        field_type: date
        value_format: rfc3339
        required: false
      created_at:
        field_type: date
        value_format: rfc3339
        required: false
      updated_at:
        field_type: date
        value_format: rfc3339
        required: false
      closed_at:
        field_type: date
        value_format: rfc3339
        required: false
      html_url:
        field_type: string
        string_semantics: short
        required: false
    relations:
      user:
        target: User
        cardinality: one
      assignee:
        target: User
        cardinality: one
      milestone:
        target: Milestone
        cardinality: one
      changed_files:
        target: PullRequestFile
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: pr_file_query
          bindings:
            owner: owner
            repo: repo
            pull_number: number
      reviews:
        target: PullRequestReview
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: pr_review_query
          bindings:
            owner: owner
            repo: repo
            pull_number: number
      review_comments:
        target: PullRequestReviewComment
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: pr_review_comment_query
          bindings:
            owner: owner
            repo: repo
            pull_number: number
  Commit:
    id_field: sha
    key_vars:
    - owner
    - repo
    - sha
    description: Repo commit (owner, repo, SHA); branch/tags resolve in get.
    fields:
      owner:
        field_type: string
        string_semantics: short
        required: true
      repo:
        field_type: string
        string_semantics: short
        required: true
      sha:
        field_type: string
        string_semantics: short
        required: true
      message:
        field_type: string
        string_semantics: markdown
        required: false
        path: commit.message
      html_url:
        field_type: string
        string_semantics: short
        required: false
  Branch:
    id_field: name
    key_vars:
    - owner
    - repo
