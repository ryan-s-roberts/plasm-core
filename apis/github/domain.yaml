auth:
  scheme: bearer_token
  env: GITHUB_TOKEN
values:
  nv_github_account_login:
    type: string
    string_semantics: short
    description: GitHub user or organization login.
  nv_github_repository_name:
    type: string
    string_semantics: short
    description: Repository name within a GitHub owner account.
  nv_github_repository_full_name:
    type: string
    string_semantics: short
    description: Repository identifier in owner/name form.
  nv_github_scope_repository:
    type: string
    string_semantics: short
    description: Repository owner/name used as HTTP scope for repository-scoped capabilities.
  nv_github_created_at:
    type: date
    value_format: rfc3339
    description: Timestamp when a GitHub resource was created.
  nv_github_updated_at:
    type: date
    value_format: rfc3339
    description: Timestamp when a GitHub resource was last updated.
  nv_github_closed_at:
    type: date
    value_format: rfc3339
    description: Timestamp when a GitHub issue, pull request, or milestone was closed.
  nv_github_html_url:
    type: string
    string_semantics: short
    description: Browser URL for a GitHub resource.
  nv_github_branch_name:
    type: string
    string_semantics: short
    description: Git branch name or branch ref within a repository.
  nv_github_git_sha:
    type: string
    string_semantics: short
    description: Git object SHA, such as a commit, tree, or blob identifier.
  nv_repository_id:
    type: integer
  nv_repository_description:
    type: string
    string_semantics: markdown
  nv_repository_private:
    type: boolean
  nv_repository_fork:
    type: boolean
  nv_repository_language:
    type: string
    string_semantics: short
  nv_repository_stargazers_count:
    type: integer
  nv_repository_forks_count:
    type: integer
  nv_repository_open_issues_count:
    type: integer
  nv_repository_archived:
    type: boolean
  nv_repository_visibility:
    type: select
    allowed_values:
    - public
    - private
    - internal
  nv_repository_pushed_at:
    type: date
    value_format: rfc3339
  nv_issue_repository_url:
    type: string
    string_semantics: short
  nv_issue_number:
    type: integer
    description: Repository-local issue number.
  nv_issue_id:
    type: integer
  nv_issue_title:
    type: string
    string_semantics: short
  nv_issue_body:
    type: string
    string_semantics: markdown
  nv_issue_state:
    type: select
    allowed_values:
    - open
    - closed
  nv_issue_state_reason:
    type: select
    allowed_values:
    - completed
    - reopened
    - not_planned
    - duplicate
  nv_issue_issue_type_id:
    type: integer
  nv_issue_issue_type_node_id:
    type: string
    string_semantics: short
  nv_issue_issue_type_name:
    type: string
    string_semantics: short
  nv_issue_issue_type_color:
    type: select
    allowed_values:
    - gray
    - blue
    - green
    - yellow
    - orange
    - red
    - pink
    - purple
  nv_issue_issue_type_is_enabled:
    type: boolean
  nv_issue_sub_issues_total:
    type: integer
  nv_issue_sub_issues_completed:
    type: integer
  nv_issue_sub_issues_percent_completed:
    type: number
  nv_issue_locked:
    type: boolean
