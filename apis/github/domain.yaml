        field_type: string
        string_semantics: short
        required: true
      repo:
        field_type: string
        string_semantics: short
        required: true
      id:
        field_type: integer
        required: true
      tag_name:
        field_type: string
        string_semantics: short
        required: true
      name:
        field_type: string
        string_semantics: short
        required: false
      body:
        field_type: string
        string_semantics: markdown
        required: false
      draft:
        field_type: boolean
        required: false
      prerelease:
