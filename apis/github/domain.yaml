version: 23
http_backend: https://api.github.com
entities:
  Repository:
    id_field: id
    key_vars:
    - owner
    - repo
    description: A GitHub repository
    fields:
      id:
        required: true
        value_ref: nv_repository_id
      owner:
        required: true
        path: owner.login
        value_ref: nv_github_account_login
      repo:
        required: true
        path: name
        value_ref: nv_github_repository_name
      full_name:
        required: true
        value_ref: nv_github_repository_full_name
      description:
        required: false
        value_ref: nv_repository_description
      private:
        required: true
        value_ref: nv_repository_private
      fork:
        required: true
        value_ref: nv_repository_fork
      language:
        required: false
        value_ref: nv_repository_language
      stargazers_count:
        required: false
        value_ref: nv_repository_stargazers_count
      forks_count:
        required: false
        value_ref: nv_repository_forks_count
      open_issues_count:
        required: false
        value_ref: nv_repository_open_issues_count
      default_branch:
        required: false
        value_ref: nv_github_branch_name
      archived:
        required: false
        value_ref: nv_repository_archived
      visibility:
        required: false
        value_ref: nv_repository_visibility
      created_at:
        required: false
        value_ref: nv_github_created_at
      updated_at:
        required: false
        value_ref: nv_github_updated_at
      pushed_at:
        required: false
        value_ref: nv_repository_pushed_at
      html_url:
        required: false
        value_ref: nv_github_html_url
    relations:
      repo_owner:
        target: User
        cardinality: one
      workflows:
        target: Workflow
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: workflow_query
          bindings:
            owner: owner
            repo: repo
      workflow_runs:
        target: WorkflowRun
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: workflow_run_query
          bindings:
            owner: owner
            repo: repo
      commits:
        target: Commit
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: commit_query
          bindings:
            repository: full_name
      branches:
        target: Branch
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: branch_query
          bindings:
            repository: full_name
      contributors:
        target: Contributor
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: contributor_query
          bindings:
            repository: full_name
  Issue:
    id_field: id
    key_vars:
    - owner
    - repo
    - number
    description: A GitHub issue in a repository
    fields:
      repository_url:
        required: false
        value_ref: nv_issue_repository_url
      owner:
        derive:
          type: segments_after_prefix
          prefix: https://api.github.com/repos/
          alternate_prefixes:
          - http://api.github.com/repos/
          part_index: 0
        required: true
        path: repository_url
        value_ref: nv_github_account_login
      repo:
        derive:
          type: segments_after_prefix
          prefix: https://api.github.com/repos/
          alternate_prefixes:
          - http://api.github.com/repos/
          part_index: 1
        required: true
        path: repository_url
        value_ref: nv_github_repository_name
      number:
        required: true
        value_ref: nv_issue_number
      id:
        required: true
        value_ref: nv_issue_id
      title:
        required: true
        value_ref: nv_issue_title
      body:
        required: false
        value_ref: nv_issue_body
      state:
        required: true
        value_ref: nv_issue_state
      state_reason:
        required: false
        value_ref: nv_issue_state_reason
      issue_type_id:
        required: false
        path: type.id
        value_ref: nv_issue_issue_type_id
      issue_type_node_id:
        required: false
        path: type.node_id
        value_ref: nv_issue_issue_type_node_id
      issue_type_name:
        required: false
        path: type.name
        value_ref: nv_issue_issue_type_name
      issue_type_color:
        required: false
        path: type.color
        value_ref: nv_issue_issue_type_color
      issue_type_is_enabled:
        required: false
        path: type.is_enabled
        value_ref: nv_issue_issue_type_is_enabled
      sub_issues_total:
        required: false
        path: sub_issues_summary.total
        value_ref: nv_issue_sub_issues_total
      sub_issues_completed:
        required: false
        path: sub_issues_summary.completed
        value_ref: nv_issue_sub_issues_completed
      sub_issues_percent_completed:
        required: false
        path: sub_issues_summary.percent_completed
        value_ref: nv_issue_sub_issues_percent_completed
      locked:
        required: false
        value_ref: nv_issue_locked
      comments:
        required: false
        value_ref: nv_issue_comments
      created_at:
        required: false
        value_ref: nv_github_created_at
      updated_at:
        required: false
        value_ref: nv_github_updated_at
      closed_at:
        required: false
        value_ref: nv_github_closed_at
      html_url:
        required: false
        value_ref: nv_github_html_url
    relations:
      user:
        target: User
        cardinality: one
      assignee:
        target: User
        cardinality: one
      milestone:
        target: Milestone
        cardinality: one
      issue_type:
        target: IssueType
        cardinality: one
      labels:
        target: Label
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: issue_label_query
          bindings:
            owner: owner
            repo: repo
            issue_number: number
      sub_issues:
        target: Issue
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: issue_sub_issue_query
          bindings:
            owner: owner
            repo: repo
            issue_number: number
  PullRequest:
    id_field: id
    key_vars:
    - owner
    - repo
    - number
    description: A pull request in a repository.
    fields:
      repository_url:
        required: false
        value_ref: nv_pull_request_repository_url
      owner:
        derive:
          type: segments_after_prefix
          prefix: https://api.github.com/repos/
          alternate_prefixes:
          - http://api.github.com/repos/
          part_index: 0
        required: true
        path: repository_url
        value_ref: nv_github_account_login
      repo:
        derive:
          type: segments_after_prefix
          prefix: https://api.github.com/repos/
          alternate_prefixes:
          - http://api.github.com/repos/
          part_index: 1
        required: true
        path: repository_url
        value_ref: nv_github_repository_name
      number:
        required: true
        value_ref: nv_pull_request_number
      id:
        required: true
        value_ref: nv_pull_request_id
      title:
        required: true
        value_ref: nv_pull_request_title
      body:
        required: false
        value_ref: nv_pull_request_body
      state:
        required: true
        value_ref: nv_pull_request_state
      locked:
        required: false
        value_ref: nv_pull_request_locked
      draft:
        required: false
        value_ref: nv_pull_request_draft
      head_ref:
        required: false
        path: head.ref
        value_ref: nv_pull_request_head_ref
      head_sha:
        required: false
        path: head.sha
        value_ref: nv_github_git_sha
      base_ref:
        required: false
        path: base.ref
        value_ref: nv_pull_request_base_ref
      base_sha:
        required: false
        path: base.sha
        value_ref: nv_github_git_sha
      mergeable:
        required: false
        value_ref: nv_pull_request_mergeable
      mergeable_state:
        required: false
        value_ref: nv_pull_request_mergeable_state
      merged_at:
        required: false
        value_ref: nv_pull_request_merged_at
      created_at:
        required: false
        value_ref: nv_github_created_at
      updated_at:
        required: false
        value_ref: nv_github_updated_at
      closed_at:
        required: false
        value_ref: nv_github_closed_at
      html_url:
        required: false
        value_ref: nv_github_html_url
    relations:
      user:
        target: User
        cardinality: one
      assignee:
        target: User
        cardinality: one
      milestone:
        target: Milestone
        cardinality: one
      changed_files:
        target: PullRequestFile
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: pr_file_query
          bindings:
            owner: owner
            repo: repo
            pull_number: number
      reviews:
        target: PullRequestReview
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: pr_review_query
          bindings:
            owner: owner
            repo: repo
            pull_number: number
      review_comments:
        target: PullRequestReviewComment
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: pr_review_comment_query
          bindings:
            owner: owner
            repo: repo
            pull_number: number
  Commit:
    id_field: sha
    key_vars:
    - owner
    - repo
    - sha
    description: A repository commit with message, times, and relations to author and committer users and to changed files.
    fields:
      owner:
        required: true
        value_ref: nv_github_account_login
      repo:
        required: true
        value_ref: nv_github_repository_name
      sha:
        required: true
        value_ref: nv_github_git_sha
      message:
        required: false
        path: commit.message
        value_ref: nv_commit_message
      html_url:
        required: false
        value_ref: nv_github_html_url
      url:
        required: false
        value_ref: nv_commit_url
      authored_at:
        required: false
        path: commit.author.date
        value_ref: nv_commit_authored_at
      committed_at:
        required: false
        path: commit.committer.date
        value_ref: nv_commit_committed_at
      comment_count:
        required: false
        path: commit.comment_count
        value_ref: nv_commit_comment_count
      stats_additions:
        required: false
        path: stats.additions
        value_ref: nv_commit_stats_additions
      stats_deletions:
        required: false
        path: stats.deletions
        value_ref: nv_commit_stats_deletions
      total_changes:
        required: false
        path: stats.total
        value_ref: nv_commit_total_changes
    relations:
      files:
        target: CommitFile
        cardinality: many
        description: Files changed in this commit.
        materialize:
          kind: from_parent_get
          path:
          - key: files
          - wildcard: true
      author:
        target: User
        cardinality: one
        description: GitHub user for the commit author, when the API provides one.
        materialize:
          kind: from_parent_get
          path:
          - key: author
      committer:
        target: User
        cardinality: one
        description: GitHub user for the committer, when the API provides one.
        materialize:
          kind: from_parent_get
          path:
          - key: committer
  CommitFile:
    abstract: true
    id_field: filename
    description: A file changed in a single repository commit.
    fields:
      filename:
        required: true
        value_ref: nv_commit_file_filename
      sha:
        required: false
        value_ref: nv_github_git_sha
      status:
        required: false
        value_ref: nv_commit_file_status
      additions:
        required: false
        value_ref: nv_commit_file_additions
      deletions:
        required: false
        value_ref: nv_commit_file_deletions
      changes:
        required: false
        value_ref: nv_commit_file_changes
      patch:
        required: false
        value_ref: nv_commit_file_patch
      previous_filename:
        required: false
        value_ref: nv_commit_file_previous_filename
      blob_url:
        required: false
        value_ref: nv_commit_file_blob_url
      raw_url:
        required: false
        value_ref: nv_commit_file_raw_url
  Branch:
    id_field: name
    key_vars:
    - owner
    - repo
    - name
    description: Git branch (owner, repo, branch name).
    fields:
      owner:
        required: true
        value_ref: nv_github_account_login
      repo:
        required: true
        value_ref: nv_github_repository_name
      name:
        required: true
        value_ref: nv_branch_name
      commit_sha:
        required: false
        path: commit.sha
        value_ref: nv_github_git_sha
      protected:
        required: false
        value_ref: nv_branch_protected
      html_url:
        required: false
        value_ref: nv_github_html_url
  PullRequestReview:
    key_vars:
    - owner
    - repo
    - pull_number
    - id
    id_field: id
    description: A review on a pull request
    fields:
      owner:
        required: false
        value_ref: nv_github_account_login
      repo:
        required: false
        value_ref: nv_github_repository_name
      pull_number:
        required: false
        value_ref: nv_pull_request_number
      id:
        required: true
        value_ref: nv_pull_request_review_id
      state:
        required: false
        value_ref: nv_pull_request_review_state
      body:
        required: false
        value_ref: nv_pull_request_review_body
      commit_id:
        required: false
        value_ref: nv_pull_request_review_commit_id
      submitted_at:
        required: false
        value_ref: nv_pull_request_review_submitted_at
      html_url:
        required: false
        value_ref: nv_github_html_url
    relations:
      pull_request:
        target: PullRequest
        cardinality: one
      user:
        target: User
        cardinality: one
  PullRequestFile:
    id_field: filename
    description: A file entry in a pull request diff.
    fields:
      filename:
        required: true
        value_ref: nv_pull_request_file_filename
      sha:
        required: false
        value_ref: nv_github_git_sha
      status:
        required: false
        value_ref: nv_pull_request_file_status
      additions:
        required: false
        value_ref: nv_pull_request_file_additions
      deletions:
        required: false
        value_ref: nv_pull_request_file_deletions
      patch:
        required: false
        value_ref: nv_pull_request_file_patch
  User:
