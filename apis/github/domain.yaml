        value_ref: nv_milestone_description
      state:
        required: true
        value_ref: nv_milestone_state
      open_issues:
        required: false
        value_ref: nv_milestone_open_issues
      closed_issues:
        required: false
        value_ref: nv_milestone_closed_issues
      due_on:
        required: false
        value_ref: nv_milestone_due_on
      created_at:
        required: false
        value_ref: nv_github_created_at
      updated_at:
        required: false
        value_ref: nv_github_updated_at
      closed_at:
        required: false
        value_ref: nv_github_closed_at
      html_url:
        required: false
