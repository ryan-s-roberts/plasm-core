        value_ref: nv_user_location
      email:
        required: false
        value_ref: nv_user_email
      bio:
        required: false
        value_ref: nv_user_bio
      public_repos:
        required: false
        value_ref: nv_user_public_repos
      public_gists:
        required: false
        value_ref: nv_user_public_gists
      hireable:
        required: false
        value_ref: nv_user_hireable
      site_admin:
        required: false
        value_ref: nv_user_site_admin
      html_url:
        required: false
        value_ref: nv_github_html_url
      avatar_url:
        required: false
        value_ref: nv_user_avatar_url
      created_at:
        required: false
        value_ref: nv_github_created_at
  Label:
    key_vars:
    - owner
    - repo
    - name
    id_field: name
    description: Label for issues and PRs
    fields:
      owner:
        required: true
        value_ref: nv_github_account_login
      repo:
        required: true
        value_ref: nv_github_repository_name
      name:
        required: true
        value_ref: nv_label_name
      id:
        required: true
        value_ref: nv_label_id
      description:
        required: false
        value_ref: nv_label_description
      color:
        required: false
        value_ref: nv_label_color
      default:
        required: false
        value_ref: nv_label_default
  Milestone:
