version: 13

http_backend: https://api.github.com

entities:
  Repository:
    id_field: id
    key_vars:
    - owner
    - repo
    description: A GitHub repository
    fields:
      id:
        field_type: integer
        required: true
      owner:
        field_type: string
        path: owner.login
        string_semantics: short
        required: false
      repo:
        field_type: string
        path: name
        string_semantics: short
        required: true
      full_name:
        field_type: string
        string_semantics: short
        required: true
      description:
        field_type: string
        string_semantics: markdown
        required: false
      private:
        field_type: boolean
        required: true
      fork:
        field_type: boolean
        required: true
      language:
        field_type: string
        string_semantics: short
        required: false
      stargazers_count:
        field_type: integer
        required: false
      forks_count:
        field_type: integer
        required: false
      open_issues_count:
        field_type: integer
        required: false
      default_branch:
        field_type: string
        string_semantics: short
        required: false
      archived:
        field_type: boolean
        required: false
      visibility:
        field_type: select
        allowed_values:
        - public
        - private
        - internal
        required: false
      created_at:
        field_type: date
        value_format: rfc3339
        required: false
      updated_at:
        field_type: date
        value_format: rfc3339
        required: false
      pushed_at:
        field_type: date
        value_format: rfc3339
        required: false
      html_url:
        field_type: string
        string_semantics: short
        required: false
    relations:
      repo_owner:
        target: User
        cardinality: one
  Issue:
    id_field: id
    key_vars:
    - owner
    - repo
    - number
    description: A GitHub issue in a repository
    fields:
      repository_url:
        field_type: string
        string_semantics: short
        required: false
      owner:
        field_type: string
        string_semantics: short
        required: true
        path: repository_url
        derive:
          type: segments_after_prefix
          prefix: https://api.github.com/repos/
          alternate_prefixes:
          - http://api.github.com/repos/
          part_index: 0
      repo:
        field_type: string
        string_semantics: short
        required: true
        path: repository_url
        derive:
          type: segments_after_prefix
          prefix: https://api.github.com/repos/
          alternate_prefixes:
          - http://api.github.com/repos/
          part_index: 1
      number:
        field_type: integer
        required: true
      id:
        field_type: integer
        required: true
      title:
        field_type: string
        string_semantics: short
        required: true
      body:
        field_type: string
        string_semantics: markdown
        required: false
      state:
        field_type: select
        allowed_values:
        - open
        - closed
        required: true
      state_reason:
        field_type: select
        allowed_values:
        - completed
        - reopened
        - not_planned
        - duplicate
        required: false
      locked:
        field_type: boolean
        required: false
      comments:
        field_type: integer
        required: false
      created_at:
        field_type: date
        value_format: rfc3339
        required: false
      updated_at:
        field_type: date
        value_format: rfc3339
        required: false
      closed_at:
        field_type: date
        value_format: rfc3339
        required: false
      html_url:
        field_type: string
        string_semantics: short
        required: false
    relations:
      user:
        target: User
        cardinality: one
      assignee:
        target: User
        cardinality: one
      milestone:
        target: Milestone
        cardinality: one
      labels:
        target: Label
        cardinality: many
        materialize:
          kind: query_scoped_bindings
          capability: issue_label_query
          bindings:
            owner: owner
            repo: repo
            issue_number: number
  PullRequest:
    id_field: id
    key_vars:
    - owner
    - repo
    - number
    description: >-
      A GitHub pull request. Use this entity when the goal is to list, search,
      filter, or update pull requests themselves.
    fields:
      repository_url:
        field_type: string
        string_semantics: short
        required: false
      owner:
        field_type: string
        string_semantics: short
        required: true
        path: repository_url
        derive:
          type: segments_after_prefix
          prefix: https://api.github.com/repos/
          alternate_prefixes:
          - http://api.github.com/repos/
          part_index: 0
      repo:
        field_type: string
        string_semantics: short
        required: true
        path: repository_url
        derive:
          type: segments_after_prefix
          prefix: https://api.github.com/repos/
          alternate_prefixes:
          - http://api.github.com/repos/
          part_index: 1
      number:
        field_type: integer
        required: true
      id:
        field_type: integer
        required: true
      title:
        field_type: string
        string_semantics: short
        required: true
      body:
        field_type: string
        string_semantics: markdown
        required: false
      state:
        field_type: select
        allowed_values:
        - open
        - closed
        required: true
      locked:
        field_type: boolean
        required: false
      draft:
        field_type: boolean
        required: false
      merged_at:
        field_type: date
        value_format: rfc3339
        required: false
      created_at:
        field_type: date
        value_format: rfc3339
        required: false
      updated_at:
        field_type: date
        value_format: rfc3339
        required: false
      closed_at:
        field_type: date
        value_format: rfc3339
        required: false
      html_url:
        field_type: string
        string_semantics: short
        required: false
    relations:
      user:
        target: User
        cardinality: one
      assignee:
        target: User
        cardinality: one
      milestone:
        target: Milestone
        cardinality: one
  Commit:
    id_field: sha
    key_vars:
    - owner
    - repo
    - sha
    description: >-
      A Git commit identified by repository scope and commit SHA. Resolve branch/tag names
      via the commit_get capability path segment (CML `sha`); the API accepts SHAs or ref names there.
    fields:
      owner:
        field_type: string
        string_semantics: short
        required: true
      repo:
        field_type: string
        string_semantics: short
        required: true
      sha:
        field_type: string
        string_semantics: short
        required: true
      message:
        field_type: string
        string_semantics: markdown
        required: false
        path: commit.message
      html_url:
        field_type: string
        string_semantics: short
        required: false
  Branch:
    id_field: name
    key_vars:
    - owner
    - repo
    - name
    description: Git branch for a repository (owner, repo, and branch name).
    fields:
      owner:
        field_type: string
        string_semantics: short
        required: true
      repo:
        field_type: string
        string_semantics: short
        required: true
      name:
        field_type: string
        string_semantics: short
        required: true
      commit_sha:
        field_type: string
        string_semantics: short
        required: false
        path: commit.sha
      protected:
        field_type: boolean
        required: false
      html_url:
        field_type: string
        string_semantics: short
        required: false
  PullRequestReview:
    key_vars:
    - owner
    - repo
    - pull_number
    - id
    id_field: id
    description: A review on a pull request
    fields:
      owner:
        field_type: string
        string_semantics: short
        required: false
      repo:
        field_type: string
        string_semantics: short
        required: false
      pull_number:
        field_type: integer
        required: false
      id:
        field_type: integer
        required: true
      state:
        field_type: select
        allowed_values:
        - APPROVED
        - CHANGES_REQUESTED
        - COMMENTED
        - DISMISSED
        - PENDING
        required: false
      body:
        field_type: string
        string_semantics: markdown
        required: false
      submitted_at:
        field_type: date
        value_format: rfc3339
        required: false
      html_url:
        field_type: string
        string_semantics: short
        required: false
  PullRequestFile:
    id_field: filename
    description: >-
      A file changed inside one specific pull request diff. Use this only when
      you already know the pull request number and want changed files for that
      pull request, not when the goal is to discover or enumerate pull requests.
    fields:
      filename:
        field_type: string
        string_semantics: short
        required: true
      sha:
        field_type: string
        string_semantics: short
        required: false
      status:
        field_type: select
        allowed_values:
        - added
        - removed
        - modified
        - renamed
        - copied
        - changed
        - unchanged
        required: false
      additions:
        field_type: integer
        required: false
      deletions:
        field_type: integer
        required: false
      patch:
        field_type: string
        string_semantics: markdown
        required: false
  User:
    id_field: login
    description: A GitHub user account
    fields:
      login:
        field_type: string
        string_semantics: short
        required: true
      id:
        field_type: integer
        required: true
      name:
        field_type: string
        string_semantics: short
        required: false
      company:
        field_type: string
        string_semantics: short
        required: false
      blog:
        field_type: string
        string_semantics: short
        required: false
      location:
        field_type: string
        string_semantics: short
        required: false
      email:
        field_type: string
        string_semantics: short
        required: false
      bio:
        field_type: string
        string_semantics: markdown
        required: false
      public_repos:
        field_type: integer
        required: false
      public_gists:
        field_type: integer
        required: false
      hireable:
        field_type: boolean
        required: false
      site_admin:
        field_type: boolean
        required: false
      html_url:
        field_type: string
        string_semantics: short
        required: false
      avatar_url:
        field_type: string
        string_semantics: short
        required: false
      created_at:
        field_type: date
        value_format: rfc3339
        required: false
  Label:
    key_vars:
    - owner
    - repo
    - name
    id_field: name
    description: A label that can be applied to issues and pull requests
    fields:
      owner:
        field_type: string
        string_semantics: short
        required: true
      repo:
        field_type: string
        string_semantics: short
        required: true
      name:
        field_type: string
        string_semantics: short
        required: true
      id:
        field_type: integer
        required: true
      description:
        field_type: string
        string_semantics: markdown
        required: false
      color:
        field_type: string
        string_semantics: short
        required: false
      default:
        field_type: boolean
        required: false
  Milestone:
    key_vars:
    - owner
    - repo
    - number
    id_field: number
    description: A milestone grouping issues and pull requests
    fields:
      owner:
        field_type: string
        string_semantics: short
        required: true
      repo:
        field_type: string
        string_semantics: short
        required: true
      number:
        field_type: integer
        required: true
      id:
        field_type: integer
        required: true
      title:
        field_type: string
        string_semantics: short
        required: true
      description:
        field_type: string
        string_semantics: markdown
        required: false
      state:
        field_type: select
        allowed_values:
        - open
        - closed
        required: true
      open_issues:
        field_type: integer
        required: false
      closed_issues:
        field_type: integer
        required: false
      due_on:
        field_type: date
        value_format: rfc3339
        required: false
      created_at:
        field_type: date
        value_format: rfc3339
        required: false
      updated_at:
        field_type: date
        value_format: rfc3339
        required: false
      closed_at:
        field_type: date
        value_format: rfc3339
        required: false
      html_url:
        field_type: string
        string_semantics: short
        required: false
  Release:
    key_vars:
    - owner
    - repo
    - id
    id_field: id
    description: A GitHub release with assets and release notes
    fields:
      owner:
        field_type: string
        string_semantics: short
        required: true
      repo:
        field_type: string
        string_semantics: short
        required: true
      id:
        field_type: integer
        required: true
      tag_name:
        field_type: string
        string_semantics: short
        required: true
      name:
        field_type: string
        string_semantics: short
        required: false
      body:
        field_type: string
        string_semantics: markdown
        required: false
      draft:
        field_type: boolean
        required: false
      prerelease:
        field_type: boolean
        required: false
      created_at:
        field_type: date
        value_format: rfc3339
        required: false
      published_at:
        field_type: date
        value_format: rfc3339
        required: false
      html_url:
        field_type: string
        string_semantics: short
        required: false
    relations:
      author:
        target: User
        cardinality: one
  IssueComment:
    id_field: id
    description: A comment on a GitHub issue or pull request
    fields:
      id:
        field_type: integer
        required: true
      body:
        field_type: string
        string_semantics: markdown
        required: false
      created_at:
        field_type: date
        value_format: rfc3339
        required: false
      updated_at:
        field_type: date
        value_format: rfc3339
        required: false
      html_url:
        field_type: string
        string_semantics: short
        required: false
    relations:
      user:
        target: User
        cardinality: one
  Organization:
    id_field: login
    description: >-
      Organization profile keyed by login (public metadata, counts, and contact fields).
    fields:
      login:
        field_type: string
        string_semantics: short
        required: true
      id:
        field_type: integer
        required: true
      name:
        field_type: string
        string_semantics: short
        required: false
      description:
        field_type: string
        string_semantics: markdown
        required: false
      blog:
        field_type: string
        string_semantics: short
        required: false
      location:
        field_type: string
        string_semantics: short
        required: false
      email:
        field_type: string
        string_semantics: short
        required: false
      avatar_url:
        field_type: string
        string_semantics: short
        required: false
      url:
        field_type: string
        string_semantics: short
        required: false
      public_repos:
        field_type: integer
        required: false
      public_gists:
        field_type: integer
        required: false
      followers:
        field_type: integer
        required: false
      following:
        field_type: integer
        required: false
      type:
        field_type: string
        string_semantics: short
        required: false
  Gist:
    id_field: id
    description: >-
      User-hosted gist (paste or small multi-file snippet) identified by gist id.
    fields:
      id:
        field_type: string
        string_semantics: short
        required: true
      description:
        field_type: string
        string_semantics: markdown
        required: false
      html_url:
        field_type: string
        string_semantics: short
        required: false
      public:
        field_type: boolean
        required: false
      comments:
        field_type: integer
        required: false
      created_at:
        field_type: date
        value_format: rfc3339
        required: false
      updated_at:
        field_type: date
        value_format: rfc3339
        required: false
    relations:
      owner:
        target: User
        cardinality: one
  PullRequestReviewComment:
    key_vars:
    - owner
    - repo
    - id
    id_field: id
    description: An inline review comment on a pull request diff (distinct from issue timeline comments)
    fields:
      owner:
        field_type: string
        string_semantics: short
        required: false
      repo:
        field_type: string
        string_semantics: short
        required: false
      id:
        field_type: integer
        required: true
      body:
        field_type: string
        string_semantics: markdown
        required: false
      path:
        field_type: string
        string_semantics: short
        required: false
      diff_hunk:
        field_type: string
        string_semantics: markdown
        required: false
      commit_id:
        field_type: string
        string_semantics: short
        required: false
      html_url:
        field_type: string
        string_semantics: short
        required: false
      created_at:
        field_type: date
        value_format: rfc3339
        required: false
      updated_at:
        field_type: date
        value_format: rfc3339
        required: false
    relations:
      user:
        target: User
        cardinality: one
  RepositoryTag:
    id_field: name
    description: A lightweight tag pointing at a commit (not the same as a GitHub Release)
    fields:
      owner:
        field_type: string
        string_semantics: short
        required: true
      repo:
        field_type: string
        string_semantics: short
        required: true
      name:
        field_type: string
        string_semantics: short
        required: true
      commit_sha:
        field_type: string
        string_semantics: short
        required: false
        path: commit.sha
      zipball_url:
        field_type: string
        string_semantics: short
        required: false
      tarball_url:
        field_type: string
        string_semantics: short
        required: false
  Contributor:
    id_field: login
    description: Repository contributor with aggregated commit counts (from the contributors API)
    fields:
      owner:
        field_type: string
        string_semantics: short
        required: true
      repo:
        field_type: string
        string_semantics: short
        required: true
      login:
        field_type: string
        string_semantics: short
        required: true
      contributions:
        field_type: integer
        required: false
  WorkflowRun:
    key_vars:
    - owner
    - repo
    - id
    id_field: id
    description: A single GitHub Actions workflow run for a repository
    fields:
      owner:
        field_type: string
        string_semantics: short
        required: true
      repo:
        field_type: string
        string_semantics: short
        required: true
      id:
        field_type: integer
        required: true
      name:
        field_type: string
        string_semantics: short
        required: false
      status:
        field_type: string
        string_semantics: short
        required: false
      conclusion:
        field_type: string
        string_semantics: short
        required: false
      event:
        field_type: string
        string_semantics: short
        required: false
      workflow_id:
        field_type: integer
        required: false
      html_url:
        field_type: string
        string_semantics: short
        required: false
      run_started_at:
        field_type: date
        value_format: rfc3339
        required: false
      created_at:
        field_type: date
        value_format: rfc3339
        required: false
      updated_at:
        field_type: date
        value_format: rfc3339
        required: false
  Notification:
    id_field: id
    description: One row in the notification inbox for subscribed activity (issues, pull requests, and similar)
    fields:
      id:
        field_type: string
        string_semantics: short
        required: true
      unread:
        field_type: boolean
        required: false
      reason:
        field_type: string
        string_semantics: short
        required: false
      updated_at:
        field_type: date
        value_format: rfc3339
        required: false
      last_read_at:
        field_type: date
        value_format: rfc3339
        required: false
      url:
        field_type: string
        string_semantics: short
        required: false
      subscription_url:
        field_type: string
        string_semantics: short
        required: false
capabilities:
  repo_search:
    kind: search
    entity: Repository
    description: Search GitHub repositories.
    parameters:
    - name: q
      type: string
      required: true
      role: search
      string_semantics: short
    - name: sort
      type: select
      allowed_values:
      - stars
      - forks
      - help-wanted-issues
      - updated
      required: false
      role: sort
    - name: order
      type: select
      allowed_values:
      - desc
      - asc
      required: false
      role: sort_direction
  user_repos_query:
    kind: query
    entity: Repository
    description: List repositories for a specific user.
    parameters:
    - name: username
      type: entity_ref
      target: User
      required: true
      role: scope
    - name: type
      type: select
      allowed_values:
      - all
      - owner
      - member
      required: false
    - name: sort
      type: select
      allowed_values:
      - created
      - updated
      - pushed
      - full_name
      required: false
      role: sort
    - name: direction
      type: select
      allowed_values:
      - asc
      - desc
      required: false
      role: sort_direction
  auth_user_repos_query:
    kind: query
    entity: Repository
    description: >-
      List repositories the authenticated token can access via GET /user/repos (owned,
      collaborator, and organization repos depending on affiliation). This is not the same
      set as `public_repos` on the User profile.
    parameters:
    - name: visibility
      type: select
      allowed_values:
      - all
      - public
      - private
      required: false
    - name: affiliation
      type: string
      required: false
      string_semantics: short
      description: >-
        Comma-separated GitHub `affiliation` filter (owner, collaborator, organization_member).
    - name: sort
      type: select
      allowed_values:
      - created
      - updated
      - pushed
      - full_name
      required: false
      role: sort
    - name: direction
      type: select
      allowed_values:
      - asc
      - desc
      required: false
      role: sort_direction
  repo_get:
    kind: get
    entity: Repository
    description: Get a repository by owner and repo slug.
    provides:
    - id
    - owner
    - repo
    - full_name
    - description
    - private
    - fork
    - language
    - stargazers_count
    - forks_count
    - open_issues_count
    - default_branch
    - archived
    - visibility
    - created_at
    - updated_at
    - pushed_at
    - html_url
  repo_collaborators_query:
    kind: query
    entity: User
    description: >-
      List users who can access a given repository (collaborators / inherited access), scoped by `repository=…`.
      This is not organization membership; use the org-scoped members query when the goal is “who is in org X”.
    scope_aggregate_key_policy: omit_when_redundant
    parameters:
    - name: repository
      type: entity_ref
      target: Repository
      required: true
      role: scope
    - name: affiliation
      type: select
      allowed_values:
      - outside
      - direct
      - all
      required: false
  repo_forks_query:
    kind: query
    entity: Repository
    description: List forks of a repository.
    scope_aggregate_key_policy: omit_when_redundant
    parameters:
    - name: repository
      type: entity_ref
      target: Repository
      required: true
      role: scope
    - name: sort
      type: select
      allowed_values:
      - newest
      - oldest
      - stargazers
      required: false
      role: sort
  issue_get:
    kind: get
    entity: Issue
    description: Get an issue by owner, repo, and number.
    provides:
    - id
    - owner
    - repo
    - number
    - title
    - body
    - state
    - state_reason
    - locked
    - comments
    - created_at
    - updated_at
    - closed_at
    - html_url
  issue_query:
    kind: query
    entity: Issue
    description: >-
      List issues and pull requests in a repository (this list endpoint returns both types).
    scope_aggregate_key_policy: omit_when_redundant
    parameters:
    - name: repository
      type: entity_ref
      target: Repository
