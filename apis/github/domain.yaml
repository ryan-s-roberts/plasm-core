      subject_type:
        required: false
        value_ref: nv_pull_request_review_comment_subject_type
      in_reply_to_id:
        required: false
        value_ref: nv_pull_request_review_comment_in_reply_to_id
      html_url:
        required: false
        value_ref: nv_github_html_url
      created_at:
        required: false
        value_ref: nv_github_created_at
      updated_at:
        required: false
        value_ref: nv_github_updated_at
    relations:
      user:
        target: User
        cardinality: one
  RepositoryTag:
