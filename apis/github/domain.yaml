      created_at:
        required: false
        value_ref: nv_github_created_at
      updated_at:
        required: false
        value_ref: nv_github_updated_at
    relations:
      owner:
        target: User
        cardinality: one
  PullRequestReviewComment:
    key_vars:
    - owner
    - repo
    - id
    id_field: id
    description: Inline comment on a pull request review diff.
    fields:
      owner:
        required: false
        value_ref: nv_github_account_login
