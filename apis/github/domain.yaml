    description: Git branch (owner, repo, branch name).
    fields:
      owner:
        field_type: string
        string_semantics: short
        required: true
      repo:
        field_type: string
        string_semantics: short
        required: true
      name:
        field_type: string
        string_semantics: short
        required: true
      commit_sha:
        field_type: string
        string_semantics: short
        required: false
        path: commit.sha
      protected:
        field_type: boolean
        required: false
      html_url:
        field_type: string
        string_semantics: short
        required: false
  PullRequestReview:
    key_vars:
    - owner
    - repo
    - pull_number
    - id
    id_field: id
    description: A review on a pull request
    fields:
      owner:
        field_type: string
        string_semantics: short
        required: false
      repo:
        field_type: string
        string_semantics: short
        required: false
      pull_number:
        field_type: integer
        required: false
      id:
        field_type: integer
        required: true
      state:
        field_type: select
        allowed_values:
        - APPROVED
        - CHANGES_REQUESTED
        - COMMENTED
        - DISMISSED
        - PENDING
        required: false
      body:
        field_type: string
        string_semantics: markdown
        required: false
      commit_id:
        field_type: string
        string_semantics: short
        required: false
      submitted_at:
        field_type: date
        value_format: rfc3339
        required: false
      html_url:
        field_type: string
        string_semantics: short
        required: false
    relations:
      pull_request:
        target: PullRequest
        cardinality: one
      user:
        target: User
        cardinality: one
  PullRequestFile:
    id_field: filename
    description: A file entry in a pull request diff.
    fields:
      filename:
        field_type: string
        string_semantics: short
        required: true
      sha:
        field_type: string
        string_semantics: short
        required: false
      status:
        field_type: select
        allowed_values:
