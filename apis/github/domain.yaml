      name:
        field_type: string
        string_semantics: short
        required: false
      company:
        field_type: string
        string_semantics: short
        required: false
      blog:
        field_type: string
        string_semantics: short
        required: false
      location:
        field_type: string
        string_semantics: short
        required: false
      email:
        field_type: string
        string_semantics: short
        required: false
      bio:
        field_type: string
        string_semantics: markdown
        required: false
      public_repos:
        field_type: integer
        required: false
      public_gists:
        field_type: integer
        required: false
      hireable:
        field_type: boolean
        required: false
      site_admin:
        field_type: boolean
        required: false
      html_url:
        field_type: string
        string_semantics: short
        required: false
      avatar_url:
        field_type: string
        string_semantics: short
        required: false
      created_at:
        field_type: date
        value_format: rfc3339
        required: false
  Label:
    key_vars:
    - owner
    - repo
    - name
    id_field: name
    description: Label for issues and PRs
    fields:
      owner:
        field_type: string
        string_semantics: short
        required: true
      repo:
        field_type: string
        string_semantics: short
        required: true
      name:
        field_type: string
        string_semantics: short
        required: true
      id:
        field_type: integer
        required: true
      description:
        field_type: string
        string_semantics: markdown
        required: false
      color:
        field_type: string
        string_semantics: short
        required: false
      default:
        field_type: boolean
        required: false
  Milestone:
    key_vars:
    - owner
