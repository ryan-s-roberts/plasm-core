    - name: locked
      type: boolean
      required: false
      description: Lock or unlock conversation on the issue.
  issue_delete:
    kind: delete
    entity: Issue
    description: Delete an issue (requires admin or sufficient repo permission).
  issue_comment_create:
    kind: create
    entity: IssueComment
    description: Post a comment on an issue or pull request thread.
    provides:
    - id
    - body
    - created_at
    - updated_at
    - html_url
    scope_aggregate_key_policy: omit_when_redundant
    parameters:
    - name: repository
      type: entity_ref
      target: Repository
      required: true
      role: scope
    - name: issue_number
      type: integer
      required: true
      role: scope
    - name: body
      type: string
      required: true
      string_semantics: markdown
  issue_comment_update:
    kind: update
    entity: IssueComment
    description: Update an issue or pull request comment.
    provides:
    - id
    - body
    - created_at
    - updated_at
    - html_url
    scope_aggregate_key_policy: omit_when_redundant
    parameters:
    - name: repository
      type: entity_ref
      target: Repository
      required: true
      role: scope
    - name: body
      type: string
      required: true
      string_semantics: markdown
  issue_comment_delete:
    kind: delete
    entity: IssueComment
    description: Delete an issue or pull request timeline comment.
    parameters:
    - name: repository
      type: entity_ref
      target: Repository
      required: true
      role: scope
  pr_patch:
    kind: update
    entity: PullRequest
    description: Update a pull request.
    provides:
    - id
    - owner
    - repo
    - number
    - title
    - body
    - state
    - locked
    - draft
    - merged_at
    - created_at
    - updated_at
    - closed_at
    - html_url
    parameters:
    - name: title
      type: string
      required: false
      string_semantics: short
    - name: body
      type: string
      required: false
      string_semantics: markdown
    - name: state
      type: select
      allowed_values:
      - open
      - closed
      required: false
    - name: base
      type: string
      required: false
      description: Base branch name to target (if changing).
      string_semantics: short
  pr_merge:
    kind: action
    entity: PullRequest
    description: Merge a pull request.
    parameters:
    - name: commit_title
      type: string
      required: false
      string_semantics: short
    - name: commit_message
      type: string
      required: false
      string_semantics: markdown
    - name: merge_method
      type: select
      allowed_values:
      - merge
      - squash
      - rebase
      required: false
    output:
      type: side_effect
      description: Merge the pull request into its base branch when the API call succeeds.
  pr_create:
    kind: create
    entity: PullRequest
    description: Open a new pull request (head branch into base).
    provides:
    - id
    - owner
    - repo
    - number
    - title
    - body
    - state
    - locked
    - draft
    - merged_at
    - created_at
    - updated_at
    - closed_at
    - html_url
    scope_aggregate_key_policy: omit_when_redundant
    parameters:
    - name: repository
      type: entity_ref
      target: Repository
      required: true
      role: scope
    - name: title
      type: string
      required: true
      string_semantics: short
    - name: head
      type: string
      required: true
      description: >-
        Branch containing changes, or user:branch for cross-fork pull requests.
      string_semantics: short
    - name: base
      type: string
      required: true
      description: Branch you want to merge into.
      string_semantics: short
    - name: body
      type: string
      required: false
      string_semantics: markdown
    - name: draft
      type: boolean
      required: false
    - name: maintainer_can_modify
      type: boolean
      required: false
      description: Allow upstream maintainers to edit this pull request (fork workflows).
    - name: issue
      type: integer
      required: false
      description: Existing issue number to convert into a pull request when the API allows.
  label_create:
    kind: create
    entity: Label
    description: Create a label in a repository.
    provides:
    - name
    - owner
    - repo
    - id
    - description
    - color
    - default
    scope_aggregate_key_policy: omit_when_redundant
    parameters:
    - name: repository
      type: entity_ref
      target: Repository
      required: true
      role: scope
    - name: name
      type: string
      required: true
      string_semantics: short
    - name: color
      type: string
      required: false
      description: Hex color without leading # (e.g. f29513).
      string_semantics: short
    - name: description
      type: string
      required: false
      string_semantics: markdown
  label_update:
    kind: update
    entity: Label
    description: Update a repository label (rename, color, or description).
    provides:
    - name
    - owner
    - repo
    - id
    - description
    - color
    - default
    scope_aggregate_key_policy: omit_when_redundant
    parameters:
    - name: new_name
      type: string
      required: false
      description: New label name (GitHub JSON field new_name).
      string_semantics: short
    - name: color
      type: string
      required: false
      description: Hex color without leading #.
      string_semantics: short
    - name: description
      type: string
      required: false
      string_semantics: markdown
  label_delete:
    kind: delete
    entity: Label
    description: Delete a label from a repository.
  repo_content_put:
    kind: action
    entity: Repository
    description: Create or replace a file in a repository (base64 content per Contents API).
    scope_aggregate_key_policy: omit_when_redundant
    parameters:
    - name: repository
      type: entity_ref
      target: Repository
      required: true
      role: scope
    - name: path
      type: string
      required: true
      string_semantics: short
    - name: message
      type: string
      required: true
      string_semantics: short
    - name: content
      type: blob
      required: true
      description: File contents already base64-encoded for the GitHub Contents API JSON body.
    - name: branch
      type: string
      required: false
      string_semantics: short
    - name: sha
      type: string
      required: false
      description: Blob SHA of the file being replaced (required when updating an existing path).
      string_semantics: short
    output:
      type: side_effect
      description: Creates or replaces the file at the path when the API call succeeds.
  repo_content_delete:
    kind: action
    entity: Repository
    description: Delete a file from a repository via the Contents API (requires commit message and blob SHA).
    scope_aggregate_key_policy: omit_when_redundant
    parameters:
    - name: repository
      type: entity_ref
      target: Repository
      required: true
      role: scope
    - name: path
      type: string
      required: true
      string_semantics: short
    - name: message
      type: string
      required: true
      string_semantics: short
    - name: sha
      type: string
      required: true
      description: SHA of the file blob being removed (from the current tree).
      string_semantics: short
    - name: branch
      type: string
      required: false
      string_semantics: short
    output:
      type: side_effect
      description: Deletes the file at the path when the API call succeeds.
oauth:
  provider: github
  scopes:
    admin:gpg_key:
      label: Full control of GPG keys
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    admin:org:
      label: Full organization control (teams, projects, memberships)
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    admin:org_hook:
      label: Full control of organization webhooks (OAuth-created hooks)
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    admin:public_key:
      label: Full control of user SSH keys
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    admin:repo_hook:
      label: Full control of repository hooks
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    codespace:
      label: Create and manage GitHub Codespaces
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    delete:packages:
      label: Delete packages from GitHub Packages
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    delete_repo:
      label: Delete repositories you can administer
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    gist:
      label: Create and update gists
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    notifications:
      label: Notifications inbox, mark read, watch/unwatch, thread subscriptions
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    project:
      label: Read and write user and organization projects (classic)
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    public_repo:
      label: Access public repositories only (read/write on public repos and orgs)
      notes: "Narrower than repo: only public repositories (and related public-org operations)."
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    read:audit_log:
      label: Read organization audit log data (where available)
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    read:org:
      label: Read organization membership, teams, and projects
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    read:packages:
      label: Download and install packages from GitHub Packages
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    read:project:
      label: Read-only access to user and organization projects (classic)
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    read:public_key:
      label: List and view SSH public keys
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    read:repo_hook:
      label: Read and ping repository hooks
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    read:user:
      label: Read user profile data
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    repo:
      label: Full control of private and public repositories, issues, PRs, and related org resources
      notes: "Classic OAuth-app scopes (space-separated on /login/oauth/authorize). Not GitHub App installation permissions or fine-grained PAT permission sets."
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    repo:invite:
      label: Accept or decline repository collaboration invitations
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    repo:status:
      label: Read/write commit statuses without full code access
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    repo_deployment:
      label: View deployment statuses without full code access
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    security_events:
      label: Read and write code scanning security events
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    user:
      label: Read/write profile (includes read:user, user:email, user:follow when normalized)
      notes: "GitHub normalizes tokens: requesting user may drop redundant read:user / user:email entries."
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    user:email:
      label: Read user email addresses
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    user:follow:
      label: Follow and unfollow users
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    workflow:
      label: Add or update GitHub Actions workflow files (.github/workflows); often needed with repo for new workflow YAML
      notes: "Required in addition to repo for many new or changed workflow files under .github/workflows (see GitHub Actions docs)."
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    write:gpg_key:
      label: Create, list, and view GPG keys
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    write:org:
      label: Read and write organization membership and organization projects
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    write:packages:
      label: Upload and publish packages to GitHub Packages
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    write:public_key:
      label: Create, list, and view SSH public keys
      docs_url: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
    write:repo_hook:
