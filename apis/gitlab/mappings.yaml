# GitLab HTTP REST API v4 — CML mappings for apis/gitlab/domain.yaml.
# Use --backend https://gitlab.com (or your self-managed origin). Paths are
# relative to the API root; include /api/v4 via path segments below.

# ── Project ─────────────────────────────────────────────────────────────────

project_query:
  method: GET
  path:
    - { type: literal, value: api }
    - { type: literal, value: v4 }
    - { type: literal, value: projects }
  response: bare_list
  query:
    type: object
    fields:
      - [search, { type: if, condition: { type: exists, var: search },
                   then_expr: { type: var, name: search },
                   else_expr: { type: const, value: null } }]
      - [visibility, { type: if, condition: { type: exists, var: visibility },
                      then_expr: { type: var, name: visibility },
                      else_expr: { type: const, value: null } }]
      - [archived, { type: if, condition: { type: exists, var: archived },
                     then_expr: { type: var, name: archived },
                     else_expr: { type: const, value: null } }]
      - [owned, { type: if, condition: { type: exists, var: owned },
                  then_expr: { type: var, name: owned },
                  else_expr: { type: const, value: null } }]
      - [membership, { type: if, condition: { type: exists, var: membership },
                      then_expr: { type: var, name: membership },
                      else_expr: { type: const, value: null } }]
      - [starred, { type: if, condition: { type: exists, var: starred },
                    then_expr: { type: var, name: starred },
                    else_expr: { type: const, value: null } }]
      - [order_by, { type: if, condition: { type: exists, var: order_by },
                     then_expr: { type: var, name: order_by },
                     else_expr: { type: const, value: null } }]
      - [sort, { type: if, condition: { type: exists, var: sort },
                 then_expr: { type: var, name: sort },
                 else_expr: { type: const, value: null } }]
      - [simple, { type: if, condition: { type: exists, var: simple },
                   then_expr: { type: var, name: simple },
                   else_expr: { type: const, value: null } }]
      - [statistics, { type: if, condition: { type: exists, var: statistics },
                      then_expr: { type: var, name: statistics },
                      else_expr: { type: const, value: null } }]
  pagination:
    params:
      page: { counter: 1 }
      per_page: { fixed: 20 }

project_get:
  method: GET
  path:
    - { type: literal, value: api }
    - { type: literal, value: v4 }
    - { type: literal, value: projects }
    - { type: var, name: id }
  response: single
  query:
    type: object
    fields:
      - [statistics, { type: if, condition: { type: exists, var: statistics },
                      then_expr: { type: var, name: statistics },
                      else_expr: { type: const, value: null } }]

