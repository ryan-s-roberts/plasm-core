# ── Project writes ───────────────────────────────────────────────────────────

project_create:
  method: POST
  path:
    - { type: literal, value: api }
    - { type: literal, value: v4 }
    - { type: literal, value: projects }
  response: single
  body:
    type: object
    fields:
      - [name, { type: var, name: name }]
      - [path, { type: if, condition: { type: exists, var: path },
                  then_expr: { type: var, name: path },
                  else_expr: { type: const, value: null } }]
      - [namespace_id, { type: if, condition: { type: exists, var: namespace_id },
                        then_expr: { type: var, name: namespace_id },
                        else_expr: { type: const, value: null } }]
      - [description, { type: if, condition: { type: exists, var: description },
                      then_expr: { type: var, name: description },
                      else_expr: { type: const, value: null } }]
      - [visibility, { type: if, condition: { type: exists, var: visibility },
                      then_expr: { type: var, name: visibility },
                      else_expr: { type: const, value: null } }]
      - [default_branch, { type: if, condition: { type: exists, var: default_branch },
                          then_expr: { type: var, name: default_branch },
                          else_expr: { type: const, value: null } }]
      - [issues_enabled, { type: if, condition: { type: exists, var: issues_enabled },
                          then_expr: { type: var, name: issues_enabled },
                          else_expr: { type: const, value: null } }]
      - [merge_requests_enabled, { type: if, condition: { type: exists, var: merge_requests_enabled },
                                    then_expr: { type: var, name: merge_requests_enabled },
                                    else_expr: { type: const, value: null } }]
      - [wiki_enabled, { type: if, condition: { type: exists, var: wiki_enabled },
                        then_expr: { type: var, name: wiki_enabled },
                        else_expr: { type: const, value: null } }]

