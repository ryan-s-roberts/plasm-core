version: 1
http_backend: https://gitlab.com
entities:
  Project:
    id_field: id
    description: GitLab project (repository namespace)
    fields:
      id:
        required: true
        value_ref: nv_project_id
      name:
        required: true
        value_ref: nv_project_name
      path:
        required: true
        value_ref: nv_project_path
      name_with_namespace:
        required: false
        value_ref: nv_project_name_with_namespace
      path_with_namespace:
        required: false
        value_ref: nv_project_path_with_namespace
      description:
        required: false
        value_ref: nv_project_description
      visibility:
        required: false
        value_ref: nv_project_visibility
      web_url:
        required: false
        value_ref: nv_project_web_url
      created_at:
        required: false
        value_ref: nv_project_created_at
      last_activity_at:
        required: false
        value_ref: nv_project_last_activity_at
      default_branch:
        required: false
        value_ref: nv_project_default_branch
      star_count:
        required: false
        value_ref: nv_project_star_count
      forks_count:
        required: false
        value_ref: nv_project_forks_count
      ssh_url_to_repo:
        required: false
        value_ref: nv_project_ssh_url_to_repo
      http_url_to_repo:
        required: false
        value_ref: nv_project_http_url_to_repo
    relations:
      issues:
        target: Issue
        cardinality: many
        via_param: project_id
      merge_requests:
        target: MergeRequest
        cardinality: many
        via_param: project_id
  Issue:
    id_field: id
    key_vars:
    - project_id
    - iid
    description: GitLab issue (project-scoped IID plus global id)
    fields:
      id:
        required: true
        value_ref: nv_issue_id
      iid:
        required: true
        value_ref: nv_issue_iid
      project_id:
        required: true
        value_ref: nv_issue_project_id
      title:
        required: true
        value_ref: nv_issue_title
      description:
        required: false
        value_ref: nv_issue_description
      state:
        required: false
        value_ref: nv_issue_state
      issue_type:
        required: false
        value_ref: nv_issue_issue_type
      confidential:
        required: false
        value_ref: nv_issue_confidential
      created_at:
        required: false
        value_ref: nv_issue_created_at
      updated_at:
        required: false
        value_ref: nv_issue_updated_at
      closed_at:
        required: false
        value_ref: nv_issue_closed_at
      web_url:
        required: false
        value_ref: nv_issue_web_url
      labels:
        required: false
        value_ref: nv_issue_labels
      time_estimate:
        required: false
        value_ref: nv_issue_time_estimate
      total_time_spent:
        required: false
        value_ref: nv_issue_total_time_spent
      human_time_estimate:
        required: false
        value_ref: nv_issue_human_time_estimate
      human_total_time_spent:
        required: false
        value_ref: nv_issue_human_total_time_spent
  MergeRequest:
    id_field: id
    key_vars:
    - project_id
    - iid
    description: GitLab merge request
    fields:
      id:
        required: true
        value_ref: nv_merge_request_id
      iid:
        required: true
        value_ref: nv_merge_request_iid
      project_id:
        required: true
        value_ref: nv_merge_request_project_id
      title:
        required: true
        value_ref: nv_merge_request_title
      description:
        required: false
        value_ref: nv_merge_request_description
      state:
        required: false
        value_ref: nv_merge_request_state
      draft:
        required: false
        value_ref: nv_merge_request_draft
      source_branch:
        required: false
        value_ref: nv_merge_request_source_branch
      target_branch:
        required: false
        value_ref: nv_merge_request_target_branch
      labels:
        required: false
        value_ref: nv_merge_request_labels
      created_at:
        required: false
        value_ref: nv_merge_request_created_at
      updated_at:
        required: false
        value_ref: nv_merge_request_updated_at
      merged_at:
        required: false
        value_ref: nv_merge_request_merged_at
      closed_at:
        required: false
        value_ref: nv_merge_request_closed_at
      web_url:
        required: false
        value_ref: nv_merge_request_web_url
      time_estimate:
        required: false
        value_ref: nv_merge_request_time_estimate
      total_time_spent:
        required: false
        value_ref: nv_merge_request_total_time_spent
      human_time_estimate:
        required: false
        value_ref: nv_merge_request_human_time_estimate
      human_total_time_spent:
        required: false
        value_ref: nv_merge_request_human_total_time_spent
  IssueNote:
    id_field: id
    key_vars:
    - project_id
    - iid
    - id
    description: Comment on a project issue
    fields:
      project_id:
        required: true
        value_ref: nv_issue_note_project_id
      iid:
        required: true
        value_ref: nv_issue_note_iid
      id:
        required: true
        value_ref: nv_issue_note_id
      body:
        required: false
        value_ref: nv_issue_note_body
      created_at:
        required: false
        value_ref: nv_issue_note_created_at
      updated_at:
        required: false
        value_ref: nv_issue_note_updated_at
      confidential:
        required: false
        value_ref: nv_issue_note_confidential
  MergeRequestNote:
    id_field: id
    key_vars:
    - project_id
    - iid
    - id
    description: Comment on a merge request
    fields:
      project_id:
        required: true
        value_ref: nv_merge_request_note_project_id
      iid:
        required: true
        value_ref: nv_merge_request_note_iid
      id:
        required: true
        value_ref: nv_merge_request_note_id
      body:
        required: false
        value_ref: nv_merge_request_note_body
      created_at:
        required: false
        value_ref: nv_merge_request_note_created_at
      updated_at:
        required: false
        value_ref: nv_merge_request_note_updated_at
  IssueAwardEmoji:
    id_field: id
    key_vars:
    - project_id
    - iid
    - id
    description: Emoji reaction on an issue
    fields:
      project_id:
        required: true
        value_ref: nv_issue_award_emoji_project_id
      iid:
        required: true
        value_ref: nv_issue_award_emoji_iid
      id:
        required: true
        value_ref: nv_issue_award_emoji_id
      name:
        required: true
        value_ref: nv_issue_award_emoji_name
      created_at:
        required: false
        value_ref: nv_issue_award_emoji_created_at
      updated_at:
        required: false
        value_ref: nv_issue_award_emoji_updated_at
  MergeRequestAwardEmoji:
    id_field: id
    key_vars:
    - project_id
    - iid
    - id
    description: Emoji reaction on a merge request
    fields:
      project_id:
        required: true
        value_ref: nv_merge_request_award_emoji_project_id
      iid:
        required: true
        value_ref: nv_merge_request_award_emoji_iid
      id:
        required: true
        value_ref: nv_merge_request_award_emoji_id
      name:
        required: true
        value_ref: nv_merge_request_award_emoji_name
      created_at:
        required: false
        value_ref: nv_merge_request_award_emoji_created_at
      updated_at:
        required: false
        value_ref: nv_merge_request_award_emoji_updated_at
capabilities:
  project_query:
    kind: query
    entity: Project
    description: List projects visible to the authenticated account
    parameters:
    - name: search
      value_ref: nv_project_query_search
      required: false
      role: search
    - name: visibility
      value_ref: nv_project_query_visibility
      required: false
    - name: archived
      value_ref: nv_project_query_archived
      required: false
    - name: owned
      value_ref: nv_project_query_owned
      required: false
    - name: membership
      value_ref: nv_project_query_membership
      required: false
    - name: starred
      value_ref: nv_project_query_starred
      required: false
    - name: order_by
      value_ref: nv_project_query_order_by
      required: false
      role: sort
    - name: sort
      value_ref: nv_project_query_sort
      required: false
      role: sort_direction
    - name: simple
      value_ref: nv_project_query_simple
      required: false
      role: response_control
    - name: statistics
      value_ref: nv_project_query_statistics
      required: false
      role: response_control
  project_get:
    kind: get
    entity: Project
    description: Fetch one project by numeric id or URL-encoded path
    parameters:
    - name: statistics
      value_ref: nv_project_get_statistics
      required: false
      role: response_control
    provides:
    - id
    - name
    - path
    - name_with_namespace
    - path_with_namespace
    - description
    - visibility
    - web_url
    - created_at
    - last_activity_at
    - default_branch
    - star_count
    - forks_count
    - ssh_url_to_repo
    - http_url_to_repo
  issue_query:
    kind: query
    entity: Issue
    description: List issues for the current user across projects
    parameters:
    - name: state
      value_ref: nv_issue_query_state
      required: false
    - name: search
      value_ref: nv_issue_query_search
      required: false
      role: search
    - name: scope
      value_ref: nv_issue_query_scope
      required: false
    - name: order_by
      value_ref: nv_issue_query_order_by
      required: false
      role: sort
    - name: sort
      value_ref: nv_issue_query_sort
      required: false
      role: sort_direction
  issue_for_project_query:
    kind: query
    entity: Issue
    description: List issues within a single project
    parameters:
    - name: project_id
      value_ref: nv_issue_for_project_query_project_id
      required: true
      role: scope
    - name: state
      value_ref: nv_issue_for_project_query_state
      required: false
    - name: search
      value_ref: nv_issue_for_project_query_search
      required: false
      role: search
    - name: order_by
      value_ref: nv_issue_for_project_query_order_by
      required: false
      role: sort
    - name: sort
      value_ref: nv_issue_for_project_query_sort
      required: false
      role: sort_direction
  issue_get:
    kind: get
    entity: Issue
    description: Fetch a project issue by project and IID
    provides:
    - id
    - iid
    - project_id
    - title
    - description
    - state
    - issue_type
    - confidential
    - created_at
    - updated_at
    - closed_at
    - web_url
    - labels
  merge_request_query:
    kind: query
    entity: MergeRequest
    description: List merge requests visible to the authenticated user
    parameters:
    - name: state
      value_ref: nv_merge_request_query_state
      required: false
    - name: scope
      value_ref: nv_merge_request_query_scope
      required: false
    - name: order_by
      value_ref: nv_merge_request_query_order_by
      required: false
      role: sort
    - name: sort
      value_ref: nv_merge_request_query_sort
      required: false
      role: sort_direction
  merge_request_for_project_query:
    kind: query
    entity: MergeRequest
    description: List merge requests for a project
    parameters:
    - name: project_id
      value_ref: nv_merge_request_for_project_query_project_id
      required: true
      role: scope
    - name: state
      value_ref: nv_merge_request_for_project_query_state
      required: false
    - name: order_by
      value_ref: nv_merge_request_for_project_query_order_by
      required: false
      role: sort
    - name: sort
      value_ref: nv_merge_request_for_project_query_sort
      required: false
      role: sort_direction
  merge_request_get:
    kind: get
    entity: MergeRequest
    description: Fetch a merge request by project and IID
    provides:
    - id
    - iid
    - project_id
    - title
    - description
    - state
    - draft
    - source_branch
    - target_branch
    - labels
    - created_at
    - updated_at
    - merged_at
    - closed_at
    - web_url
  project_create:
    kind: create
    entity: Project
    description: Create a new project under the authenticated user or namespace
    parameters:
    - name: name
      value_ref: nv_project_create_name
      required: true
    - name: path
      value_ref: nv_project_create_path
      required: false
    - name: namespace_id
      value_ref: nv_project_create_namespace_id
      required: false
    - name: description
      value_ref: nv_project_create_description
      required: false
    - name: visibility
      value_ref: nv_project_create_visibility
      required: false
    - name: default_branch
      value_ref: nv_project_create_default_branch
      required: false
    - name: issues_enabled
      value_ref: nv_project_create_issues_enabled
      required: false
    - name: merge_requests_enabled
      value_ref: nv_project_create_merge_requests_enabled
      required: false
    - name: wiki_enabled
      value_ref: nv_project_create_wiki_enabled
      required: false
  project_update:
    kind: update
    entity: Project
    description: Update project attributes
    parameters:
    - name: name
      value_ref: nv_project_update_name
      required: false
    - name: path
      value_ref: nv_project_update_path
      required: false
    - name: description
      value_ref: nv_project_update_description
      required: false
    - name: default_branch
      value_ref: nv_project_update_default_branch
      required: false
    - name: visibility
      value_ref: nv_project_update_visibility
      required: false
    - name: issues_enabled
      value_ref: nv_project_update_issues_enabled
      required: false
    - name: merge_requests_enabled
      value_ref: nv_project_update_merge_requests_enabled
      required: false
    - name: wiki_enabled
      value_ref: nv_project_update_wiki_enabled
      required: false
  project_delete:
    kind: delete
    entity: Project
    description: Delete a project asynchronously
  issue_create:
    kind: create
    entity: Issue
    description: Create an issue in a project
    parameters:
    - name: project_id
      value_ref: nv_issue_create_project_id
      required: true
    - name: title
      value_ref: nv_issue_create_title
      required: true
    - name: description
      value_ref: nv_issue_create_description
      required: false
    - name: confidential
      value_ref: nv_issue_create_confidential
      required: false
    - name: labels
      value_ref: nv_issue_create_labels
      required: false
    - name: issue_type
      value_ref: nv_issue_create_issue_type
      required: false
    - name: milestone_id
      value_ref: nv_issue_create_milestone_id
      required: false
    - name: assignee_ids
      value_ref: nv_issue_create_assignee_ids
      required: false
  issue_update:
    kind: update
    entity: Issue
    description: Update an existing issue
    parameters:
    - name: title
      value_ref: nv_issue_update_title
      required: false
    - name: description
      value_ref: nv_issue_update_description
      required: false
    - name: state_event
      value_ref: nv_issue_update_state_event
      required: false
    - name: confidential
      value_ref: nv_issue_update_confidential
      required: false
    - name: labels
      value_ref: nv_issue_update_labels
      required: false
    - name: add_labels
      value_ref: nv_issue_update_add_labels
      required: false
    - name: remove_labels
      value_ref: nv_issue_update_remove_labels
      required: false
    - name: milestone_id
      value_ref: nv_issue_update_milestone_id
      required: false
    - name: assignee_ids
      value_ref: nv_issue_update_assignee_ids
      required: false
  issue_delete:
    kind: delete
    entity: Issue
    description: Delete a project issue
  merge_request_create:
    kind: create
    entity: MergeRequest
    description: Open a new merge request
    parameters:
    - name: project_id
      value_ref: nv_merge_request_create_project_id
      required: true
    - name: title
      value_ref: nv_merge_request_create_title
      required: true
    - name: source_branch
      value_ref: nv_merge_request_create_source_branch
      required: true
    - name: target_branch
      value_ref: nv_merge_request_create_target_branch
      required: true
    - name: description
      value_ref: nv_merge_request_create_description
      required: false
    - name: draft
      value_ref: nv_merge_request_create_draft
      required: false
    - name: labels
      value_ref: nv_merge_request_create_labels
      required: false
    - name: milestone_id
      value_ref: nv_merge_request_create_milestone_id
      required: false
    - name: remove_source_branch
      value_ref: nv_merge_request_create_remove_source_branch
      required: false
  merge_request_update:
    kind: update
    entity: MergeRequest
    description: Update merge request fields
    parameters:
    - name: title
      value_ref: nv_merge_request_update_title
      required: false
    - name: description
      value_ref: nv_merge_request_update_description
      required: false
    - name: target_branch
      value_ref: nv_merge_request_update_target_branch
      required: false
    - name: state_event
      value_ref: nv_merge_request_update_state_event
      required: false
    - name: draft
      value_ref: nv_merge_request_update_draft
      required: false
    - name: labels
      value_ref: nv_merge_request_update_labels
      required: false
  merge_request_delete:
    kind: delete
    entity: MergeRequest
    description: Delete a merge request
  merge_request_merge:
    kind: action
    entity: MergeRequest
    description: Merge the merge request when allowed
    parameters:
    - name: merge_commit_message
      value_ref: nv_merge_request_merge_merge_commit_message
      required: false
    - name: squash_commit_message
      value_ref: nv_merge_request_merge_squash_commit_message
      required: false
    - name: should_remove_source_branch
      value_ref: nv_merge_request_merge_should_remove_source_branch
      required: false
    - name: squash
      value_ref: nv_merge_request_merge_squash
      required: false
    - name: sha
      value_ref: nv_merge_request_merge_sha
      required: false
    - name: auto_merge
      value_ref: nv_merge_request_merge_auto_merge
      required: false
    provides:
    - id
    - iid
    - project_id
    - title
    - state
    - merged_at
  issue_subscribe:
    kind: action
    entity: Issue
    description: Subscribe the authenticated user to the issue
    output:
      type: side_effect
      description: Subscribes the current user to issue notifications; response is not mapped onto Issue fields.
  issue_unsubscribe:
    kind: action
    entity: Issue
    description: Unsubscribe the authenticated user from the issue
    output:
      type: side_effect
      description: Unsubscribes the current user from issue notifications.
  merge_request_subscribe:
    kind: action
    entity: MergeRequest
    description: Subscribe the authenticated user to the merge request
    output:
      type: side_effect
      description: Subscribes the current user to merge request notifications.
  merge_request_unsubscribe:
    kind: action
    entity: MergeRequest
    description: Unsubscribe from the merge request
    output:
      type: side_effect
      description: Unsubscribes the current user from merge request notifications.
  issue_time_stats:
    kind: action
    entity: Issue
    description: Refresh time tracking estimates and spent time for the issue
    provides:
    - time_estimate
    - total_time_spent
    - human_time_estimate
    - human_total_time_spent
  merge_request_time_stats:
    kind: action
    entity: MergeRequest
    description: Refresh time tracking estimates for the merge request
    provides:
    - time_estimate
    - total_time_spent
    - human_time_estimate
    - human_total_time_spent
  issue_note_for_issue_query:
    kind: query
    entity: IssueNote
    description: List notes on a project issue
    parameters:
    - name: project_id
      value_ref: nv_issue_note_for_issue_query_project_id
      required: true
      role: scope
    - name: iid
      value_ref: nv_issue_note_for_issue_query_iid
      required: true
  issue_note_get:
    kind: get
    entity: IssueNote
    description: Fetch one issue note
    provides:
    - id
    - body
    - created_at
    - updated_at
    - confidential
  issue_note_create:
    kind: create
    entity: IssueNote
    description: Add a note to an issue
    parameters:
    - name: project_id
      value_ref: nv_issue_note_create_project_id
      required: true
    - name: iid
      value_ref: nv_issue_note_create_iid
      required: true
    - name: body
      value_ref: nv_issue_note_create_body
      required: true
    - name: confidential
      value_ref: nv_issue_note_create_confidential
      required: false
  issue_note_update:
    kind: update
    entity: IssueNote
    description: Edit an issue note
    parameters:
    - name: body
      value_ref: nv_issue_note_update_body
      required: true
  issue_note_delete:
    kind: delete
    entity: IssueNote
    description: Delete an issue note
  merge_request_note_for_mr_query:
    kind: query
    entity: MergeRequestNote
    description: List notes on a merge request
    parameters:
    - name: project_id
      value_ref: nv_merge_request_note_for_mr_query_project_id
      required: true
      role: scope
    - name: iid
      value_ref: nv_merge_request_note_for_mr_query_iid
      required: true
  merge_request_note_get:
    kind: get
    entity: MergeRequestNote
    description: Fetch one merge request note
    provides:
    - id
    - body
    - created_at
    - updated_at
  merge_request_note_create:
    kind: create
    entity: MergeRequestNote
    description: Add a note to a merge request
    parameters:
    - name: project_id
      value_ref: nv_merge_request_note_create_project_id
      required: true
    - name: iid
      value_ref: nv_merge_request_note_create_iid
      required: true
    - name: body
      value_ref: nv_merge_request_note_create_body
      required: true
  merge_request_note_update:
    kind: update
    entity: MergeRequestNote
    description: Edit a merge request note
    parameters:
    - name: body
      value_ref: nv_merge_request_note_update_body
      required: true
  merge_request_note_delete:
    kind: delete
    entity: MergeRequestNote
    description: Delete a merge request note
  issue_award_emoji_for_issue_query:
    kind: query
    entity: IssueAwardEmoji
    description: List award emoji on an issue
    parameters:
    - name: project_id
      value_ref: nv_issue_award_emoji_for_issue_query_project_id
      required: true
      role: scope
    - name: iid
      value_ref: nv_issue_award_emoji_for_issue_query_iid
      required: true
  issue_award_emoji_get:
    kind: get
    entity: IssueAwardEmoji
    description: Fetch one award emoji on an issue
    provides:
    - id
    - name
    - created_at
    - updated_at
  issue_award_emoji_create:
    kind: create
    entity: IssueAwardEmoji
    description: Add an emoji reaction to an issue
    parameters:
    - name: project_id
      value_ref: nv_issue_award_emoji_create_project_id
      required: true
    - name: iid
      value_ref: nv_issue_award_emoji_create_iid
      required: true
    - name: name
      value_ref: nv_issue_award_emoji_create_name
      required: true
  issue_award_emoji_delete:
    kind: delete
    entity: IssueAwardEmoji
    description: Remove an award emoji from an issue
  merge_request_award_emoji_for_mr_query:
    kind: query
    entity: MergeRequestAwardEmoji
    description: List award emoji on a merge request
    parameters:
    - name: project_id
      value_ref: nv_merge_request_award_emoji_for_mr_query_project_id
      required: true
      role: scope
    - name: iid
      value_ref: nv_merge_request_award_emoji_for_mr_query_iid
      required: true
