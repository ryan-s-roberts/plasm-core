version: 2
http_backend: https://gitlab.com
entities:
  Project:
    id_field: id
    description: GitLab project (repository namespace)
    fields:
      id:
        required: true
        value_ref: nv_wire_int
      name:
        required: true
        value_ref: nv_wire_str_short
      path:
        required: true
        value_ref: nv_wire_str_short
      name_with_namespace:
        required: false
        value_ref: nv_wire_str_short
      path_with_namespace:
        required: false
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      visibility:
        required: false
        value_ref: nv_wire_str_short
      web_url:
        required: false
        value_ref: nv_wire_str_short
      created_at:
        required: false
        value_ref: nv_wire_date_rfc3339
      last_activity_at:
        required: false
        value_ref: nv_wire_date_rfc3339
      default_branch:
        required: false
        value_ref: nv_wire_str_short
      star_count:
        required: false
        value_ref: nv_wire_int
      forks_count:
        required: false
        value_ref: nv_wire_int
      ssh_url_to_repo:
        required: false
        value_ref: nv_wire_str_short
      http_url_to_repo:
        required: false
        value_ref: nv_wire_str_short
    relations:
      issues:
        target: Issue
        cardinality: many
        via_param: project_id
      merge_requests:
        target: MergeRequest
        cardinality: many
        via_param: project_id
  Issue:
    id_field: id
    key_vars:
    - project_id
    - iid
    description: GitLab issue (project-scoped IID plus global id)
    fields:
      id:
        required: true
        value_ref: nv_wire_int
      iid:
        required: true
        value_ref: nv_wire_int
      project_id:
        required: true
        value_ref: nv_issue_project_id
      title:
        required: true
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      state:
        required: false
        value_ref: nv_issue_state
      issue_type:
        required: false
        value_ref: nv_wire_str_short
      confidential:
        required: false
        value_ref: nv_wire_bool
      created_at:
        required: false
        value_ref: nv_wire_date_rfc3339
      updated_at:
        required: false
        value_ref: nv_wire_date_rfc3339
      closed_at:
        required: false
        value_ref: nv_wire_date_rfc3339
      web_url:
        required: false
        value_ref: nv_wire_str_short
      labels:
        required: false
        value_ref: nv_issue_labels
      time_estimate:
        required: false
        value_ref: nv_wire_int
      total_time_spent:
        required: false
        value_ref: nv_wire_int
      human_time_estimate:
        required: false
        value_ref: nv_wire_str_short
      human_total_time_spent:
        required: false
        value_ref: nv_wire_str_short
  MergeRequest:
    id_field: id
    key_vars:
    - project_id
    - iid
    description: GitLab merge request
    fields:
      id:
        required: true
        value_ref: nv_wire_int
      iid:
        required: true
        value_ref: nv_wire_int
      project_id:
        required: true
        value_ref: nv_merge_request_project_id
      title:
        required: true
        value_ref: nv_wire_str_short
      description:
        required: false
        value_ref: nv_wire_str_markdown
      state:
        required: false
        value_ref: nv_wire_str_short
      draft:
        required: false
        value_ref: nv_wire_bool
      source_branch:
        required: false
        value_ref: nv_wire_str_short
      target_branch:
        required: false
        value_ref: nv_wire_str_short
      labels:
        required: false
        value_ref: nv_wire_str_short
      created_at:
        required: false
        value_ref: nv_wire_date_rfc3339
      updated_at:
        required: false
        value_ref: nv_wire_date_rfc3339
      merged_at:
        required: false
        value_ref: nv_wire_date_rfc3339
      closed_at:
        required: false
        value_ref: nv_wire_date_rfc3339
      web_url:
        required: false
        value_ref: nv_wire_str_short
      time_estimate:
        required: false
        value_ref: nv_wire_int
      total_time_spent:
        required: false
        value_ref: nv_wire_int
      human_time_estimate:
        required: false
        value_ref: nv_wire_str_short
      human_total_time_spent:
        required: false
        value_ref: nv_wire_str_short
  IssueNote:
    id_field: id
    key_vars:
    - project_id
    - iid
    - id
    description: Comment on a project issue
    fields:
      project_id:
        required: true
        value_ref: nv_issue_note_project_id
      iid:
        required: true
        value_ref: nv_wire_int
      id:
        required: true
        value_ref: nv_wire_str_short
      body:
        required: false
        value_ref: nv_wire_str_markdown
      created_at:
        required: false
        value_ref: nv_wire_date_rfc3339
      updated_at:
        required: false
        value_ref: nv_wire_date_rfc3339
      confidential:
        required: false
        value_ref: nv_wire_bool
  MergeRequestNote:
    id_field: id
    key_vars:
    - project_id
    - iid
    - id
    description: Comment on a merge request
    fields:
      project_id:
        required: true
        value_ref: nv_merge_request_note_project_id
      iid:
        required: true
        value_ref: nv_wire_int
      id:
        required: true
        value_ref: nv_wire_str_short
      body:
        required: false
        value_ref: nv_wire_str_markdown
      created_at:
        required: false
        value_ref: nv_wire_date_rfc3339
      updated_at:
        required: false
        value_ref: nv_wire_date_rfc3339
  IssueAwardEmoji:
    id_field: id
    key_vars:
    - project_id
    - iid
    - id
    description: Emoji reaction on an issue
    fields:
      project_id:
        required: true
        value_ref: nv_issue_award_emoji_project_id
      iid:
        required: true
        value_ref: nv_wire_int
      id:
        required: true
        value_ref: nv_wire_int
      name:
        required: true
        value_ref: nv_wire_str_short
      created_at:
        required: false
        value_ref: nv_wire_date_rfc3339
      updated_at:
        required: false
        value_ref: nv_wire_date_rfc3339
  MergeRequestAwardEmoji:
    id_field: id
    key_vars:
    - project_id
    - iid
    - id
    description: Emoji reaction on a merge request
    fields:
      project_id:
        required: true
        value_ref: nv_merge_request_award_emoji_project_id
      iid:
        required: true
        value_ref: nv_wire_int
      id:
        required: true
        value_ref: nv_wire_int
      name:
        required: true
        value_ref: nv_wire_str_short
      created_at:
        required: false
        value_ref: nv_wire_date_rfc3339
      updated_at:
        required: false
        value_ref: nv_wire_date_rfc3339
capabilities:
  project_query:
    kind: query
    entity: Project
    description: List projects visible to the authenticated account
    parameters:
    - name: search
      value_ref: nv_wire_str_short
      required: false
      role: search
    - name: visibility
      value_ref: nv_wire_sel_8807b75f968505fb
      required: false
    - name: archived
      value_ref: nv_wire_bool
      required: false
    - name: owned
      value_ref: nv_wire_bool
      required: false
    - name: membership
      value_ref: nv_wire_bool
      required: false
    - name: starred
      value_ref: nv_wire_bool
      required: false
    - name: order_by
