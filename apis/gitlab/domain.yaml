    - name: search
      value_ref: nv_wire_str_short
      required: false
      role: search
    - name: order_by
      value_ref: nv_wire_sel_bc45924eafff6feb
      required: false
      role: sort
    - name: sort
      value_ref: nv_wire_sel_1b3907e07c1297e8
      required: false
