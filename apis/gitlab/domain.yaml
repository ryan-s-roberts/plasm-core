    - name: state
      value_ref: nv_wire_sel_c4015a1a98023521
      required: false
    - name: search
      value_ref: nv_wire_str_short
      required: false
      role: search
    - name: scope
      value_ref: nv_issue_query_scope
      required: false
    - name: order_by
      value_ref: nv_wire_sel_bc45924eafff6feb
      required: false
      role: sort
    - name: sort
      value_ref: nv_wire_sel_1b3907e07c1297e8
